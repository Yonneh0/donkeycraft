<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkeycraft — Terrain Viewer/Debugger</title>

    <!-- Terrain Debug UI Styles -->
    <link rel="stylesheet" href="src/ui/terrain-debug-ui.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        canvas#dk-terrain-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <canvas id="dk-terrain-canvas"></canvas>

    <!-- FPS Counter -->
    <div id="dk-fps-counter">FPS: --</div>

    <!-- Instructions -->
    <div id="dk-terrain-instructions">WASD: Move | Q: Speed Cycle | Z: Down | Mouse: Look | Click: Lock Pointer | E:
        Ground Level | F: NE Overview | R: Regenerate</div>

    <!-- Speed Indicator -->
    <div id="dk-speed-indicator">
        <span class="speed-emoji">🏃</span>
        <span class="speed-label">Normal Speed</span>
    </div>

    <!-- ============================================================
         Core Infrastructure (required by debug renderer modules)
         ============================================================ -->
    <script src="src/core/namespace.js"></script>
    <script src="src/core/eventbus.js"></script>
    <script src="src/core/config.js"></script>
    <script src="src/core/logger.js"></script>
    <script src="src/core/timer.js"></script>
    <script src="src/core/input.js"></script>
    <script src="src/core/math-utils.js"></script>

    <!-- Game Data -->
    <script src="src/game/block.js"></script>
    <script src="src/game/block-types.js"></script>
    <script src="src/game/chunk.js"></script>
    <script src="src/game/biome.js"></script>

    <!-- Block Colors (extracted from terrain.html) -->
    <script src="src/game/block-colors.js"></script>

    <!-- Generation Modules -->
    <script src="src/gen/noise.js"></script>
    <script src="src/core/storage.js"></script>
    <script src="src/gen/terrain-core.js"></script>
    <script src="src/gen/chunk-grid.js"></script>
    <script src="src/gen/surface-generator.js"></script>
    <script src="src/gen/terrain-generator.js"></script>
    <script src="src/gen/ore-generator.js"></script>
    <script src="src/gen/cave-generator.js"></script>
    <script src="src/gen/structure-generator.js"></script>
    <script src="src/gen/water-generator.js"></script>
    <script src="src/game/terrain-surface.js"></script>

    <!-- Debug Renderer Shaders (extracted from terrain.html) -->
    <script src="src/render/debug-shaders.js"></script>

    <!-- Debug Terrain Renderer (extracted from terrain.html) -->
    <script src="src/render/debug-render.js"></script>

    <!-- Terrain Debug UI Module (extracted from terrain.html) -->
    <script src="src/ui/terrain-debug-ui.js"></script>

    <!-- Application Entry Point -->
    <script>
        (function () {
            'use strict';

            var Donkeycraft = window.Donkeycraft;
            if (!Donkeycraft) {
                document.body.innerHTML = '<h1 style="color:red;padding:40px;">Failed to load Donkeycraft namespace</h1>';
                return;
            }

            /**
             * Initialize the terrain debug viewer.
             */
            function init() {
                // Create and initialize the debug terrain renderer
                var renderer = new Donkeycraft.DebugTerrainRenderer();
                var ok = renderer.init('dk-terrain-canvas');
                if (!ok) {
                    document.body.innerHTML = '<h1 style="color:red;padding:40px;">WebGL not supported or shader compilation failed</h1>';
                    return;
                }

                // Initialize the UI panel and wire up handlers
                var ui = new Donkeycraft.TerrainDebugUI(renderer);
                ui.init();

                // Set initial parameters from saved state or defaults
                var savedState = renderer._loadState ? renderer._loadState() : false;

                if (savedState) {
                    // Apply saved biome
                    if (renderer.setBiome) renderer.setBiome(renderer._selectedBiomeId);
                    // Apply saved seed
                    if (renderer.setSeed) renderer.setSeed(renderer._worldSeed);
                    // Apply saved options
                    if (renderer.setOptions) renderer.setOptions(renderer._options);
                    // Apply saved camera position
                    if (renderer.setCameraPosition) {
                        renderer.setCameraPosition(
                            renderer._camera.x,
                            renderer._camera.y,
                            renderer._camera.z
                        );
                    }
                }

                // Regenerate terrain with initial parameters
                if (renderer.regenerateTerrain) {
                    renderer.regenerateTerrain();
                }

                // Start the render loop
                renderer.start();

                // Store globally for debugging
                window._dkTerrainRenderer = renderer;
                window._dkTerrainUI = ui;
            }

            // Start when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>

</html>
