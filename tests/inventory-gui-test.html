<!-- Your test script -->
<script>
(function() {
    'use strict';

    // Get the shared framework instance
    var F = TestFramework;

    // Initialize: creates #test-summary at top, uses existing #results div
    F.init('results');

    // ============================================================
    // Section 1: ItemStack — Core Item Data Structure
    // ============================================================
    F.section('1. ItemStack — Core Item Data Structure');

    // Basic creation
    var stack1 = new Donkeycraft.ItemStack(1, 64);
    F.assert(!stack1.isEmpty(), 'ItemStack(id=1, count=64) is not empty');
    F.assertEq(stack1.getItemId(), 1, 'getItemId() returns 1');
    F.assertEq(stack1.getCount(), 64, 'getCount() returns 64');

    // Empty stack
    var emptyStack = new Donkeycraft.ItemStack(0, 0);
    F.assert(emptyStack.isEmpty(), 'ItemStack(id=0, count=0) is empty');

    // Tag system
    var taggedStack = new Donkeycraft.ItemStack(218, 1, { durability: 50 });
    F.assert(taggedStack.hasTag(), 'hasTag() returns true for stack with tag');
    F.assertEq(taggedStack.getDurability(), 50, 'getDurability() returns tag value');

    // increment/decrement
    var stack2 = new Donkeycraft.ItemStack(3, 10);
    stack2.increment(5);
    F.assertEq(stack2.getCount(), 15, 'increment(5) from 10 → 15');
    stack2.decrement(3);
    F.assertEq(stack2.getCount(), 12, 'decrement(3) from 15 → 12');

    // Cloning (deep copy)
    var stack3 = new Donkeycraft.ItemStack(5, 10, { customName: 'Test' });
    var clone = stack3.clone();
    F.assertEq(clone.getItemId(), 5, 'clone getItemId matches');
    F.assertEq(clone.getCount(), 10, 'clone getCount matches');
    F.assertEq(clone.getTag().customName, 'Test', 'clone tag.customName matches');
    // Verify deep copy — modifying clone doesn't affect original
    clone.setTag({ customName: 'Modified' });
    F.assertEq(stack3.getTag().customName, 'Test', 'original tag unchanged after clone modification');

    // matches() / canStackWith()
    var stackA = new Donkeycraft.ItemStack(1, 32);
    var stackB = new Donkeycraft.ItemStack(1, 32);
    F.assert(stackA.matches(stackB), 'Two identical stacks match');
    F.assert(stackA.canStackWith(stackB), 'Two matching stacks can stack');

    // Stacks with different tags should NOT match
    var stackC = new Donkeycraft.ItemStack(1, 32, { durability: 0 });
    var stackD = new Donkeycraft.ItemStack(1, 32, { durability: 50 });
    F.assert(!stackC.matches(stackD), 'Stacks with different tags do not match');
    F.assert(!stackC.canStackWith(stackD), 'Stacks with different tags cannot stack');

    // Serialization round-trip
    var original = new Donkeycraft.ItemStack(218, 64, { enchantments: [{id: 1, level: 3}] });
    var serialized = original.serialize();
    var restored = Donkeycraft.ItemStack.fromObject(serialized);
    F.assertEq(restored.getItemId(), 218, 'serialized getItemId matches');
    F.assertEq(restored.getCount(), 64, 'serialized getCount matches');
    F.assertEq(restored.getEnchantments().length, 1, 'serialized enchantments count matches');
    F.assertEq(restored.getEnchantments()[0].level, 3, 'serialized enchantment level matches');

    // fromObject with missing data
    var nullStack = Donkeycraft.ItemStack.fromObject(null);
    F.assert(nullStack.isEmpty(), 'fromObject(null) returns empty stack');
    var badStack = Donkeycraft.ItemStack.fromObject({});
    F.assert(badStack.isEmpty(), 'fromObject({}) returns empty stack');

    // toString
    F.assert(typeof stack1.toString() === 'string', 'toString() returns a string');

    // ============================================================
    // Section 2: Inventory — Slot Management & Operations
    // ============================================================
    F.section('2. Inventory — Slot Management & Operations');

    var inv = new Donkeycraft.Inventory(9, 'Test Inventory');
    F.assertEq(inv.getSlotCount(), 9, 'Inventory has 9 slots');
    F.assertEq(inv.getTitle(), 'Test Inventory', 'Inventory title is correct');

    // setSlot / getSlot
    F.assert(inv.setSlot(0, new Donkeycraft.ItemStack(1, 16)), 'setSlot(0, stone) succeeds');
    F.assert(!inv.setSlot(-1, null), 'setSlot(-1) fails validation');
    F.assert(!inv.setSlot(9, null), 'setSlot(9) fails validation');

    var slot0 = inv.getSlot(0);
    F.assertEq(slot0.getItemId(), 1, 'getSlot(0) returns stone');
    F.assertEq(slot0.getCount(), 16, 'getSlot(0) count is 16');
    F.assert(inv.getSlot(5) === null, 'Empty slot returns null');

    // clearSlot
    inv.clearSlot(0);
    F.assert(inv.getSlot(0) === null, 'clearSlot(0) makes slot null');

    // getAllSlots
    inv.setSlot(0, new Donkeycraft.ItemStack(1, 8));
    inv.setSlot(1, new Donkeycraft.ItemStack(3, 16));
    var all = inv.getAllSlots();
    F.assertEq(all.length, 9, 'getAllSlots returns 9 elements');
    F.assertEq(all[0].getCount(), 8, 'getAllSlots[0] count is 8');

    // findEmptySlot
    var emptyIdx = inv.findEmptySlot();
    F.assert(emptyIdx >= 2, 'findEmptySlot returns index >= 2 (first two filled)');

    // addItem — stacks into existing, then fills empty
    var inv2 = new Donkeycraft.Inventory(9);
    inv2.setSlot(0, new Donkeycraft.ItemStack(1, 32));
    var added = inv2.addItem(new Donkeycraft.ItemStack(1, 40));
    // addItem returns total items successfully added (32 into existing + 8 into empty = 40)
    F.assertEq(added, 40, 'addItem fills existing stack then empty slot');

    // addItem with different item
    var added2 = inv2.addItem(new Donkeycraft.ItemStack(3, 10));
    F.assertEq(added2, 10, 'addItem with different item ID succeeds');

    // removeItem
    var inv3 = new Donkeycraft.Inventory(9);
    inv3.setSlot(0, new Donkeycraft.ItemStack(1, 32));
    inv3.setSlot(1, new Donkeycraft.ItemStack(1, 16));
    var removed = inv3.removeItem(new Donkeycraft.ItemStack(1, 20));
    F.assert(removed !== null, 'removeItem returns a stack');
    F.assertEq(removed.getCount(), 20, 'removeItem count is 20');

    // removeItem non-existent
    var noneRemoved = inv3.removeItem(new Donkeycraft.ItemStack(5, 1));
    F.assert(noneRemoved === null, 'removeItem for non-existent item returns null');

    // contains / getItemCount
    F.assert(inv3.contains(1), 'contains(1) is true');
    F.assert(!inv3.contains(5), 'contains(5) is false');
    F.assertEq(inv3.getItemCount(1), 28, 'getItemCount(1) returns 28 (32-20+16)');

    // shiftClick
    var inv4 = new Donkeycraft.Inventory(4);
    inv4.setSlot(0, new Donkeycraft.ItemStack(1, 64));
    inv4.setSlot(1, new Donkeycraft.ItemStack(3, 32));
    inv4.shiftClick(0);
    var slotAfterShift = inv4.getSlot(0);
    F.assert(slotAfterShift === null || slotAfterShift.getCount() < 64, 'shiftClick moves items from source');

    // serialize / deserialize
    var inv5 = new Donkeycraft.Inventory(3, 'Serialize Test');
    inv5.setSlot(0, new Donkeycraft.ItemStack(1, 16));
    inv5.setSlot(2, new Donkeycraft.ItemStack(3, 8));
    var data = inv5.serialize();
    F.assertEq(data.slots.length, 3, 'serialize slots length is 3');
    F.assertEq(data.title, 'Serialize Test', 'serialize title preserved');

    var inv6 = new Donkeycraft.Inventory(3);
    inv6.deserialize(data);
    F.assertEq(inv6.getSlot(0).getCount(), 16, 'deserialize restores slot 0');
    F.assertEq(inv6.getSlot(2).getCount(), 8, 'deserialize restores slot 2');
    F.assertEq(inv6.getTitle(), 'Serialize Test', 'deserialize restores title');

    // ============================================================
    // Section 3: Hotbar — Slot Rendering & Selection
    // ============================================================
    F.section('3. Hotbar — Slot Rendering & Selection');

    // Create a DOM container for hotbar
    var hotbarContainer = document.createElement('div');
    hotbarContainer.id = 'hotbar-test-container';
    document.body.appendChild(hotbarContainer);

    var hotbar = new Donkeycraft.Hotbar(hotbarContainer);
    F.assertEq(hotbar.getSelectedSlot(), 0, 'Hotbar default selected slot is 0');

    // setSelectedSlot
    hotbar.setSelectedSlot(4);
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(4) works');
    hotbar.setSelectedSlot(4); // Should be no-op (same slot)
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(same) is no-op');

    // setSelectedSlot validation
    hotbar.setSelectedSlot(-1);
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(-1) is ignored');
    hotbar.setSelectedSlot(9);
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(9) is ignored');

    // setSlots
    var stacks = [];
    for (var s = 0; s < 9; s++) {
        stacks[s] = new Donkeycraft.ItemStack(s + 1, 1);
    }
    hotbar.setSlots(stacks);
    F.assert(hotbar._slots[0] !== null, 'setSlots populates slot 0');

    // selectNext / selectPrev
    hotbar.setSelectedSlot(0);
    hotbar.selectNext();
    F.assertEq(hotbar.getSelectedSlot(), 1, 'selectNext cycles forward');
    hotbar.selectPrev();
    F.assertEq(hotbar.getSelectedSlot(), 0, 'selectPrev cycles backward');

    // destroy
    hotbar.destroy();
    document.body.removeChild(hotbarContainer);

    // ============================================================
    // Section 4: CraftingGrid — Recipe Matching
    // ============================================================
    F.section('4. CraftingGrid — Recipe Matching');

    var craftingContainer = document.createElement('div');
    craftingContainer.id = 'crafting-test-container';
    document.body.appendChild(craftingContainer);

    var grid = new Donkeycraft.CraftingGrid(craftingContainer, null);

    // clearGrid
    grid.clearGrid();
    F.assert(!grid.isMatchValid(), 'Empty grid has no valid match');

    // getGridAs2D
    var g2d = grid.getGridAs2D();
    F.assertEq(g2d.length, 3, 'getGridAs2D returns 3 rows');
    F.assertEq(g2d[0].length, 3, 'getGridAs2D returns 3 columns');

    // setGridSlot / getGrid
    grid.setGridSlot(0, new Donkeycraft.ItemStack(5, 1));
    var g = grid.getGrid();
    F.assertEq(g[0].getItemId(), 5, 'setGridSlot(0) sets slot 0');
    F.assertEq(g.length, 9, 'getGrid returns 9 elements');

    // getResultStack (no recipe without registry — should be null)
    F.assert(grid.getResultStack() === null, 'getResultStack is null with no registry');

    // takeResult (nothing to take)
    F.assert(grid.takeResult() === null, 'takeResult returns null when empty');

    // destroy
    grid.destroy();
    document.body.removeChild(craftingContainer);

    // ============================================================
    // Section 5: CreativeInventory — Tab Navigation & Search
    // ============================================================
    F.section('5. CreativeInventory — Tab Navigation & Search');

    var creativeContainer = document.createElement('div');
    creativeContainer.id = 'creative-test-container';
    document.body.appendChild(creativeContainer);

    var creative = new Donkeycraft.CreativeInventory(creativeContainer);

    // getTabs
    var tabs = creative.getTabs();
    F.assertEq(tabs.length, 6, 'CreativeInventory has 6 tabs');
    F.assertEq(tabs[0], 'building', 'First tab is "building"');

    // getCurrentTab / selectTab
    F.assertEq(creative.getCurrentTab(), 'building', 'Default tab is building');
    creative.selectTab('tools');
    F.assertEq(creative.getCurrentTab(), 'tools', 'selectTab switches to tools');
    creative.selectTab('building'); // switch back

    // getItemByIndex
    var item = creative.getItemByIndex(0);
    F.assert(item > 0, 'getItemByIndex(0) returns a valid item ID');
    var outOfBounds = creative.getItemByIndex(9999);
    F.assertEq(outOfBounds, 0, 'getItemByIndex(9999) returns 0');

    // getGridSize
    var size = creative.getGridSize();
    F.assert(size.rows > 0, 'getGridSize rows > 0');
    F.assert(size.cols > 0, 'getGridSize cols > 0');

    // searchItems
    var results = creative.searchItems('stone');
    F.assert(Array.isArray(results), 'searchItems returns an array');

    var idResults = creative.searchItems('1');
    F.assert(idResults.length > 0, 'searchItems("1") finds items with ID containing "1"');

    // destroy
    creative.destroy();
    document.body.removeChild(creativeContainer);

    // ============================================================
    // Section 6: FurnaceUI — Slots & Progress
    // ============================================================
    F.section('6. FurnaceUI — Slots & Progress');

    var furnaceContainer = document.createElement('div');
    furnaceContainer.id = 'furnace-test-container';
    document.body.appendChild(furnaceContainer);

    var furnace = new Donkeycraft.FurnaceUI(furnaceContainer);

    // getSlots
    F.assert(furnace.getInputSlot() === null, 'Input slot starts null');
    F.assert(furnace.getFuelSlot() === null, 'Fuel slot starts null');
    F.assert(furnace.getOutputSlot() === null, 'Output slot starts null');
    F.assertEq(furnace.getProgress(), 0, 'Progress starts at 0');
    F.assert(!furnace.isBurning(), 'Not burning initially');

    // setSlot with validation
    var coal = new Donkeycraft.ItemStack(214, 1);
    var ironOre = new Donkeycraft.ItemStack(11, 1);
    var ingot = new Donkeycraft.ItemStack(221, 1);

    F.assert(furnace.setSlot(0, coal), 'setSlot fuel succeeds');
    F.assert(furnace.setSlot(1, ironOre), 'setSlot input succeeds');
    F.assert(!furnace.setSlot(-1, null), 'setSlot(-1) fails validation');
    F.assert(!furnace.setSlot(3, null), 'setSlot(3) fails validation');

    // setProgress with validation
    F.assert(furnace.setProgress(0.5), 'setProgress(0.5) succeeds');
    F.assertEq(furnace.getProgress(), 0.5, 'getProgress returns 0.5');
    F.assert(!furnace.setProgress(-1), 'setProgress(-1) fails validation');
    F.assert(!furnace.setProgress('abc'), 'setProgress("abc") fails validation');

    // tick (no recipe registry — should not produce output)
    var tickResult = furnace.tick();
    F.assert(tickResult === null, 'tick returns null without RecipeRegistry');

    // setTimer / startListening / stopListening
    F.assert(furnace.setTimer(null) === false, 'setTimer(null) fails validation');
    furnace.setTimer({ onRender: function() { return function() {}; } });
    furnace.startListening();
    furnace.stopListening();

    // destroy
    furnace.destroy();
    document.body.removeChild(furnaceContainer);

    // ============================================================
    // Section 7: ChestUI — Slot Management & Full Integration
    // ============================================================
    F.section('7. ChestUI — Slot Management & Full Integration');

    var chestContainer = document.createElement('div');
    chestContainer.id = 'chest-test-container';
    document.body.appendChild(chestContainer);

    // --- Constructor with boolean config ---
    var chest = new Donkeycraft.ChestUI(chestContainer, false);
    F.assert(!chest.isDoubleChest(), 'Single chest is not double');
    F.assertEq(chest.getSlotCount(), 27, 'Single chest has 27 slots');

    // --- Constructor with object config ---
    var chestObjContainer = document.createElement('div');
    chestObjContainer.id = 'chest-obj-test-container';
    document.body.appendChild(chestObjContainer);
    var chestObj = new Donkeycraft.ChestUI(chestObjContainer, { doubleChest: true, chestKey: '1,128,1' });
    F.assert(chestObj.isDoubleChest(), 'Double chest from object config');
    F.assertEq(chestObj.getSlotCount(), 54, 'Double chest has 54 slots');

    // --- Constructor with no config ---
    var chestNullContainer = document.createElement('div');
    chestNullContainer.id = 'chest-null-test-container';
    document.body.appendChild(chestNullContainer);
    var chestNull = new Donkeycraft.ChestUI(chestNullContainer);
    F.assert(!chestNull.isDoubleChest(), 'Default is single chest');
    F.assertEq(chestNull.getSlotCount(), 27, 'Default has 27 slots');

    // --- getSlot with validation ---
    var stack = new Donkeycraft.ItemStack(1, 64);
    F.assert(chest.setSlot(0, stack), 'setSlot(0, stone) succeeds');
    F.assertEq(chest.getSlot(0).getCount(), 64, 'getSlot(0) returns correct count');
    F.assert(chest.getSlot(-1) === null, 'getSlot(-1) returns null');
    F.assert(chest.getSlot(27) === null, 'getSlot(27) out of bounds returns null');
    F.assert(chest.getSlot('abc') === null, 'getSlot("abc") returns null');
    F.assert(chest.getSlot(null) === null, 'getSlot(null) returns null');

    // --- setSlot validation ---
    F.assert(!chest.setSlot(-1, null), 'setSlot(-1) fails');
    F.assert(!chest.setSlot(27, null), 'setSlot(27) fails');
    F.assert(!chest.setSlot('abc', null), 'setSlot("abc") fails');
    F.assert(!chest.setSlot(0, 'invalid'), 'setSlot with string fails');
    F.assert(!chest.setSlot(0, 123), 'setSlot with number fails');
    F.assert(!chest.setSlot(0, {}), 'setSlot with plain object fails');

    // --- takeItem ---
    var taken = chest.takeItem(0);
    F.assert(taken !== null, 'takeItem returns a stack');
    F.assertEq(taken.getCount(), 64, 'takeItem count is correct');
    F.assert(chest.getSlot(0) === null, 'takeItem clears slot');

    // --- takeItem from empty slot ---
    var taken2 = chest.takeItem(5);
    F.assert(taken2 === null, 'takeItem from empty returns null');

    // --- takePartialItem ---
    chest.setSlot(0, new Donkeycraft.ItemStack(3, 64));
    var partial = chest.takePartialItem(0, 10);
    F.assert(partial !== null, 'takePartialItem returns a stack');
    F.assertEq(partial.getCount(), 10, 'takePartialItem count is 10');
    F.assertEq(chest.getSlot(0).getCount(), 54, 'remaining slot count is 54');

    // take more than available
    var partial2 = chest.takePartialItem(0, 100);
    F.assert(partial2 !== null, 'takePartialItem takes remaining');
    F.assertEq(partial2.getCount(), 54, 'takePartialItem returns all remaining');
    F.assert(chest.getSlot(0) === null, 'slot is null after taking all');

    // takePartialItem validation
    F.assert(chest.takePartialItem(-1, 5) === null, 'takePartialItem(-1) returns null');
    F.assert(chest.takePartialItem(0, -5) === null, 'takePartialItem count negative returns null');
    F.assert(chest.takePartialItem(0, 0) === null, 'takePartialItem count zero returns null');

    // --- handleClick (left-click takes entire stack) ---
    chest.setSlot(1, new Donkeycraft.ItemStack(5, 32));
    var clicked = chest.handleClick(1, 0);
    F.assert(clicked !== null, 'handleClick left-click returns stack');
    F.assertEq(clicked.getCount(), 32, 'handleClick takes entire stack');
    F.assert(chest.getSlot(1) === null, 'slot empty after handleClick');

    // --- handleClick (right-click takes half) ---
    chest.setSlot(2, new Donkeycraft.ItemStack(6, 10));
    var rightClicked = chest.handleClick(2, 2);
    F.assert(rightClicked !== null, 'handleClick right-click returns stack');
    F.assertEq(rightClicked.getCount(), 5, 'handleClick right-click takes half (ceil)');
    F.assertEq(chest.getSlot(2).getCount(), 5, 'remaining is 5');

    // handleClick on empty slot (use a fresh slot that was never used)
    var emptyClick = chest.handleClick(26, 0);
    F.assert(emptyClick === null, 'handleClick on empty returns null');

    // handleClick with invalid index
    F.assert(chest.handleClick(-1, 0) === null, 'handleClick(-1) returns null');
    F.assert(chest.handleClick(999, 0) === null, 'handleClick(999) returns null');

    // --- handleDrop to empty slot ---
    var dropStack = new Donkeycraft.ItemStack(7, 16);
    F.assert(chest.handleDrop(dropStack, 3), 'handleDrop to slot 3 succeeds');
    F.assertEq(chest.getSlot(3).getCount(), 16, 'handleDrop places item in slot');

    // --- handleDrop to stack with matching item ---
    chest.setSlot(4, new Donkeycraft.ItemStack(8, 32));
    var dropStack2 = new Donkeycraft.ItemStack(8, 20);
    F.assert(chest.handleDrop(dropStack2, 4), 'handleDrop stacks with matching item');
    F.assertEq(chest.getSlot(4).getCount(), 52, 'handleDrop stacks to 52 (32+20)');

    // --- handleDrop to full stack (overflow) ---
    chest.setSlot(5, new Donkeycraft.ItemStack(9, 64));
    var dropStack3 = new Donkeycraft.ItemStack(9, 10);
    F.assert(chest.handleDrop(dropStack3, 5), 'handleDrop on full stack returns true');
    F.assertEq(chest.getSlot(5).getCount(), 64, 'full stack stays at 64 (overflow not stored)');

    // --- handleDrop to -1 (first empty slot) ---
    chest.setSlot(6, new Donkeycraft.ItemStack(10, 8));
    var dropStack4 = new Donkeycraft.ItemStack(11, 4);
    F.assert(chest.handleDrop(dropStack4, -1), 'handleDrop(-1) finds first empty');
    // Should go to slot 0 (first empty after clearing)
    F.assert(chest.getSlot(0) !== null, 'handleDrop(-1) places item in first empty slot');

    // --- handleDrop with invalid stack ---
    F.assert(!chest.handleDrop(null, 7), 'handleDrop(null) fails');
    F.assert(!chest.handleDrop(new Donkeycraft.ItemStack(0, 0), 7), 'handleDrop(empty) fails');
    F.assert(!chest.handleDrop('string', 7), 'handleDrop(string) fails');

    // --- handleKeyPress: Escape passes through ---
    F.assert(!chest.handleKeyPress('Escape'), 'handleKeyPress(Escape) returns false');

    // --- handleKeyPress: Digit keys consumed ---
    F.assert(chest.handleKeyPress('Digit1'), 'handleKeyPress(Digit1) consumed');
    F.assert(chest.handleKeyPress('Digit9'), 'handleKeyPress(Digit9) consumed');
    F.assert(chest.handleKeyPress('Digit0'), 'handleKeyPress(Digit0) consumed');

    // --- handleKeyPress: KeyQ drops first non-empty slot ---
    // Clear all slots before 20 so KeyQ drops from slot 20 (the first non-empty)
    for (var kq = 0; kq < 20; kq++) {
        chest.setSlot(kq, null);
    }
    chest.setSlot(20, new Donkeycraft.ItemStack(12, 5));
    var dropped = chest.handleKeyPress('KeyQ');
    F.assert(dropped, 'handleKeyPress(KeyQ) returns true');
    F.assert(chest.getSlot(20) === null, 'KeyQ clears the first non-empty slot (slot 20)');

    // --- handleKeyPress: KeyQ on empty chest ---
    var noDrop = chest.handleKeyPress('KeyQ');
    F.assert(noDrop, 'handleKeyPress(KeyQ) returns true even when empty (consumes key)');

    // --- handleKeyPress: other keys pass through ---
    F.assert(!chest.handleKeyPress('Space'), 'handleKeyPress(Space) returns false');
    F.assert(!chest.handleKeyPress('Enter'), 'handleKeyPress(Enter) returns false');

    // --- onSlotChange event subscription ---
    var slotChangeEvent = null;
    var unsubscribe = chest.onSlotChange(function(index, newStack, oldStack) {
        slotChangeEvent = { index: index, new: newStack, old: oldStack };
    });
    chest.setSlot(11, new Donkeycraft.ItemStack(13, 1));
    F.assert(slotChangeEvent !== null, 'onSlotChange callback fired');
    F.assertEq(slotChangeEvent.index, 11, 'onSlotChange index is correct');

    // Unsubscribe
    unsubscribe();
    var eventFiredAfterUnsub = null;
    chest.onSlotChange(function(s) { eventFiredAfterUnsub = s; });
    chest.setSlot(12, new Donkeycraft.ItemStack(14, 1));

    btn.onClick(function() { clickFired = true; });
    btn.getElement().click();
    F.assert(clickFired, 'onClick callback fired');

    // destroy
    btn.destroy();
    document.body.removeChild(btnContainer);

    // ============================================================
    // Section 14: GuiTabNavigator — Tab Navigation
    // ============================================================
    F.section('14. GuiTabNavigator — Tab Navigation');

    var tabContainer = document.createElement('div');
    document.body.appendChild(tabContainer);

    var tabs = ['Building', 'Tools', 'Materials'];
    var tabNav = new Donkeycraft.GuiTabNavigator(tabContainer, tabs);

    F.assertEq(tabNav.getActiveTab(), 0, 'Active tab starts at 0');
    F.assertEq(tabNav.getTabCount(), 3, 'Tab count is 3');
    F.assertEq(tabNav.getTabName(0), 'Building', 'getTabName(0) returns "Building"');
    F.assert(tabNav.getTabName(5) === null, 'getTabName(out of bounds) returns null');

    // setContent
    tabNav.setContent('<div>Test Content</div>');
    F.assert(tabNav.getElement() !== null, 'getElement returns container');

    // on event subscription
    var tabChangeEvent = null;
    tabNav.on('tab:change', function(data) { tabChangeEvent = data; });

    // destroy
    tabNav.destroy();
    document.body.removeChild(tabContainer);

    // ============================================================
    // Section 15: GuiTextInput — Input State
    // ============================================================
    F.section('15. GuiTextInput — Input State');

    var textContainer = document.createElement('div');
    document.body.appendChild(textContainer);

    var textInput = new Donkeycraft.GuiTextInput({
        placeholder: 'Enter text...',
        value: 'Initial',
        maxLength: 50,
        container: textContainer
    });

    F.assertEq(textInput.getValue(), 'Initial', 'getValue returns initial value');
    F.assertEq(textInput.getMaxLength(), 50, 'getMaxLength returns 50');
    F.assert(!textInput.isErrored(), 'No error state initially');
    F.assert(textInput.isVisible(), 'Visible by default');

    // setValue / setMaxLength
    textInput.setValue('New Value');
    F.assertEq(textInput.getValue(), 'New Value', 'getValue after setValue');
    textInput.setMaxLength(100);
    F.assertEq(textInput.getMaxLength(), 100, 'setMaxLength updates max');

    // setError
    textInput.setError(true, 'Invalid input');
    F.assert(textInput.isErrored(), 'isErrored returns true after setError');
    textInput.setError(false);
    F.assert(!textInput.isErrored(), 'isErrored returns false after clear');

    // focus / blur
    textInput.focus();
    textInput.blur();

    // setVisible
    textInput.setVisible(false);
    F.assert(!textInput.isVisible(), 'isVisible returns false after hide');

    // getElement
    F.assert(textInput.getElement() instanceof HTMLInputElement, 'getElement returns input element');

    // onInput subscription
    var inputValue = null;
    textInput.onInput(function(val) { inputValue = val; });
    textInput.setValue('Changed');
    F.assert(inputValue === 'Changed', 'onInput callback receives new value');

    // destroy
    textInput.destroy();
    document.body.removeChild(textContainer);

    // ============================================================
    // Section 16: LoadingScreen — Progress & Messages
    // ============================================================
    F.section('16. LoadingScreen — Progress & Messages');

    var loadingScreen = new Donkeycraft.LoadingScreen(document.body);

    // updateProgress
    loadingScreen.updateProgress(0);
    loadingScreen.updateProgress(25);
    loadingScreen.updateProgress(50);
    loadingScreen.updateProgress(75);
    loadingScreen.updateProgress(100);

    // updateProgress validation (clamp)
    loadingScreen.updateProgress(-10); // should clamp to 0
    loadingScreen.updateProgress(150); // should clamp to 100

    // setMessage
    loadingScreen.setMessage('Loading assets...');

    // showError
    loadingScreen.showError('Test error message');

    // hide / dispose
    loadingScreen.hide();
    loadingScreen.dispose();

    // ============================================================
    // Section 17: Cross-Module Integration — Inventory + Hotbar + GUI Manager
    // ============================================================
    F.section('17. Cross-Module Integration — Inventory + Hotbar + GUI Manager');

    // Simulate hotbar receiving slots from inventory
    var inv7 = new Donkeycraft.Inventory(36, 'Player Inventory');
    inv7.setSlot(0, new Donkeycraft.ItemStack(1, 64));
    inv7.setSlot(1, new Donkeycraft.ItemStack(3, 32));
    inv7.setSlot(8, new Donkeycraft.ItemStack(5, 16));

    // Hotbar gets first 9 slots from inventory
    var hotbarContainer2 = document.createElement('div');
    document.body.appendChild(hotbarContainer2);
    var hotbar2 = new Donkeycraft.Hotbar(hotbarContainer2);

    var hotbarStacks = [];
    for (var h = 0; h < 9; h++) {
        hotbarStacks[h] = inv7.getSlot(h);
    }
    hotbar2.setSlots(hotbarStacks);

    F.assertEq(hotbar2._slots[0].getCount(), 64, 'Hotbar slot 0 from inventory');
    F.assertEq(hotbar2._slots[1].getCount(), 32, 'Hotbar slot 1 from inventory');

    // GUI Manager opens inventory GUI
    var invBus = new Donkeycraft.EventBus();
    // GuiManager now accepts (container, backdrop) — pass null for test mode
    var invGuiManager = new Donkeycraft.GuiManager(null, null);

    // Register inventory-like UI component
    invGuiManager.registerComponent('inventory', function(data) {
        this._slots = [];
        for (var i = 0; i < 27; i++) {
            this._slots[i] = null;
        }
        this.handleClick = function(x, y, button) { return true; };
    });

    invGuiManager.open('inventory');
    F.assert(invGuiManager.isOpen(), 'Inventory GUI opened');
    F.assertEq(invGuiManager.getCurrentType(), 'inventory', 'Current type is "inventory"');

    // Mouse click routing
    var clickRouted = invGuiManager.handleMouseClick(0.5, 0.5, 0);

    // Close with Escape via handleKeyPress
    F.assert(invGuiManager.handleKeyPress('Escape'), 'Escape consumed');
    F.assert(!invGuiManager.isOpen(), 'Inventory closed after Escape');

    invGuiManager.destroy();
    hotbar2.destroy();
    document.body.removeChild(hotbarContainer2);

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
