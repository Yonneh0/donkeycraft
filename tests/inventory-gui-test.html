<!-- Your test script -->
<script>
(function() {
    'use strict';

    // Get the shared framework instance
    var F = TestFramework;

    // Initialize: creates #test-summary at top, uses existing #results div
    F.init('results');

    // ============================================================
    // Section 1: ItemStack — Core Item Data Structure
    // ============================================================
    F.section('1. ItemStack — Core Item Data Structure');

    // Basic creation
    var stack1 = new Donkeycraft.ItemStack(1, 64);
    F.assert(!stack1.isEmpty(), 'ItemStack(id=1, count=64) is not empty');
    F.assertEq(stack1.getItemId(), 1, 'getItemId() returns 1');
    F.assertEq(stack1.getCount(), 64, 'getCount() returns 64');

    // Empty stack
    var emptyStack = new Donkeycraft.ItemStack(0, 0);
    F.assert(emptyStack.isEmpty(), 'ItemStack(id=0, count=0) is empty');

    // Tag system
    var taggedStack = new Donkeycraft.ItemStack(218, 1, { durability: 50 });
    F.assert(taggedStack.hasTag(), 'hasTag() returns true for stack with tag');
    F.assertEq(taggedStack.getDurability(), 50, 'getDurability() returns tag value');

    // increment/decrement
    var stack2 = new Donkeycraft.ItemStack(3, 10);
    stack2.increment(5);
    F.assertEq(stack2.getCount(), 15, 'increment(5) from 10 → 15');
    stack2.decrement(3);
    F.assertEq(stack2.getCount(), 12, 'decrement(3) from 15 → 12');

    // Cloning (deep copy)
    var stack3 = new Donkeycraft.ItemStack(5, 10, { customName: 'Test' });
    var clone = stack3.clone();
    F.assertEq(clone.getItemId(), 5, 'clone getItemId matches');
    F.assertEq(clone.getCount(), 10, 'clone getCount matches');
    F.assertEq(clone.getTag().customName, 'Test', 'clone tag.customName matches');
    // Verify deep copy — modifying clone doesn't affect original
    clone.setTag({ customName: 'Modified' });
    F.assertEq(stack3.getTag().customName, 'Test', 'original tag unchanged after clone modification');

    // matches() / canStackWith()
    var stackA = new Donkeycraft.ItemStack(1, 32);
    var stackB = new Donkeycraft.ItemStack(1, 32);
    F.assert(stackA.matches(stackB), 'Two identical stacks match');
    F.assert(stackA.canStackWith(stackB), 'Two matching stacks can stack');

    // Stacks with different tags should NOT match
    var stackC = new Donkeycraft.ItemStack(1, 32, { durability: 0 });
    var stackD = new Donkeycraft.ItemStack(1, 32, { durability: 50 });
    F.assert(!stackC.matches(stackD), 'Stacks with different tags do not match');
    F.assert(!stackC.canStackWith(stackD), 'Stacks with different tags cannot stack');

    // Serialization round-trip
    var original = new Donkeycraft.ItemStack(218, 64, { enchantments: [{id: 1, level: 3}] });
    var serialized = original.serialize();
    var restored = Donkeycraft.ItemStack.fromObject(serialized);
    F.assertEq(restored.getItemId(), 218, 'serialized getItemId matches');
    F.assertEq(restored.getCount(), 64, 'serialized getCount matches');
    F.assertEq(restored.getEnchantments().length, 1, 'serialized enchantments count matches');
    F.assertEq(restored.getEnchantments()[0].level, 3, 'serialized enchantment level matches');

    // fromObject with missing data
    var nullStack = Donkeycraft.ItemStack.fromObject(null);
    F.assert(nullStack.isEmpty(), 'fromObject(null) returns empty stack');
    var badStack = Donkeycraft.ItemStack.fromObject({});
    F.assert(badStack.isEmpty(), 'fromObject({}) returns empty stack');

    // toString
    F.assert(typeof stack1.toString() === 'string', 'toString() returns a string');

    // ============================================================
    // Section 2: Inventory — Slot Management & Operations
    // ============================================================
    F.section('2. Inventory — Slot Management & Operations');

    var inv = new Donkeycraft.Inventory(9, 'Test Inventory');
    F.assertEq(inv.getSlotCount(), 9, 'Inventory has 9 slots');
    F.assertEq(inv.getTitle(), 'Test Inventory', 'Inventory title is correct');

    // setSlot / getSlot
    F.assert(inv.setSlot(0, new Donkeycraft.ItemStack(1, 16)), 'setSlot(0, stone) succeeds');
    F.assert(!inv.setSlot(-1, null), 'setSlot(-1) fails validation');
    F.assert(!inv.setSlot(9, null), 'setSlot(9) fails validation');

    var slot0 = inv.getSlot(0);
    F.assertEq(slot0.getItemId(), 1, 'getSlot(0) returns stone');
    F.assertEq(slot0.getCount(), 16, 'getSlot(0) count is 16');
    F.assert(inv.getSlot(5) === null, 'Empty slot returns null');

    // clearSlot
    inv.clearSlot(0);
    F.assert(inv.getSlot(0) === null, 'clearSlot(0) makes slot null');

    // getAllSlots
    inv.setSlot(0, new Donkeycraft.ItemStack(1, 8));
    inv.setSlot(1, new Donkeycraft.ItemStack(3, 16));
    var all = inv.getAllSlots();
    F.assertEq(all.length, 9, 'getAllSlots returns 9 elements');
    F.assertEq(all[0].getCount(), 8, 'getAllSlots[0] count is 8');

    // findEmptySlot
    var emptyIdx = inv.findEmptySlot();
    F.assert(emptyIdx >= 2, 'findEmptySlot returns index >= 2 (first two filled)');

    // addItem — stacks into existing, then fills empty
    var inv2 = new Donkeycraft.Inventory(9);
    inv2.setSlot(0, new Donkeycraft.ItemStack(1, 32));
    var added = inv2.addItem(new Donkeycraft.ItemStack(1, 40));
    // addItem returns total items successfully added (32 into existing + 8 into empty = 40)
    F.assertEq(added, 40, 'addItem fills existing stack then empty slot');

    // addItem with different item
    var added2 = inv2.addItem(new Donkeycraft.ItemStack(3, 10));
    F.assertEq(added2, 10, 'addItem with different item ID succeeds');

    // removeItem
    var inv3 = new Donkeycraft.Inventory(9);
    inv3.setSlot(0, new Donkeycraft.ItemStack(1, 32));
    inv3.setSlot(1, new Donkeycraft.ItemStack(1, 16));
    var removed = inv3.removeItem(new Donkeycraft.ItemStack(1, 20));
    F.assert(removed !== null, 'removeItem returns a stack');
    F.assertEq(removed.getCount(), 20, 'removeItem count is 20');

    // removeItem non-existent
    var noneRemoved = inv3.removeItem(new Donkeycraft.ItemStack(5, 1));
    F.assert(noneRemoved === null, 'removeItem for non-existent item returns null');

    // contains / getItemCount
    F.assert(inv3.contains(1), 'contains(1) is true');
    F.assert(!inv3.contains(5), 'contains(5) is false');
    F.assertEq(inv3.getItemCount(1), 28, 'getItemCount(1) returns 28 (32-20+16)');

    // shiftClick
    var inv4 = new Donkeycraft.Inventory(4);
    inv4.setSlot(0, new Donkeycraft.ItemStack(1, 64));
    inv4.setSlot(1, new Donkeycraft.ItemStack(3, 32));
    inv4.shiftClick(0);
    var slotAfterShift = inv4.getSlot(0);
    F.assert(slotAfterShift === null || slotAfterShift.getCount() < 64, 'shiftClick moves items from source');

    // serialize / deserialize
    var inv5 = new Donkeycraft.Inventory(3, 'Serialize Test');
    inv5.setSlot(0, new Donkeycraft.ItemStack(1, 16));
    inv5.setSlot(2, new Donkeycraft.ItemStack(3, 8));
    var data = inv5.serialize();
    F.assertEq(data.slots.length, 3, 'serialize slots length is 3');
    F.assertEq(data.title, 'Serialize Test', 'serialize title preserved');

    var inv6 = new Donkeycraft.Inventory(3);
    inv6.deserialize(data);
    F.assertEq(inv6.getSlot(0).getCount(), 16, 'deserialize restores slot 0');
    F.assertEq(inv6.getSlot(2).getCount(), 8, 'deserialize restores slot 2');
    F.assertEq(inv6.getTitle(), 'Serialize Test', 'deserialize restores title');

    // ============================================================
    // Section 3: Hotbar — Slot Rendering & Selection
    // ============================================================
    F.section('3. Hotbar — Slot Rendering & Selection');

    // Create a DOM container for hotbar
    var hotbarContainer = document.createElement('div');
    hotbarContainer.id = 'hotbar-test-container';
    document.body.appendChild(hotbarContainer);

    var hotbar = new Donkeycraft.Hotbar(hotbarContainer);
    F.assertEq(hotbar.getSelectedSlot(), 0, 'Hotbar default selected slot is 0');

    // setSelectedSlot
    hotbar.setSelectedSlot(4);
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(4) works');
    hotbar.setSelectedSlot(4); // Should be no-op (same slot)
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(same) is no-op');

    // setSelectedSlot validation
    hotbar.setSelectedSlot(-1);
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(-1) is ignored');
    hotbar.setSelectedSlot(9);
    F.assertEq(hotbar.getSelectedSlot(), 4, 'setSelectedSlot(9) is ignored');

    // setSlots
    var stacks = [];
    for (var s = 0; s < 9; s++) {
        stacks[s] = new Donkeycraft.ItemStack(s + 1, 1);
    }
    hotbar.setSlots(stacks);
    F.assert(hotbar._slots[0] !== null, 'setSlots populates slot 0');

    // selectNext / selectPrev
    hotbar.setSelectedSlot(0);
    hotbar.selectNext();
    F.assertEq(hotbar.getSelectedSlot(), 1, 'selectNext cycles forward');
    hotbar.selectPrev();
    F.assertEq(hotbar.getSelectedSlot(), 0, 'selectPrev cycles backward');

    // destroy
    hotbar.destroy();
    document.body.removeChild(hotbarContainer);

    // ============================================================
    // Section 3b: RecipeRegistry — Shaped & Shapeless Recipes
    // ============================================================
    F.section('3b. RecipeRegistry — Shaped & Shapeless Recipes');

    var reg = Donkeycraft.RecipeRegistry;
    F.assert(reg !== undefined, 'RecipeRegistry is available');
    F.assert(typeof reg.matchShapedRecipe === 'function', 'matchShapedRecipe is a function');
    F.assert(typeof reg.matchShapelessRecipe === 'function', 'matchShapelessRecipe is a function');
    F.assert(typeof reg.getShapedCount === 'function', 'getShapedCount is a function');
    F.assert(typeof reg.getShapelessCount === 'function', 'getShapelessCount is a function');

    // Test: getShapedCount / getShapelessCount
    F.assert(reg.getShapedCount() > 0, 'Has shaped recipes registered');
    F.assert(reg.getShapelessCount() > 0, 'Has shapeless recipes registered');

    // Test: matchShapedRecipe with a known 2x2 recipe (crafting_table)
    var ctGrid = [
        [30, 30, 0],
        [30, 30, 0],
        [0,  0,  0]
    ];
    var shapedResult = reg.matchShapedRecipe(ctGrid, 3, 3);
    F.assert(shapedResult !== null, 'Crafting table recipe matches');
    F.assertEq(shapedResult.outputBlockId, 195, 'Crafting table output ID is 195');
    F.assertEq(shapedResult.outputCount, 1, 'Crafting table output count is 1');

    // Test: matchShapedRecipe with no match
    var emptyGrid = [
        [0, 0, 0],
        [0, 0, 0],
        [0, 0, 0]
    ];
    F.assert(reg.matchShapedRecipe(emptyGrid, 3, 3) === null, 'Empty grid returns null');

    // Test: matchShapedRecipe with wrong dimensions (2x2 grid — should still work if recipe is 2x2)
    var stickGrid = [
        [30, 0],
        [30, 0]
    ];
    var stickResult = reg.matchShapedRecipe(stickGrid, 2, 2);
    F.assert(stickResult !== null, 'Stick recipe matches in 2x2 grid');
    F.assertEq(stickResult.outputBlockId, 310, 'Stick output ID is 310');

    // Test: matchShapedRecipe with partial grid (3x3 but recipe is 2x2)
    var stickGrid3x3 = [
        [30, 0, 0],
        [30, 0, 0],
        [0,  0, 0]
    ];
    var stickResult3x3 = reg.matchShapedRecipe(stickGrid3x3, 3, 3);
    F.assert(stickResult3x3 !== null, 'Stick recipe matches in 3x3 grid');

    // Test: matchShapelessRecipe with matching items (4 string → wool)
    var shapelessItems = { 310: 4 }; // 4 sticks (if shapeless recipe exists)
    var shapelessResult = reg.matchShapelessRecipe(shapelessItems);
    // Shapeless recipe for 4 string → wool should match
    if (shapelessResult !== null) {
        F.assert(typeof shapelessResult.outputBlockId === 'number', 'Shapeless result has outputBlockId');
        F.assert(typeof shapelessResult.outputCount === 'number', 'Shapeless result has outputCount');
    }

    // Test: matchShapelessRecipe with no match
    var noMatchItems = { 9999: 1 };
    F.assert(reg.matchShapelessRecipe(noMatchItems) === null, 'Non-existent item returns null');

    // Test: matchShapedRecipe with null/undefined grid
    F.assert(reg.matchShapedRecipe(null, 3, 3) === null, 'matchShapedRecipe(null) returns null');
    F.assert(reg.matchShapedRecipe(undefined, 3, 3) === null, 'matchShapedRecipe(undefined) returns null');

    // Test: matchShapelessRecipe with null/undefined items
    F.assert(reg.matchShapelessRecipe(null) === null, 'matchShapelessRecipe(null) returns null');
    F.assert(reg.matchShapelessRecipe(undefined) === null, 'matchShapelessRecipe(undefined) returns null');

    // Test: _rotateIngredients rotation coverage (2x2 recipe)
    // The internal _rotateIngredients should handle edge cases gracefully
    var testGrid2x2 = [
        [1, 2],
        [3, 4]
    ];
    // _rotateIngredients is private but called internally by matchShapedRecipe
    // Rotation is tested implicitly via matchShapedRecipe with different grid positions

    // ============================================================
    // Section 4: CraftingGrid — Recipe Matching
    F.section('4. CraftingGrid — Recipe Matching');

    var craftingContainer = document.createElement('div');
    craftingContainer.id = 'crafting-test-container';
    document.body.appendChild(craftingContainer);

    // --- Basic operations without registry ---
    var grid = new Donkeycraft.CraftingGrid(craftingContainer, null);

    // clearGrid
    grid.clearGrid();
    F.assert(!grid.isMatchValid(), 'Empty grid has no valid match');

    // getGridAs2D
    var g2d = grid.getGridAs2D();
    F.assertEq(g2d.length, 3, 'getGridAs2D returns 3 rows');
    F.assertEq(g2d[0].length, 3, 'getGridAs2D returns 3 columns');

    // setGridSlot / getGrid
    grid.setGridSlot(0, new Donkeycraft.ItemStack(5, 1));
    var g = grid.getGrid();
    F.assertEq(g[0].getItemId(), 5, 'setGridSlot(0) sets slot 0');
    F.assertEq(g.length, 9, 'getGrid returns 9 elements');

    // getResultStack (no recipe without registry — should be null)
    F.assert(grid.getResultStack() === null, 'getResultStack is null with no registry');

    // takeResult (nothing to take)
    F.assert(grid.takeResult() === null, 'takeResult returns null when empty');

    // matchRecipe (no registry — should return null)
    F.assert(grid.matchRecipe() === null, 'matchRecipe returns null without registry');

    // handleKeyPress without registry
    F.assert(!grid.handleKeyPress('Escape'), 'handleKeyPress(Escape) returns false');
    F.assert(!grid.handleKeyPress('Enter'), 'handleKeyPress(Enter) returns false when no result');

    // destroy
    grid.destroy();
    document.body.removeChild(craftingContainer);

    // --- Recipe matching with real RecipeRegistry ---
    var craftingContainer2 = document.createElement('div');
    craftingContainer2.id = 'crafting-test-container-2';
    document.body.appendChild(craftingContainer2);

    var registry = Donkeycraft.RecipeRegistry;
    F.assert(registry !== undefined, 'RecipeRegistry is available');
    F.assert(registry.getShapedCount() > 0, 'RecipeRegistry has shaped recipes');
    F.assert(registry.getShapelessCount() > 0, 'RecipeRegistry has shapeless recipes');

    var grid2 = new Donkeycraft.CraftingGrid(craftingContainer2, registry);

    // Test: Stick recipe (2×2 shaped) — 2 planks vertically → 4 sticks
    grid2.setGridSlot(0, new Donkeycraft.ItemStack(30, 1)); // oak_planks top-left
    grid2.setGridSlot(3, new Donkeycraft.ItemStack(30, 1)); // oak_planks bottom-left
    var recipe = grid2.matchRecipe();
    F.assert(recipe !== null, 'Stick recipe matches with 2 planks in left column');
    F.assertEq(recipe.outputBlockId, 310, 'Stick recipe output is stick (ID 310)');
    F.assertEq(recipe.outputCount, 4, 'Stick recipe outputs 4 sticks');

    var result = grid2.getResultStack();
    F.assert(result !== null, 'getResultStack returns a stack after match');
    F.assertEq(result.getItemId(), 310, 'Result item is stick');
    F.assertEq(result.getCount(), 4, 'Result count is 4');
    F.assert(grid2.isMatchValid(), 'isMatchValid returns true when recipe matches');

    // Test: Crafting table recipe (2×2) — 4 planks → 1 crafting_table
    grid2.clearGrid();
    grid2.setGridSlot(0, new Donkeycraft.ItemStack(30, 1));
    grid2.setGridSlot(1, new Donkeycraft.ItemStack(30, 1));
    grid2.setGridSlot(3, new Donkeycraft.ItemStack(30, 1));
    grid2.setGridSlot(4, new Donkeycraft.ItemStack(30, 1));
    var recipe2 = grid2.matchRecipe();
    F.assert(recipe2 !== null, 'Crafting table recipe matches');
    F.assertEq(recipe2.outputBlockId, 195, 'Crafting table output ID is 195');

    // Test: takeResult
    var taken = grid2.takeResult();
    F.assert(taken !== null, 'takeResult returns a stack');
    F.assertEq(taken.getItemId(), 195, 'Taken item is crafting_table');
    F.assertEq(taken.getCount(), 1, 'Taken count is 1');
    F.assert(!grid2.isMatchValid(), 'isMatchValid is false after taking result');
    F.assert(grid2.getResultStack() === null, 'getResultStack is null after taking');

    // Test: Shapeless recipe — 4 string → white_wool (shapeless recipe 100)
    grid2.clearGrid();
    grid2.setGridSlot(0, new Donkeycraft.ItemStack(310, 1));
    grid2.setGridSlot(1, new Donkeycraft.ItemStack(310, 1));
    grid2.setGridSlot(2, new Donkeycraft.ItemStack(310, 1));
    grid2.setGridSlot(3, new Donkeycraft.ItemStack(310, 1));
    var recipe3 = grid2.matchRecipe();
    F.assert(recipe3 !== null, 'Shapeless recipe (string → wool) matches');
    F.assertEq(recipe3.outputBlockId, 53, 'Shapeless output is wool (ID 53)');

    // Test: Snowball shapeless — 1 snow_block → 4 snowballs (recipe 101)
    grid2.clearGrid();
    grid2.setGridSlot(4, new Donkeycraft.ItemStack(51, 1));
    var recipe4 = grid2.matchRecipe();
    F.assert(recipe4 !== null, 'Snowball shapeless recipe matches');
    F.assertEq(recipe4.outputBlockId, 502, 'Output is snowball (ID 502)');

    // Test: Invalid setGridSlot calls (returns null on failure)
    F.assert(grid2.setGridSlot(-1, new Donkeycraft.ItemStack(1, 1)) === null, 'setGridSlot(-1) returns null');
    F.assert(grid2.setGridSlot(9, new Donkeycraft.ItemStack(1, 1)) === null, 'setGridSlot(9) returns null');
    F.assert(grid2.setGridSlot(0, 'invalid') === null, 'setGridSlot with string returns null');
    F.assert(grid2.setGridSlot(0, 123) === null, 'setGridSlot with number returns null');
    F.assert(grid2.setGridSlot(0, {}) === null, 'setGridSlot with plain object returns null');

    // Test: _isValidStack internal validation
    F.assert(grid2._isValidStack(null), '_isValidStack(null) returns true');
    F.assert(grid2._isValidStack(new Donkeycraft.ItemStack(1, 1)), '_isValidStack(valid stack) returns true');
    F.assert(!grid2._isValidStack('string'), '_isValidStack(string) returns false');
    F.assert(!grid2._isValidStack(123), '_isValidStack(number) returns false');
    F.assert(!grid2._isValidStack({}), '_isValidStack(empty object) returns false');

    // Test: setGridSlot return value structure
    grid2.clearGrid();
    var setResult = grid2.setGridSlot(0, new Donkeycraft.ItemStack(30, 1));
    F.assert(setResult !== null, 'setGridSlot returns an object on success');
    F.assertEq(setResult.oldStack, null, 'setGridSlot oldStack is null for empty slot');
    F.assert(setResult.newStack !== null, 'setGridSlot newStack is a valid stack');
    F.assertEq(setResult.newStack.getItemId(), 30, 'setGridSlot newStack itemId matches');

    // Test: setGridSlot with existing item returns old value
    var setResult2 = grid2.setGridSlot(0, new Donkeycraft.ItemStack(1, 2));
    F.assert(setResult2.oldStack !== null, 'setGridSlot returns old stack when slot was filled');
    F.assertEq(setResult2.oldStack.getItemId(), 30, 'setGridSlot oldStack itemId is previous item');

    // Test: handleKeyPress with result available
    grid2.clearGrid();
    grid2.setGridSlot(0, new Donkeycraft.ItemStack(30, 1));
    grid2.setGridSlot(3, new Donkeycraft.ItemStack(30, 1)); // sticks recipe
    F.assert(grid2.handleKeyPress('Enter'), 'handleKeyPress(Enter) returns true when result exists');

    // Test: handleKeyPress Escape always passes through
    F.assert(!grid2.handleKeyPress('Escape'), 'handleKeyPress(Escape) returns false');

    // Test: handleKeyPress with other keys passes through
    F.assert(!grid2.handleKeyPress('Space'), 'handleKeyPress(Space) returns false');
    F.assert(!grid2.handleKeyPress('Tab'), 'handleKeyPress(Tab) returns false');

    // Test: handleKeyPress Digit1-Digit9 placement
    grid2.clearGrid();
    var hotbarItem = new Donkeycraft.ItemStack(5, 1);
    F.assert(grid2.handleKeyPress('Digit1', hotbarItem), 'handleKeyPress(Digit1, item) places item in slot 0');
    F.assertEq(grid2.getGrid()[0].getItemId(), 5, 'Digit1 places item in grid slot 0');

    // Test: handleKeyPress Digit9 placement
    F.assert(grid2.handleKeyPress('Digit9', new Donkeycraft.ItemStack(3, 1)), 'handleKeyPress(Digit9, item) places item in slot 8');
    F.assertEq(grid2.getGrid()[8].getItemId(), 3, 'Digit9 places item in grid slot 8');

    // Test: handleKeyPress Digit0 (Digit10) - out of range, returns true (consumed but no slot)
    F.assert(grid2.handleKeyPress('Digit0', new Donkeycraft.ItemStack(1, 1)), 'handleKeyPress(Digit0) returns true (out of range)');

    // Test: handleKeyPress Digit1 without hotbarItem (undefined) - should return false (not consumed)
    F.assert(!grid2.handleKeyPress('Digit1'), 'handleKeyPress(Digit1) without hotbarItem returns false');

    // Test: handleKeyPress Digit1 with explicit null hotbarItem - should return true (consumed)
    F.assert(grid2.handleKeyPress('Digit2', null), 'handleKeyPress(Digit2, null) returns true (consumed)');

    // Test: handleKeyPress Digit5 with undefined hotbarItem - should return false
    F.assert(!grid2.handleKeyPress('Digit5'), 'handleKeyPress(Digit5) without hotbarItem returns false');

    // Test: handleKeyPress with invalid key names
    F.assert(!grid2.handleKeyPress('F1'), 'handleKeyPress(F1) returns false');
    F.assert(!grid2.handleKeyPress('ArrowUp'), 'handleKeyPress(ArrowUp) returns false');
    F.assert(!grid2.handleKeyPress(''), 'handleKeyPress("") returns false');

    // Test: onResultChange event subscription
    var resultChangeEvent = null;
    var unsubscribe = grid2.onResultChange(function(stack) {
        resultChangeEvent = stack;
    });
    grid2.clearGrid();
    grid2.setGridSlot(0, new Donkeycraft.ItemStack(30, 1));
    grid2.setGridSlot(1, new Donkeycraft.ItemStack(30, 1));
    grid2.setGridSlot(3, new Donkeycraft.ItemStack(30, 1));

        getGameMode: function() { return 'spectator'; }
    };
    var argChunkManager = {
        getAllChunks: function() { return [{}, {}, {}, {}]; }
    };
    var argData = debug.collectData(argPlayer, argChunkManager);
    F.assertEq(argData.coordinates.x, 999, 'collectData uses passed player x');
    F.assertEq(argData.coordinates.y, 128, 'collectData uses passed player y');
    F.assertEq(argData.coordinates.z, -500, 'collectData uses passed player z');
    F.assertEq(argData.coordinates.mode, 'spectator', 'collectData uses passed player mode');
    F.assertEq(argData.chunkInfo.loaded, 4, 'collectData uses passed chunkManager loaded count');

    // --- collectData does not mutate internal state ---
    F.assertEq(debug._player, null, 'Internal _player unchanged after collectData with arg');
    F.assertEq(debug._chunkManager, null, 'Internal _chunkManager unchanged after collectData with arg');

    // --- collectData with mixed internal and passed references ---
    debug.setPlayer(mockPlayer);  // set internal player
    var mixedData = debug.collectData(null, argChunkManager);  // pass chunkManager only
    F.assertEq(mixedData.coordinates.x, 123.46, 'collectData uses internal player when no arg');
    F.assertEq(mixedData.chunkInfo.loaded, 4, 'collectData uses passed chunkManager');

    // --- update() emits debug:event ---
    var updateEventData = null;
    debugBus.on('debug:update', function(data) { updateEventData = data; });
    debug.setPlayer(mockPlayer);
    debug.setChunkManager(argChunkManager);
    debug.update(mockPlayer, argChunkManager);
    F.assert(updateEventData !== null, 'update() emits debug:update event');
    F.assert(updateEventData.fps >= 0, 'emitted data has non-negative fps');
    F.assert(typeof updateEventData.coordinates === 'object', 'emitted data has coordinates');

    // --- startListening / stopListening ---
    var listenData = null;
    debugBus.on('debug:update', function(data) { listenData = data; });
    var renderTimer = {
        onRender: function(callback) {
            // Simulate a single render tick
            setTimeout(function() { callback(Date.now()); }, 10);
            return function() {}; // unsubscribe
        }
    };
    debug.setTimer(renderTimer);
    debug.setPlayer(mockPlayer);
    debug.setChunkManager(argChunkManager);
    debug.startListening();
    F.assert(debug._unsubscribeRender !== null, '_unsubscribeRender is set after startListening');
    debug.stopListening();
    F.assert(debug._unsubscribeRender === null, '_unsubscribeRender cleared after stopListening');

    // --- startListening called twice (no-op second call) ---
    debug.startListening();
    var firstUnsub = debug._unsubscribeRender;
    debug.startListening();
    F.assert(debug._unsubscribeRender === firstUnsub, 'startListening() second call does not change unsubscribe ref');
    debug.stopListening();

    // --- destroy ---
    debug.destroy();
    F.assert(debug._eventBus === null, '_eventBus cleared after destroy');
    F.assert(debug._config === null, '_config cleared after destroy');
    F.assert(debug._player === null, '_player cleared after destroy');
    F.assert(debug._chunkManager === null, '_chunkManager cleared after destroy');
    F.assert(debug._biome === null, '_biome cleared after destroy');
    F.assert(debug._timer === null, '_timer cleared after destroy');

    // --- destroy is safe to call multiple times ---
    debug.destroy();  // should not throw
    debug.destroy();  // should not throw

    // ============================================================
    // Section 12: GuiDragDrop — Drag Operations
    // ============================================================
    F.section('12. GuiDragDrop — Drag Operations');

    var dragContainer = document.createElement('div');
    dragContainer.className = 'dk-slot-container';
    dragContainer.id = 'drag-test-container';
    for (var d = 0; d < 9; d++) {
        var slotDiv = document.createElement('div');
        slotDiv.className = 'dk-slot';
        slotDiv.dataset.slotIndex = d;
        var itemSpan = document.createElement('span');
        itemSpan.className = 'dk-slot-item';
        itemSpan.textContent = 'Item ' + d;
        slotDiv.appendChild(itemSpan);
        dragContainer.appendChild(slotDiv);
    }
    document.body.appendChild(dragContainer);

    var dragDrop = new Donkeycraft.GuiDragDrop(dragContainer, {
        onDragStart: function(slotIndex) { /* no-op */ },
        onDragEnd: function(targetSlot) { /* no-op */ },
        onDrop: function(source, target, stack) { /* no-op */ }
    });

    F.assert(!dragDrop.isDragging(), 'isDragging returns false initially');

    // cancelDrag (nothing to cancel)
    dragDrop.cancelDrag();
    F.assert(!dragDrop.isDragging(), 'isDragging still false after cancel');

    // on event subscription
    var dragEventFired = null;
    dragDrop.on('drag:start', function(data) { dragEventFired = data; });

    // destroy
    dragDrop.destroy();
    document.body.removeChild(dragContainer);

    // ============================================================
    // Section 13: GuiButton — State Management
    // ============================================================
    F.section('13. GuiButton — State Management');

    var btnContainer = document.createElement('div');
    document.body.appendChild(btnContainer);

    var btn = new Donkeycraft.GuiButton('Click Me', { container: btnContainer });

    F.assertEq(btn.getText(), 'Click Me', 'getText returns label');
    F.assert(!btn.isDisabled(), 'Button not disabled by default');
    F.assert(btn.isVisible(), 'Button visible by default');

    // setText / setDisabled
    btn.setText('Updated');
    F.assertEq(btn.getText(), 'Updated', 'setText updates label');
    btn.setDisabled(true);
    F.assert(btn.isDisabled(), 'isDisabled returns true');
    btn.setDisabled(false);
    F.assert(!btn.isDisabled(), 'isDisabled returns false after enable');

    // setVisible
    btn.setVisible(false);
    F.assert(!btn.isVisible(), 'isVisible returns false after hide');
    btn.setVisible(true);
    F.assert(btn.isVisible(), 'isVisible returns true after show');

    // getElement
    F.assert(btn.getElement() instanceof HTMLButtonElement, 'getElement returns button element');

    // onClick subscription
    var clickFired = false;
    btn.onClick(function() { clickFired = true; });
    btn.getElement().click();
    F.assert(clickFired, 'onClick callback fired');

    // destroy
    btn.destroy();
    document.body.removeChild(btnContainer);

    // ============================================================
    // Section 14: GuiTabNavigator — Tab Navigation
    // ============================================================
    F.section('14. GuiTabNavigator — Tab Navigation');

    var tabContainer = document.createElement('div');
    document.body.appendChild(tabContainer);

    var tabs = ['Building', 'Tools', 'Materials'];
    var tabNav = new Donkeycraft.GuiTabNavigator(tabContainer, tabs);

    F.assertEq(tabNav.getActiveTab(), 0, 'Active tab starts at 0');
    F.assertEq(tabNav.getTabCount(), 3, 'Tab count is 3');
    F.assertEq(tabNav.getTabName(0), 'Building', 'getTabName(0) returns "Building"');
    F.assert(tabNav.getTabName(5) === null, 'getTabName(out of bounds) returns null');

    // setContent
    tabNav.setContent('<div>Test Content</div>');
    F.assert(tabNav.getElement() !== null, 'getElement returns container');

    // on event subscription
    var tabChangeEvent = null;
    tabNav.on('tab:change', function(data) { tabChangeEvent = data; });

    // destroy
    tabNav.destroy();
    document.body.removeChild(tabContainer);

    // ============================================================
    // Section 15: GuiTextInput — Input State
    // ============================================================
    F.section('15. GuiTextInput — Input State');

    var textContainer = document.createElement('div');
    document.body.appendChild(textContainer);

    var textInput = new Donkeycraft.GuiTextInput({
        placeholder: 'Enter text...',
        value: 'Initial',
        maxLength: 50,
        container: textContainer
    });

    F.assertEq(textInput.getValue(), 'Initial', 'getValue returns initial value');
    F.assertEq(textInput.getMaxLength(), 50, 'getMaxLength returns 50');
    F.assert(!textInput.isErrored(), 'No error state initially');
    F.assert(textInput.isVisible(), 'Visible by default');

    // setValue / setMaxLength
    textInput.setValue('New Value');
    F.assertEq(textInput.getValue(), 'New Value', 'getValue after setValue');
    textInput.setMaxLength(100);
    F.assertEq(textInput.getMaxLength(), 100, 'setMaxLength updates max');

    // setError
    textInput.setError(true, 'Invalid input');
    F.assert(textInput.isErrored(), 'isErrored returns true after setError');
    textInput.setError(false);
    F.assert(!textInput.isErrored(), 'isErrored returns false after clear');

    // focus / blur
    textInput.focus();
    textInput.blur();

    // setVisible
    textInput.setVisible(false);
    F.assert(!textInput.isVisible(), 'isVisible returns false after hide');

    // getElement
    F.assert(textInput.getElement() instanceof HTMLInputElement, 'getElement returns input element');

    // onInput subscription
    var inputValue = null;
    textInput.onInput(function(val) { inputValue = val; });
    textInput.setValue('Changed');
    F.assert(inputValue === 'Changed', 'onInput callback receives new value');

    // destroy
    textInput.destroy();
    document.body.removeChild(textContainer);

    // ============================================================
    // Section 16: LoadingScreen — Progress & Messages
    // ============================================================
    F.section('16. LoadingScreen — Progress & Messages');

    var loadingScreen = new Donkeycraft.LoadingScreen(document.body);

    // updateProgress
    loadingScreen.updateProgress(0);
    loadingScreen.updateProgress(25);
    loadingScreen.updateProgress(50);
    loadingScreen.updateProgress(75);
    loadingScreen.updateProgress(100);

    // updateProgress validation (clamp)
    loadingScreen.updateProgress(-10); // should clamp to 0
    loadingScreen.updateProgress(150); // should clamp to 100

    // setMessage
    loadingScreen.setMessage('Loading assets...');

    // showError
    loadingScreen.showError('Test error message');

    // hide / dispose
    loadingScreen.hide();
    loadingScreen.dispose();

    // ============================================================
    // Section 17: Cross-Module Integration — Inventory + Hotbar + GUI Manager
    // ============================================================
    F.section('17. Cross-Module Integration — Inventory + Hotbar + GUI Manager');

    // Simulate hotbar receiving slots from inventory
    var inv7 = new Donkeycraft.Inventory(36, 'Player Inventory');
    inv7.setSlot(0, new Donkeycraft.ItemStack(1, 64));
    inv7.setSlot(1, new Donkeycraft.ItemStack(3, 32));
    inv7.setSlot(8, new Donkeycraft.ItemStack(5, 16));

    // Hotbar gets first 9 slots from inventory
    var hotbarContainer2 = document.createElement('div');
    document.body.appendChild(hotbarContainer2);
    var hotbar2 = new Donkeycraft.Hotbar(hotbarContainer2);

    var hotbarStacks = [];
    for (var h = 0; h < 9; h++) {
        hotbarStacks[h] = inv7.getSlot(h);
    }
    hotbar2.setSlots(hotbarStacks);

    F.assertEq(hotbar2._slots[0].getCount(), 64, 'Hotbar slot 0 from inventory');
    F.assertEq(hotbar2._slots[1].getCount(), 32, 'Hotbar slot 1 from inventory');

    // GUI Manager opens inventory GUI
    var invBus = new Donkeycraft.EventBus();
    // GuiManager now accepts (container, backdrop) — pass null for test mode
    var invGuiManager = new Donkeycraft.GuiManager(null, null);

    // Register inventory-like UI component
    invGuiManager.registerComponent('inventory', function(data) {
        this._slots = [];
        for (var i = 0; i < 27; i++) {
            this._slots[i] = null;
        }
        this.handleClick = function(x, y, button) { return true; };
    });

    invGuiManager.open('inventory');
    F.assert(invGuiManager.isOpen(), 'Inventory GUI opened');
    F.assertEq(invGuiManager.getCurrentType(), 'inventory', 'Current type is "inventory"');

    // Mouse click routing
    var clickRouted = invGuiManager.handleMouseClick(0.5, 0.5, 0);

    // Close with Escape via handleKeyPress
    F.assert(invGuiManager.handleKeyPress('Escape'), 'Escape consumed');
    F.assert(!invGuiManager.isOpen(), 'Inventory closed after Escape');

    invGuiManager.destroy();
    hotbar2.destroy();
    document.body.removeChild(hotbarContainer2);

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
</body>
</html>
