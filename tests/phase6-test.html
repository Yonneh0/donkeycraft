<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Phase 6 Interaction Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 960px; margin: 0 auto; }
h1 { color: #00d4ff; font-size: 1.4em; margin-bottom: 8px; border-bottom: 2px solid #00d4ff; padding-bottom: 8px; }
.subtitle { color: #888; font-size: 0.85em; margin-bottom: 16px; }
.section { margin: 16px 0; padding: 12px 16px; background: #16213e; border-radius: 6px; border-left: 4px solid #333; }
.section h2 { color: #00d4ff; font-size: 1.05em; margin-bottom: 8px; }
.test { padding: 4px 0 4px 24px; font-size: 0.88em; border-left: 2px solid #333; margin: 2px 0; }
.test.pass { color: #2ecc71; border-left-color: #2ecc71; }
.test.fail { color: #e74c3c; border-left-color: #e74c3c; }
.test .detail { color: #888; font-size: 0.85em; margin-top: 1px; }
.summary { margin: 20px 0; padding: 14px 18px; border-radius: 6px; font-size: 1em; }
.summary.pass { background: #0a3d0a; border-left: 4px solid #2ecc71; }
.summary.fail { background: #3d0a0a; border-left: 4px solid #e74c3c; }
.info-msg { color: #f1c40f; font-style: italic; padding: 4px 0 4px 24px; font-size: 0.85em; }
</style>
</head>
<body>
<h1>Donkeycraft — Phase 6 Interaction Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Testing: Raycasting, Block Breaking, Block Placement, Interactable Blocks</div>
<div id="results"></div>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>

<script src="../src/world/block.js"></script>

<script src="../src/world/block-models.js"></script>
<script src="../src/world/recipe-registry.js"></script>

<!-- Phase 4 World Generation -->
<script src="../src/world/biome.js"></script>
<script src="../src/world/chunk.js"></script>

<script src="../src/player/player.js"></script>
<script src="../src/player/collision.js"></script>
<script src="../src/player/movement.js"></script>

<script src="../src/interaction/raycast.js"></script>

<script>
(function() {
    'use strict';

    var results = document.getElementById('results');
    var totalTests = 0;
    var passedTests = 0;
    var failedTests = 0;
    var currentSection = null;

    // ============================================================
    // Test Framework
    // ============================================================

    function section(name) {
        var div = document.createElement('div');
        div.className = 'section';
        var heading = document.createElement('h2');
        heading.textContent = name;
        div.appendChild(heading);
        results.appendChild(div);
        currentSection = div;
    }

    function assert(condition, message) {
        totalTests++;
        if (condition) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Assertion failed.</div>';
        }
        currentSection.appendChild(div);
    }

    function assertEq(actual, expected, message) {
        totalTests++;
        if (actual === expected) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual) + '</div>';
        }
        currentSection.appendChild(div);
    }

    function assertNear(actual, expected, epsilon, message) {
        totalTests++;
        if (Math.abs(actual - expected) < epsilon) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ~' + expected + ', got ' + actual + ' (delta=' + Math.abs(actual - expected) + ', epsilon=' + epsilon + ')</div>';
        }
        currentSection.appendChild(div);
    }

    function assertType(val, type, message) {
        totalTests++;
        if (typeof val === type) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected type "' + type + '", got "' + typeof val + '"</div>';
        }
        currentSection.appendChild(div);
    }

    function assertArrEq(actual, expected, message) {
        totalTests++;
        if (actual.length !== expected.length) {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Length mismatch: ' + actual.length + ' vs ' + expected.length + '</div>';
            currentSection.appendChild(div);
            return;
        }
        for (var i = 0; i < actual.length; i++) {
            if (actual[i] !== expected[i]) {
                failedTests++;
                var div3 = document.createElement('div');
                div3.className = 'test fail';
                div3.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Index ' + i + ': expected ' + expected[i] + ', got ' + actual[i] + '</div>';
                currentSection.appendChild(div3);
                return;
            }
        }
        passedTests++;
        var div2 = document.createElement('div');
        div2.className = 'test pass';
        div2.textContent = '\u2713 PASS: ' + message;
        currentSection.appendChild(div2);
    }

    function info(msg) {
        var div = document.createElement('div');
        div.className = 'info-msg';
        div.textContent = '>> ' + msg;
        currentSection.appendChild(div);
    }

    function finishTests() {
        var summary = document.createElement('div');
        if (failedTests === 0) {
            summary.className = 'summary pass';
            summary.innerHTML = '<strong>ALL TESTS PASSED</strong> \u2014 ' + passedTests + '/' + totalTests;
        } else {
            summary.className = 'summary fail';
            summary.innerHTML = '<strong>TESTS FAILED</strong> \u2014 ' + passedTests + '/' + totalTests + ' passed, ' + failedTests + ' failed';
        }
        results.appendChild(summary);
    }

    // ============================================================
    // HELPER: Build a test chunk with known block layout
    // ============================================================
    function buildTestWorld(chunkManager) {
        var chunk = chunkManager.getChunk(0, 0);
        chunk.fill(0); // air everywhere

        // Stone wall at local X=5 for all Y (global X=5)
        for (var y = 0; y < 64; y++) {
            chunk.setBlock(5, y, 5, 1); // stone
        }

        // Floor at Y=0 (stone everywhere)
        for (var x = 0; x < 16; x++) {
            for (var z = 0; z < 16; z++) {
                chunk.setBlock(x, 0, z, 1); // stone
            }
        }

        // Air corridor: local X=8..12, Y=8..20, Z=5 (all air)
        for (var cx = 8; cx <= 12; cx++) {
            for (var cy = 8; cy <= 20; cy++) {
                chunk.setBlock(cx, cy, 5, 0); // air
            }
        }

        // Ceiling at Y=15 for local X=8..12, Z=5 (for looking-up test)
        for (var ccx = 8; ccx <= 12; ccx++) {
            chunk.setBlock(ccx, 15, 5, 1); // stone ceiling
        }

        return chunk;
    }

    // ============================================================
    // TEST 1: Raycasting — raycast.js
    // ============================================================
    section('1. Raycasting (raycast.js)');

    var rayChunkManager = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    buildTestWorld(rayChunkManager);

    // Test 1a: RaycastResult class
    var testPos = new Donkeycraft.Vector3(10.5, 14.0, 10.0);
    var result = new Donkeycraft.RaycastResult(10, 14, 10, 1, 0, 0, 2.0, testPos);
    assert(result !== null, 'RaycastResult instance created');
    assertEq(result.blockX, 10, 'RaycastResult.blockX = 10');
    assertEq(result.blockY, 14, 'RaycastResult.blockY = 14');
    assertEq(result.blockZ, 10, 'RaycastResult.blockZ = 10');
    assertEq(result.faceNormalX, 1, 'RaycastResult.faceNormalX = 1 (right face)');
    assertEq(result.faceNormalY, 0, 'RaycastResult.faceNormalY = 0');
    assertEq(result.faceNormalZ, 0, 'RaycastResult.faceNormalZ = 0');
    assertEq(result.distance, 2.0, 'RaycastResult.distance = 2.0');
    assertNear(result.hitPosition.x, 10.5, 0.01, 'RaycastResult.hitPosition.X ≈ 10.5');

    // Test 1b: Raycasting toward stone wall from air corridor
    var origin = new Donkeycraft.Vector3(10.5, 14.0, 5.0);
    var direction = new Donkeycraft.Vector3(-1, 0, 0); // facing left toward wall at X=5
    var hitResult = Donkeycraft.Raycast.raycast(rayChunkManager, origin, direction, 6.0);

    assert(hitResult !== null, 'Raycast hits stone wall (direction=-X)');
    if (hitResult) {
        assertEq(hitResult.blockX, 5, 'Hit block X = 5 (wall position)');
        assertEq(hitResult.faceNormalX, 1, 'Face normal X = 1 (right face hit — stepping -X means entering from right)');
        assertEq(hitResult.faceNormalY, 0, 'Face normal Y = 0');
        assertEq(hitResult.faceNormalZ, 0, 'Face normal Z = 0');
        assertNear(hitResult.distance, 4.5, 0.1, 'Distance ≈ 4.5 (DDA hits face at entry point X=6, origin=10.5) (got ' + hitResult.distance.toFixed(4) + ')');
    }

    // Test 1c: Raycasting in opposite direction (positive X — no block beyond wall)
    var origin2 = new Donkeycraft.Vector3(10.0, 14.0, 5.0);
    var direction2 = new Donkeycraft.Vector3(1, 0, 0); // facing right into air corridor
    var hitResult2 = Donkeycraft.Raycast.raycast(rayChunkManager, origin2, direction2, 6.0);
    assert(hitResult2 === null, 'Raycast misses when looking into empty space (+X)');

    // Test 1d: Raycasting upward (positive Y — hits ceiling at Y=15)
    var origin3 = new Donkeycraft.Vector3(10.0, 10.0, 5.0);
    var direction3 = new Donkeycraft.Vector3(0, 1, 0); // facing up
    var hitResult3 = Donkeycraft.Raycast.raycast(rayChunkManager, origin3, direction3, 6.0);
    assert(hitResult3 !== null, 'Raycast hits ceiling when looking up (+Y)');
    if (hitResult3) {
        assertEq(hitResult3.faceNormalY, -1, 'Ceiling face normal Y = -1 (bottom face hit)');
    }

    // Test 1e: Raycasting downward (negative Y — hits floor at Y=0)
    var origin4 = new Donkeycraft.Vector3(10.0, 20.0, 5.0);
    var direction4 = new Donkeycraft.Vector3(0, -1, 0); // facing down
    var hitResult4 = Donkeycraft.Raycast.raycast(rayChunkManager, origin4, direction4, 6.0);
    assert(hitResult4 !== null, 'Raycast hits floor when looking down (-Y)');
    if (hitResult4) {
        assertEq(hitResult4.faceNormalY, 1, 'Floor face normal Y = 1 (top face hit)');
    }

    // Test 1f: Reach distance enforcement — reach too short to hit wall
    var origin5 = new Donkeycraft.Vector3(10.5, 14.0, 5.0);
    var direction5 = new Donkeycraft.Vector3(-1, 0, 0);
    var hitResult5 = Donkeycraft.Raycast.raycast(rayChunkManager, origin5, direction5, 3.0); // reach too short (wall at distance 5.5)
    assert(hitResult5 === null, 'Raycast misses when reach (3.0) < distance to block (5.5)');

    // Test 1g: getDirectionFromRotation
    var dir = Donkeycraft.Raycast.getDirectionFromRotation(0, 0);
    assertNear(dir.x, 0, 0.01, 'Direction from rotation(0,0): X ≈ 0 (got ' + dir.x.toFixed(4) + ')');
    assertNear(dir.y, 0, 0.01, 'Direction from rotation(0,0): Y ≈ 0 (got ' + dir.y.toFixed(4) + ')');
    assertNear(dir.z, -1, 0.01, 'Direction from rotation(0,0): Z ≈ -1 (facing -Z) (got ' + dir.z.toFixed(4) + ')');

    // Test 1h: getFaceNormals
    var faceNormals = Donkeycraft.Raycast.getFaceNormals();
    assert(Array.isArray(faceNormals), 'getFaceNormals returns an array');
    assertEq(faceNormals.length, 6, 'getFaceNormals returns 6 face normals');

    // Test 1i: raycast with ignoreIds — skip stone, hit cobblestone behind it
    var chunk2 = rayChunkManager.getChunk(0, 0);
    chunk2.setBlock(3, 14, 5, 4); // cobblestone at local X=3, Y=14, Z=5

    var origin6 = new Donkeycraft.Vector3(10.0, 14.0, 5.0);
    var direction6 = new Donkeycraft.Vector3(-1, 0, 0);
    var hitIgnore = Donkeycraft.Raycast.raycast(rayChunkManager, origin6, direction6, 6.0);
    assert(hitIgnore !== null, 'raycast with ignoreIds: hits stone first');

    var hitIgnore2 = Donkeycraft.Raycast.raycast(rayChunkManager, origin6, direction6, 6.0, [1]);
    assert(hitIgnore2 !== null, 'raycast skips stone (id=1), hits cobblestone (id=4)');
    if (hitIgnore2) {
        assertEq(hitIgnore2.blockX, 3, 'raycast with ignoreIds: hit block X = 3 (cobblestone behind wall)');
    }

    // Test 1j: Zero direction returns null
    var zeroDir = new Donkeycraft.Vector3(0, 0, 0);
    var hitZero = Donkeycraft.Raycast.raycast(rayChunkManager, origin, zeroDir, 6.0);
    assert(hitZero === null, 'Zero direction returns null');

    // Test 1k: Out of world bounds — floor beyond reach
    // Origin at Y=8: DDA steps to Y=1 at t=7, then Y=0 at t=8 > reach=6 → break before checking floor
    var originDown = new Donkeycraft.Vector3(10.0, 8.0, 5.0);
    var dirDown = new Donkeycraft.Vector3(0, -1, 0);
    var hitDown = Donkeycraft.Raycast.raycast(rayChunkManager, originDown, dirDown, 6.0);
    // Distance from Y=8 to floor entry face at Y=1 is 7.0 > reach 6.0, so should miss
    assert(hitDown === null, 'Raycast misses when floor is beyond reach (7.0 > 6.0)');

    // Test 1l: Inside-block raycast — DDA steps away from origin to find adjacent blocks
    // Place stone at local X=10, Y=14, Z=5 — fill the air corridor
    chunk2.setBlock(10, 14, 5, 1);
    var originInside = new Donkeycraft.Vector3(10.5, 14.5, 5.5); // inside stone block
    var dirInside = new Donkeycraft.Vector3(-1, 0, 0);
    var hitInside = Donkeycraft.Raycast.raycast(rayChunkManager, originInside, dirInside, 6.0);
    // DDA naturally steps away from origin, so it finds adjacent blocks
    assert(hitInside !== null, 'Raycast finds adjacent block when origin is inside solid (DDA steps away)');
    if (hitInside) {
        // DDA starts at floor(10.5)=10, steps to 9 first (t=0.5), then 8,7,6,5...
        // First solid block found is at X=5 (stone wall from buildTestWorld)
        assert(hitInside.blockX >= 5 && hitInside.blockX <= 10, 'Hit block X between 5 and 10 (got ' + hitInside.blockX + ')');
    }

    // Test 1m: Near-zero direction vector clamped to zero (epsilon fix)
    var nearZeroDir = new Donkeycraft.Vector3(1e-8, 0.5, 0); // very small X component
    var hitNearZero = Donkeycraft.Raycast.raycast(rayChunkManager, origin2, nearZeroDir, 6.0);
    // Should not throw or produce NaN — returns null since looking into empty space
    assert(hitNearZero === null || hitNearZero.distance > 0, 'Near-zero direction vector handled without error');

    // Test 1n: Reach clamping (1.0-12.0 range)
    var originReach = new Donkeycraft.Vector3(10.0, 14.0, 5.0);
    var dirReach = new Donkeycraft.Vector3(-1, 0, 0);
    var hitClamp = Donkeycraft.Raycast.raycast(rayChunkManager, originReach, dirReach, 0.5); // below min
    assert(hitClamp === null, 'Reach clamped to minimum (0.5 → 1.0), still too short for wall at distance 5');

    rayChunkManager.destroy();

    // ============================================================
    // TEST 2: Block Breaking (block-action.js)
    // ============================================================
    section('2. Block Breaking (block-action.js)');

    // Test 2a: Hardness values (matching block.js definitions)
    assertEq(Donkeycraft.BlockAction.getHardness(0), 0, 'Air hardness = 0');
    assertEq(Donkeycraft.BlockAction.getHardness(1), 1.5, 'Stone hardness = 1.5');
    // ID 3 = diorite (hardness 1.5), ID 4 = andesite (hardness 1.5)
    // ID 7 = dirt (hardness 0.5) — using correct ID
    assertEq(Donkeycraft.BlockAction.getHardness(7), 0.5, 'Dirt hardness = 0.5');
    assertEq(Donkeycraft.BlockAction.getHardness(4), 1.5, 'Andesite hardness = 1.5');
    // ID 10 = coal_ore (hardness 3.0) — using correct block name in test description
    assertEq(Donkeycraft.BlockAction.getHardness(10), 3.0, 'Coal ore hardness = 3.0');

    // Test 2b: Tool multipliers
    assertEq(Donkeycraft.BlockAction.getToolMultiplier('naked'), 1.0, 'Naked tool multiplier = 1.0');
    assertEq(Donkeycraft.BlockAction.getToolMultiplier('wood'), 2.0, 'Wood tool multiplier = 2.0');
    assertEq(Donkeycraft.BlockAction.getToolMultiplier('stone'), 4.0, 'Stone tool multiplier = 4.0');
    assertEq(Donkeycraft.BlockAction.getToolMultiplier('iron'), 6.0, 'Iron tool multiplier = 6.0');
    assertEq(Donkeycraft.BlockAction.getToolMultiplier('diamond'), 8.0, 'Diamond tool multiplier = 8.0');

    // Test 2c: Calculate break time (hardness / toolMultiplier)
    // Stone hardness = 1.5, naked multiplier = 1.0 → 1.5/1.0 = 1.5s
    var stoneBreakNaked = Donkeycraft.BlockAction.calculateBreakTime(1, 'naked');
    assertEq(stoneBreakNaked, 1.5, 'Stone break time with naked = 1.5s (1.5/1.0) (got ' + stoneBreakNaked.toFixed(4) + ')');

    // Stone hardness = 1.5, diamond multiplier = 8.0 → 1.5/8.0 = 0.1875s
    var stoneBreakDiamond = Donkeycraft.BlockAction.calculateBreakTime(1, 'diamond');
    assertEq(stoneBreakDiamond, 0.1875, 'Stone break time with diamond = 0.1875s (1.5/8) (got ' + stoneBreakDiamond.toFixed(4) + ')');

    // Dirt hardness = 0.5, wood multiplier = 2.0 → 0.5/2.0 = 0.25s
    var dirtBreakWood = Donkeycraft.BlockAction.calculateBreakTime(7, 'wood');
    assertEq(dirtBreakWood, 0.25, 'Dirt break time with wood = 0.25s (0.5/2) (got ' + dirtBreakWood.toFixed(4) + ')');

    // Test 2d: All tool multipliers (matching TOOL_MULTIPLIERS in block-action.js)
    var allMultipliers = Donkeycraft.BlockAction.getAllToolMultipliers();
    assertEq(allMultipliers.wood, 2.0, 'AllToolMultipliers.wood = 2.0');
    assertEq(allMultipliers.stone, 4.0, 'AllToolMultipliers.stone = 4.0');
    assertEq(allMultipliers.iron, 6.0, 'AllToolMultipliers.iron = 6.0');
    assertEq(allMultipliers.gold, 12.0, 'AllToolMultipliers.gold = 12.0');
    assertEq(allMultipliers.diamond, 8.0, 'AllToolMultipliers.diamond = 8.0');
    assertEq(allMultipliers.netherite, 9.0, 'AllToolMultipliers.netherite = 9.0');
    assertEq(allMultipliers.naked, 1.0, 'AllToolMultipliers.naked = 1.0');

    // Test 2e: Start breaking and tick progress
    // Stone break time with naked = 1.5s, so 0.1s → progress = 0.1/1.5 = 0.0667
    var breakChunkManager = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var breakChunk = breakChunkManager.getChunk(0, 0);
    breakChunk.fill(0);
    breakChunk.setBlock(8, 10, 8, 1); // stone at known position

    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');

    var events = Donkeycraft.BlockAction.tickBreakProgress(0.1);
    assert(events.length === 1, 'tickBreakProgress returns 1 event for active break');
    if (events.length > 0) {
        assertEq(events[0].type, 'progress', 'Event type = progress');
        assertEq(events[0].x, 8, 'Event x = 8');
        assertEq(events[0].y, 10, 'Event y = 10');
        assertEq(events[0].z, 8, 'Event z = 8');
        assertNear(events[0].progress, 0.0667, 0.01, 'Progress ≈ 0.0667 after 0.1s (got ' + events[0].progress.toFixed(4) + ')');
    }

    // Test 2f: Break completes after full time (1.5s for stone with naked)
    Donkeycraft.BlockAction.clearAll();
    // Set chunk manager so re-verification works (block check requires it)
    Donkeycraft.BlockAction.setChunkManager(breakChunkManager);
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');

    var events2 = Donkeycraft.BlockAction.tickBreakProgress(1.5);
    var brokenEvent = null;
    for (var i = 0; i < events2.length; i++) {
        if (events2[i].type === 'broken') {
            brokenEvent = events2[i];
            break;
        }
    }
    assert(brokenEvent !== null, 'Break completes after full break time');
    if (brokenEvent) {
        assertEq(brokenEvent.blockId, 1, 'Broken event blockId = 1 (stone)');
        assertEq(brokenEvent.x, 8, 'Broken event x = 8');
    }

    // Test 2g: Get break progress
    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');
    var progressBefore = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assertEq(progressBefore, 0, 'Break progress = 0 before ticking');

    Donkeycraft.BlockAction.tickBreakProgress(0.1);
    var progressAfter = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assert(progressAfter > 0, 'Break progress > 0 after ticking (got ' + progressAfter.toFixed(4) + ')');

    // Test 2h: Cancel breaking
    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');
    Donkeycraft.BlockAction.cancelBreaking(8, 10, 8);
    var progressCancelled = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assertEq(progressCancelled, 0, 'Break progress = 0 after cancel');

    // Test 2i: Unbreakable block (air — hardness 0)
    var airBreakTime = Donkeycraft.BlockAction.calculateBreakTime(0, 'diamond');
    assert(airBreakTime === Infinity, 'Air break time = Infinity (unbreakable)');

    // Test 2j: getActiveBreakStates
    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');
    var activeStates = Donkeycraft.BlockAction.getActiveBreakStates();
    assert(Object.keys(activeStates).length === 1, 'getActiveBreakStates returns 1 entry');

    // Test 2k: Unknown block ID uses default hardness
    var unknownBreakTime = Donkeycraft.BlockAction.calculateBreakTime(999, 'naked');
    assertEq(unknownBreakTime, 1.0, 'Unknown block break time = 1.0s (default hardness 1.0 / naked multiplier 1.0)');

    // Test 2l: Coordinate flooring consistency — float coords should match int coords
    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8.9, 10.1, 8.7, 1, [], 'naked');
    var progressFloored = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assertEq(progressFloored, 0, 'Float startBreaking coords floor to same key as int getBreakProgress');

    Donkeycraft.BlockAction.tickBreakProgress(0.1);
    var progressFlooredAfter = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assert(progressFlooredAfter > 0, 'Float startBreaking coords match int getBreakProgress after tick');

    // Test 2m: Cancel with float coords matches floor'd key
    Donkeycraft.BlockAction.cancelBreaking(8.9, 10.1, 8.7);
    var progressCancelledFloat = Donkeycraft.BlockAction.getBreakProgress(8.9, 10.1, 8.7);
    assertEq(progressCancelledFloat, 0, 'Cancel with float coords works (floors to same key)');

    // Test 2n: Block re-verification — block changed during break → no broken event
    Donkeycraft.BlockAction.clearAll();
    breakChunk.setBlock(8, 10, 8, 1); // stone
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');

    // Set chunk manager for re-verification
    Donkeycraft.BlockAction.setChunkManager(breakChunkManager);

    // Change block to dirt (ID 7) BEFORE break completes
    breakChunk.setBlock(8, 10, 8, 7); // change stone → dirt

    // Tick for full break time — should NOT emit broken event (block changed)
    var events3 = Donkeycraft.BlockAction.tickBreakProgress(1.5);
    var noBrokenEvent = null;
    for (var j = 0; j < events3.length; j++) {
        if (events3[j].type === 'broken') {
            noBrokenEvent = events3[j];
            break;
        }
    }
    assert(noBrokenEvent === null, 'No broken event when block was changed during break (re-verification)');

    // Test 2o: Block re-verification — block still exists → broken event emitted
    Donkeycraft.BlockAction.clearAll();
    breakChunk.setBlock(8, 10, 8, 1); // stone again
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');

    var events4 = Donkeycraft.BlockAction.tickBreakProgress(1.5);
    var stillBrokenEvent = null;
    for (var k = 0; k < events4.length; k++) {
        if (events4[k].type === 'broken') {
            stillBrokenEvent = events4[k];
            break;
        }
    }

    // Test 2p: Chunk index cleanup — O(1) clearChunkBreakStates
    Donkeycraft.BlockAction.clearAll();

    breakChunk.setBlock(12, 10, 8, 1);
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');
    Donkeycraft.BlockAction.startBreaking(12, 10, 8, 1, [], 'naked');

    // Both should be in the same chunk (chunkX=0, chunkZ=0)
    var statesBefore = Object.keys(Donkeycraft.BlockAction.getActiveBreakStates()).length;
    assertEq(statesBefore, 2, 'Two break states in chunk (0,0)');

    // Clear chunk break states — should remove both via O(1) index lookup
    Donkeycraft.BlockAction.clearChunkBreakStates(0, 0);
    var statesAfter = Object.keys(Donkeycraft.BlockAction.getActiveBreakStates()).length;
    assertEq(statesAfter, 0, 'All break states cleared via chunk index');

    // Test 2q: Debounced progress events — only emit when crack stage changes
    Donkeycraft.BlockAction.clearAll();
    breakChunk.setBlock(8, 10, 8, 1);
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');

    // Tick with small delta (10ms each = 0.01s) — stone break time = 1.5s
    // Each tick adds 0.01/1.5 = 0.00667 progress
    // Stages: 0→0%→6.7%→13.3%→...→93.3%→100%
    // Stage changes at: 0%, 10%, 20%, ... 90% = stages 0-9
    // But progress only reaches ~6.67% after 10 ticks (0.1s total)
    // So only stage 0 emitted = 1 progress event
    var debounceEvents = [];
    for (var m = 0; m < 10; m++) {
        var tickEvents = Donkeycraft.BlockAction.tickBreakProgress(0.01); // 10ms ticks
        for (var n = 0; n < tickEvents.length; n++) {
            debounceEvents.push(tickEvents[n]);
        }
    }

    // With debouncing, should have far fewer events than 10 ticks
    var progressEventCount = 0;
    for (var p = 0; p < debounceEvents.length; p++) {
        if (debounceEvents[p].type === 'progress') {
            progressEventCount++;
        }
    }
    assert(progressEventCount < 10, 'Debounced progress events: ' + progressEventCount + ' < 10 ticks (got ' + progressEventCount + ')');

    // Test 2r: Debounced events include stage field
    if (debounceEvents.length > 0 && debounceEvents[0] && debounceEvents[0].type === 'progress') {
        assert(debounceEvents[0].stage !== undefined, 'Debounced progress event includes stage field');
    }

    breakChunkManager.destroy();

    section('5. Integration — Full Interaction Pipeline');

    var pipeChunkManager = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var pipeChunk = pipeChunkManager.getChunk(0, 0);
    pipeChunk.fill(0); // air

    // Build a test wall at Z=8
    for (var px = 0; px < 16; px++) {
        for (var py = 0; py < 20; py++) {
            pipeChunk.setBlock(px, py, 8, 1); // stone wall
        }
    }

    // Place a chest in the wall at local X=7, Y=10, Z=8
    pipeChunk.setBlock(7, 10, 8, 54);

    var pipePlayer = new Donkeycraft.Player({ x: 2.0, y: 14.0, z: 5.0 });

    // Step 1: Raycast toward the wall (direction +Z)
    var pipeOrigin = new Donkeycraft.Vector3(7.0, 14.0, 5.0);
    var pipeDir = new Donkeycraft.Vector3(0, 0, 1); // facing +Z toward wall at Z=8
    var pipeHit = Donkeycraft.Raycast.raycast(pipeChunkManager, pipeOrigin, pipeDir, 10.0);

    if (pipeHit) {
        info('Raycast hit block at (' + pipeHit.blockX + ', ' + pipeHit.blockY + ', ' + pipeHit.blockZ + ')');

        // Step 2: Try to break the hit block
        Donkeycraft.BlockAction.clearAll();
        var blockId = pipeChunk.getBlock(
            pipeHit.blockX,
            pipeHit.blockY,
            pipeHit.blockZ
        );
        assertEq(blockId !== 0, true, 'Hit block exists (id=' + blockId + ')');

        // Start breaking with diamond pickaxe
        Donkeycraft.BlockAction.startBreaking(pipeHit.blockX, pipeHit.blockY, pipeHit.blockZ, blockId, [], 'diamond');
        var breakEvents = Donkeycraft.BlockAction.tickBreakProgress(0.1);

        // Step 3: Try to place a block adjacent to hit face
        var placePos = Donkeycraft.BlockPlacement.getPlacementPosition(
            pipeHit.blockX, pipeHit.blockY, pipeHit.blockZ,
            pipeHit.faceNormalX, pipeHit.faceNormalY, pipeHit.faceNormalZ
        );
        assert(placePos.x !== undefined, 'getPlacementPosition returns valid position');

        // Step 4: Try to interact with chest if hit
        if (blockId === 54) {
            var interactResult = Donkeycraft.InteractableBlocks.handleRightClick(pipeChunkManager, pipePlayer, pipeHit.blockX, pipeHit.blockY, pipeHit.blockZ);
            assert(interactResult === true, 'Right-click on chest returns true');
        }
    }

    // Test 5b: Break and replace cycle
    Donkeycraft.BlockAction.clearAll();
    // Set chunk manager for re-verification (Test 2o may have left a destroyed reference)
    Donkeycraft.BlockAction.setChunkManager(pipeChunkManager);

    // Place andesite (ID 4, hardness 1.5) to break
    pipeChunk.setBlock(3, 12, 8, 4); // andesite at local (3, 12, 8)

    // Start breaking with iron pickaxe (multiplier 6.0)
    Donkeycraft.BlockAction.startBreaking(3, 12, 8, 4, [], 'iron');
    var breakTime = Donkeycraft.BlockAction.calculateBreakTime(4, 'iron');
    assertEq(breakTime, 0.25, 'Andesite break time with iron = 0.25s (1.5/6) (got ' + breakTime.toFixed(4) + ')');

    // Tick for full break time (0.25s)
    // Note: tickBreakProgress removes the break state after completion, so we check
    // for the "broken" event rather than getBreakProgress (which would return 0).
    var breakEvents = Donkeycraft.BlockAction.tickBreakProgress(breakTime);
    var brokenEventFound = false;
    for (var be = 0; be < breakEvents.length; be++) {
        if (breakEvents[be].type === 'broken') {
            brokenEventFound = true;
            break;
        }
    }
    assert(brokenEventFound, 'Break progress >= 1.0 after full break time (emits broken event)');

    // Verify block is still there (tick doesn't remove it — that's the game's job)
    var stillThere = pipeChunk.getBlock(3, 12, 8);
    assertEq(stillThere, 4, 'Block still exists after break tick (game must remove it separately)');

    // Remove block manually and place new one
    pipeChunk.setBlock(3, 12, 8, 0); // set to air
    var placed = Donkeycraft.BlockPlacement.placeBlock(pipeChunkManager, 3, 12, 8, 5, pipePlayer);
    assert(placed === true, 'Placed new block after breaking old one');
    assertEq(pipeChunk.getBlock(3, 12, 8), 5, 'New plank block at broken position');

    // Cleanup
    Donkeycraft.BlockAction.clearAll();
    pipePlayer.destroy();
    pipeChunkManager.destroy();

    // ============================================================
    // TEST 6: Edge Cases & Boundary Conditions
    // ============================================================
    section('6. Edge Cases & Boundary Conditions');

    // Test 6a: Raycast with reach = 1.0 (minimum)
    var edgeCM = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var edgeChunk = edgeCM.getChunk(0, 0);
    edgeChunk.fill(0);
    edgeChunk.setBlock(5, 10, 5, 1); // stone at (5,10,5)

    var edgeOrigin = new Donkeycraft.Vector3(6.0, 10.0, 5.0);
    var edgeDir = new Donkeycraft.Vector3(-1, 0, 0);
    var edgeHit = Donkeycraft.Raycast.raycast(edgeCM, edgeOrigin, edgeDir, 1.0); // min reach
    assert(edgeHit !== null, 'Raycast with reach=1.0 hits block at distance 1.0');

    // Test 6b: Raycast with reach = 12.0 (maximum)
    var edgeHitMax = Donkeycraft.Raycast.raycast(edgeCM, edgeOrigin, edgeDir, 12.0); // max reach
    assert(edgeHitMax !== null, 'Raycast with reach=12.0 (max) still works');

    // Test 6c: Raycast direction with exact axis alignment
    // Place a stone block at Z=2 so the -Z ray from Z=5 will hit it
    edgeChunk.setBlock(10, 10, 2, 1); // stone at (10,10,2)
    var axisDir = new Donkeycraft.Vector3(0, 0, -1);
    var edgeOrigin2 = new Donkeycraft.Vector3(10.0, 10.0, 5.0);
    var axisHit = Donkeycraft.Raycast.raycast(edgeCM, edgeOrigin2, axisDir, 6.0);
    assert(axisHit !== null, 'Exact axis direction (0,0,-1) raycast works (hit block at Z=2)');
    if (axisHit) {
        assertEq(axisHit.blockZ, 2, 'Axis raycast hit block Z = 2');
    }

    // Test 6d: Block action with very small delta time
    var tinyCM = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var tinyChunk = tinyCM.getChunk(0, 0);
    tinyChunk.fill(0);
    tinyChunk.setBlock(8, 10, 8, 1);

    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');
    var tinyEvents = Donkeycraft.BlockAction.tickBreakProgress(0.001); // 1ms tick
    assert(tinyEvents.length >= 0, 'Very small delta time (1ms) does not crash');

    // Test 6e: Block action with large delta time (tab reactivation scenario)
    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');
    var largeEvents = Donkeycraft.BlockAction.tickBreakProgress(2.0); // 2 second tick
    // Should complete break (or at least not crash)
    assert(largeEvents.length >= 0, 'Large delta time (2s) does not crash');

    // Test 6f: Block placement with negative coordinates
    var negCM = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var negChunk = negCM.getChunk(-1, -1); // chunk at (-1,-1) covers global X=[-16,-1], Z=[-16,-1]
    negChunk.fill(0);
    for (var ny = 0; ny < 20; ny++) {
        negChunk.setBlock(15, ny, 15, 1); // stone wall at local X=15 → global X=-1
    }

    var negPlayer = new Donkeycraft.Player({ x: -10.0, y: 14.0, z: -8.0 });
    var negPlaced = Donkeycraft.BlockPlacement.placeBlock(negCM, -1, 14, -8, 5, negPlayer);
    assert(negPlaced === true, 'Block placement at negative coordinates works');

    // Test 6g: Interactable blocks with float coordinates
    var intCM = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var intChunk = intCM.getChunk(0, 0);
    intChunk.fill(0);
    intChunk.setBlock(5, 10, 5, 54); // chest

    var intPlayer = new Donkeycraft.Player({ x: 2.0, y: 14.0, z: 5.0 });
    var intResult = Donkeycraft.InteractableBlocks.handleRightClick(intCM, intPlayer, 5.3, 10.7, 5.1);
    assert(intResult === true, 'handleRightClick with float coords works (floors to integer)');

    // Test 6i: WorldUtils — getBlockAt
    var wuCM = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var wuChunk = wuCM.getChunk(0, 0);
    wuChunk.fill(0);
    wuChunk.setBlock(5, 10, 5, 1); // stone

    var wuBlock = Donkeycraft.WorldUtils.getBlockAt(wuCM, 5, 10, 5);
    assertEq(wuBlock, 1, 'WorldUtils.getBlockAt returns correct block ID');

    var wuAir = Donkeycraft.WorldUtils.getBlockAt(wuCM, 6, 10, 5);
    assertEq(wuAir, 0, 'WorldUtils.getBlockAt returns 0 for air');

    var wuEmpty = Donkeycraft.WorldUtils.getBlockAt(null, 5, 10, 5);
    assertEq(wuEmpty, 0, 'WorldUtils.getBlockAt returns 0 when chunkManager is null');

    // Test 6j: WorldUtils — setBlockAt
    var setResult = Donkeycraft.WorldUtils.setBlockAt(wuCM, 5, 10, 5, 4); // cobblestone
    assert(setResult === true, 'WorldUtils.setBlockAt returns true on success');
    assertEq(Donkeycraft.WorldUtils.getBlockAt(wuCM, 5, 10, 5), 4, 'Block updated via WorldUtils.setBlockAt');

    var setFail = Donkeycraft.WorldUtils.setBlockAt(null, 5, 10, 5, 4);
    assert(setFail === false, 'WorldUtils.setBlockAt returns false when chunkManager is null');

    // Test 6k: WorldUtils — isChunkLoaded
    assert(Donkeycraft.WorldUtils.isChunkLoaded(wuCM, 5, 5) === true, 'Chunk containing (5,5) is loaded');
    assert(Donkeycraft.WorldUtils.isChunkLoaded(null, 5, 5) === false, 'isChunkLoaded returns false when chunkManager is null');

    // Test 6l: WorldUtils — calculateRaycastMaxSteps
    var maxSteps1 = Donkeycraft.WorldUtils.calculateRaycastMaxSteps(6.0);
    assert(maxSteps1 > 0, 'calculateRaycastMaxSteps(6) returns positive value (got ' + maxSteps1 + ')');
    // At reach=6: ceil(6 * 1.732) + 2 = ceil(10.392) + 2 = 11 + 2 = 13
    assertEq(maxSteps1, 13, 'calculateRaycastMaxSteps(6) = 13 (formula: ceil(reach*sqrt(3))+2)');

    var maxSteps2 = Donkeycraft.WorldUtils.calculateRaycastMaxSteps(1.0);
    // ceil(1 * 1.732) + 2 = 2 + 2 = 4
    assertEq(maxSteps2, 4, 'calculateRaycastMaxSteps(1) = 4');

    // Test 6m: WorldUtils — makeStateKey / parseStateKey
    var sKey = Donkeycraft.WorldUtils.makeStateKey(5, 10, 5);
    assertEq(sKey, '5,10,5', 'makeStateKey produces "x,y,z" format');
    var parsed = Donkeycraft.WorldUtils.parseStateKey('5,10,5');
    assertEq(parsed.x, 5, 'parseStateKey x = 5');
    assertEq(parsed.y, 10, 'parseStateKey y = 10');
    assertEq(parsed.z, 5, 'parseStateKey z = 5');

    // Test 6n: WorldUtils — makeChunkKey
    var cKey = Donkeycraft.WorldUtils.makeChunkKey(20, 30);
    assertEq(cKey, '1,1', 'makeChunkKey(20,30) = "1,1" (chunk coords of 20,30)');

    // Test 6o: WorldUtils — getChunkAndLocalCoords
    var coords = Donkeycraft.WorldUtils.getChunkAndLocalCoords(wuCM, 5, 10, 5);
    assert(coords.chunk !== null, 'getChunkAndLocalCoords returns chunk for loaded position');
    if (coords.chunk) {
        assertEq(coords.lx, 5, 'Local X = 5 for global (5,10,5)');
        assertEq(coords.ly, 10, 'Local Y = 10 for global (5,10,5)');
        assertEq(coords.lz, 5, 'Local Z = 5 for global (5,10,5)');
    }

    // Test 6p: Break state pause on chunk unload
    var pauseCM = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var pauseChunk = pauseCM.getChunk(0, 0);
    pauseChunk.fill(0);
    pauseChunk.setBlock(8, 10, 8, 1); // stone
    Donkeycraft.BlockAction.setChunkManager(pauseCM);

    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked');

    // Tick while chunk is loaded — progress should accumulate
    Donkeycraft.BlockAction.tickBreakProgress(0.5);
    var progressLoaded = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assert(progressLoaded > 0, 'Break progress accumulates when chunk is loaded (got ' + progressLoaded.toFixed(4) + ')');

    // Unload the chunk — tick should pause
    pauseCM.unloadChunk(0, 0);
    Donkeycraft.BlockAction.tickBreakProgress(1.0); // 1 second while chunk unloaded
    var progressUnloaded = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assertEq(progressUnloaded, progressLoaded, 'Break progress PAUSED when chunk unloaded (no drift)');

    // Reload chunk — progress should resume from where it left off
    pauseCM.getChunk(0, 0);
    Donkeycraft.BlockAction.tickBreakProgress(0.1);
    var progressResumed = Donkeycraft.BlockAction.getBreakProgress(8, 10, 8);
    assert(progressResumed > progressUnloaded, 'Break progress resumes after chunk reloaded');

    // Cleanup
    edgeCM.destroy();
    tinyCM.destroy();
    negCM.destroy();
    intCM.destroy();
    wuCM.destroy();
    pauseCM.destroy();

    // Test 6q: Multiple concurrent break states in different chunks
    var multiCM = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var multiChunk0 = multiCM.getChunk(0, 0);
    var multiChunk1 = multiCM.getChunk(1, 0); // chunk at (1,0) covers global X=[16,31]
    multiChunk0.fill(0);
    multiChunk1.fill(0);
    multiChunk0.setBlock(8, 10, 8, 1); // stone in chunk (0,0)
    multiChunk1.setBlock(8, 10, 8, 1); // stone in chunk (1,0) → global X=24

    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 10, 8, 1, [], 'naked'); // chunk (0,0)
    Donkeycraft.BlockAction.startBreaking(24, 10, 8, 1, [], 'naked'); // chunk (1,0)

    var multiStates = Object.keys(Donkeycraft.BlockAction.getActiveBreakStates()).length;
    assertEq(multiStates, 2, 'Two concurrent break states in different chunks');

    // Clear only chunk (0,0) — should leave chunk (1,0) state intact
    Donkeycraft.BlockAction.clearChunkBreakStates(0, 0);
    var remainingStates = Object.keys(Donkeycraft.BlockAction.getActiveBreakStates()).length;
    assertEq(remainingStates, 1, 'Only chunk (0,0) states cleared, chunk (1,0) state remains');

    // Cleanup
    edgeCM.destroy();
    tinyCM.destroy();
    negCM.destroy();
    intCM.destroy();
    multiCM.destroy();
    negPlayer.destroy();
    intPlayer.destroy();

    finishTests();

})();
</script>
