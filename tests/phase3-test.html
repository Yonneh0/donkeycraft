<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Phase 3 Block System Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 960px; margin: 0 auto; }
h1 { color: #00d4ff; font-size: 1.4em; margin-bottom: 8px; border-bottom: 2px solid #00d4ff; padding-bottom: 8px; }
.subtitle { color: #888; font-size: 0.85em; margin-bottom: 16px; }
.section { margin: 16px 0; padding: 12px 16px; background: #16213e; border-radius: 6px; border-left: 4px solid #333; }
.section h2 { color: #00d4ff; font-size: 1.05em; margin-bottom: 8px; }
.test { padding: 4px 0 4px 24px; font-size: 0.88em; border-left: 2px solid #333; margin: 2px 0; }
.test.pass { color: #2ecc71; border-left-color: #2ecc71; }
.test.fail { color: #e74c3c; border-left-color: #e74c3c; }
.test .detail { color: #888; font-size: 0.85em; margin-top: 1px; }
.summary { margin: 20px 0; padding: 14px 18px; border-radius: 6px; font-size: 1em; }
.summary.pass { background: #0a3d0a; border-left: 4px solid #2ecc71; }
.summary.fail { background: #3d0a0a; border-left: 4px solid #e74c3c; }
.info-msg { color: #f1c40f; font-style: italic; padding: 4px 0 4px 24px; font-size: 0.85em; }
</style>
</head>
<body>
<h1>Donkeycraft — Phase 3 Block System Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Testing: Block Definitions, Block State, Block Types, Texture Atlas, Block Models, Recipe Registry</div>
<div id="results"></div>

<!-- Hidden canvas for WebGL/TextureAtlas tests -->
<canvas id="test-canvas" width="256" height="256" style="display:none;"></canvas>

<!-- Load Phase 1 dependencies first -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<!-- Load Phase 3 files -->
<script src="../src/world/block.js"></script>
<script src="../src/world/block-state.js"></script>
<script src="../src/world/block-types.js"></script>
<script src="../src/world/texture-atlas.js"></script>
<script src="../src/world/block-models.js"></script>
<script src="../src/world/recipe-registry.js"></script>

<script>
(function() {
    'use strict';

    var results = document.getElementById('results');
    var totalTests = 0;
    var passedTests = 0;
    var failedTests = 0;
    var currentSection = null;

    // ============================================================
    // Test Framework (uniform across all tests)
    // ============================================================

    function section(name) {
        var div = document.createElement('div');
        div.className = 'section';
        var heading = document.createElement('h2');
        heading.textContent = name;
        div.appendChild(heading);
        results.appendChild(div);
        currentSection = div;
    }

    function assert(condition, message) {
        totalTests++;
        var div = document.createElement('div');
        if (condition) {
            passedTests++;
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Assertion failed.</div>';
        }
        currentSection.appendChild(div);
    }

    function assertEq(actual, expected, message) {
        totalTests++;
        if (actual === expected) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual) + '</div>';
            currentSection.appendChild(div);
        }
    }

    function assertNear(actual, expected, epsilon, message) {
        totalTests++;
        if (Math.abs(actual - expected) < epsilon) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ~' + expected + ', got ' + actual + ' (delta=' + Math.abs(actual - expected) + ', epsilon=' + epsilon + ')</div>';
            currentSection.appendChild(div);
        }
    }

    function assertType(val, type, message) {
        totalTests++;
        if (typeof val === type) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected type "' + type + '", got "' + typeof val + '"</div>';
            currentSection.appendChild(div);
        }
    }

    function assertArrEq(actual, expected, message) {
        totalTests++;
        if (actual.length !== expected.length) {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Length mismatch: ' + actual.length + ' vs ' + expected.length + '</div>';
            currentSection.appendChild(div);
            return;
        }
        for (var i = 0; i < actual.length; i++) {
            if (actual[i] !== expected[i]) {
                failedTests++;
                var div3 = document.createElement('div');
                div3.className = 'test fail';
                div3.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Index ' + i + ': expected ' + expected[i] + ', got ' + actual[i] + '</div>';
                currentSection.appendChild(div3);
                return;
            }
        }
        passedTests++;
        var div2 = document.createElement('div');
        div2.className = 'test pass';
        div2.textContent = '\u2713 PASS: ' + message;
        currentSection.appendChild(div2);
    }

    function info(msg) {
        var div = document.createElement('div');
        div.className = 'info-msg';
        div.textContent = '>> ' + msg;
        currentSection.appendChild(div);
    }

    function finishTests() {
        var summary = document.createElement('div');
        if (failedTests === 0) {
            summary.className = 'summary pass';
            summary.innerHTML = '<strong>ALL TESTS PASSED</strong> \u2014 ' + passedTests + '/' + totalTests;
        } else {
            summary.className = 'summary fail';
            summary.innerHTML = '<strong>TESTS FAILED</strong> \u2014 ' + passedTests + '/' + totalTests + ' passed, ' + failedTests + ' failed';
        }
        results.appendChild(summary);
    }

    // ============================================================
    // TEST 1: Block Definitions (block.js)
    // ============================================================
    section('1. Block Definitions (block.js)');

    var air = Donkeycraft.BlockRegistry.getBlockById(0);
    assert(air !== null, 'Air block exists');
    assert(air.name === 'air', 'Air name is "air"');
    assert(air.transparent === true, 'Air is transparent');
    assert(air.hardness === -1, 'Air hardness is -1');

    var stone = Donkeycraft.BlockRegistry.getBlockById(1);
    assert(stone !== null, 'Stone block exists');
    assert(stone.name === 'stone', 'Stone name is "stone"');
    assert(stone.hardness === 1.5, 'Stone hardness is 1.5');
    assert(stone.blastResistance === 6.0, 'Stone blast resistance is 6.0');
    assert(stone.dropBlockId === 1, 'Stone dropBlockId is 1');
    assert(stone.transparent === false, 'Stone is not transparent');
    assert(stone.lightOpacity === 15, 'Stone lightOpacity is 15');

    var stoneByName = Donkeycraft.BlockRegistry.getBlockByName('stone');
    assert(stoneByName !== null && stoneByName.id === 1, 'Lookup stone by name');

    var glassByName = Donkeycraft.BlockRegistry.getBlockByName('glass');
    assert(glassByName !== null && glassByName.id === 45, 'Lookup glass by name');
    assert(glassByName.transparent === true, 'Glass is transparent');

    assert(Donkeycraft.BlockRegistry.getBlockById(999) === null, 'Non-existent block returns null');
    assert(Donkeycraft.BlockRegistry.getBlockByName('nonexistent_block') === null, 'Non-existent name returns null');

    var allBlocks = Donkeycraft.BlockRegistry.getAllBlocks();
    assert(allBlocks.length > 250, 'Block count > 250 (count=' + allBlocks.length + ')');

    var allHaveProps = true;
    var missingProps = [];
    for (var i = 0; i < allBlocks.length; i++) {
        var b = allBlocks[i];
        if (b.id === undefined || b.id === null || !b.name || b.hardness === undefined || b.blastResistance === undefined) {
            allHaveProps = false;
            missingProps.push('id=' + b.id + ' name=' + b.name);
        }
    }
    assert(allHaveProps, 'All blocks have required properties', missingProps.length > 0 ? 'Missing: ' + missingProps.join(', ') : '');

    var water = Donkeycraft.BlockRegistry.getBlockById(212);
    assert(water !== null, 'Water exists');
    assert(water.transparent === true, 'Water is transparent');
    assert(water.lightOpacity === 1, 'Water lightOpacity is 1');

    var lava = Donkeycraft.BlockRegistry.getBlockById(213);
    assert(lava !== null, 'Lava exists');
    assert(lava.emissive === true, 'Lava is emissive');
    assert(lava.lightLevel === 15, 'Lava lightLevel is 15');

    var obsidian = Donkeycraft.BlockRegistry.getBlockById(17);
    assert(obsidian.blastResistance >= 1200, 'Obsidian blast resistance >= 1200 (br=' + (obsidian ? obsidian.blastResistance : 'null') + ')');

    // ============================================================
    // TEST 2: Block Type Queries (block.js)
    // ============================================================
    section('2. Block Type Queries (block.js)');

    assert(Donkeycraft.BlockRegistry.isTransparent(0) === true, 'isTransparent(0) [air]');
    assert(Donkeycraft.BlockRegistry.isTransparent(45) === true, 'isTransparent(45) [glass]');
    assert(Donkeycraft.BlockRegistry.isTransparent(1) === false, 'isTransparent(1) [stone]');

    assert(Donkeycraft.BlockRegistry.isSolid(1) === true, 'isSolid(1) [stone]');
    assert(Donkeycraft.BlockRegistry.isSolid(45) === false, 'isSolid(45) [glass]');
    assert(Donkeycraft.BlockRegistry.isSolid(0) === false, 'isSolid(0) [air]');

    assert(Donkeycraft.BlockRegistry.isOpaque(1) === true, 'isOpaque(1) [stone]');
    assert(Donkeycraft.BlockRegistry.isOpaque(45) === false, 'isOpaque(45) [glass]');

    assert(Donkeycraft.BlockRegistry.isLiquid(212) === true, 'isLiquid(212) [water]');
    assert(Donkeycraft.BlockRegistry.isLiquid(213) === true, 'isLiquid(213) [lava]');
    assert(Donkeycraft.BlockRegistry.isLiquid(1) === false, 'isLiquid(1) [stone]');

    assert(Donkeycraft.BlockRegistry.isReplaceable(0) === true, 'isReplaceable(0) [air]');
    assert(Donkeycraft.BlockRegistry.getDropBlockId(1) === 1, 'getDropBlockId(1) = 1');
    assert(Donkeycraft.BlockRegistry.getDropBlockId(45) === -1, 'getDropBlockId(45) [glass] = -1');
    assert(Donkeycraft.BlockRegistry.getDropItemCount(1) === 1, 'getDropItemCount(1) = 1');

    // ============================================================
    // TEST 3: Block State System (block-state.js)
    // ============================================================
    section('3. Block State System (block-state.js)');

    var state1 = new Donkeycraft.BlockState({ axis: 'y', color: 'red' });
    assert(state1 !== null, 'BlockState created');
    assert(state1.get('axis') === 'y', 'Get property "axis"');
    assert(state1.get('color') === 'red', 'Get property "color"');
    assert(state1.get('nonexistent') === null, 'Get non-existent property');

    var state2 = new Donkeycraft.BlockState({ axis: 'y', color: 'red' });
    assert(state1.matches(state2) === true, 'States match (same properties)');

    var state3 = new Donkeycraft.BlockState({ axis: 'x', color: 'red' });
    assert(state1.matches(state3) === false, 'States do not match (different axis)');

    var emptyState = new Donkeycraft.BlockState();
    assert(emptyState.isEmpty() === true, 'Empty state is empty');
    assert(state1.isEmpty() === false, 'Non-empty state is not empty');

    var cloned = state1.clone();
    assert(state1.matches(cloned) === true, 'Clone matches original');

    state1.set('newProp', 'newValue');
    assert(state1.get('newProp') === 'newValue', 'Set and get property');

    var logStates = Donkeycraft.BlockStateRegistry.getPossibleStates(24);
    assert(logStates.length > 0, 'Oak log has states (count=' + logStates.length + ')');
    assert(logStates.length === 3, 'Oak log has 3 axis variants');

    var firstLogState = logStates[0];
    assert(firstLogState.get('axis') === 'y', 'First log state axis is "y"');

    var stateStr = Donkeycraft.BlockStateRegistry.getStateString(state1);
    assert(stateStr.indexOf('axis=y') >= 0 && stateStr.indexOf('color=red') >= 0, 'State string serialization');

    assert(Donkeycraft.BlockStateRegistry.hasStates(24) === true, 'Oak log has states');
    assert(Donkeycraft.BlockStateRegistry.hasStates(1) === false, 'Stone has no states');

    var defaultLog = Donkeycraft.BlockStateRegistry.getDefaultState(24);
    assert(defaultLog.get('axis') === 'y', 'Default log state axis is y');

    var found = Donkeycraft.BlockStateRegistry.findMatchingState(24, { axis: 'z' });
    assert(found !== null && found.get('axis') === 'z', 'Find matching state for axis=z');

    assert(Donkeycraft.ColorValues.WHITE === 'white', 'ColorValues.WHITE exists');
    assert(Donkeycraft.ColorValues.RED === 'red', 'ColorValues.RED exists');
    assert(Donkeycraft.AxisValues.Y === 'y', 'AxisValues.Y exists');
    assert(Donkeycraft.FacingValues.NORTH === 'north', 'FacingValues.NORTH exists');

    // ============================================================
    // TEST 4: Block Types Classification (block-types.js)
    // ============================================================
    section('4. Block Types Classification (block-types.js)');

    assert(Donkeycraft.BlockTypes.isSolid(1) === true, 'isSolid(1) [stone]');
    assert(Donkeycraft.BlockTypes.isSolid(45) === false, 'isSolid(45) [glass]');
    assert(Donkeycraft.BlockTypes.isSolid(212) === false, 'isSolid(212) [water]');

    assert(Donkeycraft.BlockTypes.isTransparent(45) === true, 'isTransparent(45) [glass]');
    assert(Donkeycraft.BlockTypes.isTransparent(1) === false, 'isTransparent(1) [stone]');
    assert(Donkeycraft.BlockTypes.isTransparent(118) === true, 'isTransparent(118) [oak_leaves]');

    assert(Donkeycraft.BlockTypes.isOpaque(1) === true, 'isOpaque(1) [stone]');
    assert(Donkeycraft.BlockTypes.isOpaque(45) === false, 'isOpaque(45) [glass]');

    assert(Donkeycraft.BlockTypes.isLiquid(212) === true, 'isLiquid(212) [water]');
    assert(Donkeycraft.BlockTypes.isLiquid(213) === true, 'isLiquid(213) [lava]');
    assert(Donkeycraft.BlockTypes.isLiquid(1) === false, 'isLiquid(1) [stone]');

    assert(Donkeycraft.BlockTypes.isReplaceable(0) === true, 'isReplaceable(0) [air]');
    assert(Donkeycraft.BlockTypes.isReplaceable(158) === true, 'isReplaceable(158) [grass plant]');

    assert(Donkeycraft.BlockTypes.isFullBlock(1) === true, 'isFullBlock(1) [stone]');
    assert(Donkeycraft.BlockTypes.isFullBlock(45) === false, 'isFullBlock(45) [glass]');
    assert(Donkeycraft.BlockTypes.isFullBlock(127) === false, 'isFullBlock(127) [stone_slab]');

    assert(Donkeycraft.BlockTypes.isCollidable(1) === true, 'isCollidable(1) [stone]');
    assert(Donkeycraft.BlockTypes.isCollidable(212) === true, 'isCollidable(212) [water]');

    assert(Donkeycraft.BlockTypes.blocksLight(1) === true, 'blocksLight(1) [stone]');
    assert(Donkeycraft.BlockTypes.blocksLight(45) === false, 'blocksLight(45) [glass]');

    assert(Donkeycraft.BlockTypes.getLightOpacity(1) === 15, 'getLightOpacity(1) = 15');
    assert(Donkeycraft.BlockTypes.getLightOpacity(45) === 0, 'getLightOpacity(45) = 0');

    var solidIds = Donkeycraft.BlockTypes.getIdsByType('solid');
    assert(Array.isArray(solidIds) && solidIds.length > 0, 'getIdsByType("solid") returns array (count=' + (solidIds ? solidIds.length : 0) + ')');

    var liquidIds = Donkeycraft.BlockTypes.getIdsByType('liquid');
    assert(liquidIds && liquidIds.indexOf(212) >= 0 && liquidIds.indexOf(213) >= 0, 'getIdsByType("liquid") contains water and lava');

    // ============================================================
    // TEST 5: Texture Atlas (texture-atlas.js)
    // ============================================================
    section('5. Texture Atlas (texture-atlas.js)');

    var canvas = document.getElementById('test-canvas');
    if (canvas) {
        try {
            var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (gl) {
                var atlas = new Donkeycraft.TextureAtlas(gl);
                assert(atlas !== null, 'TextureAtlas created');

                var genResult = atlas.generate();
                assert(genResult === true, 'Atlas generation succeeded');
                assert(atlas.isReady() === true, 'Atlas is ready after generation');

                var stoneUV = atlas.getUVs(1);
                assert(stoneUV !== null, 'Stone UV coordinates exist');
                if (stoneUV) {
                    assert(Math.abs(stoneUV.u - 0.0625) < 0.001, 'Stone U is 0.0625 (1/16)', 'u=' + stoneUV.u);
                    assert(stoneUV.v === 0, 'Stone V is 0');
                    assert(Math.abs(stoneUV.uSize - 0.0625) < 0.001, 'Stone uSize is 0.0625 (1/16)');
                }

                var glassUV = atlas.getUVs(45);
                assert(glassUV !== null, 'Glass UV coordinates exist');
                if (glassUV) {
                    assert(Math.abs(glassUV.u - 0.8125) < 0.001, 'Glass U is ~0.8125', 'u=' + glassUV.u);
                    assert(Math.abs(glassUV.v - 0.125) < 0.001, 'Glass V is ~0.125', 'v=' + glassUV.v);
                }

                var stonePixelUV = atlas.getPixelUVs(1);
                assert(stonePixelUV !== null, 'Stone pixel UVs exist');
                if (stonePixelUV) {
                    assert(stonePixelUV.pixelU === 16, 'Stone pixelU is 16');
                    assert(stonePixelUV.pixelV === 0, 'Stone pixelV is 0');
                }

                atlas.bind();
                assert(true, 'Atlas bind succeeded (no error)');

                atlas.destroy();
                assert(atlas.isReady() === false, 'Atlas destroyed successfully');

            } else {
                info('WebGL not available \u2014 skipping texture atlas tests');
            }
        } catch (e) {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 ERROR: Texture Atlas test threw: ' + e.message;
            currentSection.appendChild(div);
        }
    } else {
        info('Test canvas not found \u2014 skipping texture atlas tests');
    }

    // ============================================================
    // TEST 6: Block Models (block-models.js)
    // ============================================================
    section('6. Block Models (block-models.js)');

    var stoneModel = new Donkeycraft.BlockModel(1);
    assert(stoneModel !== null, 'BlockModel created for stone');
    assert(stoneModel.blockId === 1, 'Stone model blockId is 1');
    assert(stoneModel.getFaceTexture('up') === 'stone', 'Stone model uses default texture');

    assert(stoneModel.getFaceTexture('up') && stoneModel.getFaceTexture('down') &&
           stoneModel.getFaceTexture('north') && stoneModel.getFaceTexture('south') &&
           stoneModel.getFaceTexture('east') && stoneModel.getFaceTexture('west'), 'All 6 faces have textures');

    assert(stoneModel.hasAO() === false, 'Default model has no AO');

    var upAO = stoneModel.getAOWeights('up');
    assert(Array.isArray(upAO) && upAO.length === 4, 'AO weights are array of 4 values');
    assert(upAO[0] === 1.0 && upAO[1] === 1.0 && upAO[2] === 1.0 && upAO[3] === 1.0, 'Full AO weights are all 1.0');

    var regStoneModel = Donkeycraft.BlockModelRegistry.getBlockModel(1);
    assert(regStoneModel !== null, 'Registry returns stone model');
    assert(regStoneModel.hasAO() === true, 'Registry stone model has AO (solid block)');

    var regGlassModel = Donkeycraft.BlockModelRegistry.getBlockModel(45);
    assert(regGlassModel !== null, 'Registry returns glass model');
    assert(regGlassModel.hasAO() === false, 'Registry glass model has no AO (transparent)');

    var grassModel = Donkeycraft.BlockModelRegistry.getBlockModel(8);
    assert(grassModel !== null, 'Grass block model exists');
    if (grassModel) {
        assert(grassModel.getFaceTexture('up') === 'grass_block_top', 'Grass top is grass_block_top');
        assert(grassModel.getFaceTexture('down') === 'dirt', 'Grass bottom is dirt');
        assert(grassModel.getFaceTexture('north') === 'grass_block_side', 'Grass side is grass_block_side');
        assert(grassModel.hasAO() === true, 'Grass model has AO');
    }

    assert(Donkeycraft.BlockModelRegistry.hasAO(1) === true, 'hasAO(1) [stone]');
    assert(Donkeycraft.BlockModelRegistry.hasAO(45) === false, 'hasAO(45) [glass]');

    assert(Donkeycraft.BlockModelRegistry.FACE_UP === 0, 'FACE_UP = 0');
    assert(Donkeycraft.BlockModelRegistry.FACE_DOWN === 1, 'FACE_DOWN = 1');
    assert(Donkeycraft.BlockModelRegistry.FACE_NORTH === 2, 'FACE_NORTH = 2');

    var upNormal = Donkeycraft.BlockModelRegistry.FACE_NORMALS[0];
    assert(upNormal.x === 0 && upNormal.y === 1 && upNormal.z === 0, 'UP normal is (0,1,0)');
    var downNormal = Donkeycraft.BlockModelRegistry.FACE_NORMALS[1];
    assert(downNormal.x === 0 && downNormal.y === -1 && downNormal.z === 0, 'DOWN normal is (0,-1,0)');

    var modelCount = Donkeycraft.BlockModelRegistry.getModelCount();
    assert(modelCount > 200, 'Model count > 200 (count=' + modelCount + ')');

    // ============================================================
    // TEST 7: Recipe Registry (recipe-registry.js)
    // ============================================================
    section('7. Recipe Registry (recipe-registry.js)');

    var shapedCount = Donkeycraft.RecipeRegistry.getShapedCount();
    assert(shapedCount > 0, 'Shaped recipes registered (count=' + shapedCount + ')');

    var shapelessCount = Donkeycraft.RecipeRegistry.getShapelessCount();
    assert(shapelessCount > 0, 'Shapeless recipes registered (count=' + shapelessCount + ')');

    var smeltCount = Donkeycraft.RecipeRegistry.getSmeltCount();
    assert(smeltCount > 0, 'Smelting recipes registered (count=' + smeltCount + ')');

    var ironOreSmelt = Donkeycraft.RecipeRegistry.getSmeltRecipe(11);
    assert(ironOreSmelt !== null, 'Iron ore has smelt recipe');
    if (ironOreSmelt) {
        assert(ironOreSmelt.outputBlockId === 221, 'Iron ore smelts to iron_ingot');
        assert(ironOreSmelt.cookingTime === 200, 'Smelting time is 200 ticks');
    }

    var sandSmelt = Donkeycraft.RecipeRegistry.getSmeltOutput(19);
    assert(sandSmelt === 45, 'Sand smelts to glass (45)');

    var planksGrid = [
        [30, 30],
        [30, 30]
    ];
    var craftedTable = Donkeycraft.RecipeRegistry.matchShapedRecipe(planksGrid, 2, 2);
    assert(craftedTable !== null && craftedTable.outputBlockId === 195, '4 oak_planks craft crafting_table');

    var itemCounts = { 221: 9 };
    var shapelessMatch = Donkeycraft.RecipeRegistry.matchShapelessRecipe(itemCounts);
    assert(shapelessMatch !== null && shapelessMatch.outputBlockId === 226, '9 iron_ingots match shapeless recipe');

    var emptyGrid = [
        [null, null],
        [null, null]
    ];
    var noMatch = Donkeycraft.RecipeRegistry.matchShapedRecipe(emptyGrid, 2, 2);
    assert(noMatch === null, 'Empty grid matches no shaped recipe');

    var wrongCounts = { 999: 5 };
    var noShapelessMatch = Donkeycraft.RecipeRegistry.matchShapelessRecipe(wrongCounts);
    assert(noShapelessMatch === null, 'Wrong items match no shapeless recipe');

    var smeltTime = Donkeycraft.RecipeRegistry.getSmeltTime(11);
    assert(smeltTime === 200, 'Iron ore smelt time is 200');

    var unknownSmelt = Donkeycraft.RecipeRegistry.getSmeltTime(999);
    assert(unknownSmelt === 200, 'Unknown block smelt time defaults to 200');

    var allRecipes = Donkeycraft.RecipeRegistry.getAllRecipes();
    assert(Array.isArray(allRecipes), 'getAllRecipes returns array');
    assert(allRecipes.length >= shapedCount + shapelessCount + smeltCount, 'Total recipes >= shaped + shapeless + smelt');

    var testRecipe = new Donkeycraft.Recipe(999, 'shaped', [1, 2, 3, 4], 2, 5, 2);
    assert(testRecipe !== null, 'Recipe object created');
    assert(testRecipe.type === 'shaped', 'Recipe type is "shaped"');
    assert(testRecipe.outputBlockId === 5, 'Recipe outputBlockId is 5');
