<h1>Donkeycraft — Phase 16: Enchanting & Potions Test</h1>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>

<!-- Phase 16: Enchanting & Potions -->
<script src="../src/game/enchantment.js"></script>
<script src="../src/game/potion.js"></script>

<script>
(function() {
    'use strict';

    // Get the shared framework instance
    var F = TestFramework;

    // Initialize: creates #test-summary at top, uses existing #results div
    F.init('results');

    // ============================================================
    // Section 1: EnchantmentRegistry — Namespace & Core
    // ============================================================
    F.section('1. EnchantmentRegistry — Namespace & Core');

    F.assert(typeof Donkeycraft.Enchantment === 'function', 'Donkeycraft.Enchantment constructor exists');
    F.assert(typeof Donkeycraft.EnchantmentRegistry === 'object', 'Donkeycraft.EnchantmentRegistry exists');
    F.assertType(Donkeycraft.EnchantmentRegistry.getEnchantment, 'function', 'getEnchantment is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.getEnchantmentByName, 'function', 'getEnchantmentByName is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.areCompatible, 'function', 'areCompatible is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.canApplyToItem, 'function', 'canApplyToItem is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.getEnchantmentsForSlot, 'function', 'getEnchantmentsForSlot is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.calculateLevelCost, 'function', 'calculateLevelCost is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.getMaxLevel, 'function', 'getMaxLevel is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.getAllEnchantments, 'function', 'getAllEnchantments is a function');
    F.assertType(Donkeycraft.EnchantmentRegistry.getEnchantmentCount, 'function', 'getEnchantmentCount is a function');

    // ============================================================
    // Section 2: Enchantment Registration — All enchantments loaded
    // ============================================================
    F.section('2. Enchantment Registration');

    var enchantCount = Donkeycraft.EnchantmentRegistry.getEnchantmentCount();
    F.assert(enchantCount >= 25, 'At least 25 enchantments registered (got ' + enchantCount + ')');

    // Check specific enchantments
    var sharpness = Donkeycraft.EnchantmentRegistry.getEnchantment(1);
    F.assert(sharpness !== null, 'Sharpness (ID 1) exists');
    F.assertEq(sharpness.name, 'Sharpness', 'Sharpness name is correct');
    F.assertEq(sharpness.maxLevel, 5, 'Sharpness max level is 5');
    F.assertEq(sharpness.weight, 10, 'Sharpness weight is 10');
    F.assertArrEq(sharpness.slots, ['weapon'], 'Sharpness slot is weapon');
    F.assertArrEq(sharpness.incompatible, [2, 3], 'Sharpness incompatible with Smite(2) and BaneOfArthropods(3)');

    var protection = Donkeycraft.EnchantmentRegistry.getEnchantment(4);
    F.assert(protection !== null, 'Protection (ID 4) exists');
    F.assertEq(protection.name, 'Protection', 'Protection name is correct');
    F.assertEq(protection.maxLevel, 4, 'Protection max level is 4');
    F.assertArrEq(protection.slots, ['armor'], 'Protection slot is armor');

    var unbreaking = Donkeycraft.EnchantmentRegistry.getEnchantment(11);
    F.assert(unbreaking !== null, 'Unbreaking (ID 11) exists');
    F.assertEq(unbreaking.name, 'Unbreaking', 'Unbreaking name is correct');
    F.assertArrEq(unbreaking.slots, ['weapon', 'armor'], 'Unbreaking slot is both weapon and armor');

    var silkTouch = Donkeycraft.EnchantmentRegistry.getEnchantment(9);
    F.assert(silkTouch !== null, 'SilkTouch (ID 9) exists');
    F.assertEq(silkTouch.maxLevel, 1, 'SilkTouch max level is 1');
    F.assertArrEq(silkTouch.incompatible, [8], 'SilkTouch incompatible with Fortune(8)');

    var infinity = Donkeycraft.EnchantmentRegistry.getEnchantment(15);
    F.assert(infinity !== null, 'Infinity (ID 15) exists');
    F.assertEq(infinity.incompatible[0], 16, 'Infinity incompatible with Mending(16)');

    var curseOfVanishing = Donkeycraft.EnchantmentRegistry.getEnchantment(31);
    F.assert(curseOfVanishing !== null, 'CurseOfVanishing (ID 31) exists');
    F.assertArrEq(curseOfVanishing.slots, ['weapon', 'armor'], 'CurseOfVanishing works on both slots');

    // ============================================================
    // Section 3: Enchantment Lookup by Name
    // ============================================================
    F.section('3. Enchantment Lookup by Name');

    var sharpByName = Donkeycraft.EnchantmentRegistry.getEnchantmentByName('Sharpness');
    F.assert(sharpByName !== null, 'Lookup by name "Sharpness" works');
    F.assertEq(sharpByName.id, 1, 'Name lookup returns correct ID');

    var sharpByLower = Donkeycraft.EnchantmentRegistry.getEnchantmentByName('sharpness');
    F.assert(sharpByLower !== null, 'Case-insensitive name lookup works');
    F.assertEq(sharpByLower.id, 1, 'Lowercase lookup returns correct ID');

    var unknownEnchant = Donkeycraft.EnchantmentRegistry.getEnchantmentByName('NonExistent');
    F.assert(unknownEnchant === null, 'Unknown enchantment name returns null');

    var unknownId = Donkeycraft.EnchantmentRegistry.getEnchantment(999);
    F.assert(unknownId === null, 'Unknown enchantment ID returns null');

    // ============================================================
    // Section 4: Compatibility Rules
    // ============================================================
    F.section('4. Compatibility Rules');

    // Damage enchantments are mutually exclusive
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(1, 2) === false, 'Sharpness and Smite are incompatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(1, 3) === false, 'Sharpness and BaneOfArthropods are incompatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(2, 3) === false, 'Smite and BaneOfArthropods are incompatible');

    // Protection enchantments are mutually exclusive
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(4, 5) === false, 'Protection and FireProtection are incompatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(4, 6) === false, 'Protection and BlastProtection are incompatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(5, 6) === false, 'FireProtection and BlastProtection are incompatible');

    // Compatible enchantments
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(1, 10) === true, 'Sharpness and Efficiency are compatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(1, 11) === true, 'Sharpness and Unbreaking are compatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(10, 11) === true, 'Efficiency and Unbreaking are compatible');

    // Infinity/Mending incompatibility
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(15, 16) === false, 'Infinity and Mending are incompatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(16, 15) === false, 'Mending and Infinity are incompatible (symmetric)');

    // Trident incompatibilities
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(23, 24) === false, 'Loyalty and Riptide are incompatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(23, 25) === false, 'Loyalty and Channeling are incompatible');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(24, 25) === false, 'Riptide and Channeling are incompatible');

    // Invalid enchantment IDs return false
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(999, 1) === false, 'Invalid enchantment ID returns false');
    F.assert(Donkeycraft.EnchantmentRegistry.areCompatible(1, 999) === false, 'Invalid enchantment ID (second param) returns false');

    // ============================================================
    // Section 5: Slot Restrictions
    // ============================================================
    F.section('5. Slot Restrictions');

    var weaponEnchants = Donkeycraft.EnchantmentRegistry.getEnchantmentsForSlot('weapon');
    F.assert(weaponEnchants.length > 0, 'Weapon slot has enchantments registered');

    var armorEnchants = Donkeycraft.EnchantmentRegistry.getEnchantmentsForSlot('armor');
    F.assert(armorEnchants.length > 0, 'Armor slot has enchantments registered');

    // Sharpness should be in weapon list
    var hasSharpness = false;
    for (var i = 0; i < weaponEnchants.length; i++) {
        if (weaponEnchants[i].name === 'Sharpness') { hasSharpness = true; break; }
    }
    F.assert(hasSharpness, 'Sharpness is in weapon enchantment list');

    // Protection should be in armor list
    var hasProtection = false;
    for (var j = 0; j < armorEnchants.length; j++) {
        if (armorEnchants[j].name === 'Protection') { hasProtection = true; break; }
    }
    F.assert(hasProtection, 'Protection is in armor enchantment list');

    // Unbreaking should be in both lists
    var weaponHasUnbreaking = false;
    for (var k = 0; k < weaponEnchants.length; k++) {
        if (weaponEnchants[k].name === 'Unbreaking') { weaponHasUnbreaking = true; break; }
    }
    F.assert(weaponHasUnbreaking, 'Unbreaking is in weapon enchantment list');

    var armorHasUnbreaking = false;
    for (var l = 0; l < armorEnchants.length; l++) {
        if (armorEnchants[l].name === 'Unbreaking') { armorHasUnbreaking = true; break; }
    }
    F.assert(armorHasUnbreaking, 'Unbreaking is in armor enchantment list');

    // Invalid slot returns empty array
    var invalidSlot = Donkeycraft.EnchantmentRegistry.getEnchantmentsForSlot('invalid');
    F.assertType(invalidSlot, 'object', 'Invalid slot returns array');
    F.assertEq(invalidSlot.length, 0, 'Invalid slot returns empty array');

    // ============================================================
    // Section 6: Item Type Application
    // ============================================================
    F.section('6. Item Type Application');

    // Sword (ID 257) should accept weapon enchantments
    F.assert(Donkeycraft.EnchantmentRegistry.canApplyToItem(257, 1) === true, 'Sharpness can apply to sword');
    F.assert(Donkeycraft.EnchantmentRegistry.canApplyToItem(257, 10) === true, 'Efficiency can apply to sword');

    // Armor (ID 304 = chestplate) should accept armor enchantments
    F.assert(Donkeycraft.EnchantmentRegistry.canApplyToItem(304, 4) === true, 'Protection can apply to chestplate');
    F.assert(Donkeycraft.EnchantmentRegistry.canApplyToItem(304, 11) === true, 'Unbreaking can apply to chestplate');

    // Book (ID 225) should accept both
    F.assert(Donkeycraft.EnchantmentRegistry.canApplyToItem(225, 1) === false, 'Sharpness cannot apply to book (book category only)');

    // Invalid enchantment returns false
    F.assert(Donkeycraft.EnchantmentRegistry.canApplyToItem(257, 999) === false, 'Invalid enchantment ID returns false');

    // ============================================================
    // Section 7: Level Cost Calculation
    // ============================================================
    F.section('7. Level Cost Calculation');

    // Sharpness (weight 10): level 1 cost = 1*1 * max(1, floor(10/10)) = 1
    var cost1 = Donkeycraft.EnchantmentRegistry.calculateLevelCost(1, 1);
    F.assert(cost1 >= 1, 'Sharpness level 1 cost >= 1 (got ' + cost1 + ')');

    // Sharpness (weight 10): level 2 cost = 4 * 1 = 4
    var cost2 = Donkeycraft.EnchantmentRegistry.calculateLevelCost(1, 2);
    F.assert(cost2 >= 4, 'Sharpness level 2 cost >= 4 (got ' + cost2 + ')');

    // Sharpness (weight 10): level 3 cost = 9 * 1 = 9
    var cost3 = Donkeycraft.EnchantmentRegistry.calculateLevelCost(1, 3);
    F.assert(cost3 >= 9, 'Sharpness level 3 cost >= 9 (got ' + cost3 + ')');

    // Low weight enchantments (SilkTouch weight 1) should be more expensive
    var silkCost1 = Donkeycraft.EnchantmentRegistry.calculateLevelCost(9, 1);
    F.assert(silkCost1 >= 1, 'SilkTouch level 1 cost >= 1');

    // Level clamping: negative levels clamp to 1
    var negCost = Donkeycraft.EnchantmentRegistry.calculateLevelCost(1, -5);
    F.assertEq(negCost, Donkeycraft.EnchantmentRegistry.calculateLevelCost(1, 1), 'Negative level clamps to level 1 cost');

    // Level above max clamps to max
    var overCost = Donkeycraft.EnchantmentRegistry.calculateLevelCost(1, 100);
    F.assertEq(overCost, Donkeycraft.EnchantmentRegistry.calculateLevelCost(1, 5), 'Over-max level clamps to max level cost');

    // Invalid enchantment returns 1
    var invalidCost = Donkeycraft.EnchantmentRegistry.calculateLevelCost(999, 1);
    F.assertEq(invalidCost, 1, 'Invalid enchantment ID returns cost of 1');

    // ============================================================
    // Section 8: getMaxLevel
    // ============================================================
    F.section('8. getMaxLevel');

    F.assertEq(Donkeycraft.EnchantmentRegistry.getMaxLevel(1), 5, 'Sharpness max level is 5');
    F.assertEq(Donkeycraft.EnchantmentRegistry.getMaxLevel(4), 4, 'Protection max level is 4');
    F.assertEq(Donkeycraft.EnchantmentRegistry.getMaxLevel(9), 1, 'SilkTouch max level is 1');
    F.assertEq(Donkeycraft.EnchantmentRegistry.getMaxLevel(15), 1, 'Infinity max level is 1');
    F.assertEq(Donkeycraft.EnchantmentRegistry.getMaxLevel(999), 1, 'Invalid enchantment returns max level 1');

    // ============================================================
    // Section 9: PotionRegistry — Namespace & Core
    // ============================================================
    F.section('9. PotionRegistry — Namespace & Core');

    F.assert(typeof Donkeycraft.Potion === 'function', 'Donkeycraft.Potion constructor exists');
    F.assert(typeof Donkeycraft.PotionEffect === 'function', 'Donkeycraft.PotionEffect constructor exists');
    F.assert(typeof Donkeycraft.PotionRegistry === 'object', 'Donkeycraft.PotionRegistry exists');
    F.assert(typeof Donkeycraft.ActivePotion === 'function', 'Donkeycraft.ActivePotion constructor exists');
    F.assert(typeof Donkeycraft.ActivePotionManager === 'object', 'Donkeycraft.ActivePotionManager exists');

    F.assertType(Donkeycraft.PotionRegistry.getPotion, 'function', 'getPotion is a function');
    F.assertType(Donkeycraft.PotionRegistry.getPotionByName, 'function', 'getPotionByName is a function');
    F.assertType(Donkeycraft.PotionRegistry.getEffect, 'function', 'getEffect is a function');
    F.assertType(Donkeycraft.PotionRegistry.matchBrewingRecipe, 'function', 'matchBrewingRecipe is a function');
    F.assertType(Donkeycraft.PotionRegistry.getEffects, 'function', 'getEffects is a function');
    F.assertType(Donkeycraft.PotionRegistry.getAllPotions, 'function', 'getAllPotions is a function');
    F.assertType(Donkeycraft.PotionRegistry.getPotionCount, 'function', 'getPotionCount is a function');
    F.assertType(Donkeycraft.PotionRegistry.getEffectCount, 'function', 'getEffectCount is a function');
    F.assertType(Donkeycraft.PotionRegistry.getBrewingRecipes, 'function', 'getBrewingRecipes is a function');

    // ActivePotionManager methods
    F.assertType(Donkeycraft.ActivePotionManager.addPotion, 'function', 'addPotion is a function');
    F.assertType(Donkeycraft.ActivePotionManager.removePotion, 'function', 'removePotion is a function');
    F.assertType(Donkeycraft.ActivePotionManager.tick, 'function', 'tick is a function');
    F.assertType(Donkeycraft.ActivePotionManager.getActiveEffects, 'function', 'getActiveEffects is a function');
    F.assertType(Donkeycraft.ActivePotionManager.hasActiveEffect, 'function', 'hasActiveEffect is a function');
    F.assertType(Donkeycraft.ActivePotionManager.clearAll, 'function', 'clearAll is a function');
    F.assertType(Donkeycraft.ActivePotionManager.destroy, 'function', 'destroy is a function');

    // ============================================================
    // Section 10: Potion Registration
    // ============================================================
    F.section('10. Potion Registration');

    var potionCount = Donkeycraft.PotionRegistry.getPotionCount();
    F.assert(potionCount >= 30, 'At least 30 potions registered (got ' + potionCount + ')');

    var effectCount = Donkeycraft.PotionRegistry.getEffectCount();
    F.assert(effectCount >= 15, 'At least 15 effects registered (got ' + effectCount + ')');

    // Check specific potions
    var waterBottle = Donkeycraft.PotionRegistry.getPotion(1);
    F.assert(waterBottle !== null, 'Water Bottle (ID 1) exists');
    F.assertEq(waterBottle.name, 'Water Bottle', 'Water Bottle name is correct');
    F.assertEq(waterBottle.basePotionId, 0, 'Water Bottle base potion ID is 0');

    var awkward = Donkeycraft.PotionRegistry.getPotion(2);
    F.assert(awkward !== null, 'Awkward Potion (ID 2) exists');
    F.assertEq(awkward.name, 'Awkward Potion', 'Awkward Potion name is correct');
    F.assertEq(awkward.basePotionId, 1, 'Awkward transforms from Water Bottle (1)');

    var regen = Donkeycraft.PotionRegistry.getPotion(10);
    F.assert(regen !== null, 'Potion of Regeneration (ID 10) exists');
    F.assertEq(regen.basePotionId, 2, 'Regeneration transforms from Awkward (2)');
    F.assertEq(regen.effects.length, 1, 'Regeneration has 1 effect');
    F.assertEq(regen.effects[0].effectId, 1, 'Regeneration effect ID is 1');
    F.assertEq(regen.effects[0].duration, 900, 'Regeneration duration is 900 ticks');

    var instantHealth = Donkeycraft.PotionRegistry.getPotion(21);
    F.assert(instantHealth !== null, 'Potion of Instant Health (ID 21) exists');
    F.assert(instantHealth.isInstant === true, 'Instant Health is an instant potion');

    var instantDamage = Donkeycraft.PotionRegistry.getPotion(23);
    F.assert(instantDamage !== null, 'Potion of Instant Damage (ID 23) exists');
    F.assert(instantDamage.isInstant === true, 'Instant Damage is an instant potion');

    // ============================================================
    // Section 11: Potion Effects — Colors & Properties
    // ============================================================
    F.section('11. Potion Effects — Colors & Properties');

    var regenEffect = Donkeycraft.PotionRegistry.getEffect(1);
    F.assert(regenEffect !== null, 'Regeneration effect (ID 1) exists');
    F.assertEq(regenEffect.name, 'Regeneration', 'Regeneration effect name is correct');
    F.assertEq(regenEffect.r, 255, 'Regeneration red component is 255');
    F.assertEq(regenEffect.g, 70, 'Regeneration green component is 70');
    F.assertEq(regenEffect.b, 70, 'Regeneration blue component is 70');
    F.assertEq(regenEffect.maxAmplifier, 4, 'Regeneration max amplifier is 4');

    var speedEffect = Donkeycraft.PotionRegistry.getEffect(2);
    F.assert(speedEffect !== null, 'Speed effect (ID 2) exists');
    F.assertEq(speedEffect.name, 'Speed', 'Speed effect name is correct');
    F.assertEq(speedEffect.maxDuration, 1800, 'Speed max duration is 1800 ticks');

    var instantHealthEffect = Donkeycraft.PotionRegistry.getEffect(7);
    F.assert(instantHealthEffect !== null, 'Instant Health effect (ID 7) exists');
    F.assertEq(instantHealthEffect.maxAmplifier, 0, 'Instant Health has max amplifier 0');

    var unknownEffect = Donkeycraft.PotionRegistry.getEffect(999);
    F.assert(unknownEffect === null, 'Unknown effect ID returns null');

    // ============================================================
    // Section 12: Brewing Recipe Matching
    // ============================================================
    F.section('12. Brewing Recipe Matching');

    // Nether Wart (241) + Awkward (2) → Potion of Regeneration is wrong; should be Awkward itself
    // Actually: Nether Wart (241) + Water Bottle (1) → Awkward Potion (2)
    var result1 = Donkeycraft.PotionRegistry.matchBrewingRecipe(241, 1);
    F.assert(result1 !== null, 'Nether Wart + Water Bottle produces a potion');
    F.assertEq(result1.id, 2, 'Nether Wart + Water Bottle → Awkward Potion (ID 2)');

    // Ghast Tear (237) + Awkward (2) → Potion of Regeneration (10)
    var result2 = Donkeycraft.PotionRegistry.matchBrewingRecipe(237, 2);
    F.assert(result2 !== null, 'Ghast Tear + Awkward produces a potion');
    F.assertEq(result2.id, 10, 'Ghast Tear + Awkward → Potion of Regeneration (ID 10)');

    // Magma Cream (236) + Regeneration (10) → Potion of Regeneration II (11)
    var result3 = Donkeycraft.PotionRegistry.matchBrewingRecipe(236, 10);
    F.assert(result3 !== null, 'Magma Cream + Regeneration produces a potion');
    F.assertEq(result3.id, 11, 'Magma Cream + Regeneration → Regeneration II (ID 11)');

    // Rabbit Foot (242) + Awkward (2) → Potion of Swiftness (12)
    var result4 = Donkeycraft.PotionRegistry.matchBrewingRecipe(242, 2);
    F.assert(result4 !== null, 'Rabbit Foot + Awkward produces a potion');
    F.assertEq(result4.id, 12, 'Rabbit Foot + Awkward → Potion of Swiftness (ID 12)');

    // Wrong ingredient — should return null
    var result5 = Donkeycraft.PotionRegistry.matchBrewingRecipe(999, 1);
    F.assert(result5 === null, 'Unknown ingredient returns null');

    // Wrong base potion — should return null
    var result6 = Donkeycraft.PotionRegistry.matchBrewingRecipe(237, 1);
    F.assert(result6 === null, 'Ghast Tear + Water Bottle (wrong base) returns null');

    // Zero ingredient — should return null
    var result7 = Donkeycraft.PotionRegistry.matchBrewingRecipe(0, 1);
    F.assert(result7 === null, 'Zero ingredient returns null');

    // ============================================================
    // Section 13: Potion Effects Retrieval
    // ============================================================
    F.section('13. Potion Effects Retrieval');

    var regenEffects = Donkeycraft.PotionRegistry.getEffects(10);
    F.assert(regenEffects.length === 1, 'Regeneration has 1 effect');
    F.assertEq(regenEffects[0].effectId, 1, 'Regeneration effect ID is 1');
    F.assertEq(regenEffects[0].amplifier, 0, 'Regeneration amplifier is 0 (level I)');
    F.assertEq(regenEffects[0].duration, 900, 'Regeneration duration is 900 ticks');

    var regen2Effects = Donkeycraft.PotionRegistry.getEffects(11);
    F.assert(regen2Effects.length === 1, 'Regeneration II has 1 effect');
    F.assertEq(regen2Effects[0].amplifier, 1, 'Regeneration II amplifier is 1 (level II)');
    F.assertEq(regen2Effects[0].duration, 450, 'Regeneration II duration is 450 ticks');

    var unknownPotionEffects = Donkeycraft.PotionRegistry.getEffects(999);
    F.assert(unknownPotionEffects.length === 0, 'Unknown potion returns empty effects array');

    // Water Bottle has no effects
    var waterEffects = Donkeycraft.PotionRegistry.getEffects(1);
    F.assert(waterEffects.length === 0, 'Water Bottle has no effects');

    // ============================================================
    // Section 14: ActivePotionManager — Add/Remove Effects
    // ============================================================
    F.section('14. ActivePotionManager — Add/Remove Effects');

    // Create a test entity
    var testEntity = { name: 'TestPlayer' };

    // Clear any existing effects first
    Donkeycraft.ActivePotionManager.clearAll(testEntity);

    // Apply Potion of Regeneration (ID 10)
    var added = Donkeycraft.ActivePotionManager.addPotion(testEntity, 10, 900, 0);
    F.assert(added.length >= 1, 'Adding regeneration potion returns at least 1 active effect');

    // Check that the effect is now active
    var active = Donkeycraft.ActivePotionManager.getActiveEffects(testEntity);
    F.assert(active.length >= 1, 'Entity has active effects after adding potion');

    // Check hasActiveEffect
    F.assert(Donkeycraft.ActivePotionManager.hasActiveEffect(testEntity, 1) === true, 'Entity has Regeneration effect (ID 1)');
    F.assert(Donkeycraft.ActivePotionManager.hasActiveEffect(testEntity, 2) === false, 'Entity does not have Speed effect (ID 2)');

    // Remove the regeneration effect
    var removed = Donkeycraft.ActivePotionManager.removePotion(testEntity, 1);
    F.assert(removed === true, 'removePotion returns true when effect exists');

    var activeAfterRemove = Donkeycraft.ActivePotionManager.getActiveEffects(testEntity);
    F.assert(activeAfterRemove.length === 0, 'No active effects after removing the only effect');

    // Remove non-existent effect returns false
    var removed2 = Donkeycraft.ActivePotionManager.removePotion(testEntity, 1);
    F.assert(removed2 === false, 'removePotion returns false when effect does not exist');

    // ============================================================
    // Section 15: ActivePotionManager — Tick & Expiration
    // ============================================================
    F.section('15. ActivePotionManager — Tick & Expiration');

    var entity2 = { name: 'TestEntity2' };
    Donkeycraft.ActivePotionManager.clearAll(entity2);

    // Add a short-duration effect (60 ticks = 3 seconds at 20 TPS)
    Donkeycraft.ActivePotionManager.addPotion(entity2, 10, 60, 0);

    var beforeTick = Donkeycraft.ActivePotionManager.getActiveEffects(entity2);
    F.assert(beforeTick.length >= 1, 'Effect is active before tick');

    // Tick with 3 seconds of game time (60 ticks at 20 TPS)
    var afterTick = Donkeycraft.ActivePotionManager.tick(entity2, 3.0);

    // Effect should have expired (60 ticks duration, 60 ticks passed)
    F.assert(afterTick.length === 0, 'Effect expired after 3 seconds (60 ticks)');

    // Tick with partial duration (1 second = 20 ticks)
    var entity3 = { name: 'TestEntity3' };
    Donkeycraft.ActivePotionManager.clearAll(entity3);
    Donkeycraft.ActivePotionManager.addPotion(entity3, 10, 60, 0);

    var afterPartialTick = Donkeycraft.ActivePotionManager.tick(entity3, 1.0);
    F.assert(afterPartialTick.length >= 1, 'Effect still active after partial duration (1 second)');

    // Check remaining ticks
    if (afterPartialTick.length > 0) {
        F.assert(afterPartialTick[0].remainingTicks < 60, 'Remaining ticks decreased after tick');
    }

    // ============================================================
    // Section 16: ActivePotionManager — Effect Stacking
    // ============================================================
    F.section('16. ActivePotionManager — Effect Stacking');

    var entity4 = { name: 'TestEntity4' };
    Donkeycraft.ActivePotionManager.clearAll(entity4);

    // Apply two different potions
    Donkeycraft.ActivePotionManager.addPotion(entity4, 10, 900, 0); // Regeneration
    var active4a = Donkeycraft.ActivePotionManager.getActiveEffects(entity4);
    F.assert(active4a.length >= 1, 'First potion applied');

    Donkeycraft.ActivePotionManager.addPotion(entity4, 12, 900, 0); // Swiftness
    var active4b = Donkeycraft.ActivePotionManager.getActiveEffects(entity4);
    F.assert(active4b.length >= 2, 'Two different potions both active');

    // Apply same potion again — should upgrade, not duplicate
    Donkeycraft.ActivePotionManager.addPotion(entity4, 10, 900, 1); // Regeneration II
    var active4c = Donkeycraft.ActivePotionManager.getActiveEffects(entity4);

    // Count regeneration effects
    var regenCount = 0;
    for (var m = 0; m < active4c.length; m++) {
        if (active4c[m].effectId === 1) regenCount++;
    }
    F.assertEq(regenCount, 1, 'Same effect not duplicated (count = 1)');

    // ============================================================
    // Section 17: ActivePotionManager — Edge Cases & Null Handling
    // ============================================================
    F.section('17. ActivePotionManager — Edge Cases & Null Handling');

    // Null entity
    var nullResult = Donkeycraft.ActivePotionManager.addPotion(null, 10, 600, 0);
    F.assertType(nullResult, 'object', 'Null entity addPotion returns array');
    F.assertEq(nullResult.length, 0, 'Null entity addPotion returns empty array');

    var nullTick = Donkeycraft.ActivePotionManager.tick(null, 1.0);
    F.assertType(nullTick, 'object', 'Null entity tick returns array');
    F.assertEq(nullTick.length, 0, 'Null entity tick returns empty array');

    var nullActive = Donkeycraft.ActivePotionManager.getActiveEffects(null);
    F.assertType(nullActive, 'object', 'Null entity getActiveEffects returns array');
    F.assertEq(nullActive.length, 0, 'Null entity getActiveEffects returns empty array');

    var nullHas = Donkeycraft.ActivePotionManager.hasActiveEffect(null, 1);
    F.assert(nullHas === false, 'Null entity hasActiveEffect returns false');

    var nullClear = Donkeycraft.ActivePotionManager.clearAll(null);
    F.assert(true, 'clearAll(null) does not throw');

    // Invalid potion ID — no effects to add
    var invalidAdd = Donkeycraft.ActivePotionManager.addPotion(entity4, 999, 600, 0);
    F.assert(invalidAdd.length === 0, 'Invalid potion ID adds no effects');

    // ============================================================
    // Section 18: Integration — getAllPotions & getBrewingRecipes
    // ============================================================
    F.section('18. Integration — getAllPotions & getBrewingRecipes');

    var allPotions = Donkeycraft.PotionRegistry.getAllPotions();
    F.assert(allPotions.length >= 30, 'getAllPotions returns at least 30 potions (got ' + allPotions.length + ')');

    // Check that all returned items have required properties
    var validPotions = true;
    for (var n = 0; n < allPotions.length; n++) {
        if (!allPotions[n].id || !allPotions[n].name) {
            validPotions = false;
            break;
        }
    }
    F.assert(validPotions, 'All potions have id and name properties');

    var recipes = Donkeycraft.PotionRegistry.getBrewingRecipes();
    F.assert(recipes.length > 0, 'Brewing recipes list is not empty');

    // Check recipe structure
    if (recipes.length > 0) {
        F.assert(recipes[0].hasOwnProperty('ingredientId'), 'Recipe has ingredientId property');
        F.assert(recipes[0].hasOwnProperty('basePotionId'), 'Recipe has basePotionId property');
        F.assert(recipes[0].hasOwnProperty('resultPotionId'), 'Recipe has resultPotionId property');
    }

    // ============================================================
    // Section 19: Integration — destroy Methods
    // ============================================================
    F.section('19. Integration — destroy Methods');

    try {
        Donkeycraft.ActivePotionManager.destroy();
        F.assert(true, 'ActivePotionManager.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'ActivePotionManager.destroy() threw: ' + e.message);
    }

    // Verify destroy clears effects
    var entity5 = { name: 'TestEntity5' };
    Donkeycraft.ActivePotionManager.addPotion(entity5, 10, 600, 0);
    Donkeycraft.ActivePotionManager.destroy();
    var afterDestroy = Donkeycraft.ActivePotionManager.getActiveEffects(entity5);
    F.assertEq(afterDestroy.length, 0, 'All effects cleared after destroy()');

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
