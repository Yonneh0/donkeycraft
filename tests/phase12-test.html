<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Phase 12 Dimensions & Portals Test</title>

</head>
<body>
<h1>Donkeycraft — Phase 12: Dimensions & Portals Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Testing: Dimension System, Portal Detection/Travel, Nether Generator, End Generator, Config Constants, Block Definitions</div>

<!-- Summary is auto-created at top by TestFramework.init() -->
<div id="results"></div>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>

<script src="../src/core/audio.js"></script>

<!-- Phase 3 Block System -->
<script src="../src/world/block.js"></script>
<script src="../src/world/block-state.js"></script>
<script src="../src/world/block-types.js"></script>
<script src="../src/world/texture-atlas.js"></script>
<script src="../src/world/block-models.js"></script>
<script src="../src/world/recipe-registry.js"></script>

<!-- Phase 4 World Generation -->
<script src="../src/world/biome.js"></script>
<script src="../src/world/chunk.js"></script>
<script src="../src/world/chunk-manager.js"></script>
<script src="../src/world/terrain-generator.js"></script>
<script src="../src/world/ore-generator.js"></script>
<script src="../src/world/cave-generator.js"></script>
<script src="../src/world/structure-generator.js"></script>
<script src="../src/world/water-generator.js"></script>
<script src="../src/world/terrain-surface.js"></script>
<script src="../src/world/lighting-engine.js"></script>
<script src="../src/world/physics.js"></script>
<script src="../src/world/world-utils.js"></script>

<!-- Phase 12: Dimensions & Portals -->
<script src="../src/world/dimension.js"></script>
<script src="../src/world/portal.js"></script>
<script src="../src/world/nether-generator.js"></script>
<script src="../src/world/end-generator.js"></script>

<!-- Load shared test framework (MUST come before the test script) -->
<script src="test.js"></script>

<script>
(function() {
    'use strict';

    // Get the shared framework instance
    var F = TestFramework;

    // Initialize: creates #test-summary at top, uses existing #results div
    F.init('results');

    // ============================================================
    // Section 1: Config — Dimension Constants
    // ============================================================
    F.section('1. Config — Dimension Constants');

    F.assert(typeof Donkeycraft.Config.NETHER_SCALE === 'number', 'Config.NETHER_SCALE exists and is a number');
    F.assertEq(Donkeycraft.Config.NETHER_SCALE, 8, 'NETHER_SCALE equals 8');
    F.assert(typeof Donkeycraft.Config.END_SCALE === 'number', 'Config.END_SCALE exists and is a number');
    F.assertEq(Donkeycraft.Config.END_SCALE, 1, 'END_SCALE equals 1');

    // ============================================================
    // Section 2: DimensionType Constants
    // ============================================================
    F.section('2. DimensionType Constants');

    F.assert(typeof Donkeycraft.DimensionType === 'object', 'DimensionType namespace exists');
    F.assertEq(Donkeycraft.DimensionType.OVERWORLD, 0, 'DimensionType.OVERWORLD = 0');
    F.assertEq(Donkeycraft.DimensionType.NETHER, 1, 'DimensionType.NETHER = 1');
    F.assertEq(Donkeycraft.DimensionType.END, 2, 'DimensionType.END = 2');

    // ============================================================
    // Section 3: Dimension Class — Construction & Properties
    // ============================================================
    F.section('3. Dimension Class — Construction & Properties');

    var overworld = Donkeycraft.Dimensions.getDimension(Donkeycraft.DimensionType.OVERWORLD);
    F.assert(overworld !== null, 'Overworld dimension exists');
    F.assertEq(overworld.type, 0, 'Overworld type is 0');
    F.assertEq(overworld.name, 'overworld', 'Overworld name is "overworld"');
    F.assertEq(overworld.height, 256, 'Overworld height is 256');
    F.assertEq(overworld.minY, 0, 'Overworld minY is 0');
    F.assertEq(overworld.maxY, 256, 'Overworld maxY is 256');
    F.assert(overworld.hasSkyLight === true, 'Overworld has sky light');
    F.assert(overworld.hasCeiling === false, 'Overworld has no ceiling');
    F.assertEq(overworld.ambientDarkness, 0, 'Overworld ambient darkness is 0');
    F.assert(overworld.respawnAtSpawn === true, 'Overworld respawns at spawn');
    F.assert(overworld.hasPiglins === false, 'Overworld has no piglins');
    F.assert(overworld.hasWeather === true, 'Overworld has weather');
    F.assert(overworld.bedWorks === true, 'Beds work in Overworld');
    F.assertEq(overworld.coordinateScale, 1, 'Overworld coordinate scale is 1');

    var nether = Donkeycraft.Dimensions.getDimension(Donkeycraft.DimensionType.NETHER);
    F.assert(nether !== null, 'Nether dimension exists');
    F.assertEq(nether.name, 'nether', 'Nether name is "nether"');
    F.assert(nether.hasSkyLight === false, 'Nether has no sky light');
    F.assert(nether.hasCeiling === true, 'Nether has ceiling');
    F.assert(nether.ambientDarkness === 0, 'Nether ambient darkness is 0');
    F.assert(nether.hasPiglins === true, 'Nether has piglins');
    F.assert(nether.hasWeather === false, 'Nether has no weather');
    F.assert(nether.bedWorks === false, 'Beds do not work in Nether');
    F.assertEq(nether.coordinateScale, 8, 'Nether coordinate scale is 8');

    var end = Donkeycraft.Dimensions.getDimension(Donkeycraft.DimensionType.END);
    F.assert(end !== null, 'End dimension exists');
    F.assertEq(end.name, 'end', 'End name is "end"');
    F.assert(end.hasSkyLight === false, 'End has no sky light');
    F.assert(end.ambientDarkness === 1, 'End ambient darkness is 1 (pitch black)');
    F.assert(end.bedWorks === false, 'Beds do not work in End');
    F.assertEq(end.coordinateScale, 1, 'End coordinate scale is 1');

    // ============================================================
    // Section 4: Dimension Queries & State Management
    // ============================================================
    F.section('4. Dimension Queries & State Management');

    F.assert(Donkeycraft.Dimensions.hasDimension(0) === true, 'hasDimension(0) returns true');
    F.assert(Donkeycraft.Dimensions.hasDimension(1) === true, 'hasDimension(1) returns true');
    F.assert(Donkeycraft.Dimensions.hasDimension(2) === true, 'hasDimension(2) returns true');
    F.assert(Donkeycraft.Dimensions.hasDimension(99) === false, 'hasDimension(99) returns false (non-existent)');

    var allDims = Donkeycraft.Dimensions.getAllDimensions();
    F.assert(allDims.length === 3, 'getAllDimensions returns 3 dimensions');
    F.assertType(allDims[0], 'object', 'All dimensions are objects');

    var currentDim = Donkeycraft.Dimensions.getCurrentDimension();
    F.assertEq(currentDim, 0, 'Initial current dimension is Overworld (0)');

    Donkeycraft.Dimensions.setCurrentDimension(1);
    F.assertEq(Donkeycraft.Dimensions.getCurrentDimension(), 1, 'setCurrentDimension(1) sets Nether');

    Donkeycraft.Dimensions.setCurrentDimension(2);
    F.assertEq(Donkeycraft.Dimensions.getCurrentDimension(), 2, 'setCurrentDimension(2) sets End');

    // Invalid dimension should not change current
    Donkeycraft.Dimensions.setCurrentDimension(99);
    F.assertEq(Donkeycraft.Dimensions.getCurrentDimension(), 2, 'Invalid setCurrentDimension(99) does not change current');

    // Reset to Overworld for further tests
    Donkeycraft.Dimensions.setCurrentDimension(0);

    // ============================================================
    // Section 5: Spawn Positions
    // ============================================================
    F.section('5. Spawn Positions');

    var spawn = Donkeycraft.Dimensions.getSpawnPosition(0);
    F.assertEq(spawn.x, 0, 'Overworld spawn X is 0');
    F.assertEq(spawn.y, 64, 'Overworld spawn Y is 64');
    F.assertEq(spawn.z, 0, 'Overworld spawn Z is 0');

    var netherSpawn = Donkeycraft.Dimensions.getSpawnPosition(1);
    F.assertEq(netherSpawn.x, 0, 'Nether spawn X is 0');
    F.assertEq(netherSpawn.y, 64, 'Nether spawn Y is 64');
    F.assertEq(netherSpawn.z, 0, 'Nether spawn Z is 0');

    // Set custom spawn
    Donkeycraft.Dimensions.setSpawnPosition(1, 100, 80, 200);
    var customSpawn = Donkeycraft.Dimensions.getSpawnPosition(1);
    F.assertEq(customSpawn.x, 100, 'Custom Nether spawn X is 100');
    F.assertEq(customSpawn.y, 80, 'Custom Nether spawn Y is 80');
    F.assertEq(customSpawn.z, 200, 'Custom Nether spawn Z is 200');

    // ============================================================
    // Section 6: Coordinate Transformation
    // ============================================================
    F.section('6. Coordinate Transformation');

    // Overworld → Nether: divide by 8
    var toNether = Donkeycraft.Dimensions.transformCoordinates(0, 1, 80, 64, 160);
    F.assertEq(toNether.x, 10, 'Overworld X=80 → Nether X=10 (÷8)');
    F.assertEq(toNether.y, 64, 'Y coordinate unchanged: 64');
    F.assertEq(toNether.z, 20, 'Overworld Z=160 → Nether Z=20 (÷8)');

    // Nether → Overworld: multiply by 8
    var toOverworld = Donkeycraft.Dimensions.transformCoordinates(1, 0, 10, 64, 20);
    F.assertEq(toOverworld.x, 80, 'Nether X=10 → Overworld X=80 (×8)');
    F.assertEq(toOverworld.y, 64, 'Y coordinate unchanged: 64');
    F.assertEq(toOverworld.z, 160, 'Nether Z=20 → Overworld Z=160 (×8)');

    // End ↔ Overworld: no change
    var toEnd = Donkeycraft.Dimensions.transformCoordinates(0, 2, 100, 64, 200);
    F.assertEq(toEnd.x, 100, 'Overworld X=100 → End X=100 (×1)');
    F.assertEq(toEnd.z, 200, 'Overworld Z=200 → End Z=200 (×1)');

    var fromEnd = Donkeycraft.Dimensions.transformCoordinates(2, 0, 100, 64, 200);
    F.assertEq(fromEnd.x, 100, 'End X=100 → Overworld X=100 (×1)');

    // Non-existent dimensions should return original coords
    var invalid = Donkeycraft.Dimensions.transformCoordinates(0, 99, 80, 64, 160);
    F.assertEq(invalid.x, 80, 'Invalid toDimension returns original X');

    // ============================================================
    // Section 7: Dimension Helper Functions
    // ============================================================
    F.section('7. Dimension Helper Functions');

    F.assert(Donkeycraft.Dimensions.bedsWorkInDimension(0) === true, 'Beds work in Overworld');
    F.assert(Donkeycraft.Dimensions.bedsWorkInDimension(1) === false, 'Beds do not work in Nether');
    F.assert(Donkeycraft.Dimensions.bedsWorkInDimension(2) === false, 'Beds do not work in End');

    F.assert(Donkeycraft.Dimensions.hasPiglinsInDimension(0) === false, 'No piglins in Overworld');
    F.assert(Donkeycraft.Dimensions.hasPiglinsInDimension(1) === true, 'Piglins in Nether');
    F.assert(Donkeycraft.Dimensions.hasPiglinsInDimension(2) === false, 'No piglins in End');

    F.assert(Donkeycraft.Dimensions.hasWeatherInDimension(0) === true, 'Weather in Overworld');
    F.assert(Donkeycraft.Dimensions.hasWeatherInDimension(1) === false, 'No weather in Nether');
    F.assert(Donkeycraft.Dimensions.hasWeatherInDimension(2) === false, 'No weather in End');

    F.assertEq(Donkeycraft.Dimensions.getAmbientDarkness(0), 0, 'Overworld ambient darkness = 0');
    F.assertEq(Donkeycraft.Dimensions.getAmbientDarkness(1), 0, 'Nether ambient darkness = 0');
    F.assertEq(Donkeycraft.Dimensions.getAmbientDarkness(2), 1, 'End ambient darkness = 1');

    F.assert(Donkeycraft.Dimensions.hasSkyLightInDimension(0) === true, 'Sky light in Overworld');
    F.assert(Donkeycraft.Dimensions.hasSkyLightInDimension(1) === false, 'No sky light in Nether');
    F.assert(Donkeycraft.Dimensions.hasSkyLightInDimension(2) === false, 'No sky light in End');

    F.assertEq(Donkeycraft.Dimensions.getDimensionHeight(0), 256, 'Overworld height = 256');
    F.assertEq(Donkeycraft.Dimensions.getDimensionHeight(1), 256, 'Nether height = 256');
    F.assertEq(Donkeycraft.Dimensions.getDimensionHeight(2), 256, 'End height = 256');
    F.assertEq(Donkeycraft.Dimensions.getDimensionHeight(99), 256, 'Non-existent dimension returns default height');

    // ============================================================
    // Section 8: New Block Definitions (Nether/End)
    // ============================================================
    F.section('8. New Block Definitions (Nether/End)');

    var netherrack = Donkeycraft.BlockRegistry.getBlockById(257);
    F.assert(netherrack !== null, 'netherrack (ID 257) exists');
    F.assertEq(netherrack.name, 'netherrack', 'Block name is "netherrack"');
    F.assertEq(netherrack.hardness, 1.0, 'netherrack hardness = 1.0');

    var soulSand = Donkeycraft.BlockRegistry.getBlockById(258);
    F.assert(soulSand !== null, 'soul_sand (ID 258) exists');
    F.assertEq(soulSand.name, 'soul_sand', 'Block name is "soul_sand"');

    var soulSoil = Donkeycraft.BlockRegistry.getBlockById(259);
    F.assert(soulSoil !== null, 'soul_soil (ID 259) exists');

    var ancientDebris = Donkeycraft.BlockRegistry.getBlockById(273);
    F.assert(ancientDebris !== null, 'ancient_debris (ID 273) exists');
    F.assertEq(ancientDebris.hardness, 30.0, 'ancient_debris hardness = 30.0');
    F.assertEq(ancientDebris.blastResistance, 1200.0, 'ancient_debris blast resistance = 1200.0');

    var respawnAnchor = Donkeycraft.BlockRegistry.getBlockById(275);
    F.assert(respawnAnchor !== null, 'respawn_anchor (ID 275) exists');
    F.assertEq(respawnAnchor.lightLevel, 11, 'respawn_anchor light level = 11');
    F.assert(respawnAnchor.blastResistance >= 1200, 'respawn_anchor has high blast resistance');

    var netherPortal = Donkeycraft.BlockRegistry.getBlockById(276);
    F.assert(netherPortal !== null, 'nether_portal (ID 276) exists');
    F.assert(netherPortal.transparent === true, 'nether_portal is transparent');
    F.assert(netherPortal.emissive === true, 'nether_portal is emissive');
    F.assertEq(netherPortal.lightLevel, 11, 'nether_portal light level = 11');

    var chorusPlant = Donkeycraft.BlockRegistry.getBlockById(278);
    F.assert(chorusPlant !== null, 'chorus_plant (ID 278) exists');

    var purpurBlock = Donkeycraft.BlockRegistry.getBlockById(280);
    F.assert(purpurBlock !== null, 'purpur_block (ID 280) exists');

    var shroomlight = Donkeycraft.BlockRegistry.getBlockById(284);
    F.assert(shroomlight !== null, 'shroomlight (ID 284) exists');
    F.assertEq(shroomlight.lightLevel, 15, 'shroomlight light level = 15');

    // ============================================================
    // Section 9: Portal — Namespace & Core Methods
    // ============================================================
    F.section('9. Portal — Namespace & Core Methods');

    F.assert(typeof Donkeycraft.Portal === 'object', 'Portal namespace exists');
    F.assertType(Donkeycraft.Portal.init, 'function', 'Portal.init is a function');
    F.assertType(Donkeycraft.Portal.setEventBus, 'function', 'Portal.setEventBus is a function');
    F.assertType(Donkeycraft.Portal.setChunkManager, 'function', 'Portal.setChunkManager is a function');
    F.assertType(Donkeycraft.Portal.isPortalBlock, 'function', 'Portal.isPortalBlock is a function');
    F.assertType(Donkeycraft.Portal.isPortalActive, 'function', 'Portal.isPortalActive is a function');
    F.assertType(Donkeycraft.Portal.detectNetherPortal, 'function', 'Portal.detectNetherPortal is a function');
    F.assertType(Donkeycraft.Portal.createPortal, 'function', 'Portal.createPortal is a function');
    F.assertType(Donkeycraft.Portal.findMatchingPortal, 'function', 'Portal.findMatchingPortal is a function');
    F.assertType(Donkeycraft.Portal.travelToDimension, 'function', 'Portal.travelToDimension is a function');
    F.assertType(Donkeycraft.Portal.isPortalAt, 'function', 'Portal.isPortalAt is a function');
    F.assertType(Donkeycraft.Portal.getAllPortals, 'function', 'Portal.getAllPortals is a function');
    F.assertType(Donkeycraft.Portal.clearAllPortals, 'function', 'Portal.clearAllPortals is a function');
    F.assertType(Donkeycraft.Portal.getObsidianId, 'function', 'Portal.getObsidianId is a function');
    F.assertType(Donkeycraft.Portal.getNetherPortalId, 'function', 'Portal.getNetherPortalId is a function');
    F.assertType(Donkeycraft.Portal.getEndPortalId, 'function', 'Portal.getEndPortalId is a function');
    F.assertType(Donkeycraft.Portal.destroy, 'function', 'Portal.destroy is a function');

    // ============================================================
    // Section 10: Portal — Block ID Helpers
    // ============================================================
    F.section('10. Portal — Block ID Helpers');

    F.assertEq(Donkeycraft.Portal.getObsidianId(), 17, 'Obsidian block ID = 17');
    F.assertEq(Donkeycraft.Portal.getNetherPortalId(), 276, 'Nether portal block ID = 276');
    F.assertEq(Donkeycraft.Portal.getEndPortalId(), 277, 'End portal block ID = 277');

    F.assert(Donkeycraft.Portal.isPortalBlock(17) === true, 'Obsidian (17) is a portal block');
    F.assert(Donkeycraft.Portal.isPortalBlock(18) === true, 'Crying obsidian (18) is a portal block');
    F.assert(Donkeycraft.Portal.isPortalBlock(1) === false, 'Stone (1) is not a portal block');
    F.assert(Donkeycraft.Portal.isPortalBlock(0) === false, 'Air (0) is not a portal block');

    F.assert(Donkeycraft.Portal.isPortalActive(276) === true, 'Nether portal (276) is active');
    F.assert(Donkeycraft.Portal.isPortalActive(277) === true, 'End portal (277) is active');
    F.assert(Donkeycraft.Portal.isPortalActive(17) === false, 'Obsidian (17) is not an active portal');
    F.assert(Donkeycraft.Portal.isPortalActive(0) === false, 'Air (0) is not an active portal');

    // ============================================================
    // Section 11: Portal — Initialization & Chunk Manager
    // ============================================================
    F.section('11. Portal — Initialization & Chunk Manager');

    var testBus = new Donkeycraft.EventBus();
    var testChunkManager = new Donkeycraft.ChunkManager();

    Donkeycraft.Portal.init(testBus, testChunkManager);
    F.assert(true, 'Portal.init() completes without error');

    // Test clearAllPortals after init
    Donkeycraft.Portal.clearAllPortals();
    var portals = Donkeycraft.Portal.getAllPortals();
    F.assertEq(portals.length, 0, 'getAllPortals returns empty array after clearAllPortals');

    // ============================================================
    // Section 12: NetherGenerator — Namespace & Core Methods
    // ============================================================
    F.section('12. NetherGenerator — Namespace & Core Methods');

    F.assert(typeof Donkeycraft.NetherGenerator === 'object', 'NetherGenerator namespace exists');
    F.assertType(Donkeycraft.NetherGenerator.getInstance, 'function', 'NetherGenerator.getInstance is a function');
    F.assertType(Donkeycraft.NetherGenerator.setChunkManager, 'function', 'NetherGenerator.setChunkManager is a function');
    F.assertType(Donkeycraft.NetherGenerator.generateNetherTerrain, 'function', 'NetherGenerator.generateNetherTerrain is a function');
    F.assertType(Donkeycraft.NetherGenerator.generateNetherHeightmap, 'function', 'NetherGenerator.generateNetherHeightmap is a function');
    F.assertType(Donkeycraft.NetherGenerator.isLavaSeaLevel, 'function', 'NetherGenerator.isLavaSeaLevel is a function');
    F.assertType(Donkeycraft.NetherGenerator.getLavaSeaLevel, 'function', 'NetherGenerator.getLavaSeaLevel is a function');
    F.assertType(Donkeycraft.NetherGenerator.destroy, 'function', 'NetherGenerator.destroy is a function');

    // ============================================================
    // Section 13: NetherGenerator — Lava Sea Level
    // ============================================================
    F.section('13. NetherGenerator — Lava Sea Level');

    F.assertEq(Donkeycraft.NetherGenerator.getLavaSeaLevel(), 31, 'Lava sea level = 31');
    F.assert(Donkeycraft.NetherGenerator.isLavaSeaLevel(31) === true, 'Y=31 is lava sea level');
    F.assert(Donkeycraft.NetherGenerator.isLavaSeaLevel(32) === true, 'Y=32 is lava sea level');
    F.assert(Donkeycraft.NetherGenerator.isLavaSeaLevel(30) === false, 'Y=30 is not lava sea level');
    F.assert(Donkeycraft.NetherGenerator.isLavaSeaLevel(64) === false, 'Y=64 is not lava sea level');

    // ============================================================
    // Section 14: NetherGenerator — Terrain Generation
    // ============================================================
    F.section('14. NetherGenerator — Terrain Generation');

    var netherCM = new Donkeycraft.ChunkManager();
    Donkeycraft.NetherGenerator.setChunkManager(netherCM);

    // Generate a nether chunk
    Donkeycraft.NetherGenerator.generateNetherTerrain(0, 0);

    var chunk = netherCM.getChunk(0, 0);
    F.assert(chunk !== null, 'Nether chunk (0,0) exists');
    F.assert(chunk.generated === true, 'Nether chunk is marked as generated');

    if (chunk) {
        // Check bedrock floor at Y=0-2
        var floorBlock = chunk.getBlock(8, 0, 8);
        F.assert(floorBlock === 37, 'Bedrock at Y=0 (block ID 37), got: ' + floorBlock);

        var floorBlock2 = chunk.getBlock(8, 1, 8);
        F.assert(floorBlock2 === 37, 'Bedrock at Y=1 (block ID 37), got: ' + floorBlock2);

        // Check bedrock ceiling at top
        var ceilBlock = chunk.getBlock(8, 255, 8);
        F.assert(ceilBlock === 37, 'Bedrock at Y=255 (block ID 37), got: ' + ceilBlock);

        var ceilBlock2 = chunk.getBlock(8, 254, 8);
        F.assert(ceilBlock2 === 37, 'Bedrock at Y=254 (block ID 37), got: ' + ceilBlock2);

        // Check netherrack fills the middle
        var midBlock = chunk.getBlock(8, 64, 8);
        F.assert(midBlock === 257, 'Netherrack at Y=64 (block ID 257), got: ' + midBlock);

        // Check lava sea level
        var lavaBlock = chunk.getBlock(8, 31, 8);
        F.assert(lavaBlock === 213, 'Lava at Y=31 (block ID 213), got: ' + lavaBlock);

        var lavaBlock2 = chunk.getBlock(8, 32, 8);
        F.assert(lavaBlock2 === 213, 'Lava at Y=32 (block ID 213), got: ' + lavaBlock2);
    }

    // ============================================================
    // Section 15: NetherGenerator — Heightmap
    // ============================================================
    F.section('15. NetherGenerator — Heightmap');

    var heightmap = Donkeycraft.NetherGenerator.generateNetherHeightmap(0, 0);
    F.assertType(heightmap, 'object', 'Heightmap is an object (array)');
    F.assertEq(heightmap.length, 256, 'Heightmap has 256 entries (16×16)');

    // All heights should be reasonable for nether
    var validHeights = true;
    for (var i = 0; i < heightmap.length; i++) {
        if (heightmap[i] < 24 || heightmap[i] > 40) {
            validHeights = false;
            break;
        }
    }
    F.assert(validHeights, 'All nether heights are in reasonable range [24, 40]');

    // ============================================================
    // Section 16: EndGenerator — Namespace & Core Methods
    // ============================================================
    F.section('16. EndGenerator — Namespace & Core Methods');

    F.assert(typeof Donkeycraft.EndGenerator === 'object', 'EndGenerator namespace exists');
    F.assertType(Donkeycraft.EndGenerator.getInstance, 'function', 'EndGenerator.getInstance is a function');
    F.assertType(Donkeycraft.EndGenerator.setChunkManager, 'function', 'EndGenerator.setChunkManager is a function');
    F.assertType(Donkeycraft.EndGenerator.generateEndTerrain, 'function', 'EndGenerator.generateEndTerrain is a function');
    F.assertType(Donkeycraft.EndGenerator.generateEndHeightmap, 'function', 'EndGenerator.generateEndHeightmap is a function');
    F.assertType(Donkeycraft.EndGenerator.isIslandChunk, 'function', 'EndGenerator.isIslandChunk is a function');
    F.assertType(Donkeycraft.EndGenerator.getBaseYForIslandType, 'function', 'EndGenerator.getBaseYForIslandType is a function');
    F.assertType(Donkeycraft.EndGenerator.destroy, 'function', 'EndGenerator.destroy is a function');

    // ============================================================
    // Section 17: EndGenerator — Island Type Detection
    // ============================================================
    F.section('17. EndGenerator — Island Type Detection');

    // Center area (dist < 2) should be inner (void)
    F.assert(Donkeycraft.EndGenerator.isIslandChunk(0, 0) === false, 'Chunk (0,0) is not an island (center void)');
    F.assert(Donkeycraft.EndGenerator.isIslandChunk(1, 0) === false, 'Chunk (1,0) is not an island (center void)');

    // Midlands area (2 ≤ dist < 12)
    F.assert(typeof Donkeycraft.EndGenerator.isIslandChunk(5, 5) === 'boolean', 'Chunk (5,5) returns boolean');

    // Base Y for different island types
    F.assertEq(Donkeycraft.EndGenerator.getBaseYForIslandType('midlands'), 49, 'Midlands base Y = 49');
    F.assertEq(Donkeycraft.EndGenerator.getBaseYForIslandType('highlands'), 55, 'Highlands base Y = 55');
    F.assertEq(Donkeycraft.EndGenerator.getBaseYForIslandType('outer'), 45, 'Outer End base Y = 45');
    F.assertEq(Donkeycraft.EndGenerator.getBaseYForIslandType('unknown'), 49, 'Unknown island type defaults to midlands Y');

    // ============================================================
    // Section 18: EndGenerator — Terrain Generation
    // ============================================================
    F.section('18. EndGenerator — Terrain Generation');

    var endCM = new Donkeycraft.ChunkManager();
    Donkeycraft.EndGenerator.setChunkManager(endCM);

    // Generate an End chunk (use a position that should be an island)
    Donkeycraft.EndGenerator.generateEndTerrain(5, 5);

    var endChunk = endCM.getChunk(5, 5);
    F.assert(endChunk !== null, 'End chunk (5,5) exists');

    if (endChunk) {
        // Should have end stone blocks
        var hasEndStone = false;
        for (var ey = 40; ey < 80; ey++) {
            var eb = endChunk.getBlock(8, ey, 8);
            if (eb === 12) { // END_STONE_ID
                hasEndStone = true;
                break;
            }
        }
        F.assert(hasEndStone, 'End chunk contains end stone blocks');
    }

    // ============================================================
    // Section 19: EndGenerator — Heightmap
    // ============================================================
    F.section('19. EndGenerator — Heightmap');

    var endHeightmap = Donkeycraft.EndGenerator.generateEndHeightmap(5, 5);
    F.assertType(endHeightmap, 'object', 'End heightmap is an object (array)');
    F.assertEq(endHeightmap.length, 256, 'End heightmap has 256 entries (16×16)');

    // ============================================================
    // Section 20: Chunk — Uint16Array for Block IDs > 255
    // ============================================================
    F.section('20. Chunk — Uint16Array Support for Block IDs > 255');

    var testChunk = new Donkeycraft.Chunk(0, 0);

    // Test setting a block ID above 255 (netherrack = 257)
    testChunk.setBlock(8, 64, 8, 257);
    var readBack = testChunk.getBlock(8, 64, 8);
    F.assertEq(readBack, 257, 'Uint16Array supports block ID 257 (netherrack)');

    // Test setting a very high block ID (ancient debris = 273)
    testChunk.setBlock(8, 64, 9, 273);
    var readBack2 = testChunk.getBlock(8, 64, 9);
    F.assertEq(readBack2, 273, 'Uint16Array supports block ID 273 (ancient_debris)');

    // Test setting an even higher block ID (pitcher_pod = 285)
    testChunk.setBlock(8, 64, 10, 285);
    var readBack3 = testChunk.getBlock(8, 64, 10);
    F.assertEq(readBack3, 285, 'Uint16Array supports block ID 285 (pitcher_pod)');

    // Verify air is still 0
    testChunk.setBlock(8, 64, 11, 0);
    var airBlock = testChunk.getBlock(8, 64, 11);
    F.assertEq(airBlock, 0, 'Air block ID = 0');

    // Out of bounds returns air
    var oobBlock = testChunk.getBlock(16, 64, 8);
    F.assertEq(oobBlock, 0, 'Out-of-bounds X returns air (0)');

    var oobBlock2 = testChunk.getBlock(8, -1, 8);
    F.assertEq(oobBlock2, 0, 'Out-of-bounds Y=-1 returns air (0)');

    var oobBlock3 = testChunk.getBlock(8, 64, 16);
    F.assertEq(oobBlock3, 0, 'Out-of-bounds Z=16 returns air (0)');

    // ============================================================
    // Section 21: Integration — Dimension Travel Simulation
    // ============================================================
    F.section('21. Integration — Dimension Travel Simulation');

    // Reset portal state
    Donkeycraft.Portal.clearAllPortals();

    // Simulate travel from Overworld to Nether
    var travelResult = Donkeycraft.Portal.travelToDimension(
        Donkeycraft.DimensionType.OVERWORLD,
        Donkeycraft.DimensionType.NETHER,
        800, 64, 1600
    );

    F.assert(travelResult !== null, 'travelToDimension returns a result');
    if (travelResult) {
        F.assertEq(travelResult.dimension, 1, 'Travel destination dimension is Nether (1)');
        // X should be transformed: 800 / 8 = 100
        F.assertEq(travelResult.x, 100, 'Overworld X=800 → Nether X=100 (÷8)');
        F.assertEq(travelResult.z, 200, 'Overworld Z=1600 → Nether Z=200 (÷8)');
    }

    // Verify current dimension was updated
    F.assertEq(Donkeycraft.Dimensions.getCurrentDimension(), 1, 'Current dimension is now Nether after travel');

    // ============================================================
    // Section 22: Integration — Portal Event Emission
    // ============================================================
    F.section('22. Integration — Portal Event Emission');

    var portalEventFired = false;
    var portalEventData = null;

    var eventBus2 = new Donkeycraft.EventBus();
    eventBus2.on('portal:travel', function(data) {
        portalEventFired = true;
        portalEventData = data;
    });

    Donkeycraft.Portal.setEventBus(eventBus2);

    // Reset portal state for clean test
    Donkeycraft.Portal.clearAllPortals();

    // Simulate another travel
    var travelResult2 = Donkeycraft.Portal.travelToDimension(
        Donkeycraft.DimensionType.NETHER,
        Donkeycraft.DimensionType.OVERWORLD,
        100, 64, 200
    );

    F.assert(portalEventFired === true, 'portal:travel event was fired');
    if (portalEventFired && portalEventData) {
        F.assertEq(portalEventData.fromDimension, 1, 'Event fromDimension is Nether (1)');
        F.assertEq(portalEventData.toDimension, 0, 'Event toDimension is Overworld (0)');
    }

    // ============================================================
    // Section 23: Edge Cases — Portal at World Bounds
    // ============================================================
    F.section('23. Edge Cases — Portal at World Bounds');

    // Portal methods should not throw at edge coordinates
    try {
        var result1 = Donkeycraft.Portal.detectNetherPortal(0, 0, 0);
        F.assert(result1 === null, 'detectNetherPortal(0,0,0) returns null (no frame)');
    } catch (e) {
        F.assert(false, 'detectNetherPortal(0,0,0) did not throw: ' + e.message);
    }

    try {
        var result2 = Donkeycraft.Portal.isPortalAt(-100, -100, -100);
        F.assert(result2 === false, 'isPortalAt with negative coords returns false');
    } catch (e) {
        F.assert(false, 'isPortalAt did not throw: ' + e.message);
    }

    // ============================================================
    // Section 24: Edge Cases — Invalid Dimension Operations
    // ============================================================
    F.section('24. Edge Cases — Invalid Dimension Operations');

    // getDimension for non-existent type
    var invalidDim = Donkeycraft.Dimensions.getDimension(99);
    F.assert(invalidDim === null, 'getDimension(99) returns null');

    // setCurrentDimension with invalid value should not change current
    var savedCurrent = Donkeycraft.Dimensions.getCurrentDimension();
    Donkeycraft.Dimensions.setCurrentDimension(99);
    F.assertEq(Donkeycraft.Dimensions.getCurrentDimension(), savedCurrent, 'Invalid setCurrentDimension does not change current');

    // getSpawnPosition for non-existent dimension should return default
    var invalidSpawn = Donkeycraft.Dimensions.getSpawnPosition(99);
    F.assert(invalidSpawn !== null, 'getSpawnPosition(99) returns default object');
    if (invalidSpawn) {
        F.assertEq(invalidSpawn.x, 0, 'Invalid spawn X defaults to 0');
        F.assertEq(invalidSpawn.y, 64, 'Invalid spawn Y defaults to 64');
        F.assertEq(invalidSpawn.z, 0, 'Invalid spawn Z defaults to 0');
    }

    // transformCoordinates with invalid dimensions
    var invalidTransform = Donkeycraft.Dimensions.transformCoordinates(99, 0, 80, 64, 160);
    F.assertEq(invalidTransform.x, 80, 'Invalid fromDimension returns original X');

    var invalidTransform2 = Donkeycraft.Dimensions.transformCoordinates(0, 99, 80, 64, 160);
    F.assertEq(invalidTransform2.x, 80, 'Invalid toDimension returns original X');

    // ============================================================
    // Section 25: Edge Cases — Destroy Methods
    // ============================================================
    F.section('25. Edge Cases — Destroy Methods');

    // Test that all destroy methods complete without error
    try {
        Donkeycraft.Portal.destroy();
        F.assert(true, 'Portal.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'Portal.destroy() threw: ' + e.message);
    }

    try {
        Donkeycraft.NetherGenerator.destroy();
        F.assert(true, 'NetherGenerator.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'NetherGenerator.destroy() threw: ' + e.message);
    }

    try {
        Donkeycraft.EndGenerator.destroy();
        F.assert(true, 'EndGenerator.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'EndGenerator.destroy() threw: ' + e.message);
    }

    // Test ChunkManager cleanup
    try {
        netherCM.destroy();
        F.assert(true, 'ChunkManager.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'ChunkManager.destroy() threw: ' + e.message);
    }

    try {
        endCM.destroy();
        F.assert(true, 'EndChunkManager.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'EndChunkManager.destroy() threw: ' + e.message);
    }

    // ============================================================
    // Section 26: Edge Cases — Chunk fill & clearLight
    // ============================================================
    F.section('26. Edge Cases — Chunk fill & clearLight');

    var fillChunk = new Donkeycraft.Chunk(0, 0);

    // fill should mark chunk as dirty
    fillChunk.fill(257);
    F.assert(fillChunk.isDirty() === true, 'fill() marks chunk as dirty');

    // All blocks should be netherrack now
    var filledBlock = fillChunk.getBlock(8, 64, 8);
    F.assertEq(filledBlock, 257, 'fill(257) sets all blocks to netherrack');

    // clearLight should zero all light
    fillChunk.setSkyLight(8, 64, 8, 15);
    fillChunk.setBlockLight(8, 64, 8, 10);
    fillChunk.clearLight();
    F.assertEq(fillChunk.getSkyLight(8, 64, 8), 0, 'clearLight zeros sky light');
    F.assertEq(fillChunk.getBlockLight(8, 64, 8), 0, 'clearLight zeros block light');

    // markClean should clear dirty flag
    fillChunk.markClean();
    F.assert(fillChunk.isDirty() === false, 'markClean() clears dirty flag');

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
