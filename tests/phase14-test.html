<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Phase 14 Save/Load System Test</title>
<link rel="stylesheet" href="test.css">
</head>
<body>
<h1>Donkeycraft — Phase 14 Save/Load System Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Testing: WorldStore (IndexedDB save/load), LevelData (spawn, game mode, time, seed, player data)</div>

<!-- Summary is auto-created at top by TestFramework.init() -->
<div id="results"></div>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<!-- Phase 3 Block System -->
<script src="../src/world/block.js"></script>
<script src="../src/world/block-state.js"></script>
<script src="../src/world/block-types.js"></script>
<script src="../src/world/texture-atlas.js"></script>
<script src="../src/world/block-models.js"></script>
<script src="../src/world/recipe-registry.js"></script>

<!-- Phase 4 World Generation -->
<script src="../src/world/biome.js"></script>
<script src="../src/world/chunk.js"></script>
<script src="../src/world/chunk-manager.js"></script>
<script src="../src/world/terrain-generator.js"></script>
<script src="../src/world/ore-generator.js"></script>
<script src="../src/world/cave-generator.js"></script>
<script src="../src/world/structure-generator.js"></script>
<script src="../src/world/water-generator.js"></script>
<script src="../src/world/terrain-surface.js"></script>
<script src="../src/world/lighting-engine.js"></script>
<script src="../src/world/physics.js"></script>
<script src="../src/world/world-utils.js"></script>

<!-- Phase 13 Time & Weather -->
<script src="../src/world/time.js"></script>
<script src="../src/render/weather.js"></script>

<!-- Load shared test framework (MUST come before the test script) -->
<script src="test.js"></script>

<!-- Phase 14: Save/Load -->
<script src="../src/storage/world-store.js"></script>
<script src="../src/storage/level-data.js"></script>

<script>
(function() {
    'use strict';

    // Get the shared framework instance
    var F = TestFramework;

    // Initialize: creates #test-summary at top, uses existing #results div
    F.init('results');

    // ============================================================
    // Section 1: WorldStore — Namespace & Construction
    // ============================================================
    F.section('1. WorldStore — Namespace & Construction');

    F.assert(typeof Donkeycraft.WorldStore === 'function', 'WorldStore constructor exists');
    F.assertType(Donkeycraft.WORLD_STORE_DB_NAME, 'string', 'WORLD_STORE_DB_NAME is a string');
    F.assertEq(Donkeycraft.WORLD_STORE_DB_NAME, 'donkeycraft-worlds', 'DB name = "donkeycraft-worlds"');
    F.assertType(Donkeycraft.WORLD_STORE_VERSION, 'number', 'WORLD_STORE_VERSION is a number');
    F.assertEq(Donkeycraft.WORLD_STORE_VERSION, 1, 'DB version = 1');
    F.assertType(Donkeycraft.WORLD_STORE_STORE_NAME, 'string', 'WORLD_STORE_STORE_NAME is a string');
    F.assertEq(Donkeycraft.WORLD_STORE_STORE_NAME, 'worlds', 'Store name = "worlds"');

    var ws1 = new Donkeycraft.WorldStore();
    F.assert(ws1 instanceof Donkeycraft.WorldStore, 'Default construction creates WorldStore instance');
    F.assert(!ws1.isReady(), 'New WorldStore is not ready (DB not opened)');

    var ws2 = new Donkeycraft.WorldStore('custom-db');
    F.assertEq(ws2._dbName, 'custom-db', 'Custom DB name set correctly');

    // ============================================================
    // Section 2: WorldStore — Setters (ChunkManager & EventBus)
    // ============================================================
    F.section('2. WorldStore — ChunkManager & EventBus Setters');

    var fakeBus = new Donkeycraft.EventBus();
    ws1.setEventBus(fakeBus);
    F.assert(true, 'setEventBus accepts EventBus instance without error');

    var fakeCM = new Donkeycraft.ChunkManager({ renderDistance: 1 });
    ws1.setChunkManager(fakeCM);
    F.assert(true, 'setChunkManager accepts ChunkManager instance without error');

    // ============================================================
    // Section 3: WorldStore — Init (Graceful Fallback)
    // ============================================================
    F.section('3. WorldStore — IndexedDB Initialization');

    // Test init returns a promise and handles gracefully even without real IndexedDB
    var initPromise = ws1.init();
    F.assertType(initPromise, 'object', 'init() returns a Promise-like object');

    // Since we're running in a test environment, init may or may not succeed
    // The key is that it doesn't throw and resolves gracefully
    var initCompleted = false;
    initPromise.then(function(result) {
        initCompleted = true;
        F.assert(true, 'init() resolved with: ' + result);
    }).catch(function(err) {
        F.assert(false, 'init() rejected: ' + err.message);
    });

    // ============================================================
    // Section 4: WorldStore — Level Data Get/Set (Without DB)
    // ============================================================
    F.section('4. WorldStore — Level Data Methods (Non-DB)');

    // Without a real DB, these should return null/false gracefully
    var wsNoDb = new Donkeycraft.WorldStore();

    var ldPromise = wsNoDb.getLevelData('test-world');
    F.assertType(ldPromise, 'object', 'getLevelData returns Promise-like');

    var slPromise = wsNoDb.setLevelData('test-world', { spawn: { x: 0, y: 64, z: 0 } });
    F.assertType(slPromise, 'object', 'setLevelData returns Promise-like');

    var lwPromise = wsNoDb.loadWorld('test-world');
    F.assertType(lwPromise, 'object', 'loadWorld returns Promise-like');

    var swPromise = wsNoDb.saveWorld('test-world', {}, []);
    F.assertType(swPromise, 'object', 'saveWorld returns Promise-like');

    // ============================================================
    // Section 5: WorldStore — Chunk Save/Load Methods (Non-DB)
    // ============================================================
    F.section('5. WorldStore — Chunk Methods (Non-DB)');

    var scPromise = wsNoDb.saveChunk('test-world', 0, 0, { blockData: null });
    F.assertType(scPromise, 'object', 'saveChunk returns Promise-like');

    var lcPromise = wsNoDb.loadChunk('test-world', 0, 0);
    F.assertType(lcPromise, 'object', 'loadChunk returns Promise-like');

    // ============================================================
    // Section 6: LevelData — Namespace & Construction
    // ============================================================
    F.section('6. LevelData — Namespace & Construction');

    F.assert(typeof Donkeycraft.LevelData === 'function', 'LevelData constructor exists');
    F.assertType(Donkeycraft.DEFAULT_SPAWN_X, 'number', 'DEFAULT_SPAWN_X = 0');
    F.assertEq(Donkeycraft.DEFAULT_SPAWN_X, 0, 'Default spawn X = 0');
    F.assertType(Donkeycraft.DEFAULT_SPAWN_Y, 'number', 'DEFAULT_SPAWN_Y = 64');
    F.assertEq(Donkeycraft.DEFAULT_SPAWN_Y, 64, 'Default spawn Y = 64');
    F.assertType(Donkeycraft.DEFAULT_SPAWN_Z, 'number', 'DEFAULT_SPAWN_Z = 0');
    F.assertEq(Donkeycraft.DEFAULT_SPAWN_Z, 0, 'Default spawn Z = 0');

    var ld1 = new Donkeycraft.LevelData();
    F.assert(ld1 instanceof Donkeycraft.LevelData, 'Default construction creates LevelData instance');

    // ============================================================
    // Section 7: LevelData — Spawn Position Get/Set
    // ============================================================
    F.section('7. LevelData — Spawn Position');

    var spawn = ld1.getSpawn();
    F.assertEq(spawn.x, 0, 'Default spawn X = 0');
    F.assertEq(spawn.y, 64, 'Default spawn Y = 64');
    F.assertEq(spawn.z, 0, 'Default spawn Z = 0');

    ld1.setSpawn(100, 128, -50);
    var spawn2 = ld1.getSpawn();
    F.assertEq(spawn2.x, 100, 'Spawn X = 100 after set');
    F.assertEq(spawn2.y, 128, 'Spawn Y = 128 after set');
    F.assertEq(spawn2.z, -50, 'Spawn Z = -50 after set');

    // Individual getters
    F.assertEq(ld1.getSpawnX(), 100, 'getSpawnX() = 100');
    F.assertEq(ld1.getSpawnY(), 128, 'getSpawnY() = 128');
    F.assertEq(ld1.getSpawnZ(), -50, 'getSpawnZ() = -50');

    // setSpawn with undefined/null clamps to defaults
    ld1.setSpawn(undefined, undefined, undefined);
    var spawn3 = ld1.getSpawn();
    F.assertEq(spawn3.x, 0, 'setSpawn(undefined) uses default X = 0');
    F.assertEq(spawn3.y, 64, 'setSpawn(undefined) uses default Y = 64');
    F.assertEq(spawn3.z, 0, 'setSpawn(undefined) uses default Z = 0');

    // setSpawn with floats rounds to integers
    ld1.setSpawn(10.7, 20.3, 30.9);
    var spawn4 = ld1.getSpawn();
    F.assertEq(spawn4.x, 11, 'setSpawn(10.7) rounds to 11');
    F.assertEq(spawn4.y, 20, 'setSpawn(20.3) rounds to 20');
    F.assertEq(spawn4.z, 31, 'setSpawn(30.9) rounds to 31');

    // ============================================================
    // Section 8: LevelData — Game Mode Get/Set
    // ============================================================
    F.section('8. LevelData — Game Mode');

    F.assertEq(ld1.getGameMode(), 'survival', 'Default game mode = "survival"');

    ld1.setGameMode('creative');
    F.assertEq(ld1.getGameMode(), 'creative', 'setGameMode("creative") = "creative"');

    ld1.setGameMode('spectator');
    F.assertEq(ld1.getGameMode(), 'spectator', 'setGameMode("spectator") = "spectator"');

    // Invalid mode falls back to survival
    ld1.setGameMode('invalid_mode');
    F.assertEq(ld1.getGameMode(), 'survival', 'Invalid game mode falls back to "survival"');

    // ============================================================
    // Section 9: LevelData — Time & Seed Get/Set
    // ============================================================
    F.section('9. LevelData — World Time & Seed');

    F.assertEq(ld1.getTime(), 0, 'Default world time = 0');
    F.assertEq(ld1.getSeed(), 42, 'Default seed = 42');

    ld1.setTime(12345);
    F.assertEq(ld1.getTime(), 12345, 'setTime(12345) = 12345');

    ld1.setTime(-100);
    F.assertEq(ld1.getTime(), 0, 'setTime(-100) clamped to 0');

    ld1.setTime(99999.7);
    F.assertEq(ld1.getTime(), 99999, 'setTime(99999.7) floors to 99999');

    ld1.setSeed(-500);
    F.assertEq(ld1.getSeed(), -500, 'setSeed(-500) = -500');

    ld1.setSeed(undefined);
    F.assertEq(ld1.getSeed(), 42, 'setSeed(undefined) falls back to default 42');

    // ============================================================
    // Section 10: LevelData — Player Data Get/Set
    // ============================================================
    F.section('10. LevelData — Player Data');

    F.assert(ld1.getPlayerData() === null, 'Default player data = null');

    ld1.setPlayerData({
        position: { x: 10, y: 64, z: 20 },
        rotation: { yaw: 90, pitch: -15 },
        health: 15,
        maxHealth: 20,
        inventory: [{ item: 'stone', count: 64 }],
        hunger: 18,
        saturation: 12,
        experience: { levels: 5, points: 100 },
        fallDistance: 3.5,
        alive: true
    });

    var pData = ld1.getPlayerData();
    F.assert(pData !== null, 'Player data is not null after set');
    F.assertEq(pData.position.x, 10, 'Player position x = 10');
    F.assertEq(pData.position.y, 64, 'Player position y = 64');
    F.assertEq(pData.position.z, 20, 'Player position z = 20');
    F.assertEq(pData.rotation.yaw, 90, 'Player rotation yaw = 90');
    F.assertEq(pData.health, 15, 'Player health = 15');
    F.assertEq(pData.maxHealth, 20, 'Player maxHealth = 20');
    F.assertEq(pData.hunger, 18, 'Player hunger = 18');
    F.assertEq(pData.saturation, 12, 'Player saturation = 12');
    F.assertEq(pData.experience.levels, 5, 'XP levels = 5');
    F.assertEq(pData.experience.points, 100, 'XP points = 100');
    F.assertEq(pData.fallDistance, 3.5, 'Fall distance = 3.5');
    F.assert(pData.alive, 'Player is alive');

    // Verify returned data is a copy (mutation safety)
    pData.position.x = 999;
    var pData2 = ld1.getPlayerData();
    F.assertEq(pData2.position.x, 10, 'Player data is deep-copied (mutation safe)');

    // Invalid setPlayerData
    ld1.setPlayerData(null);
    F.assert(ld1.getPlayerData() !== null, 'setPlayerData(null) preserves existing data');

    ld1.setPlayerData('invalid');
    F.assert(ld1.getPlayerData() !== null, 'setPlayerData("invalid") preserves existing data');

    // setPlayerPosition auto-creates player data
    var ld2 = new Donkeycraft.LevelData();
    ld2.setPlayerPosition(5, 10, 15);
    var pd2 = ld2.getPlayerData();
    F.assert(pd2 !== null, 'setPlayerPosition auto-creates player data');
    F.assertEq(pd2.position.x, 5, 'Auto-created position x = 5');

    // setPlayerHealth
    ld2.setPlayerHealth(10);
    var pd3 = ld2.getPlayerData();
    F.assertEq(pd3.health, 10, 'setPlayerHealth(10) = 10');
    F.assert(pd3.alive, 'Player alive when health > 0');

    ld2.setPlayerHealth(0);
    var pd4 = ld2.getPlayerData();
    F.assertEq(pd4.health, 0, 'setPlayerHealth(0) = 0');
    F.assert(!pd4.alive, 'Player dead when health = 0');

    // isPlayerAlive
    F.assert(!ld2.isPlayerAlive(), 'isPlayerAlive() = false after death');

    var ld3 = new Donkeycraft.LevelData();
    F.assert(ld3.isPlayerAlive(), 'isPlayerAlive() = true when no player data');

    // ============================================================
    // Section 11: LevelData — Hunger & Saturation
    // ============================================================
    F.section('11. LevelData — Hunger & Saturation');

    var ldH = new Donkeycraft.LevelData();
    // Without player data, defaults are returned
    F.assertEq(ldH.getHunger(), 20, 'Default hunger (no player data) = 20');
    F.assertEq(ldH.getSaturation(), 0, 'Default saturation (no player data) = 0');

    ldH.setPlayerData({});
    F.assertEq(ldH.getHunger(), 20, 'Default hunger (with player data) = 20');
    F.assertEq(ldH.getSaturation(), 0, 'Default saturation (with player data) = 0');

    ldH.setHunger(15);
    F.assertEq(ldH.getHunger(), 15, 'setHunger(15) = 15');

    ldH.setHunger(-5);
    F.assertEq(ldH.getHunger(), 0, 'setHunger(-5) clamped to 0');

    ldH.setHunger(25);
    F.assertEq(ldH.getHunger(), 20, 'setHunger(25) clamped to 20');

    ldH.setSaturation(10);
    F.assertEq(ldH.getSaturation(), 10, 'setSaturation(10) = 10');

    ldH.setSaturation(-3);
    F.assertEq(ldH.getSaturation(), 0, 'setSaturation(-3) clamped to 0');

    // ============================================================
    // Section 12: LevelData — Experience Levels
    // ============================================================
    F.section('12. LevelData — Experience Levels');

    var ldXp = new Donkeycraft.LevelData();
    F.assertEq(ldXp.getXpLevels(), 0, 'Default XP levels = 0 (no player data)');

    ldXp.setPlayerData({});
    F.assertEq(ldXp.getXpLevels(), 0, 'Default XP levels = 0 (with player data)');

    ldXp.setXpLevels(10);
    F.assertEq(ldXp.getXpLevels(), 10, 'setXpLevels(10) = 10');

    ldXp.setXpLevels(-5);
    F.assertEq(ldXp.getXpLevels(), 0, 'setXpLevels(-5) clamped to 0');

    // ============================================================
    // Section 13: LevelData — World Name
    // ============================================================
    F.section('13. LevelData — World Name');

    F.assertEq(ld1.getWorldName(), 'DefaultWorld', 'Default world name = "DefaultWorld"');

    ld1.setWorldName('MyAwesomeWorld');
    F.assertEq(ld1.getWorldName(), 'MyAwesomeWorld', 'setWorldName("MyAwesomeWorld") = "MyAwesomeWorld"');

    ld1.setWorldName('');
    F.assertEq(ld1.getWorldName(), 'DefaultWorld', 'setWorldName("") falls back to "DefaultWorld"');

    // ============================================================
    // Section 14: LevelData — Serialization/Deserialization
    // ============================================================
    F.section('14. LevelData — Serialization & Deserialization');

    ld1.setSpawn(50, 100, -30);
    ld1.setGameMode('creative');
    ld1.setTime(7777);
    ld1.setSeed(12345);
    ld1.setWorldName('TestWorld');
    ld1.setPlayerData({
        position: { x: 1, y: 2, z: 3 },
        health: 10,
        hunger: 15,
        experience: { levels: 3, points: 50 }
    });

    var serialized = ld1.serialize();
    F.assertEq(serialized.worldName, 'TestWorld', 'Serialize worldName');
    F.assertEq(serialized.spawn.x, 50, 'Serialize spawn x');
    F.assertEq(serialized.spawn.y, 100, 'Serialize spawn y');
    F.assertEq(serialized.spawn.z, -30, 'Serialize spawn z');
    F.assertEq(serialized.gameMode, 'creative', 'Serialize gameMode');
    F.assertEq(serialized.worldTime, 7777, 'Serialize worldTime');
    F.assertEq(serialized.seed, 12345, 'Serialize seed');
    F.assert(serialized.playerData !== null, 'Serialize playerData');

    // Deserialize into fresh instance
    var ldDeser = new Donkeycraft.LevelData();
    ldDeser.deserialize(serialized);

    F.assertEq(ldDeser.getWorldName(), 'TestWorld', 'Deserialize worldName');
    var deserSpawn = ldDeser.getSpawn();
    F.assertEq(deserSpawn.x, 50, 'Deserialize spawn x');
    F.assertEq(deserSpawn.y, 100, 'Deserialize spawn y');
    F.assertEq(deserSpawn.z, -30, 'Deserialize spawn z');
    F.assertEq(ldDeser.getGameMode(), 'creative', 'Deserialize gameMode');
    F.assertEq(ldDeser.getTime(), 7777, 'Deserialize worldTime');
    F.assertEq(ldDeser.getSeed(), 12345, 'Deserialize seed');

    var deserPlayer = ldDeser.getPlayerData();
    F.assert(deserPlayer !== null, 'Deserialize playerData');
    F.assertEq(deserPlayer.health, 10, 'Deserialize health');
    F.assertEq(deserPlayer.hunger, 15, 'Deserialize hunger');
    F.assertEq(deserPlayer.experience.levels, 3, 'Deserialize XP levels');

    // Deserialize null/invalid data preserves defaults
    var ldDef = new Donkeycraft.LevelData();
    ldDef.deserialize(null);
    F.assertEq(ldDef.getGameMode(), 'survival', 'Deserialize(null) preserves defaults');

    ldDef.deserialize('not an object');
    F.assertEq(ldDef.getGameMode(), 'survival', 'Deserialize("string") preserves defaults');

    // ============================================================
    // Section 15: LevelData — Validation (isValid)
    // ============================================================
    F.section('15. LevelData — Validation');

    var ldValid = new Donkeycraft.LevelData();
    F.assert(ldValid.isValid(), 'Default LevelData is valid');

    // Invalid world name — setWorldName('') falls back to 'DefaultWorld', so it's valid
    var ldBadName = new Donkeycraft.LevelData();
    ldBadName.setWorldName('');
    F.assert(ldBadName.isValid(), 'setWorldName("") falls back to "DefaultWorld" → valid');

    // Invalid game mode — setGameMode('invalid') falls back to 'survival', so it's valid
    var ldBadMode = new Donkeycraft.LevelData();
    ldBadMode.setGameMode('invalid');
    F.assert(ldBadMode.isValid(), 'setGameMode("invalid") falls back to "survival" → valid');

    // Test truly invalid world name and game mode by direct field manipulation
    var ldDirect = new Donkeycraft.LevelData();
    ldDirect._worldName = '';
    F.assert(!ldDirect.isValid(), 'Direct empty _worldName makes LevelData invalid');

    var ldDirect2 = new Donkeycraft.LevelData();
    ldDirect2._gameMode = 'invalid_mode';
    F.assert(!ldDirect2.isValid(), 'Direct invalid _gameMode makes LevelData invalid');

    // Spawn Y out of bounds
    var ldBadSpawn = new Donkeycraft.LevelData();
    ldBadSpawn.setSpawn(0, 300, 0);
    F.assert(!ldBadSpawn.isValid(), 'Spawn Y >= WORLD_HEIGHT makes LevelData invalid');

    ldBadSpawn.setSpawn(0, -1, 0);
    F.assert(!ldBadSpawn.isValid(), 'Spawn Y < 0 makes LevelData invalid');

    // Valid spawn within bounds
    ldBadSpawn.setSpawn(0, 255, 0);
    F.assert(ldBadSpawn.isValid(), 'Spawn Y = 255 (WORLD_HEIGHT-1) is valid');

    // ============================================================
    // Section 16: LevelData — Reset & Last Saved
    // ============================================================
    F.section('16. LevelData — Reset & Last Saved');

    var ldReset = new Donkeycraft.LevelData();
    ldReset.setSpawn(99, 99, 99);
    ldReset.setGameMode('creative');
    ldReset.setTime(50000);
    ldReset.setSeed(999);

    ldReset.reset();
    F.assertEq(ldReset.getSpawnX(), 0, 'reset() restores spawn X');
    F.assertEq(ldReset.getSpawnY(), 64, 'reset() restores spawn Y');
    F.assertEq(ldReset.getSpawnZ(), 0, 'reset() restores spawn Z');
    F.assertEq(ldReset.getGameMode(), 'survival', 'reset() restores game mode');
    F.assertEq(ldReset.getTime(), 0, 'reset() restores time');
    F.assertEq(ldReset.getSeed(), 42, 'reset() restores seed');

    // markSaved / getLastSaved
    var ldSave = new Donkeycraft.LevelData();
    F.assertEq(ldSave.getLastSaved(), 0, 'Default lastSaved = 0');

    ldSave.markSaved();
    var now = Date.now();
    F.assert(ldSave.getLastSaved() > 0, 'markSaved() sets lastSaved to current time');
    F.assert(ldSave.getLastSaved() <= now, 'lastSaved <= current timestamp');

    // ============================================================
    // Section 17: Integration — Time + LevelData Coordination
    // ============================================================
    F.section('17. Integration — Time + LevelData Coordination');

    var wtInt = new Donkeycraft.WorldTime(0);
    var ldInt = new Donkeycraft.LevelData();

    // Advance time and sync to level data
    for (var i = 0; i < 5000; i++) {
        wtInt.tick();
    }
    F.assertEq(wtInt.getTotalTicks(), 5000, 'WorldTime advanced to 5000 ticks');

    // Sync world time to level data
    ldInt.setTime(wtInt.getTotalTicks());
    F.assertEq(ldInt.getTime(), 5000, 'LevelData time synced from WorldTime');

    // ============================================================
    // Section 18: Integration — Destroy Methods
    // ============================================================
    F.section('18. Integration — Destroy Methods');

    try {
        ws1.destroy();
        F.assert(true, 'WorldStore.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'WorldStore.destroy() threw: ' + e.message);
    }

    try {
        ld1.destroy();
        F.assert(true, 'LevelData.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'LevelData.destroy() threw: ' + e.message);
    }

    // Verify destroy nullifies player data
    var ldDestroy = new Donkeycraft.LevelData();
    ldDestroy.setPlayerData({ health: 10 });
    ldDestroy.destroy();
    F.assert(ldDestroy.getPlayerData() === null, 'LevelData.destroy() nullifies player data');

    // ============================================================
    // Section 19: Edge Cases — Boundary Values
    // ============================================================
    F.section('19. Edge Cases — Boundary Values');

    var ldEdge = new Donkeycraft.LevelData();

    // setSpawn with very large values
    ldEdge.setSpawn(999999, 999999, -999999);
    var eSpawn = ldEdge.getSpawn();
    F.assertEq(eSpawn.x, 999999, 'Large spawn X preserved');
    F.assertEq(eSpawn.y, 999999, 'Large spawn Y preserved (not clamped)');

    // setTime with NaN
    var ldNaN = new Donkeycraft.LevelData();
    ldNaN.setTime(NaN);
    F.assert(ldNaN.getTime() === 0 || ldNaN.getTime() !== ldNaN.getTime(), 'setTime(NaN) handled gracefully');

    // getSpawn returns fresh object each time (mutation safety)
    var s1 = ldEdge.getSpawn();
    s1.x = -999;
    var s2 = ldEdge.getSpawn();
    F.assertEq(s2.x, 999999, 'getSpawn() returns independent copy');

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
