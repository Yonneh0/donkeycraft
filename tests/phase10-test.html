<meta charset="UTF-8">

<link rel="stylesheet" href="test.css">
</head>
<body>
<h1>Donkeycraft — Phase 10 Redstone System Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Testing: RedstoneEngine, Wiring, Repeater/Comparator, Observers, Pistons, TNT</div>

<!-- Summary is auto-created at top by TestFramework.init() -->
<div id="results"></div>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<!-- Phase 3 Block System -->
<script src="../src/world/block.js"></script>
<script src="../src/world/block-state.js"></script>
<script src="../src/world/block-types.js"></script>
<script src="../src/world/texture-atlas.js"></script>
<script src="../src/world/block-models.js"></script>
<script src="../src/world/recipe-registry.js"></script>

<!-- Phase 4 World Generation -->
<script src="../src/world/biome.js"></script>
<script src="../src/world/chunk.js"></script>
<script src="../src/world/chunk-manager.js"></script>
<script src="../src/world/terrain-generator.js"></script>
<script src="../src/world/ore-generator.js"></script>
<script src="../src/world/cave-generator.js"></script>
<script src="../src/world/structure-generator.js"></script>
<script src="../src/world/water-generator.js"></script>
<script src="../src/world/terrain-surface.js"></script>
<script src="../src/world/lighting-engine.js"></script>
<script src="../src/world/physics.js"></script>
<script src="../src/world/world-utils.js"></script>

<!-- Load shared test framework (MUST come before the test script) -->
<script src="test.js"></script>

<!-- Phase 10: Redstone -->
<script src="../src/redstone/redstone-engine.js"></script>
<script src="../src/redstone/wiring.js"></script>
<script src="../src/redstone/repeater-comparator.js"></script>
<script src="../src/redstone/observers.js"></script>
<script src="../src/redstone/pistons.js"></script>
<script src="../src/redstone/tnt.js"></script>

<script>
(function() {
    'use strict';

    // Get the shared framework instance
    var F = TestFramework;

    // Initialize: creates #test-summary at top, uses existing #results div
    F.init('results');

    // ============================================================
    // Section 1: RedstoneEngine — Namespace & Core
    // ============================================================
    F.section('1. RedstoneEngine — Namespace & Core');

    F.assert(typeof Donkeycraft.RedstoneEngine === 'object', 'RedstoneEngine namespace exists');
    F.assertType(Donkeycraft.RedstoneEngine.setEventBus, 'function', 'setEventBus is a function');
    F.assertType(Donkeycraft.RedstoneEngine.setChunkManager, 'function', 'setChunkManager is a function');
    F.assertType(Donkeycraft.RedstoneEngine.setWiring, 'function', 'setWiring is a function');
    F.assertType(Donkeycraft.RedstoneEngine.setRepeaterComparator, 'function', 'setRepeaterComparator is a function');
    F.assertType(Donkeycraft.RedstoneEngine.setObservers, 'function', 'setObservers is a function');
    F.assertType(Donkeycraft.RedstoneEngine.setPistons, 'function', 'setPistons is a function');
    F.assertType(Donkeycraft.RedstoneEngine.setTNT, 'function', 'setTNT is a function');
    F.assertType(Donkeycraft.RedstoneEngine.start, 'function', 'start is a function');
    F.assertType(Donkeycraft.RedstoneEngine.stop, 'function', 'stop is a function');
    F.assertType(Donkeycraft.RedstoneEngine.markDirty, 'function', 'markDirty is a function');
    F.assertType(Donkeycraft.RedstoneEngine.markDirtyRange, 'function', 'markDirtyRange is a function');
    F.assertType(Donkeycraft.RedstoneEngine.getDirtyQueueLength, 'function', 'getDirtyQueueLength is a function');
    F.assertType(Donkeycraft.RedstoneEngine.clearDirtyQueue, 'function', 'clearDirtyQueue is a function');
    F.assertType(Donkeycraft.RedstoneEngine.getCurrentTick, 'function', 'getCurrentTick is a function');
    F.assertType(Donkeycraft.RedstoneEngine.isRunning, 'function', 'isRunning is a function');
    F.assertType(Donkeycraft.RedstoneEngine.destroy, 'function', 'destroy is a function');

    // ============================================================
    // Section 2: RedstoneEngine — Dirty Queue Operations
    // ============================================================
    F.section('2. RedstoneEngine — Dirty Queue');

    Donkeycraft.RedstoneEngine.clearDirtyQueue();
    F.assert(Donkeycraft.RedstoneEngine.getDirtyQueueLength() === 0, 'Initial dirty queue is empty');

    Donkeycraft.RedstoneEngine.markDirty(10, 64, 20);
    F.assert(Donkeycraft.RedstoneEngine.getDirtyQueueLength() === 1, 'After one markDirty, queue length = 1');

    // Mark same position again — should not duplicate
    Donkeycraft.RedstoneEngine.markDirty(10, 64, 20);
    F.assert(Donkeycraft.RedstoneEngine.getDirtyQueueLength() === 1, 'Duplicate markDirty does not increase queue length');

    // Mark different positions
    Donkeycraft.RedstoneEngine.markDirty(11, 64, 20);
    Donkeycraft.RedstoneEngine.markDirty(10, 65, 20);
    F.assert(Donkeycraft.RedstoneEngine.getDirtyQueueLength() === 3, 'After two more markDirty calls, queue length = 3');

    Donkeycraft.RedstoneEngine.clearDirtyQueue();
    F.assert(Donkeycraft.RedstoneEngine.getDirtyQueueLength() === 0, 'clearDirtyQueue empties the queue');

    // ============================================================
    // Section 3: RedstoneEngine — markDirtyRange
    // ============================================================
    F.section('3. RedstoneEngine — markDirtyRange');

    Donkeycraft.RedstoneEngine.clearDirtyQueue();
    Donkeycraft.RedstoneEngine.markDirtyRange(0, 0, 0, 2, 1, 2);
    var rangeLen = Donkeycraft.RedstoneEngine.getDirtyQueueLength();
    // Should be up to 3*2*3 = 18 entries (but deduplicated per chunk)
    F.assert(rangeLen > 0 && rangeLen <= 18, 'markDirtyRange adds correct number of entries: ' + rangeLen);

    // ============================================================
    // Section 4: RedstoneWiring — Namespace & Core
    // ============================================================
    F.section('4. RedstoneWiring — Namespace & Core');

    F.assert(typeof Donkeycraft.RedstoneWiring === 'object', 'RedstoneWiring namespace exists');
    F.assertType(Donkeycraft.RedstoneWiring.init, 'function', 'init is a function');
    F.assertType(Donkeycraft.RedstoneWiring.getSignalStrength, 'function', 'getSignalStrength is a function');
    F.assertType(Donkeycraft.RedstoneWiring.setSignalStrength, 'function', 'setSignalStrength is a function');
    F.assertType(Donkeycraft.RedstoneWiring.getWireBlockIds, 'function', 'getWireBlockIds is a function');
    F.assertType(Donkeycraft.RedstoneWiring.getMaxSignalDistance, 'function', 'getMaxSignalDistance is a function');
    F.assertType(Donkeycraft.RedstoneWiring.clearAllSignals, 'function', 'clearAllSignals is a function');
    F.assertType(Donkeycraft.RedstoneWiring.destroy, 'function', 'destroy is a function');

    var wireIds = Donkeycraft.RedstoneWiring.getWireBlockIds();
    F.assert(wireIds[173] === true, 'Redstone wire (ID 173) is in wire block IDs');
    F.assert(wireIds[229] === true, 'Redstone dust (ID 229) is in wire block IDs');

    var maxDist = Donkeycraft.RedstoneWiring.getMaxSignalDistance();
    F.assertEq(maxDist, 15, 'Max signal distance is 15');

    // ============================================================
    // Section 5: RedstoneWiring — Signal Strength Operations
    // ============================================================
    F.section('5. RedstoneWiring — Signal Strength');

    Donkeycraft.RedstoneWiring.clearAllSignals();

    // Signal strength at non-wire position should be 0
    var sig = Donkeycraft.RedstoneWiring.getSignalStrength(10, 64, 20);
    F.assertEq(sig, 0, 'Signal strength at non-wire position is 0');

    // ============================================================
    // Section 6: RedstoneRepeaterComparator — Namespace & Core
    // ============================================================
    F.section('6. RedstoneRepeaterComparator — Namespace & Core');

    F.assert(typeof Donkeycraft.RedstoneRepeaterComparator === 'object', 'RedstoneRepeaterComparator namespace exists');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.init, 'function', 'init is a function');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.setRepeaterDelay, 'function', 'setRepeaterDelay is a function');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.setComparatorMode, 'function', 'setComparatorMode is a function');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.lockRepeater, 'function', 'lockRepeater is a function');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.getRepeaterState, 'function', 'getRepeaterState is a function');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.getComparatorState, 'function', 'getComparatorState is a function');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.clearAllStates, 'function', 'clearAllStates is a function');
    F.assertType(Donkeycraft.RedstoneRepeaterComparator.destroy, 'function', 'destroy is a function');

    // ============================================================
    // Section 7: RedstoneRepeaterComparator — Repeater State
    // ============================================================
    F.section('7. RedstoneRepeaterComparator — Repeater State');

    Donkeycraft.RedstoneRepeaterComparator.clearAllStates();

    var state = Donkeycraft.RedstoneRepeaterComparator.getRepeaterState(10, 64, 20);
    F.assert(state === null, 'Non-existent repeater state is null');

    Donkeycraft.RedstoneRepeaterComparator.setRepeaterDelay(10, 64, 20, 2);
    var state2 = Donkeycraft.RedstoneRepeaterComparator.getRepeaterState(10, 64, 20);
    F.assert(state2 !== null, 'Repeater state exists after setRepeaterDelay');
    F.assertEq(state2.delay, 2, 'Repeater delay is correctly set to 2');

    // Test delay clamping (1-4)
    Donkeycraft.RedstoneRepeaterComparator.setRepeaterDelay(10, 64, 21, 0);
    var state3 = Donkeycraft.RedstoneRepeaterComparator.getRepeaterState(10, 64, 21);
    F.assertEq(state3.delay, 1, 'Delay clamped to minimum: 0 → 1');

    Donkeycraft.RedstoneRepeaterComparator.setRepeaterDelay(10, 64, 22, 10);
    var state4 = Donkeycraft.RedstoneRepeaterComparator.getRepeaterState(10, 64, 22);
    F.assertEq(state4.delay, 4, 'Delay clamped to maximum: 10 → 4');

    // ============================================================
    // Section 8: RedstoneRepeaterComparator — Comparator State
    // ============================================================
    F.section('8. RedstoneRepeaterComparator — Comparator Mode');

    Donkeycraft.RedstoneRepeaterComparator.clearAllStates();

    var cState = Donkeycraft.RedstoneRepeaterComparator.getComparatorState(10, 64, 20);
    F.assert(cState === null, 'Non-existent comparator state is null');

    Donkeycraft.RedstoneRepeaterComparator.setComparatorMode(10, 64, 20, 1);
    var cState2 = Donkeycraft.RedstoneRepeaterComparator.getComparatorState(10, 64, 20);
    F.assert(cState2 !== null, 'Comparator state exists after setComparatorMode');
    F.assertEq(cState2.mode, 1, 'Comparator mode is correctly set to 1 (difference)');

    // ============================================================
    // Section 9: RedstoneObservers — Namespace & Core
    // ============================================================
    F.section('9. RedstoneObservers — Namespace & Core');

    F.assert(typeof Donkeycraft.RedstoneObservers === 'object', 'RedstoneObservers namespace exists');
    F.assertType(Donkeycraft.RedstoneObservers.init, 'function', 'init is a function');
    F.assertType(Donkeycraft.RedstoneObservers.setObserverFacing, 'function', 'setObserverFacing is a function');
    F.assertType(Donkeycraft.RedstoneObservers.getObserverState, 'function', 'getObserverState is a function');
    F.assertType(Donkeycraft.RedstoneObservers.forceEmit, 'function', 'forceEmit is a function');
    F.assertType(Donkeycraft.RedstoneObservers.clearAllStates, 'function', 'clearAllStates is a function');
    F.assertType(Donkeycraft.RedstoneObservers.destroy, 'function', 'destroy is a function');

    // ============================================================
    // Section 10: RedstoneObservers — Observer State
    // ============================================================
    F.section('10. RedstoneObservers — Observer State');

    Donkeycraft.RedstoneObservers.clearAllStates();

    var oState = Donkeycraft.RedstoneObservers.getObserverState(10, 64, 20);
    F.assert(oState === null, 'Non-existent observer state is null');

    Donkeycraft.RedstoneObservers.setObserverFacing(10, 64, 20, 2);
    var oState2 = Donkeycraft.RedstoneObservers.getObserverState(10, 64, 20);
    F.assert(oState2 !== null, 'Observer state exists after setObserverFacing');
    F.assertEq(oState2.facing, 2, 'Observer facing is correctly set to 2 (north)');

    // ============================================================
    // Section 11: RedstonePistons — Namespace & Core
    // ============================================================
    F.section('11. RedstonePistons — Namespace & Core');

    F.assert(typeof Donkeycraft.RedstonePistons === 'object', 'RedstonePistons namespace exists');
    F.assertType(Donkeycraft.RedstonePistons.init, 'function', 'init is a function');
    F.assertType(Donkeycraft.RedstonePistons.getPistonState, 'function', 'getPistonState is a function');
    F.assertType(Donkeycraft.RedstonePistons.getMaxPushDistance, 'function', 'getMaxPushDistance is a function');
    F.assertType(Donkeycraft.RedstonePistons.isUnpushable, 'function', 'isUnpushable is a function');
    F.assertType(Donkeycraft.RedstonePistons.clearAllStates, 'function', 'clearAllStates is a function');
    F.assertType(Donkeycraft.RedstonePistons.destroy, 'function', 'destroy is a function');

    var maxPush = Donkeycraft.RedstonePistons.getMaxPushDistance();
    F.assertEq(maxPush, 12, 'Max push distance is 12');

    // ============================================================
    // Section 12: RedstonePistons — Unpushable Blocks
    // ============================================================
    F.section('12. RedstonePistons — Unpushable Blocks');

    F.assert(Donkeycraft.RedstonePistons.isUnpushable(0) === true, 'Air (ID 0) is unpushable');
    F.assert(Donkeycraft.RedstonePistons.isUnpushable(37) === true, 'Bedrock (ID 37) is unpushable');
    F.assert(Donkeycraft.RedstonePistons.isUnpushable(46) === true, 'Obsidian (ID 46) is unpushable');
    F.assert(Donkeycraft.RedstonePistons.isUnpushable(52) === true, 'Piston head (ID 52) is unpushable');
    F.assert(Donkeycraft.RedstonePistons.isUnpushable(1) === false, 'Stone (ID 1) is pushable');
    F.assert(Donkeycraft.RedstonePistons.isUnpushable(7) === false, 'Dirt (ID 7) is pushable');

    // ============================================================
    // Section 13: RedstoneTNT — Namespace & Core
    // ============================================================
    F.section('13. RedstoneTNT — Namespace & Core');

    F.assert(typeof Donkeycraft.RedstoneTNT === 'object', 'RedstoneTNT namespace exists');
    F.assertType(Donkeycraft.RedstoneTNT.init, 'function', 'init is a function');
    F.assertType(Donkeycraft.RedstoneTNT.getTNTState, 'function', 'getTNTState is a function');
    F.assertType(Donkeycraft.RedstoneTNT.getFuseTicks, 'function', 'getFuseTicks is a function');
    F.assertType(Donkeycraft.RedstoneTNT.getExplosionRadius, 'function', 'getExplosionRadius is a function');
    F.assertType(Donkeycraft.RedstoneTNT.getFuseDuration, 'function', 'getFuseDuration is a function');
    F.assertType(Donkeycraft.RedstoneTNT.clearAllStates, 'function', 'clearAllStates is a function');
    F.assertType(Donkeycraft.RedstoneTNT.destroy, 'function', 'destroy is a function');

    var expRadius = Donkeycraft.RedstoneTNT.getExplosionRadius();
    F.assertEq(expRadius, 8, 'Explosion radius is 8');

    var fuseDur = Donkeycraft.RedstoneTNT.getFuseDuration();
    F.assertEq(fuseDur, 40, 'Fuse duration is 40 ticks (2 seconds)');

    // ============================================================
    // Section 14: RedstoneTNT — TNT State
    // ============================================================
    F.section('14. RedstoneTNT — TNT State');

    Donkeycraft.RedstoneTNT.clearAllStates();

    var tState = Donkeycraft.RedstoneTNT.getTNTState(10, 64, 20);
    F.assert(tState === null, 'Non-existent TNT state is null');

    var fuse = Donkeycraft.RedstoneTNT.getFuseTicks(10, 64, 20);
    F.assertEq(fuse, 0, 'Non-lit TNT has 0 fuse ticks');

    // ============================================================
    // Section 15: Integration — System Interconnection
    // ============================================================
    F.section('15. Integration — System Interconnection');

    // Test that systems can be interconnected via the engine
    var fakeChunkManager = {
        getChunk: function(cx, cz) { return null; }
    };

    var fakeWiring = {
        getSignalStrength: function(x, y, z) { return 0; },
        setSignalStrength: function(x, y, z, s) {}
    };

    var fakePistons = {};
    var fakeTNT = {};

    Donkeycraft.RedstoneEngine.setChunkManager(fakeChunkManager);
    Donkeycraft.RedstoneEngine.setWiring(fakeWiring);
    Donkeycraft.RedstoneEngine.setPistons(fakePistons);
    Donkeycraft.RedstoneEngine.setTNT(fakeTNT);

    F.assert(true, 'All subsystems can be connected to RedstoneEngine');

    // Test EventBus connection
    var testBus = new Donkeycraft.EventBus();
    var eventFired = false;
    testBus.on('redstone:tick', function(tick, queueLen) {
        eventFired = true;
    });
    Donkeycraft.RedstoneEngine.setEventBus(testBus);
    F.assert(true, 'EventBus can be connected to RedstoneEngine');

    // ============================================================
    // Section 16: Integration — Destroy Methods
    // ============================================================
    F.section('16. Integration — Destroy Methods');

    // Test that destroy methods don't throw
    try {
        Donkeycraft.RedstoneEngine.destroy();
        F.assert(true, 'RedstoneEngine.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'RedstoneEngine.destroy() threw: ' + e.message);
    }

    try {
        Donkeycraft.RedstoneWiring.destroy();
        F.assert(true, 'RedstoneWiring.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'RedstoneWiring.destroy() threw: ' + e.message);
    }

    try {
        Donkeycraft.RedstoneRepeaterComparator.destroy();
        F.assert(true, 'RedstoneRepeaterComparator.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'RedstoneRepeaterComparator.destroy() threw: ' + e.message);
    }

    try {
        Donkeycraft.RedstoneObservers.destroy();
        F.assert(true, 'RedstoneObservers.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'RedstoneObservers.destroy() threw: ' + e.message);
    }

    try {
        Donkeycraft.RedstonePistons.destroy();
        F.assert(true, 'RedstonePistons.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'RedstonePistons.destroy() threw: ' + e.message);
    }

    try {
        Donkeycraft.RedstoneTNT.destroy();
        F.assert(true, 'RedstoneTNT.destroy() completes without error');
    } catch (e) {
        F.assert(false, 'RedstoneTNT.destroy() threw: ' + e.message);
    }

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
</body>
</html>
