<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Phase 2 WebGL Rendering Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 960px; margin: 0 auto; }
h1 { color: #00d4ff; font-size: 1.4em; margin-bottom: 8px; border-bottom: 2px solid #00d4ff; padding-bottom: 8px; }
.subtitle { color: #888; font-size: 0.85em; margin-bottom: 16px; }

.summary { margin: 20px 0; padding: 14px 18px; border-radius: 6px; font-size: 1em; }
.summary.pass { background: #0a3d0a; border-left: 4px solid #2ecc71; }
.summary.fail { background: #3d0a0a; border-left: 4px solid #e74c3c; }
#canvas-container { margin: 16px 0; padding: 12px; background: #0a0a0a; border-radius: 6px; text-align: center; }
canvas { border: 1px solid #333; max-width: 100%; }
</style>
</head>
<body>
<h1>Donkeycraft — Phase 2 WebGL Rendering Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Testing: GLContext, ShaderManager, GeometryBuilder, MeshOptimizer, ChunkMesh, TerrainRenderer, Camera, Fog, Sky, Lighting, HandRenderer, BreakParticles, GUIRenderer</div>
<div id="progress-bar"><span class="count" id="progress-count">Initializing...</span></div>
<div id="results"></div>
<div id="canvas-container">
    <canvas id="canvas" width="800" height="400"></canvas>
</div>
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<!-- Phase 2 Render modules -->
<script src="../src/render/gl-context.js"></script>
<script src="../src/render/shader-manager.js"></script>
<script src="../src/render/shaders/vertex-shaders.glsl"></script>
<script src="../src/render/shaders/fragment-shaders.glsl"></script>
<script src="../src/render/geometry-builder.js"></script>
<script src="../src/render/mesh-optimizer.js"></script>
<script src="../src/render/chunk-mesh.js"></script>
<script src="../src/render/terrain-renderer.js"></script>
<script src="../src/render/camera.js"></script>
<script src="../src/render/fog.js"></script>
<script src="../src/render/sky.js"></script>
<script src="../src/render/lighting.js"></script>
<script src="../src/render/hand-renderer.js"></script>
<script src="../src/render/break-particles.js"></script>
<script src="../src/render/gui-renderer.js"></script>

<script>
(function() {
    'use strict';

    var results = document.getElementById('results');
    var progressBar = document.getElementById('progress-bar');
    var progressCount = document.getElementById('progress-count');
    var canvas = document.getElementById('canvas');
    var totalTests = 0;
    var passedTests = 0;
    var failedTests = 0;
    var currentSection = null;
    var gl = null;
    var shaderMgr = null;

    // ============================================================
    // Suppress Logger.error to prevent console noise from Test 19
    // ============================================================
    if (typeof Donkeycraft !== 'undefined' && Donkeycraft.Logger) {
        var origError = Donkeycraft.Logger.error;
        Donkeycraft.Logger.error = function() { /* suppressed */ };
    }

    // ============================================================
    // Test Framework
    // ============================================================

    function updateProgress() {
        progressCount.textContent = passedTests + '/' + (passedTests + failedTests) + ' passed';
        progressBar.className = failedTests > 0 ? 'fail' : 'pass';
    }

    function section(name) {
        var div = document.createElement('div');
        div.className = 'section';
        var heading = document.createElement('h2');
        heading.textContent = name;
        div.appendChild(heading);
        results.appendChild(div);
        currentSection = div;
    }

    function assert(condition, message) {
        totalTests++;
        var div = document.createElement('div');
        if (condition) {
            passedTests++;
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Assertion failed.</div>';
        }
        currentSection.appendChild(div);
        updateProgress();
    }

    function assertEq(actual, expected, message) {
        totalTests++;
        if (actual === expected) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual) + '</div>';
        }
        currentSection.appendChild(div);
        updateProgress();
    }

    function assertNear(actual, expected, epsilon, message) {
        totalTests++;
        if (Math.abs(actual - expected) < epsilon) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ~' + expected + ', got ' + actual + ' (delta=' + Math.abs(actual - expected) + ', epsilon=' + epsilon + ')</div>';
        }
        currentSection.appendChild(div);
        updateProgress();
    }

    function assertType(val, type, message) {
        totalTests++;
        if (typeof val === type) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected type "' + type + '", got "' + typeof val + '"</div>';
        }
        currentSection.appendChild(div);
        updateProgress();
    }

    function assertArrEq(actual, expected, message) {
        totalTests++;
        if (actual.length !== expected.length) {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Length mismatch: ' + actual.length + ' vs ' + expected.length + '</div>';
            currentSection.appendChild(div);
            updateProgress();
            return;
        }
        for (var i = 0; i < actual.length; i++) {
            if (actual[i] !== expected[i]) {
                failedTests++;
                var div3 = document.createElement('div');
                div3.className = 'test fail';
                div3.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Index ' + i + ': expected ' + expected[i] + ', got ' + actual[i] + '</div>';
                currentSection.appendChild(div3);
                updateProgress();
                return;
            }
        }
        passedTests++;
        var div2 = document.createElement('div');
        div2.className = 'test pass';
        div2.textContent = '\u2713 PASS: ' + message;
        currentSection.appendChild(div2);
        updateProgress();
    }

    function info(msg) {
        var div = document.createElement('div');
        div.className = 'info-msg';
        div.textContent = '>> ' + msg;
        currentSection.appendChild(div);
    }

    function finishTests() {
        var summary = document.createElement('div');
        if (failedTests === 0) {
            summary.className = 'summary pass';
            summary.innerHTML = '<strong>ALL TESTS PASSED</strong> — ' + passedTests + '/' + totalTests;
        } else {
            summary.className = 'summary fail';
            summary.innerHTML = '<strong>TESTS FAILED</strong> — ' + passedTests + '/' + totalTests + ' passed, ' + failedTests + ' failed';
        }
        results.appendChild(summary);

        // Also output to console for developer tools inspection
        console.log('=== Phase 2 Test Results ===');
        console.log('Total: ' + totalTests + ', Passed: ' + passedTests + ', Failed: ' + failedTests);
    }

    // ============================================================
    // HELPER: Create shader programs needed by Phase 2 classes
    // ============================================================

    function createTerrainShaderProgram() {
        // Matches src/render/shaders/vertex-shaders.glsl TERRAIN_VERTEX_SHADER
        // and src/render/shaders/fragment-shaders.glsl TERRAIN_FRAGMENT_SHADER
        var vertSrc = [
            'attribute vec3 aPosition;',
            'attribute vec2 aUV;',
            'attribute vec3 aNormal;',
            'attribute float aLight;',
            'uniform mat4 uProjection;',
            'uniform mat4 uView;',
            'uniform mat4 uModel;',
            'uniform float uSunIntensity;',
            'uniform float uAmbient;',
            'uniform vec3 uSkyColor;',
            'uniform vec3 uSunDirection;',
            'varying vec2 vUV;',
            'varying vec3 vNormal;',
            'varying float vLight;',
            'varying float vDepth;',
            'void main() {',
            '    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);',
            '    vUV = aUV;',
            '    vNormal = mat3(uModel) * aNormal;',
            '    vNormal = normalize(vNormal);',
            '    float sunDot = max(dot(normalize(uSunDirection), vNormal), 0.0);',
            '    vLight = uAmbient + aLight * uSunIntensity * sunDot;',
            '    // Use sky color to prevent WebGL stripping',
            '    vLight += length(uSkyColor) * 0.01;',
            '    vec4 viewPos = uView * uModel * vec4(aPosition, 1.0);',
            '    vDepth = -viewPos.z;',
            '}'
        ].join('\n');

        var fragSrc = [
            'precision mediump float;',
            'varying vec2 vUV;',
            'varying vec3 vNormal;',
            'varying float vLight;',
            'varying float vDepth;',
            'uniform sampler2D uTexture;',
            'uniform vec3 uFogColor;',
            'uniform float uFogDensity;',
            'void main() {',
            '    vec4 texColor = texture2D(uTexture, vUV);',
            '    vec3 finalColor = texColor.rgb * vLight;',
            '    if (texColor.a < 0.5) discard;',
            '    float fogDist = vDepth;',
            '    float fogFactor = 1.0 - exp(-fogDist * uFogDensity);',
            '    fogFactor = clamp(fogFactor, 0.0, 1.0);',
            '    finalColor = mix(finalColor, uFogColor, fogFactor);',
            '    gl_FragColor = vec4(finalColor, texColor.a);',
            '}'
        ].join('\n');

        return shaderMgr.createProgram('terrain', vertSrc, fragSrc);
    }

    function createGuiShaderProgram() {
        var vertSrc = [
            'attribute vec3 aPosition;',
            'attribute vec2 aUV;',
            'attribute vec4 aColor;',
            'uniform mat4 uProjection;',
            'uniform mat4 uView;',
            'uniform mat4 uModel;',
            'varying vec2 vUV;',
            'varying vec4 vColor;',
            'void main() {',
            '    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);',
            '    vUV = aUV;',
            '    vColor = aColor;',
            '}'
        ].join('\n');

        var fragSrc = [
            'precision mediump float;',
            'varying vec2 vUV;',
            'varying vec4 vColor;',
            'void main() {',
            '    gl_FragColor = vColor;',
            '}'
        ].join('\n');

        return shaderMgr.createProgram('gui', vertSrc, fragSrc);
    }

    function createColoredShaderProgram() {
        // Simple colored shader with no texture dependency — renders a solid color
        // IMPORTANT: Must declare ALL vertex attributes that ChunkMesh.draw() binds
        // (aPosition, aUV, aNormal, aLight) with the same types/strides as the terrain shader.
        var vertSrc = [
            'attribute vec3 aPosition;',
            'attribute vec2 aUV;',
            'attribute vec3 aNormal;',
            'attribute float aLight;',
            'uniform mat4 uProjection;',
            'uniform mat4 uView;',
            'uniform mat4 uModel;',
            'void main() {',
            '    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);',
            '}'
        ].join('\n');

        var fragSrc = [
            'precision mediump float;',
            'uniform vec3 uColor;',
            'void main() {',
            '    gl_FragColor = vec4(uColor, 1.0);',
            '}'
        ].join('\n');

        return shaderMgr.createProgram('colored', vertSrc, fragSrc);
    }

    function createSkyShaderProgram() {
        var vertSrc = [
            'attribute vec3 aPosition;',
            'attribute vec2 aUV;',
            'uniform mat4 uProjection;',
            'uniform mat4 uView;',
            'varying vec2 vUV;',
            'varying vec3 vWorldPos;',
            'void main() {',
            '    mat4 skyView = uView;',
            '    skyView[3] = vec4(0.0, 0.0, 0.0, 1.0);',
            '    gl_Position = uProjection * skyView * vec4(aPosition, 1.0);',
            '    vUV = aUV;',
            '    vWorldPos = aPosition;',
            '}'
        ].join('\n');

        var fragSrc = [
            'precision mediump float;',
            'varying vec2 vUV;',
            'varying vec3 vWorldPos;',
            'uniform vec3 uTopColor;',
            'uniform vec3 uBottomColor;',
            'uniform float uHorizon;',
            'void main() {',
            '    float t = clamp(vWorldPos.y / 400.0, 0.0, 1.0);',
            '    vec3 color = mix(uBottomColor, uTopColor, pow(t, uHorizon));',
            '    gl_FragColor = vec4(color, 1.0);',
            '}'
        ].join('\n');

        return shaderMgr.createProgram('sky', vertSrc, fragSrc);
    }

    // ============================================================
    // TEST 1: Namespace and class registration
    // ============================================================
    section('1. Namespace & Class Registration');

    assert(typeof Donkeycraft !== 'undefined', 'Donkeycraft namespace exists');
    assert(typeof Donkeycraft.GLContext === 'function', 'Donkeycraft.GLContext registered');
    assert(typeof Donkeycraft.ShaderManager === 'function', 'Donkeycraft.ShaderManager registered');
    assert(typeof Donkeycraft.GeometryBuilder === 'function', 'Donkeycraft.GeometryBuilder registered');
    assert(typeof Donkeycraft.MeshOptimizer === 'function', 'Donkeycraft.MeshOptimizer registered');
    assert(typeof Donkeycraft.ChunkMesh === 'function', 'Donkeycraft.ChunkMesh registered');
    assert(typeof Donkeycraft.TerrainRenderer === 'function', 'Donkeycraft.TerrainRenderer registered');
    assert(typeof Donkeycraft.Camera === 'function', 'Donkeycraft.Camera registered');
    assert(typeof Donkeycraft.Fog === 'function', 'Donkeycraft.Fog registered');
    assert(typeof Donkeycraft.Sky === 'function', 'Donkeycraft.Sky registered');
    assert(typeof Donkeycraft.Lighting === 'function', 'Donkeycraft.Lighting registered');
    assert(typeof Donkeycraft.HandRenderer === 'function', 'Donkeycraft.HandRenderer registered');
    assert(typeof Donkeycraft.BreakParticles === 'function', 'Donkeycraft.BreakParticles registered');
    assert(typeof Donkeycraft.GUIRenderer === 'function', 'Donkeycraft.GUIRenderer registered');

    // ============================================================
    // TEST 2: GLContext — WebGL context creation
    // ============================================================
    section('2. GLContext (gl-context.js)');

    var glCtx = new Donkeycraft.GLContext(canvas);
    assert(glCtx !== null, 'GLContext instance created');
    assert(glCtx.isValid() === true, 'GLContext is valid');

    gl = glCtx.getGL();
    assert(gl instanceof WebGLRenderingContext, 'WebGLRenderingContext obtained via getGL()');

    assert(typeof glCtx.getMaxTextureSize() === 'number', 'getMaxTextureSize returns number');
    assert(glCtx.getMaxTextureSize() > 0, 'getMaxTextureSize returns positive value (got ' + glCtx.getMaxTextureSize() + ')');

    assert(typeof glCtx.getMaxVertexUniforms() === 'number', 'getMaxVertexUniforms returns number');
    assert(glCtx.getMaxVertexUniforms() > 0, 'getMaxVertexUniforms returns positive value (got ' + glCtx.getMaxVertexUniforms() + ')');

    assert(typeof glCtx.isExtensionSupported() === 'boolean', 'isExtensionSupported returns boolean');
    assert(typeof glCtx.isExtensionSupported('OES_standard_derivatives') === 'boolean', 'isExtensionSupported works with name arg');

    var caps = glCtx.getCapabilities();
    assertType(caps, 'object', 'getCapabilities returns object');
    assert(typeof caps.maxTextureSize === 'number', 'capabilities include maxTextureSize');
    assert(typeof caps.renderer === 'string', 'capabilities include renderer string');

    glCtx.setViewport(800, 400);
    assert(true, 'setViewport executed without error');

    // ============================================================
    // TEST 3: ShaderManager — shader compilation and program creation
    // ============================================================
    section('3. ShaderManager (shader-manager.js)');

    shaderMgr = new Donkeycraft.ShaderManager(gl);
    assert(shaderMgr !== null, 'ShaderManager instance created');
    assertType(shaderMgr.getStats(), 'object', 'getStats returns object');
    assertEq(shaderMgr.getStats().shaders, 0, 'Initial shader count is 0');
    assertEq(shaderMgr.getStats().programs, 0, 'Initial program count is 0');

    // Test individual shader compilation
    var simpleVert = shaderMgr.compileShader(
        'attribute vec3 aPos;\nvoid main(){gl_Position=vec4(aPos,1.0);}',
        'vertex'
    );
    assert(simpleVert !== null, 'Vertex shader compiled successfully');

    var simpleFrag = shaderMgr.compileShader(
        'precision mediump float;\nvoid main(){gl_FragColor=vec4(1.0,0.0,0.0,1.0);}',
        'fragment'
    );
    assert(simpleFrag !== null, 'Fragment shader compiled successfully');

    // Test program linking
    var prog = shaderMgr.linkProgram(simpleVert, simpleFrag);
    assert(prog !== null, 'Shader program linked successfully');
    assert(shaderMgr.getStats().programs >= 1, 'Program count incremented after link');

    // Test createProgram (convenience method)
    var testProg = shaderMgr.createProgram('test-simple',
        'attribute vec3 aPosition;\nvoid main(){gl_Position=vec4(aPosition,1.0);}',
        'precision mediump float;\nvoid main(){gl_FragColor=vec4(1.0,0.0,0.0,1.0);}'
    );
    assert(testProg !== null, 'createProgram created program successfully');

    // Test use() method
    var useResult = shaderMgr.use('test-simple');
    assert(useResult === true, 'use() returns true for existing program');

    var useResult2 = shaderMgr.use('nonexistent');
    assert(useResult2 === false, 'use() returns false for nonexistent program');

    // Test getProgram
    var retrievedProg = shaderMgr.getProgram('test-simple');
    assert(retrievedProg !== null, 'getProgram retrieves existing program');

    // ============================================================
    // TEST 4: Create all required shader programs for renderers
    // ============================================================
    section('4. Required Shader Programs for Renderers');

    var terrainProg = createTerrainShaderProgram();
    assert(terrainProg !== null, 'Terrain shader program created');

    var guiProg = createGuiShaderProgram();
    assert(guiProg !== null, 'GUI shader program created');

    var skyProg = createSkyShaderProgram();
    assert(skyProg !== null, 'Sky shader program created');

    // Verify all programs can be used
    assert(shaderMgr.use('terrain') === true, 'Terrain shader can be activated');
    assert(shaderMgr.use('gui') === true, 'GUI shader can be activated');
    assert(shaderMgr.use('sky') === true, 'Sky shader can be activated');

    // ============================================================
    // TEST 5: ShaderManager — uniform setting methods
    // ============================================================
    section('5. ShaderManager — Uniform Methods');

    // Create a test shader that has all the uniform types we need to test.
    // IMPORTANT: WebGL strips unused uniforms, so every uniform must be used in main().
    // Test shader that exercises all uniform-setting methods.
    // Avoids vec4 uniforms to prevent precision-conflict with ShaderManager's
    // auto-inserted "precision mediump float;" in fragment shaders.
    var testUniformVert = [
        'attribute vec3 aPosition;',
        'uniform float uTest;',
        'uniform vec2 uTest2;',
        'uniform vec3 uTest4r;',
        'uniform vec3 uTest4b;',
        'uniform mat4 uTestMat;',
        'uniform int uIntTest;',
        'varying vec2 vTest2;',
        'varying vec3 vTest4r;',
        'varying vec3 vTest4b;',
        'varying float vTest;',
        'void main() {',
        '    vTest = uTest;',
        '    vTest2 = uTest2;',
        '    vTest4r = uTest4r;',
        '    vTest4b = uTest4b;',
        '    gl_Position = uTestMat * vec4(aPosition, 1.0);',
        '}'
    ].join('\n');

    var testUniformFrag = [
        'precision mediump float;',
        'varying float vTest;',
        'varying vec2 vTest2;',
        'varying vec3 vTest4r;',
        'varying vec3 vTest4b;',
        'uniform vec3 uTest3;',
        'uniform sampler2D uTex;',
        'uniform int uIntTest;',
        'void main() {',
        '    float t = vTest + uTest3.x + uTest3.y + uTest3.z;',
        '    vec2 uv = vTest2 * (vTest4r.xy / vTest4b.x);',
        '    vec4 col = texture2D(uTex, uv);',
        '    int i = uIntTest;',
        '    if (i < 0) col.rgb = vec3(0.0);',
        '    gl_FragColor = vec4(t, vTest2.x, vTest4r.x, col.a);',
        '}'
    ].join('\n');

    shaderMgr.createProgram('test-uniforms', testUniformVert, testUniformFrag);
    assert(shaderMgr.use('test-uniforms') === true, 'Test uniforms shader activated');

    // Test setFloat
    var floatResult = shaderMgr.setFloat('uTest', 0.5);
    assert(floatResult === true, 'setFloat works with existing uniform');

    // Test setVec2
    var vec2Result = shaderMgr.setVec2('uTest2', 0.3, 0.7);
    assert(vec2Result === true, 'setVec2 works with existing uniform');

    // Test setVec3
    var vec3Result = shaderMgr.setVec3('uTest3', 0.1, 0.2, 0.3);
    assert(vec3Result === true, 'setVec3 works with existing uniform');

    // Test setVec4 (use two vec3 uniforms to replace vec4 due to WebGL precision quirks)
    var vec4Result = shaderMgr.setVec3('uTest4r', 0.1, 0.2, 0.3);
    assert(vec4Result === true, 'setVec3 works for uTest4r (vec4 substitute)');

    var vec4bResult = shaderMgr.setVec3('uTest4b', 1.0, 1.0, 1.0);
    assert(vec4bResult === true, 'setVec3 works for uTest4b (vec4 substitute)');

    // Test setMat4
    var identityMat = Donkeycraft.Matrix4.createIdentity();
    var mat4Result = shaderMgr.setMat4('uTestMat', identityMat);
    assert(mat4Result === true, 'setMat4 works with identity matrix');

    // Test setSampler
    var samplerResult = shaderMgr.setSampler('uTex', 0);
    assert(samplerResult === true, 'setSampler works');

    // Test setInt
    var intResult = shaderMgr.setInt('uIntTest', 5);
    assert(intResult === true, 'setInt works');

    // Test uniform location caching with terrain program
    shaderMgr.use('terrain');
    var terrainMatResult = shaderMgr.setMat4('uProjection', identityMat);
    assert(terrainMatResult === true, 'setMat4 works on terrain shader');

    var terrainVec3Result = shaderMgr.setVec3('uFogColor', 0.5, 0.6, 0.7);
    assert(terrainVec3Result === true, 'setVec3 works for uFogColor on terrain shader');

    var terrainFloatResult = shaderMgr.setFloat('uFogDensity', 0.015);
    assert(terrainFloatResult === true, 'setFloat works for uFogDensity on terrain shader');

    // ============================================================
    // TEST 6: GeometryBuilder — quad and cube generation
    // ============================================================
    section('6. GeometryBuilder (geometry-builder.js)');

    var geoBuilder = new Donkeycraft.GeometryBuilder();
    assert(geoBuilder !== null, 'GeometryBuilder instance created');

    assert(geoBuilder.isTransparent(0) === true, 'Air block (ID 0) is transparent');
    assert(geoBuilder.isTransparent(1) === false, 'Stone block (ID 1) is not transparent');
    assert(geoBuilder.isTransparent(9) === true, 'Water block (ID 9) is transparent');

    var quad = geoBuilder.buildQuad(2.0, 0.0);
    assert(quad !== null, 'Quad geometry generated');
    assert(quad.vertexCount === 4, 'Quad has 4 vertices');
    assert(quad.indexCount === 6, 'Quad has 6 indices');
    assert(quad.vertices instanceof Float32Array, 'Quad vertices are Float32Array');

    // TEST 17: WebGL — render a simple colored quad (with pixel validation)
    // ============================================================
    section('17. WebGL — Render Quad Visual Test');

    gl.viewport(0, 0, canvas.width || 800, canvas.height || 400);
    gl.clearColor(0.1, 0.1, 0.2, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    // Disable depth test so quad always draws regardless of depth position
    gl.disable(gl.DEPTH_TEST);

    // Use the colored shader (no texture dependency)
    var coloredProg = createColoredShaderProgram();
    assert(coloredProg !== null, 'Colored shader program created');
    shaderMgr.use('colored');

    // Verify attribute locations are valid for this shader
    var aPosLoc = shaderMgr.getAttribute('aPosition');
    assert(aPosLoc >= 0, 'aPosition attribute location is valid (got ' + aPosLoc + ')');

    // Set up camera at origin looking down -Z
    var camera2 = new Donkeycraft.Camera(70, 0.1, 1000);
    camera2.setPosition(0, 0, 0);
    camera2.setRotation(0, 0);
    var mats = camera2.getMatrices();
    shaderMgr.setMat4('uProjection', mats.projection);
    shaderMgr.setMat4('uView', mats.view);

    // Model matrix: rotate quad to face camera (XY plane), translate to z=-3, scale by 2.
    // buildQuad creates a quad in the XZ plane (facing up). We rotate -90° around X to make it face -Z.
    // Order: translate * rotate * scale (applied right-to-left to vertices)
    var scaleMat = Donkeycraft.Matrix4.createScale(2, 2, 2);
    var rotateMat = Donkeycraft.Matrix4.createRotation(-Math.PI / 2, [1, 0, 0]);
    var translateMat = Donkeycraft.Matrix4.createTranslation(0, 0, -3);
    var temp = Donkeycraft.Matrix4.multiply(rotateMat, scaleMat);
    var modelMat = Donkeycraft.Matrix4.multiply(translateMat, temp);
    shaderMgr.setMat4('uModel', modelMat);
    shaderMgr.setVec3('uColor', 0.2, 0.8, 0.4);

    // Upload quad geometry to GPU and draw
    chunkMesh = new Donkeycraft.ChunkMesh(gl, shaderMgr);
    var testQuad = geoBuilder.buildQuad(1.0, 0.0);
    chunkMesh.update(testQuad);
    chunkMesh.uploadBuffers();

    var drawResult2 = chunkMesh.draw();
    assert(drawResult2 === true, 'Colored quad draw() returned true');

    err = gl.getError();
    assert(err === gl.NO_ERROR, 'No WebGL errors after rendering colored quad');

    // Render to an offscreen FBO so readPixels works reliably on all browsers.
    var fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);

    var rb = gl.createRenderbuffer();
    gl.bindRenderbuffer(gl.RENDERBUFFER, rb);
    gl.renderbufferStorage(gl.RENDERBUFFER, gl.RGBA4, canvas.width || 800, canvas.height || 400);
    gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.RENDERBUFFER, rb);

    // Re-render the quad into the FBO
    gl.viewport(0, 0, canvas.width || 800, canvas.height || 400);
    gl.clearColor(0.1, 0.1, 0.2, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    // Re-apply uniforms for the FBO render (shader state may have changed)
    shaderMgr.use('colored');
    shaderMgr.setMat4('uProjection', mats.projection);
    shaderMgr.setMat4('uView', mats.view);
    shaderMgr.setMat4('uModel', modelMat);
    shaderMgr.setVec3('uColor', 0.2, 0.8, 0.4);

    chunkMesh.draw();

    // Check for errors after FBO render
    var fboErr = gl.getError();
    assert(fboErr === gl.NO_ERROR, 'No WebGL errors during FBO render');

    // Read pixels from the FBO (bound framebuffer)
    var pixelData = [];
    var foundGreen = false;
    var cx = Math.floor((canvas.width || 800) / 2);
    var cy = Math.floor((canvas.height || 400) / 2);
    for (var py = -2; py <= 2; py++) {
        for (var px2 = -2; px2 <= 2; px2++) {
            var pxArr = new Uint8Array(4);
            gl.readPixels(cx + px2, cy + py, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pxArr);
            pixelData.push({ x: cx + px2, y: cy + py, r: pxArr[0], g: pxArr[1], b: pxArr[2], a: pxArr[3] });
            if (pxArr[1] > 128) { foundGreen = true; }
        }
    }
    // Report actual pixel values for debugging
    var bestPixel = pixelData.reduce(function(a, b) { return (b.g > a.g) ? b : a; });
    assert(foundGreen, 'Center pixel is green (best pixel R=' + bestPixel.r + ', G=' + bestPixel.g + ', B=' + bestPixel.b + ') — quad actually rendered via FBO, not clear color');

    // Clean up FBO resources and mesh
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.deleteFramebuffer(fbo);
    gl.deleteRenderbuffer(rb);
    chunkMesh.destroy();

    // Use colored shader for visual integration test (no texture dependency)
    shaderMgr.use('colored');

    // Verify attribute locations are valid for this shader
    var aPosLoc2 = shaderMgr.getAttribute('aPosition');
    assert(aPosLoc2 >= 0, 'Integration: aPosition attribute location is valid (got ' + aPosLoc2 + ')');

    // Set up camera at origin looking down -Z
    var intMats2 = intCamera.getMatrices();
    shaderMgr.setMat4('uProjection', intMats2.projection);
    shaderMgr.setMat4('uView', intMats2.view);

    // Model matrix: rotate quad to face camera (XY plane), translate to z=-3, scale by 2.
    // buildQuad creates a quad in the XZ plane (facing up). We rotate -90° around X to make it face -Z.
    var intScaleMat = Donkeycraft.Matrix4.createScale(2, 2, 2);
    var intRotateMat = Donkeycraft.Matrix4.createRotation(-Math.PI / 2, [1, 0, 0]);
    var intTranslateMat = Donkeycraft.Matrix4.createTranslation(0, 0, -3);
    var intTemp = Donkeycraft.Matrix4.multiply(intRotateMat, intScaleMat);
    var intModelMat = Donkeycraft.Matrix4.multiply(intTranslateMat, intTemp);
    shaderMgr.setMat4('uModel', intModelMat);
    shaderMgr.setVec3('uColor', 0.9, 0.3, 0.2);

    // Build a quad geometry for integration test
    var intGeo = geoBuilder.buildQuad(1.0, 0.0);

    assert(intGeo.vertexCount > 0, 'Integration quad has geometry');
    assert(intGeo.indices instanceof Uint16Array, 'Integration geometry uses Uint16 indices');

    // Upload and draw the quad
    var intMesh = new Donkeycraft.ChunkMesh(gl, shaderMgr);
    intMesh.update(intGeo);
    intMesh.uploadBuffers();

    var intDrawResult = intMesh.draw();
    assert(intDrawResult === true, 'Integration colored quad draw() returned true');

    err = gl.getError();
    assert(err === gl.NO_ERROR, 'No WebGL errors in integration test');

    // Render to an offscreen FBO so readPixels works reliably on all browsers.
    var fbo2 = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo2);

    var rb2 = gl.createRenderbuffer();
    gl.bindRenderbuffer(gl.RENDERBUFFER, rb2);
    gl.renderbufferStorage(gl.RENDERBUFFER, gl.RGBA4, canvas.width || 800, canvas.height || 400);
    gl.framebufferRenderbuffer(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.RENDERBUFFER, rb2);

    // Re-render the quad into the FBO
    gl.viewport(0, 0, canvas.width || 800, canvas.height || 400);
    gl.clearColor(0.1, 0.1, 0.2, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    // Re-apply uniforms for the FBO render (shader state may have changed)
    shaderMgr.use('colored');
    shaderMgr.setMat4('uProjection', intMats2.projection);
    shaderMgr.setMat4('uView', intMats2.view);
    shaderMgr.setMat4('uModel', intModelMat);
    shaderMgr.setVec3('uColor', 0.9, 0.3, 0.2);

    intMesh.draw();

    // Check for errors after FBO render
    var fboErr2 = gl.getError();
    assert(fboErr2 === gl.NO_ERROR, 'No WebGL errors during integration FBO render');

    // Read pixels from the FBO (bound framebuffer)
    var pixelData2 = [];
    var foundRed = false;
    var cx2 = Math.floor((canvas.width || 800) / 2);
    var cy2 = Math.floor((canvas.height || 400) / 2);
    for (var py2 = -2; py2 <= 2; py2++) {
        for (var px3 = -2; px3 <= 2; px3++) {
            var pxArr2 = new Uint8Array(4);
            gl.readPixels(cx2 + px3, cy2 + py2, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, pxArr2);
            pixelData2.push({ x: cx2 + px3, y: cy2 + py2, r: pxArr2[0], g: pxArr2[1], b: pxArr2[2], a: pxArr2[3] });
            if (pxArr2[0] > 128) { foundRed = true; }
        }
    }
    var bestPixel2 = pixelData2.reduce(function(a, b) { return (b.r > a.r) ? b : a; });
    assert(foundRed, 'Integration center pixel is red (best pixel R=' + bestPixel2.r + ', G=' + bestPixel2.g + ', B=' + bestPixel2.b + ') — quad actually rendered via FBO, not clear color');

    // Clean up FBO resources
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.deleteFramebuffer(fbo2);
    gl.deleteRenderbuffer(rb2);

    // Test sky rendering pipeline with actual sky geometry
    shaderMgr.use('sky');
    var skyMats = intCamera.getMatrices();
    shaderMgr.setMat4('uProjection', skyMats.projection);
    shaderMgr.setMat4('uView', skyMats.view);
    var skyCol = intLighting.getSkyColor();
    shaderMgr.setVec3('uTopColor', skyCol.r, skyCol.g, skyCol.b);
    shaderMgr.setVec3('uBottomColor', skyCol.r * 0.8, skyCol.g * 0.8, skyCol.b * 0.8);
    shaderMgr.setFloat('uHorizon', 0.1);
    assert(true, 'Sky shader uniforms set without error');

    // Test GUI rendering pipeline
    shaderMgr.use('gui');
    var aspect = 800 / 600;
    var orthoMat = Donkeycraft.Matrix4.createOrthographic(-aspect, aspect, -1, 1, -1, 1);
    shaderMgr.setMat4('uProjection', orthoMat);
    shaderMgr.setMat4('uView', Donkeycraft.Matrix4.createIdentity());
    assert(true, 'GUI shader uniforms set without error');

    // Clean up integration test resources (Camera and Fog have no destroy methods)
    intMesh.destroy();
    intCamera = null;
    intFog2 = null;

    // ============================================================
    // TEST 21: GLSL Shader Files — compile shaders from actual .glsl files
    // ============================================================
    section('21. GLSL Shader Files (vertex-shaders.glsl, fragment-shaders.glsl)');

    // Verify that the GLSL shader variables are defined by the loaded files
    assert(typeof TERRAIN_VERTEX_SHADER === 'string', 'TERRAIN_VERTEX_SHADER variable defined from vertex-shaders.glsl');
    assert(typeof TERRAIN_FRAGMENT_SHADER === 'string', 'TERRAIN_FRAGMENT_SHADER variable defined from fragment-shaders.glsl');
    assert(typeof BREAK_VERTEX_SHADER === 'string', 'BREAK_VERTEX_SHADER variable defined from vertex-shaders.glsl');
    assert(typeof GUI_VERTEX_SHADER === 'string', 'GUI_VERTEX_SHADER variable defined from vertex-shaders.glsl');
    assert(typeof SKY_VERTEX_SHADER === 'string', 'SKY_VERTEX_SHADER variable defined from vertex-shaders.glsl');
    assert(typeof SKY_FRAGMENT_SHADER === 'string', 'SKY_FRAGMENT_SHADER variable defined from fragment-shaders.glsl');
    assert(typeof GUI_FRAGMENT_SHADER === 'string', 'GUI_FRAGMENT_SHADER variable defined from fragment-shaders.glsl');
    assert(typeof HAND_VERTEX_SHADER === 'string', 'HAND_VERTEX_SHADER variable defined from vertex-shaders.glsl');
    assert(typeof HAND_FRAGMENT_SHADER === 'string', 'HAND_FRAGMENT_SHADER variable defined from fragment-shaders.glsl');
    assert(typeof PARTICLE_FRAGMENT_SHADER === 'string', 'PARTICLE_FRAGMENT_SHADER variable defined from fragment-shaders.glsl');

    // Compile and link a program using the actual GLSL shader strings
    var glslTerrainProg = shaderMgr.createProgram('glsl-terrain-test', TERRAIN_VERTEX_SHADER, TERRAIN_FRAGMENT_SHADER);
    assert(glslTerrainProg !== null, 'Terrain shader compiled from actual GLSL file source');

    // Verify it can be used
    assert(shaderMgr.use('glsl-terrain-test') === true, 'GLSL terrain program can be activated');

    // Test break particles shader compilation
    var glslParticleProg = shaderMgr.createProgram('glsl-particle-test', BREAK_VERTEX_SHADER, PARTICLE_FRAGMENT_SHADER);
    assert(glslParticleProg !== null, 'Break particle shader compiled from actual GLSL file source');

    // Test sky shader compilation
    var glslSkyProg = shaderMgr.createProgram('glsl-sky-test', SKY_VERTEX_SHADER, SKY_FRAGMENT_SHADER);
    assert(glslSkyProg !== null, 'Sky shader compiled from actual GLSL file source');

    // ============================================================
    // TEST 22: Uint32 Index Buffer Support — OES_element_index_uint
    // ============================================================
    section('22. Uint32 Index Buffer Support (chunk-mesh.js)');

    var chunkMeshUint32 = new Donkeycraft.ChunkMesh(gl, shaderMgr);
    assert(chunkMeshUint32._supportsUint32Indices === true, 'Uint32 index support detected via OES_element_index_uint extension');

    // Verify that chunk geometry uses Uint32 indices for large worlds
    assert(chunkGeo.indices instanceof Uint32Array, 'Chunk geometry indices are Uint32Array');
    assert(chunkGeo.useUint32 === true, 'Chunk geometry flags useUint32 as true');

    // Test that ChunkMesh properly reports when Uint32 is unsupported
    var chunkMeshSmall = new Donkeycraft.ChunkMesh(gl, shaderMgr);
    var smallQuad = geoBuilder.buildQuad(1.0, 0.0);
    chunkMeshSmall.update(smallQuad);
    assert(chunkMeshSmall._geometryUsesUint32 === false, 'Small geometry (quad) does not use Uint32');

    // Test that ChunkMesh.draw() returns false when geometry needs Uint32 but extension unavailable
    // We can't easily disable the extension, so we verify the check exists
    assert(typeof chunkMeshUint32._supportsUint32Indices === 'boolean', '_supportsUint32Indices is a boolean');

    chunkMeshUint32.destroy();
    chunkMeshSmall.destroy();

    // ============================================================
    // TEST 23: Frustum Culling — extract planes and box test
    // ============================================================
    section('23. Frustum Culling (terrain-renderer.js)');

    var terrain2 = new Donkeycraft.TerrainRenderer(gl, shaderMgr, fog);
    assert(terrain2 !== null, 'TerrainRenderer instance for frustum test');

    // Verify _isBoxInFrustum returns true when no frustum planes extracted (fallback: visible)
    var boxVisible = terrain2._isBoxInFrustum(0, 0, 0, 16, 256, 16);
    assert(boxVisible === true, 'Box is visible when no frustum planes extracted');

    // Set world data so _extractFrustumPlanes has matrix data to work with
    terrain2.setWorldData(function(x, y, z) { return (y < 128) ? 1 : 0; });

    // Verify frustum plane extraction method exists
    assert(typeof terrain2._extractFrustumPlanes === 'function', '_extractFrustumPlanes method exists');
    assert(typeof terrain2._isBoxInFrustum === 'function', '_isBoxInFrustum method exists');
    assert(typeof terrain2._extractPlane === 'function', '_extractPlane helper method exists');

    terrain2.destroy();

    // ============================================================
    // TEST 24: Break Particles — color validation
    // ============================================================
    section('24. Break Particles — Color Validation (break-particles.js)');

    var particles2 = new Donkeycraft.BreakParticles(gl, shaderMgr);
    assert(particles2 !== null, 'BreakParticles instance for color test');

    // Test _getBlockParticleColor returns correct colors for known block IDs
    var stoneColor = particles2._getBlockParticleColor(1);
    assert(stoneColor.r === 0.5 && stoneColor.g === 0.5 && stoneColor.b === 0.5, 'Stone block particle color is gray (0.5, 0.5, 0.5)');

    var grassColor = particles2._getBlockParticleColor(2);
    assert(grassColor.r === 0.3 && grassColor.g === 0.6 && grassColor.b === 0.2, 'Grass block particle color is green (0.3, 0.6, 0.2)');

    var dirtColor = particles2._getBlockParticleColor(3);
    assert(dirtColor.r === 0.6 && dirtColor.g === 0.4 && dirtColor.b === 0.2, 'Dirt block particle color is brown (0.6, 0.4, 0.2)');

    var sandColor = particles2._getBlockParticleColor(4);
    assert(sandColor.r === 0.8 && sandColor.g === 0.7 && sandColor.b === 0.3, 'Sand block particle color is yellow (0.8, 0.7, 0.3)');

    var fallbackColor = particles2._getBlockParticleColor(99);
    assert(fallbackColor.r === 0.5 && fallbackColor.g === 0.5 && fallbackColor.b === 0.5, 'Unknown block ID returns fallback gray color');

    particles2.destroy();

    // ============================================================
    // TEST 25: Hand Renderer — item color validation
    // ============================================================
    section('25. Hand Renderer — Item Color Validation (hand-renderer.js)');

    var hand2 = new Donkeycraft.HandRenderer(gl, shaderMgr);
    assert(hand2 !== null, 'HandRenderer instance for color test');

    // Test _getItemColor returns correct colors for known item IDs
    var stoneItemColor = hand2._getItemColor(1);
    assert(stoneItemColor.r === 0.5 && stoneItemColor.g === 0.5 && stoneItemColor.b === 0.5, 'Stone item color is gray');

    var grassItemColor = hand2._getItemColor(2);
    assert(grassItemColor.r === 0.3 && grassItemColor.g === 0.6 && grassItemColor.b === 0.2, 'Grass item color is green');

    var goldItemColor = hand2._getItemColor(4);
    assert(goldItemColor.r === 0.8 && goldItemColor.g === 0.8 && goldItemColor.b === 0.2, 'Gold item color is yellow');

    var diamondItemColor = hand2._getItemColor(5);
    assert(diamondItemColor.r === 0.7 && diamondItemColor.g === 0.7 && diamondItemColor.b === 0.8, 'Diamond item color is light blue');

    var fallbackItemColor = hand2._getItemColor(99);
    assert(fallbackItemColor.r === 0.5 && fallbackItemColor.g === 0.5 && fallbackItemColor.b === 0.5, 'Unknown item ID returns fallback gray');

    hand2.destroy();

    // ============================================================
    // TEST 26: Sky — render sky dome geometry
    // ============================================================
    section('26. Sky — Geometry and Rendering (sky.js)');

    var sky2 = new Donkeycraft.Sky(gl, shaderMgr);
    assert(sky2 !== null, 'Sky instance for geometry test');

    // Verify sky dome geometry was built
    assert(sky2._skyDomeGeometry !== null, 'Sky dome geometry exists');
    assert(sky2._skyDomeGeometry.vertexCount > 0, 'Sky dome has vertices');
    assert(sky2._skyDomeGeometry.indexCount > 0, 'Sky dome has indices');

    // Verify persistent buffers were created
    assert(sky2._skyDomeVertBuf !== null, 'Sky vertex buffer exists');
    assert(sky2._skyDomeIndexBuf !== null, 'Sky index buffer exists');

    // Render sky with camera and lighting
    var testCam2 = new Donkeycraft.Camera(70, 0.1, 1000);
    testCam2.setPosition(0, 64, 0);
    testCam2.setRotation(0, 0);
    var testLight2 = new Donkeycraft.Lighting();
    testLight2.setTimeOfDay(0.5);

    sky2.render(testCam2, testLight2);
    assert(true, 'Sky.render completed without error');

    err = gl.getError();
    assert(err === gl.NO_ERROR, 'No WebGL error after Sky.render');

    sky2.destroy();
    testCam2 = null;
    testLight2 = null;

    // ============================================================
    // TEST 27: GLContext — context lost handling
    // ============================================================
    section('27. GLContext — Context Lost Handling (gl-context.js)');

    var glCtx2 = new Donkeycraft.GLContext(canvas);
    assert(glCtx2 !== null, 'Second GLContext instance created');

    // Verify getError returns a number when no error
    var noErr = glCtx2.getError();
    assert(noErr === 0 || noErr === null, 'getError returns 0 or null when no error');

    // Verify destroy method exists and runs without error
    glCtx2.destroy();
    assert(true, 'GLContext.destroy completed without error');

    // ============================================================
    // TEST 28: ShaderManager — uniform caching behavior
    // ============================================================
    section('28. ShaderManager — Uniform Caching (shader-manager.js)');

    shaderMgr.use('terrain');

    // Set the same uniform twice — second call should use cached location
    var set1 = shaderMgr.setVec3('uFogColor', 0.5, 0.6, 0.7);
    var set2 = shaderMgr.setVec3('uFogColor', 0.8, 0.9, 1.0);
    assert(set1 === true && set2 === true, 'Repeated uniform sets both succeed with caching');

    // Verify getUniformLocation returns cached location
    var loc1 = shaderMgr.getUniformLocation('uFogColor');
    var loc2 = shaderMgr.getUniformLocation('uFogColor');
    assert(loc1 !== null && loc2 !== null, 'getUniformLocation returns valid locations');
    assert(loc1 === loc2, 'Cached uniform location is consistent across calls');

    // ============================================================
    // Summary
    // ============================================================
    finishTests();

})();
</script>
</body>
</html>
