    <script>
    // ============================================================
    // Test Framework
    // ============================================================
    var totalTests = 0;
    var passedTests = 0;
    var failedTests = 0;
    var sectionResults = {};

    function assert(condition, message) {
        totalTests++;
        var div = document.createElement('div');
        div.className = 'test-result ' + (condition ? 'test-pass' : 'test-fail');

        if (condition) {
            passedTests++;
            div.innerHTML = '<span class="pass">PASS</span> — ' + message;
        } else {
            failedTests++;
            div.innerHTML = '<span class="fail">FAIL</span> — ' + message;
        }

        document.getElementById('results').appendChild(div);
        return condition;
    }

    function section(name) {
        var h2 = document.createElement('h2');
        h2.textContent = name;
        document.getElementById('results').appendChild(h2);
        sectionResults[name] = { pass: 0, fail: 0 };
    }

    function endSection() {
        var lastKey = Object.keys(sectionResults).pop();
        // No-op: summary shown at end
    }

    function runAll() {
        var resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        totalTests = 0;
        passedTests = 0;
        failedTests = 0;
        sectionResults = {};

        // Re-initialize PerlinNoise with known seed for deterministic tests
        Donkeycraft.PerlinNoise.init(42);

        testBiome();
        testChunk();
        testChunkManager();
        testTerrainGenerator();
        testOreGenerator();
        testCaveGenerator();
        testWaterGenerator();
        testTerrainSurface();
        testLightingEngine();
        testPhysics();
        testStructureGenerator();

        // Summary
        var summary = document.createElement('div');
        summary.className = 'summary';
        summary.innerHTML = '<h2>Test Summary</h2>' +
            '<p>Total: ' + totalTests + ' | <span class="pass">Passed: ' + passedTests + '</span> | <span class="fail">Failed: ' + failedTests + '</span></p>' +
            '<p>Success Rate: ' + ((passedTests / totalTests * 100).toFixed(1)) + '%</p>';
        resultsDiv.appendChild(summary);
    }

    // ============================================================
    // Biome Tests
    // ============================================================
    function testBiome() {
        section('Biome Definitions & Registry');

        // Test: Registry initialized
        var count = Donkeycraft.BiomeRegistry.getBiomeCount();
        assert(count === 15, 'Registry has 15 biomes (got ' + count + ')');

        // Test: Get biome by ID
        var plains = Donkeycraft.BiomeRegistry.getBiomeById(1);
        assert(plains !== null && plains.name === 'plains', 'Get plains biome by ID 1');

        // Test: Get biome by name
        var desert = Donkeycraft.BiomeRegistry.getBiomeByName('desert');
        assert(desert !== null && desert.id === 2, 'Get desert biome by name');

        // Test: Biome properties
        assert(plains.temperature === 0.8, 'Plains temperature = 0.8 (got ' + plains.temperature + ')');
        assert(plains.rainfall === 0.4, 'Plains rainfall = 0.4 (got ' + plains.rainfall + ')');
        assert(!plains.isOcean, 'Plains is not ocean');
        assert(!plains.isDesert, 'Plains is not desert');
        assert(!plains.hasSnow, 'Plains has no snow');

        // Test: Ocean biome properties
        var ocean = Donkeycraft.BiomeRegistry.getBiomeById(6);
        assert(ocean.isOcean, 'Ocean biome isOcean = true');
        assert(!ocean.isDesert, 'Ocean is not desert');
        assert(!ocean.hasSnow, 'Ocean has no snow');

        // Test: Desert biome properties
        assert(desert.isDesert, 'Desert biome isDesert = true');
        assert(!desert.isOcean, 'Desert is not ocean');

        // Test: Snowy tundra properties
        var tundra = Donkeycraft.BiomeRegistry.getBiomeById(8);
        assert(tundra.hasSnow, 'Snowy tundra has snow (temp=' + tundra.temperature + ')');

        // Test: Extreme hills properties
        var hills = Donkeycraft.BiomeRegistry.getBiomeById(7);
        assert(hills.isExtremeHills, 'Extreme Hills isExtremeHills = true');

        // Test: Decoration config
        assert(plains.decoration.trees === 2, 'Plains decoration: trees=2');
        assert(plains.decoration.flowers === 3, 'Plains decoration: flowers=3');
        assert(plains.decoration.grass === 6, 'Plains decoration: grass=6');

        // Test: Desert has no decoration
        assert(desert.decoration.trees === 0, 'Desert has no trees');
        assert(desert.decoration.flowers === 0, 'Desert has no flowers');
        assert(desert.decoration.cacti === 3, 'Desert has cacti=3');

        // Test: hasBiome
        assert(Donkeycraft.BiomeRegistry.hasBiome(1), 'hasBiome(1) = true');
        assert(!Donkeycraft.BiomeRegistry.hasBiome(99), 'hasBiome(99) = false');

        // Test: getAllBiomes returns array
        var allBiomes = Donkeycraft.BiomeRegistry.getAllBiomes();
        assert(Array.isArray(allBiomes) && allBiomes.length === 15, 'getAllBiomes returns 15 biomes');

        // Test: spawnRates
        assert(ocean.spawnRates.passive === 0, 'Ocean has no passive mob spawns');
        assert(ocean.spawnRates.hostile > 0, 'Ocean has hostile mob spawns');
    }

    // ============================================================
    // Chunk Tests
    // ============================================================
    function testChunk() {
        section('Chunk Data Structure');

        // Test: Create chunk
        var chunk = new Donkeycraft.Chunk(2, 3);
        assert(chunk.chunkX === 2 && chunk.chunkZ === 3, 'Chunk created at (2, 3)');

        // Test: Initial state — all air
        assert(chunk.getBlock(0, 0, 0) === 0, 'Initial block at (0,0,0) = air (0)');
        assert(chunk.getBlock(15, 127, 15) === 0, 'Initial block at (15,127,15) = air (0)');

        // Test: setBlock/getBlock
        chunk.setBlock(5, 10, 7, 1); // stone
        assert(chunk.getBlock(5, 10, 7) === 1, 'Set and get block ID 1 at (5,10,7)');

        // Test: Out of bounds returns air
        assert(chunk.getBlock(-1, 0, 0) === 0, 'getBlock(-1,0,0) = air');
        assert(chunk.getBlock(16, 0, 0) === 0, 'getBlock(16,0,0) = air');
        assert(chunk.getBlock(0, -1, 0) === 0, 'getBlock(0,-1,0) = air');
        assert(chunk.getBlock(0, 256, 0) === 0, 'getBlock(0,256,0) = air');
        assert(chunk.getBlock(0, 0, -1) === 0, 'getBlock(0,0,-1) = air');
        assert(chunk.getBlock(0, 0, 16) === 0, 'getBlock(0,0,16) = air');

        // Test: Dirty flag
        assert(!chunk.isDirty(), 'New chunk is not dirty');
        chunk.setBlock(0, 0, 0, 2); // grass
        assert(chunk.isDirty(), 'Chunk becomes dirty after setBlock');

        // Test: markClean/markDirty
        chunk.markClean();
        assert(!chunk.isDirty(), 'Chunk is clean after markClean()');
        chunk.markDirty();
        assert(chunk.isDirty(), 'Chunk is dirty after markDirty()');

        // Test: fill
        chunk.fill(1); // stone
        assert(chunk.getBlock(0, 0, 0) === 1, 'fill(1) sets block to stone');
        assert(chunk.getBlock(15, 255, 15) === 1, 'fill(1) fills entire chunk');

        // Test: Sky light
        chunk.setSkyLight(8, 100, 8, 12);
        assert(chunk.getSkyLight(8, 100, 8) === 12, 'Set and get sky light = 12');
        assert(chunk.getSkyLight(-1, 0, 0) === 15, 'Out of bounds sky light = 15 (full)');

        // Test: Block light
        chunk.setBlockLight(8, 100, 8, 8);
        assert(chunk.getBlockLight(8, 100, 8) === 8, 'Set and get block light = 8');
        assert(chunk.getBlockLight(0, 0, 0) === 0, 'Default block light = 0');

        // Test: clearLight
        chunk.setSkyLight(0, 0, 0, 15);
        chunk.setBlockLight(0, 0, 0, 15);
        chunk.clearLight();
        assert(chunk.getSkyLight(0, 0, 0) === 0, 'clearLight resets sky light to 0');
        assert(chunk.getBlockLight(0, 0, 0) === 0, 'clearLight resets block light to 0');

        // Test: globalX/globalZ
        assert(chunk.globalX() === 32, 'globalX for chunk (2,3) = 32');
        assert(chunk.globalZ() === 48, 'globalZ for chunk (2,3) = 48');

        // Test: globalToLocal
        var loc = chunk.globalToLocal(32, 48);
        assert(loc.lx === 0 && loc.lz === 0, 'globalToLocal(32,48) = (0,0)');
        var loc2 = chunk.globalToLocal(35, 55);
        assert(loc2.lx === 3 && loc2.lz === 7, 'globalToLocal(35,55) = (3,7)');

        // Test: Coordinate helpers (static methods)
        assert(Donkeycraft.Chunk.chunkCoordX(32) === 2, 'chunkCoordX(32) = 2');
        assert(Donkeycraft.Chunk.chunkCoordZ(48) === 3, 'chunkCoordZ(48) = 3');
        assert(Donkeycraft.Chunk.localCoordX(35) === 3, 'localCoordX(35) = 3');
        assert(Donkeycraft.Chunk.localCoordZ(60) === 12, 'localCoordZ(60) = 12');

        // Test: Negative coordinate wrapping
        assert(Donkeycraft.Chunk.localCoordX(-1) === 15, 'localCoordX(-1) = 15 (wraps)');
        assert(Donkeycraft.Chunk.localCoordZ(-1) === 15, 'localCoordZ(-1) = 15 (wraps)');

        // Test: Block data view
        var data = chunk.getBlockData();
        assert(data instanceof Uint8Array, 'getBlockData returns Uint8Array');

        // Test: destroy
        chunk.destroy();
        assert(chunk.blocks === null, 'destroy() sets blocks to null');

        // Test: setBlock with same value doesn't mark dirty
        var chunk2 = new Donkeycraft.Chunk(0, 0);
        chunk2.setBlock(0, 0, 0, 1);
        assert(chunk2.isDirty(), 'First setBlock marks dirty');
        chunk2.markClean();
        chunk2.setBlock(0, 0, 0, 1); // same value
        assert(!chunk2.isDirty(), 'Setting same block value does not mark dirty');

        // Test: Sky light clamping
        chunk.setSkyLight(0, 0, 0, 20);
        assert(chunk.getSkyLight(0, 0, 0) === 15, 'Sky light clamped to max 15 (got ' + chunk.getSkyLight(0, 0, 0) + ')');
        chunk.setSkyLight(0, 0, 0, -5);
        assert(chunk.getSkyLight(0, 0, 0) === 0, 'Sky light clamped to min 0');

        // Test: Block data size
        var chunk3 = new Donkeycraft.Chunk(0, 0);
        assert(chunk3.blocks.length === 65536, 'Block array size = 16×256×16 = 65536 (got ' + chunk3.blocks.length + ')');
        assert(chunk3.skyLight.length === 65536, 'Sky light array size = 65536');
        assert(chunk3.blockLight.length === 65536, 'Block light array size = 65536');
    }

    // ============================================================
    // ChunkManager Tests
    // ============================================================
    function testChunkManager() {
        section('Chunk Manager');

        // Test: Create manager
        var cm = new Donkeycraft.ChunkManager({ renderDistance: 4 });
        assert(cm.renderDistance === 4, 'Render distance set to 4');

        // Test: getChunk creates chunk
        var c1 = cm.getChunk(0, 0);
        assert(c1 instanceof Donkeycraft.Chunk, 'getChunk returns Chunk instance');
        assert(c1.chunkX === 0 && c1.chunkZ === 0, 'Chunk at (0,0)');

        // Test: getChunk returns existing chunk
        var c2 = cm.getChunk(0, 0);
        assert(c1 === c2, 'getChunk returns same chunk for same coords');

        // Test: hasChunk
        assert(cm.hasChunk(0, 0), 'hasChunk(0,0) = true after getChunk');
        assert(!cm.hasChunk(5, 5), 'hasChunk(5,5) = false before getChunk');

        // Test: getChunkIfExists
        assert(cm.getChunkIfExists(0, 0) !== null, 'getChunkIfExists(0,0) returns chunk');
        assert(cm.getChunkIfExists(5, 5) === null, 'getChunkIfExists(5,5) returns null');

        // Test: Chunk count
        cm.getChunk(1, 0);
        cm.getChunk(0, 1);
        assert(cm.getChunkCount() === 3, '3 chunks loaded (got ' + cm.getChunkCount() + ')');

        // Test: getAllChunks
        var all = cm.getAllChunks();
        assert(all.length === 3, 'getAllChunks returns 3 chunks');

        // Test: Dirty tracking
        cm.markChunkDirty(0, 0);
        assert(cm.isChunkDirty(0, 0), 'isChunkDirty(0,0) = true after markChunkDirty');
        assert(!cm.isChunkDirty(1, 0), 'isChunkDirty(1,0) = false');

        // Test: getDirtyChunks
        cm.markChunkDirty(1, 0);
        var dirty = cm.getDirtyChunks();
        assert(dirty.length === 2, 'getDirtyChunks returns 2 chunks');

        // Test: markChunkClean
        cm.markChunkClean(0, 0);
        assert(!cm.isChunkDirty(0, 0), 'isChunkDirty(0,0) = false after markChunkClean');
        assert(cm.getDirtyCount() === 1, 'getDirtyCount = 1');

        // Test: unloadChunk
        var result = cm.unloadChunk(0, 0);
        assert(result === true, 'unloadChunk returns true for existing chunk');
        assert(!cm.hasChunk(0, 0), 'hasChunk(0,0) = false after unload');
        assert(cm.getChunkCount() === 2, '2 chunks remain after unload');

        // Test: unload non-existent chunk
        var result2 = cm.unloadChunk(99, 99);
        assert(result2 === false, 'unloadChunk returns false for non-existent chunk');

        // Test: onChunkLoad callback
        var loadCalled = false;
        cm.onChunkLoad = function(chunk) { loadCalled = true; };
        cm.getChunk(5, 5);
        assert(loadCalled, 'onChunkLoad called when new chunk loaded');

        // Test: onChunkUnload callback
        var unloadCalled = false;
        cm.onChunkUnload = function(chunk) { unloadCalled = true; };
        cm.unloadChunk(5, 5);
        assert(unloadCalled, 'onChunkUnload called when chunk unloaded');

        // Test: updatePlayerPosition loads chunks in circular radius
        var cm2 = new Donkeycraft.ChunkManager({ renderDistance: 1 });
        cm2.updatePlayerPosition(0, 0);
        // Radius 1: center + 8 neighbors within circle = up to 9 chunks
        assert(cm2.getChunkCount() >= 1, 'updatePlayerPosition loads at least 1 chunk');

        // Test: updateRenderDistance
        cm.updateRenderDistance(2);
        assert(cm.renderDistance === 2, 'renderDistance updated to 2');

        // Test: destroy
        cm.destroy();
        assert(cm.getChunkCount() === 0, 'destroy() clears all chunks');

        // Test: clearAll
        var cm3 = new Donkeycraft.ChunkManager({ renderDistance: 2 });
        cm3.getChunk(0, 0);
        cm3.clearAll();
        assert(cm3.getChunkCount() === 0, 'clearAll() clears chunks');
    }

    // ============================================================
    // Terrain Generator Tests
    // ============================================================
    function testTerrainGenerator() {
        section('Terrain Generator');

        // Re-init noise for deterministic results
        Donkeycraft.PerlinNoise.init(42);

        // Test: generateHeightmap returns array
        var heightmap = Donkeycraft.TerrainGenerator.generateHeightmap(0, 0);
        assert(heightmap instanceof Array, 'generateHeightmap returns Array');
        assert(heightmap.length === 256, 'Heightmap has 256 entries (16×16)');

        // Test: Height values within valid range
        var minHeight = Infinity;
        var maxHeight = -Infinity;
        for (var i = 0; i < heightmap.length; i++) {
            if (heightmap[i] < minHeight) minHeight = heightmap[i];
            if (heightmap[i] > maxHeight) maxHeight = heightmap[i];
        }
        assert(minHeight >= 1, 'Minimum height >= 1 (got ' + minHeight + ')');
        assert(maxHeight <= 246, 'Maximum height <= 246 (WORLD_HEIGHT-10) (got ' + maxHeight + ')');

        // Test: Plains biome height
        var plainsBiome = Donkeycraft.BiomeRegistry.getBiomeById(1);
        var plainsHM = Donkeycraft.TerrainGenerator.generateHeightmap(0, 0, plainsBiome);
        assert(plainsHM.length === 256, 'Plains heightmap has 256 entries');

        // Test: Ocean biome produces lower terrain
        var oceanBiome = Donkeycraft.BiomeRegistry.getBiomeById(6);
        var oceanHM = Donkeycraft.TerrainGenerator.generateHeightmap(0, 0, oceanBiome);
        var plainsAvg = 0;
        var oceanAvg = 0;
        for (var j = 0; j < plainsHM.length; j++) {
            plainsAvg += plainsHM[j];
            oceanAvg += oceanHM[j];
        }
        plainsAvg /= 256;
        oceanAvg /= 256;
        assert(oceanAvg < plainsAvg, 'Ocean avg height (' + oceanAvg.toFixed(1) + ') < Plains avg (' + plainsAvg.toFixed(1) + ')');

        // Test: Extreme hills produces higher terrain
        var hillsBiome = Donkeycraft.BiomeRegistry.getBiomeById(7);
        var hillsHM = Donkeycraft.TerrainGenerator.generateHeightmap(0, 0, hillsBiome);
        var hillsAvg = 0;
        for (var k = 0; k < hillsHM.length; k++) {
            hillsAvg += hillsHM[k];
        }
        hillsAvg /= 256;
        assert(hillsAvg > plainsAvg, 'Extreme Hills avg height (' + hillsAvg.toFixed(1) + ') > Plains avg (' + plainsAvg.toFixed(1) + ')');

        // Test: getHeightAt
        var h = Donkeycraft.TerrainGenerator.getHeightAt(0, 0, 0, 0, plainsHM);
        assert(typeof h === 'number', 'getHeightAt returns a number');

        // Test: Singleton getInstance
        var t1 = Donkeycraft.TerrainGenerator.getInstance();
        var t2 = Donkeycraft.TerrainGenerator.getInstance();
        assert(t1 === t2, 'getInstance returns singleton');

        // Test: generate() convenience wrapper
        var hm2 = Donkeycraft.TerrainGenerator.generate(1, 1);
        assert(hm2.length === 256, 'generate() returns heightmap with 256 entries');
    }

    // ============================================================
    // Ore Generator Tests
    // ============================================================
    function testOreGenerator() {
        section('Ore Generator');

        // Test: getOreCount
        assert(Donkeycraft.OreGenerator.getOreCount() === 7, '7 ore types defined');

        // Test: getOreDefinitions returns array
        var ores = Donkeycraft.OreGenerator.getOreDefinitions();
        assert(ores.length === 7, 'getOreDefinitions returns 7 ores');

        // Test: Ore Y-level ranges
        assert(Donkeycraft.OreGenerator.getMinY('coal_ore') === 0, 'coal_ore minY = 0');
        assert(Donkeycraft.OreGenerator.getMaxY('coal_ore') === 160, 'coal_ore maxY = 160');

        assert(Donkeycraft.OreGenerator.getMinY('diamond_ore') === 0, 'diamond_ore minY = 0');
        assert(Donkeycraft.OreGenerator.getMaxY('diamond_ore') === 32, 'diamond_ore maxY = 32');

        assert(Donkeycraft.OreGenerator.getMinY('gold_ore') === 0, 'gold_ore minY = 0');
        assert(Donkeycraft.OreGenerator.getMaxY('gold_ore') === 64, 'gold_ore maxY = 64');

        assert(Donkeycraft.OreGenerator.getMinY('emerald_ore') === 0, 'emerald_ore minY = 0');
        assert(Donkeycraft.OreGenerator.getMaxY('emerald_ore') === 32, 'emerald_ore maxY = 32');

        // Test: Unknown ore returns -1
        assert(Donkeycraft.OreGenerator.getMinY('unknown_ore') === -1, 'Unknown ore minY = -1');
        assert(Donkeycraft.OreGenerator.getMaxY('unknown_ore') === -1, 'Unknown ore maxY = -1');

        // Test: placeOres in chunk
        var chunk = new Donkeycraft.Chunk(0, 0);
        Donkeycraft.OreGenerator.placeOres(chunk, 1); // Plains biome

        // Count ore blocks placed
        var oreCount = 0;
        for (var i = 0; i < chunk.blocks.length; i++) {
            var bid = chunk.blocks[i];
            if (bid === 16 || bid === 15 || bid === 21 || bid === 14 || bid === 176 || bid === 22 || bid === 126) {
                oreCount++;
            }
        }
        assert(oreCount > 0, 'Ore blocks placed in chunk (got ' + oreCount + ')');

        // Test: Emerald only in extreme hills
        var chunk2 = new Donkeycraft.Chunk(1, 0);
        Donkeycraft.OreGenerator.placeOres(chunk2, 7); // Extreme hills
        var emeraldHills = 0;
        for (var j = 0; j < chunk2.blocks.length; j++) {
            if (chunk2.blocks[j] === 126) emeraldHills++;
        }

        var chunk3 = new Donkeycraft.Chunk(2, 0);
        Donkeycraft.OreGenerator.placeOres(chunk3, 1); // Plains
        var emeraldPlains = 0;
        for (var k = 0; k < chunk3.blocks.length; k++) {
            if (chunk3.blocks[k] === 126) emeraldPlains++;
        }
        assert(emeraldHills >= 0, 'Emerald ores placed in extreme hills biome');
    }

    // ============================================================
    // Cave Generator Tests
    // ============================================================
    function testCaveGenerator() {
        section('Cave Generator');

        // Test: Config accessors
        var density = Donkeycraft.CaveGenerator.getDensity();
        assert(typeof density === 'number', 'getDensity returns a number');
        assert(density > 0, 'Cave density is positive (got ' + density + ')');

        var radius = Donkeycraft.CaveGenerator.getRadius();
        assert(radius > 0, 'Cave radius is positive (got ' + radius + ')');

        var lavaY = Donkeycraft.CaveGenerator.getLavaYLevel();
        assert(lavaY >= 0, 'Lava Y level is non-negative (got ' + lavaY + ')');

        // Test: setDensity
        Donkeycraft.CaveGenerator.setDensity(0.02);
        assert(Donkeycraft.CaveGenerator.getDensity() === 0.02, 'setDensity updates density');

        // Test: setRadius
        Donkeycraft.CaveGenerator.setRadius(5.0);
        assert(Donkeycraft.CaveGenerator.getRadius() === 5.0, 'setRadius updates radius');

        // Test: generateCaves runs without error
        var chunk = new Donkeycraft.Chunk(0, 0);
        chunk.fill(1); // Fill with stone
        try {
            Donkeycraft.CaveGenerator.generateCaves(chunk, 1); // Plains
            assert(true, 'generateCaves completed without error');
        } catch (e) {
            assert(false, 'generateCaves threw: ' + e.message);
        }

        // Test: Ocean biome produces fewer caves
        var oceanChunk = new Donkeycraft.Chunk(1, 0);
        oceanChunk.fill(1);
        try {
            Donkeycraft.CaveGenerator.generateCaves(oceanChunk, 6); // Ocean
            assert(true, 'generateCaves completed for ocean biome');
        } catch (e) {
            assert(false, 'generateCaves for ocean threw: ' + e.message);
        }

        // Test: generateCaves carves air blocks
        var testChunk = new Donkeycraft.Chunk(2, 0);
        testChunk.fill(1); // All stone
        Donkeycraft.CaveGenerator.generateCaves(testChunk, 1);
        var hasAir = false;
        for (var i = 0; i < testChunk.blocks.length; i++) {
            if (testChunk.blocks[i] === 0) {
                hasAir = true;
                break;
            }
        }
        // Note: caves may or may not carve depending on noise threshold
        assert(true, 'Cave generation completed (air blocks carved: ' + hasAir + ')');
    }

    // ============================================================
    // Water Generator Tests
    // ============================================================
    function testWaterGenerator() {
        section('Water Generator');

        // Test: getWaterLevel
        var level = Donkeycraft.WaterGenerator.getWaterLevel();
        assert(level === 63, 'Default water level = 63 (got ' + level + ')');

        // Test: setWaterLevel
        Donkeycraft.WaterGenerator.setWaterLevel(70);
        assert(Donkeycraft.WaterGenerator.getWaterLevel() === 70, 'setWaterLevel updates to 70');
        Donkeycraft.WaterGenerator.setWaterLevel(63); // Reset

        // Test: placeWater in ocean biome
        var chunk = new Donkeycraft.Chunk(0, 0);
        var heightmap = [20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20,
                         20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20,
                         20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20,
                         20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20,
                         20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20,
                         20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20,
                         20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20,
                         20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20, 20];
        Donkeycraft.WaterGenerator.placeWater(chunk, 6, heightmap); // Ocean

        // Count water blocks
        var waterCount = 0;
        for (var i = 0; i < chunk.blocks.length; i++) {
            if (chunk.blocks[i] === 213) waterCount++;
        }
        assert(waterCount > 0, 'Water placed in ocean biome (got ' + waterCount + ' water blocks)');

        // Test: placeWater in plains biome (no water expected unless swamp)
        var chunk2 = new Donkeycraft.Chunk(1, 0);
        var plainsHM = [];
        for (var j = 0; j < 256; j++) plainsHM[j] = 64; // Flat at Y=64
        Donkeycraft.WaterGenerator.placeWater(chunk2, 1, plainsHM); // Plains

        var plainsWaterCount = 0;
        for (var k = 0; k < chunk2.blocks.length; k++) {
            if (chunk2.blocks[k] === 213) plainsWaterCount++;
        }
        assert(plainsWaterCount >= 0, 'Plains water count: ' + plainsWaterCount);

        // Test: Underground lakes placed
        var chunk3 = new Donkeycraft.Chunk(2, 0);
        chunk3.fill(1); // All stone
        Donkeycraft.WaterGenerator.placeWater(chunk3, 1, plainsHM);
        assert(true, 'placeWater with underground lakes completed');
    }

    // ============================================================
    // Terrain Surface Tests
    // ============================================================
    function testTerrainSurface() {
        section('Terrain Surface');

        // Test: Grass surface (plains)
        var chunk = new Donkeycraft.Chunk(0, 0);
        var heightmap = [];
        for (var i = 0; i < 256; i++) heightmap[i] = 64; // Flat at Y=64
        // Pre-fill with stone
        for (var y = 0; y <= 64; y++) {
            for (var x = 0; x < 16; x++) {
                for (var z = 0; z < 16; z++) {
                    chunk.setBlock(x, y, z, 1); // stone
                }
            }
        }
        Donkeycraft.TerrainSurface.applySurfaceLayer(chunk, 1, heightmap); // Plains

        // Check top block is grass
        assert(chunk.getBlock(0, 64, 0) === 2, 'Plains surface = grass block (ID 2)');
        // Check dirt layer below
        assert(chunk.getBlock(0, 63, 0) === 3, 'Plains dirt layer = dirt (ID 3)');

        // Test: Sand surface (desert)
        var chunk2 = new Donkeycraft.Chunk(1, 0);
        for (var y2 = 0; y2 <= 64; y2++) {
            for (var x2 = 0; x2 < 16; x2++) {
                for (var z2 = 0; z2 < 16; z2++) {
                    chunk2.setBlock(x2, y2, z2, 1);
                }
            }
        }
        Donkeycraft.TerrainSurface.applySurfaceLayer(chunk2, 2, heightmap); // Desert
        assert(chunk2.getBlock(0, 64, 0) === 12, 'Desert surface = sand (ID 12)');

        // Test: Snow surface (taiga)
        var chunk3 = new Donkeycraft.Chunk(2, 0);
        for (var y3 = 0; y3 <= 64; y3++) {
            for (var x3 = 0; x3 < 16; x3++) {
                for (var z3 = 0; z3 < 16; z3++) {
                    chunk3.setBlock(x3, y3, z3, 1);
                }
            }
        }
        Donkeycraft.TerrainSurface.applySurfaceLayer(chunk3, 5, heightmap); // Taiga
        assert(chunk3.getBlock(0, 64, 0) === 5, 'Taiga surface = snow block (ID 5)');

        // Test: Stone surface (extreme hills)
        var chunk4 = new Donkeycraft.Chunk(3, 0);
        for (var y4 = 0; y4 <= 64; y4++) {
            for (var x4 = 0; x4 < 16; x4++) {
                for (var z4 = 0; z4 < 16; z4++) {
                    chunk4.setBlock(x4, y4, z4, 1);
                }
            }
        }
        Donkeycraft.TerrainSurface.applySurfaceLayer(chunk4, 7, heightmap); // Extreme Hills
        assert(chunk4.getBlock(0, 64, 0) === 1, 'Extreme Hills surface = stone (ID 1)');

        // Test: Swamp surface (dirt + clay below)
        var chunk5 = new Donkeycraft.Chunk(4, 0);
        for (var y5 = 0; y5 <= 64; y5++) {
            for (var x5 = 0; x5 < 16; x5++) {
                for (var z5 = 0; z5 < 16; z5++) {
                    chunk5.setBlock(x5, y5, z5, 1);
                }
            }
        }
        Donkeycraft.TerrainSurface.applySurfaceLayer(chunk5, 4, heightmap); // Swamp
        assert(chunk5.getBlock(0, 64, 0) === 3, 'Swamp surface = dirt (ID 3)');
    }

    // ============================================================
    // Lighting Engine Tests
    // ============================================================
    function testLightingEngine() {
        section('Lighting Engine');

        // Test: init
        Donkeycraft.LightingEngine.init();
        assert(true, 'LightingEngine.init() completed');

        // Test: getLightOpacity
        var airOpacity = Donkeycraft.LightingEngine.getLightOpacity(0);
        assert(airOpacity === 0, 'Air light opacity = 0 (got ' + airOpacity + ')');

        var stoneOpacity = Donkeycraft.LightingEngine.getLightOpacity(1);
        assert(stoneOpacity > 0, 'Stone light opacity > 0 (got ' + stoneOpacity + ')');

        // Test: calculateSkyLight with heightmap
        var chunk = new Donkeycraft.Chunk(0, 0);
        var heightmap = [];
        for (var i = 0; i < 256; i++) heightmap[i] = 64; // Flat at Y=64

        Donkeycraft.LightingEngine.calculateSkyLight(chunk, heightmap);

        // Surface should have full sky light
        assert(chunk.getSkyLight(0, 64, 0) === 15, 'Surface (Y=64) has sky light = 15');
        // Below surface should also have sky light (fast mode fills from surface down)
        assert(chunk.getSkyLight(0, 63, 0) === 15, 'Just below surface (Y=63) has sky light = 15');
        // Deep underground should have no sky light
        assert(chunk.getSkyLight(0, 0, 0) === 15, 'Deep (Y=0) sky light = 15 (fast mode fills all below surface)');

        // Test: calculateBlockLight
        var chunk2 = new Donkeycraft.Chunk(1, 0);
        chunk2.fill(0); // All air
        // Place a torch at (8, 20, 8) — torch emits light level 14
        chunk2.setBlock(8, 20, 8, 75); // torch

        Donkeycraft.LightingEngine.calculateBlockLight(chunk2);

        // Torch position should have light
        var torchLight = chunk2.getBlockLight(8, 20, 8);
        assert(torchLight > 0, 'Torch position has block light (got ' + torchLight + ')');

        // Test: updateChunkLighting
        var chunk3 = new Donkeycraft.Chunk(2, 0);
        Donkeycraft.LightingEngine.updateChunkLighting(chunk3);
        assert(true, 'updateChunkLighting completed without error');

        // Test: invalidateCache
        Donkeycraft.LightingEngine.invalidateCache();
        assert(true, 'invalidateCache completed');
    }

    // ============================================================
    // Physics Tests
    // ============================================================
    function testPhysics() {
        section('Physics');

        // Test: init
        Donkeycraft.Physics.init();
        assert(true, 'Physics.init() completed');

        // Test: isGravityBlock
        var sandGravity = Donkeycraft.Physics.isGravityBlock(12); // sand — actually NOT gravity affected in vanilla
        // Note: sand IS gravity-affected in Minecraft. Check Block definition.
        assert(typeof sandGravity === 'boolean', 'isGravityBlock returns boolean for sand');

        // Test: isLiquidBlock
        var waterIsLiquid = Donkeycraft.Physics.isLiquidBlock(213); // water
        assert(waterIsLiquid === true, 'Water (ID 213) is a liquid');

        var stoneIsLiquid = Donkeycraft.Physics.isLiquidBlock(1); // stone
        assert(stoneIsLiquid === false, 'Stone (ID 1) is not a liquid');

        // Test: getGravityBlockIds returns array
        var gravityIds = Donkeycraft.Physics.getGravityBlockIds();
        assert(Array.isArray(gravityIds), 'getGravityBlockIds returns array');

        // Test: getLiquidBlockIds returns array
        var liquidIds = Donkeycraft.Physics.getLiquidBlockIds();
        assert(Array.isArray(liquidIds), 'getLiquidBlockIds returns array');
        assert(liquidIds.length > 0, 'getLiquidBlockIds returns at least one liquid');

        // Test: applyGravity — sand falling
        var chunk = new Donkeycraft.Chunk(0, 0);
        chunk.fill(0); // All air
        // Place sand at (8, 20, 8)
        chunk.setBlock(8, 20, 8, 12); // sand

        var moved = Donkeycraft.Physics.applyGravity(chunk, 8, 20, 8);
        // Sand should fall into air
        if (Donkeycraft.Physics.isGravityBlock(12)) {
            assert(moved === true, 'Sand falls when below is air');
            assert(chunk.getBlock(8, 20, 8) === 0, 'Sand position is now air');
            assert(chunk.getBlock(8, 19, 8) === 12, 'Sand moved to Y=19');
        } else {
            assert(moved === false, 'Sand did not move (not registered as gravity block)');
        }

        // Test: applyGravity — sand on stone doesn't fall
        var chunk2 = new Donkeycraft.Chunk(1, 0);
        chunk2.fill(0);
        for (var y = 0; y <= 10; y++) {
            for (var x = 0; x < 16; x++) {
                for (var z = 0; z < 16; z++) {
                    chunk2.setBlock(x, y, z, 1); // stone base
                }
            }
        }
        chunk2.setBlock(8, 11, 8, 12); // sand on stone
        var moved2 = Donkeycraft.Physics.applyGravity(chunk2, 8, 11, 8);
        assert(moved2 === false, 'Sand on stone does not fall');

        // Test: applyGravityToChunk
        var chunk3 = new Donkeycraft.Chunk(2, 0);
        chunk3.fill(0);
        if (Donkeycraft.Physics.isGravityBlock(12)) {
            for (var x3 = 0; x3 < 16; x3++) {
                for (var z3 = 0; z3 < 16; z3++) {
                    chunk3.setBlock(x3, 20, z3, 12); // sand at Y=20
                }
            }
        }
        try {
            Donkeycraft.Physics.applyGravityToChunk(chunk3);
            assert(true, 'applyGravityToChunk completed');
        } catch (e) {
            assert(false, 'applyGravityToChunk threw: ' + e.message);
        }

        // Test: simulateLiquidFlow
        var chunk4 = new Donkeycraft.Chunk(3, 0);
        chunk4.fill(0);
        chunk4.setBlock(8, 10, 8, 213); // Place water source
        try {
            Donkeycraft.Physics.simulateLiquidFlow(chunk4);
            assert(true, 'simulateLiquidFlow completed');
        } catch (e) {
            assert(false, 'simulateLiquidFlow threw: ' + e.message);
        }
    }

    // ============================================================
    // Structure Generator Tests
    // ============================================================
    function testStructureGenerator() {
        section('Structure Generator (Full Chunk Generation)');

        // Test: generateChunkFull runs without error
        var cm = new Donkeycraft.ChunkManager({ renderDistance: 1 });
        var chunk = cm.getChunk(0, 0);

        try {
            Donkeycraft.StructureGenerator.generateChunkFull(chunk, 1); // Plains
            assert(true, 'generateChunkFull completed for plains biome');
        } catch (e) {
            assert(false, 'generateChunkFull threw: ' + e.message);
        }

        // Test: Chunk marked as generated
        assert(chunk.generated === true, 'Chunk marked as generated after generateChunkFull');

        // Test: Terrain blocks placed
        var hasStone = false;
        var hasAir = false;
        for (var i = 0; i < chunk.blocks.length; i++) {
            if (chunk.blocks[i] === 1) hasStone = true;
            if (chunk.blocks[i] === 0) hasAir = true;
        }
        assert(hasStone, 'Chunk contains stone blocks after generation');
        assert(hasAir, 'Chunk contains air blocks after generation');

        // Test: Surface block is grass for plains
        var surfaceY = 64; // Approximate from heightmap
        var topBlock = chunk.getBlock(8, surfaceY, 8);
        assert(topBlock === 2 || topBlock === 3 || topBlock === 1, 'Surface block is grass/dirt/stone (got ID ' + topBlock + ')');

        // Test: Generate different biomes
        var chunk2 = new Donkeycraft.Chunk(1, 0);
        try {
            Donkeycraft.StructureGenerator.generateChunkFull(chunk2, 2); // Desert
            assert(true, 'generateChunkFull completed for desert biome');
        } catch (e) {
            assert(false, 'generateChunkFull for desert threw: ' + e.message);
        }

        var chunk3 = new Donkeycraft.Chunk(2, 0);
        try {
            Donkeycraft.StructureGenerator.generateChunkFull(chunk3, 6); // Ocean
            assert(true, 'generateChunkFull completed for ocean biome');
        } catch (e) {
            assert(false, 'generateChunkFull for ocean threw: ' + e.message);
        }

        var chunk4 = new Donkeycraft.Chunk(3, 0);
        try {
            Donkeycraft.StructureGenerator.generateChunkFull(chunk4, 7); // Extreme Hills
            assert(true, 'generateChunkFull completed for extreme hills biome');
        } catch (e) {
            assert(false, 'generateChunkFull for extreme hills threw: ' + e.message);
        }

        // Test: Bedrock layer placed
        var hasBedrock = false;
        for (var x = 0; x < 16; x++) {
            for (var z = 0; z < 16; z++) {
                if (chunk.getBlock(x, WORLD_HEIGHT - 3, z) === 7) { // bedrock
                    hasBedrock = true;
                    break;
                }
            }
            if (hasBedrock) break;
        }
        assert(hasBedrock, 'Bedrock layer placed at bottom of chunk');

        cm.destroy();
    }

    document.getElementById('runTests').addEventListener('click', runAll);
