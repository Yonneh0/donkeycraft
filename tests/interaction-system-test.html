<script>
(function() {
    'use strict';

    var F = TestFramework;
    F.init('results');

    // ============================================================
    // Mock ChunkManager for testing (no real world generation needed)
    // ============================================================
    function createMockChunkManager() {
        var chunks = {};
        var dirtyChunks = {};

        function getChunkIfExists(cx, cz) {
            var key = cx + ',' + cz;
            return chunks[key] || null;
        }

        function markChunkDirty(cx, cz) {
            dirtyChunks[cx + ',' + cz] = true;
        }

        function createMockChunk(cx, cz) {
            var key = cx + ',' + cz;
            if (!chunks[key]) {
                chunks[key] = new Donkeycraft.Chunk(cx, cz);
            }
            return chunks[key];
        }

        // Fill a small area with stone (block ID 1) and air (0)
        function fillArea(chunkManager, startX, startY, startZ, endX, endY, endZ, blockId) {
            for (var x = startX; x <= endX; x++) {
                for (var y = startY; y <= endY; y++) {
                    for (var z = startZ; z <= endZ; z++) {
                        var result = Donkeycraft.WorldUtils.getChunkAndLocalCoords(chunkManager, x, y, z);
                        if (result.chunk) {
                            result.chunk.setBlock(result.lx, result.ly, result.lz, blockId);
                            chunkManager.markChunkDirty(result.chunk.chunkX, result.chunk.chunkZ);
                        }
                    }
                }
            }
        }

        return {
            getChunkIfExists: getChunkIfExists,
            markChunkDirty: markChunkDirty,
            createMockChunk: createMockChunk,
            fillArea: fillArea,
            _getChunks: function() { return chunks; },
            _getDirtyChunks: function() { return dirtyChunks; }
        };
    }

    // ============================================================
    // Mock Player for testing
    // ============================================================
    function createMockPlayer() {
        var pos = { x: 0, y: 0, z: 0 };
        var hurtBox = { minX: -0.3, maxX: 0.3, minY: 0, maxY: 1.8 };

        return {
            getPosition: function() { return pos; },
            setPosition: function(x, y, z) { pos.x = x; pos.y = y; pos.z = z; },
            getHurtBox: function() { return hurtBox; },
            setHurtBox: function(mbX, mbY, mbZ, mxX, mxY, mxZ) {
                hurtBox.minX = mbX; hurtBox.minY = mbY; hurtBox.minZ = mbZ;
                hurtBox.maxX = mxX; hurtBox.maxY = mxY; hurtBox.maxZ = mxZ;
            }
        };
    }

    // ============================================================
    // Section 1: Raycast — DDA Voxel Traversal
    // ============================================================
    F.section('1. Raycast — DDA Voxel Traversal');

    // 1a. Class registration
    F.assert(typeof Donkeycraft.Raycast === 'object', 'Donkeycraft.Raycast exists');
    F.assert(typeof Donkeycraft.Raycast.raycast === 'function', 'Raycast.raycast is a function');
    F.assert(typeof Donkeycraft.Raycast.getDirectionFromRotation === 'function', 'Raycast.getDirectionFromRotation is a function');
    F.assert(typeof Donkeycraft.Raycast.getFaceNormals === 'function', 'Raycast.getFaceNormals is a function');
    F.assert(typeof Donkeycraft.RaycastResult === 'function', 'Donkeycraft.RaycastResult constructor exists');

    // 1b. RaycastResult construction
    var mockOrigin = new Donkeycraft.Vector3(0, 10, 0);
    var mockDir = new Donkeycraft.Vector3(0, 0, -1);
    var hitPos = new Donkeycraft.Vector3(5, 10, -5);
    var result = new Donkeycraft.RaycastResult(6, 10, -6, 0, 0, -1, 11.18, hitPos);
    F.assertEq(result.blockX, 6, 'RaycastResult.blockX = 6');
    F.assertEq(result.blockY, 10, 'RaycastResult.blockY = 10');
    F.assertEq(result.blockZ, -6, 'RaycastResult.blockZ = -6');
    F.assertEq(result.faceNormalX, 0, 'RaycastResult.faceNormalX = 0');
    F.assertEq(result.faceNormalY, 0, 'RaycastResult.faceNormalY = 0');
    F.assertEq(result.faceNormalZ, -1, 'RaycastResult.faceNormalZ = -1');
    F.assertNear(result.distance, 11.18, 0.01, 'RaycastResult.distance ≈ 11.18');
    F.assertType(result.hitPosition, 'object', 'RaycastResult.hitPosition is object');

    // 1c. getDirectionFromRotation
    var dirForward = Donkeycraft.Raycast.getDirectionFromRotation(0, 0);
    F.assertType(dirForward, 'object', 'getDirectionFromRotation returns Vector3');
    F.assertNear(dirForward.x, 0, 0.01, 'Direction forward x ≈ 0');
    F.assertNear(dirForward.y, 0, 0.01, 'Direction forward y ≈ 0');
    F.assertNear(dirForward.z, -1, 0.01, 'Direction forward z ≈ -1 (looking -Z)');

    var dirLeft = Donkeycraft.Raycast.getDirectionFromRotation(Math.PI / 2, 0);
    F.assertNear(dirLeft.x, -1, 0.01, 'Direction left x ≈ -1');

    // 1d. getFaceNormals
    var normals = Donkeycraft.Raycast.getFaceNormals();
    F.assertArrEq(normals.length > 0 ? [true] : [], [true], 'getFaceNormals returns non-empty array');
    F.assertEq(normals.length, 6, 'getFaceNormals returns 6 normals');

    // 1e. Raycast with no hit (empty chunk manager)
    var mockCM = createMockChunkManager();
    var eyePos = new Donkeycraft.Vector3(8, 50, 8);
    var lookDir = new Donkeycraft.Vector3(0, 0, -1);
    var noHit = Donkeycraft.Raycast.raycast(mockCM, eyePos, lookDir, 6.0);
    F.assert(noHit === null, 'Raycast returns null when no solid blocks exist');

    // 1f. Raycast with solid blocks
    mockCM.createMockChunk(0, 0);
    mockCM.fillArea(mockCM, 0, 0, 0, 15, 255, 15, 1); // stone everywhere in chunk
    var origin2 = new Donkeycraft.Vector3(8, 50, 16);
    var dirDown = new Donkeycraft.Vector3(0, -1, 0);
    var hitResult = Donkeycraft.Raycast.raycast(mockCM, origin2, dirDown, 6.0);
    F.assert(hitResult !== null, 'Raycast hits solid block below player');
    if (hitResult) {
        F.assertEq(hitResult.blockY, 50, 'Hit block Y = 50 (directly below)');
        F.assertEq(hitResult.faceNormalY, 1, 'Face normal Y = 1 (hitting top face)');
        F.assertNear(hitResult.distance, 0, 0.1, 'Distance ≈ 0 (starting inside block)');
    }

    // 1g. Raycast with ignoreIds
    var origin3 = new Donkeycraft.Vector3(8, 50, 8);
    var dirRight = new Donkeycraft.Vector3(1, 0, 0);
    var hitWithIgnore = Donkeycraft.Raycast.raycast(mockCM, origin3, dirRight, 6.0, [1]);
    F.assert(hitWithIgnore === null, 'Raycast returns null when all blocks are ignored');

    // 1h. Raycast reach clamping
    F.info('Reach clamping: min=1.0, max=12.0 enforced internally');

    // ============================================================
    // Section 2: BlockAction — Block Breaking Mechanics
    // ============================================================
    F.section('2. BlockAction — Block Breaking Mechanics');

    // 2a. Class registration
    F.assert(typeof Donkeycraft.BlockAction === 'object', 'Donkeycraft.BlockAction exists');
    F.assert(typeof Donkeycraft.BlockAction.startBreaking === 'function', 'startBreaking is a function');
    F.assert(typeof Donkeycraft.BlockAction.tickBreakProgress === 'function', 'tickBreakProgress is a function');
    F.assert(typeof Donkeycraft.BlockAction.cancelBreaking === 'function', 'cancelBreaking is a function');
    F.assert(typeof Donkeycraft.BlockAction.getBreakProgress === 'function', 'getBreakProgress is a function');
    F.assert(typeof Donkeycraft.BlockAction.calculateBreakTime === 'function', 'calculateBreakTime is a function');
    F.assert(typeof Donkeycraft.BlockAction.getActiveBreakStates === 'function', 'getActiveBreakStates is a function');
    F.assert(typeof Donkeycraft.BlockAction.clearAll === 'function', 'clearAll is a function');
    F.assert(typeof Donkeycraft.BlockAction.setChunkManager === 'function', 'setChunkManager is a function');
    F.assert(typeof Donkeycraft.BlockAction.getHardness === 'function', 'getHardness is a function');
    F.assert(typeof Donkeycraft.BlockAction.getToolMultiplier === 'function', 'getToolMultiplier is a function');
    F.assert(typeof Donkeycraft.BlockAction.getAllToolMultipliers === 'function', 'getAllToolMultipliers is a function');

    // 2b. calculateBreakTime
    var woodTime = Donkeycraft.BlockAction.calculateBreakTime(1, 'wood'); // stone with wood pickaxe
    F.assertType(woodTime, 'number', 'Wood pickaxe break time is a number');
    F.assert(woodTime > 0, 'Wood pickaxe break time > 0');

    var diamondTime = Donkeycraft.BlockAction.calculateBreakTime(1, 'diamond'); // stone with diamond pickaxe
    F.assert(diamondTime < woodTime, 'Diamond pickaxe is faster than wood pickaxe');

    var nakedTime = Donkeycraft.BlockAction.calculateBreakTime(1, 'naked');
    F.assert(nakedTime > woodTime, 'Naked hands are slower than wood pickaxe');

    // 2c. getToolMultiplier
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('wood'), 2.0, 'Wood multiplier = 2.0');
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('stone'), 4.0, 'Stone multiplier = 4.0');
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('iron'), 6.0, 'Iron multiplier = 6.0');
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('gold'), 12.0, 'Gold multiplier = 12.0');
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('diamond'), 8.0, 'Diamond multiplier = 8.0');
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('netherite'), 9.0, 'Netherite multiplier = 9.0');
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('naked'), 1.0, 'Naked multiplier = 1.0');
    F.assertEq(Donkeycraft.BlockAction.getToolMultiplier('unknown'), 1.0, 'Unknown tier defaults to 1.0');

    // 2d. getAllToolMultipliers
    var allMultipliers = Donkeycraft.BlockAction.getAllToolMultipliers();
    F.assertType(allMultipliers.wood, 'number', 'allMultipliers.wood is number');
    F.assertType(allMultipliers.diamond, 'number', 'allMultipliers.diamond is number');

    // 2e. startBreaking and getBreakProgress
    Donkeycraft.BlockAction.clearAll();
    Donkeycraft.BlockAction.startBreaking(8, 50, 8, 1, [], 'wood');
    var progress0 = Donkeycraft.BlockAction.getBreakProgress(8, 50, 8);
    F.assertEq(progress0, 0, 'Initial break progress = 0');

    // 2f. tickBreakProgress — simulate time passing
    var events = Donkeycraft.BlockAction.tickBreakProgress(1.0); // 1 second of game time
    var progressAfterTick = Donkeycraft.BlockAction.getBreakProgress(8, 50, 8);
    F.assert(progressAfterTick > 0, 'Break progress increases after tick');
    F.assert(progressAfterTick <= 1.0, 'Break progress ≤ 1.0');

    // 2g. cancelBreaking
    Donkeycraft.BlockAction.cancelBreaking(8, 50, 8);
    var progressCancelled = Donkeycraft.BlockAction.getBreakProgress(8, 50, 8);
    F.assertEq(progressCancelled, 0, 'Break progress = 0 after cancel');

    // 2h. clearAll also clears chunk break indices (memory leak fix)
    Donkeycraft.BlockAction.startBreaking(10, 60, 10, 1, [], 'stone');
    Donkeycraft.BlockAction.clearAll();
    var statesAfterClear = Donkeycraft.BlockAction.getActiveBreakStates();
    F.assertEq(Object.keys(statesAfterClear).length, 0, 'clearAll removes all break states');

    // 2i. clearChunkBreakStates
    Donkeycraft.BlockAction.startBreaking(0, 0, 0, 1, [], 'wood');
    Donkeycraft.BlockAction.startBreaking(16, 0, 0, 1, [], 'wood'); // different chunk
    Donkeycraft.BlockAction.clearChunkBreakStates(0, 0); // only clear chunk (0,0)
    var statesAfterChunkClear = Donkeycraft.BlockAction.getActiveBreakStates();
    F.assertEq(Object.keys(statesAfterChunkClear).length, 1, 'clearChunkBreakStates only clears one chunk');

    // 2j. Coordinate flooring consistency
    Donkeycraft.BlockAction.startBreaking(8.7, 50.3, 8.9, 1, [], 'wood');
    var progressFloored = Donkeycraft.BlockAction.getBreakProgress(8, 50, 8);
    F.assertEq(progressFloored, 0, 'Floored coordinates match startBreaking key');

    // ============================================================
    // Section 3: BlockPlacement — Block Placement Mechanics
    // ============================================================
    F.section('3. BlockPlacement — Block Placement Mechanics');

    // 3a. Class registration
    F.assert(typeof Donkeycraft.BlockPlacement === 'object', 'Donkeycraft.BlockPlacement exists');
    F.assert(typeof Donkeycraft.BlockPlacement.placeBlock === 'function', 'placeBlock is a function');
    F.assert(typeof Donkeycraft.BlockPlacement.placeBlockFromRaycast === 'function', 'placeBlockFromRaycast is a function');
    F.assert(typeof Donkeycraft.BlockPlacement.getPlacementPosition === 'function', 'getPlacementPosition is a function');
    F.assert(typeof Donkeycraft.BlockPlacement.canPlaceAt === 'function', 'canPlaceAt is a function');
    F.assert(typeof Donkeycraft.BlockPlacement.getFaceNormals === 'function', 'getFaceNormals is a function');

    // 3b. placeBlock — null checks
    var mockPlayer = createMockPlayer();
    var placeResult = Donkeycraft.BlockPlacement.placeBlock(null, 5, 10, 5, 1, mockPlayer);
    F.assert(placeResult === false, 'placeBlock returns false with null chunkManager');

    placeResult = Donkeycraft.BlockPlacement.placeBlock(mockCM, 5, 10, 5, 1, null);
    F.assert(placeResult === false, 'placeBlock returns false with null player');

    // 3c. placeBlock — air check (target not air)
    mockCM.createMockChunk(0, 0);
    mockCM.fillArea(mockCM, 0, 0, 0, 15, 255, 15, 1); // stone everywhere
    var placeSolid = Donkeycraft.BlockPlacement.placeBlock(mockCM, 8, 50, 8, 2, mockPlayer);
    F.assert(placeSolid === false, 'placeBlock returns false on non-air block');

    // 3d. placeBlock — player collision
    mockCM.createMockChunk(1, 1);
    mockCM.fillArea(mockCM, 16, 0, 16, 31, 0, 31, 0); // air in chunk (1,1)
    mockPlayer.setPosition(24, 10, 24); // player at center of chunk (1,1)
    var placeCollide = Donkeycraft.BlockPlacement.placeBlock(mockCM, 24, 10, 24, 2, mockPlayer);
    F.assert(placeCollide === false, 'placeBlock returns false on player collision');

    // 3e. placeBlock — valid placement
    mockPlayer.setPosition(24, 10, 24);
    var placeValid = Donkeycraft.BlockPlacement.placeBlock(mockCM, 24, 255, 24, 2, mockPlayer); // high up, no player
    F.assert(placeValid === true, 'placeBlock returns true for valid placement');

    // 3f. getPlacementPosition — floors coordinates
    var posResult = Donkeycraft.BlockPlacement.getPlacementPosition(10.7, 20.3, 5.9, -1, 0, 0);
    F.assertEq(posResult.x, 9, 'getPlacementPosition floors x: floor(10.7 - (-1)) = floor(11.7) = 11... wait, hitX-faceNormalX = 10.7-(-1) = 11.7, floor = 11');
    // Actually: hitX=10.7, faceNormalX=-1, so placementX = 10.7 - (-1) = 11.7, floor = 11
    F.assertEq(posResult.x, 11, 'getPlacementPosition floors x correctly');
    F.assertEq(posResult.y, 20, 'getPlacementPosition floors y: floor(20.3) = 20');
    F.assertEq(posResult.z, 5, 'getPlacementPosition floors z: floor(5.9) = 5');

    // 3g. placeBlockFromRaycast — null checks
    var raycastPlace = Donkeycraft.BlockPlacement.placeBlockFromRaycast(null, 5, 10, 5, 0, -1, 0, 1, mockPlayer);
    F.assert(raycastPlace === false, 'placeBlockFromRaycast returns false with null chunkManager');

    // 3h. canPlaceAt
    var canPlace = Donkeycraft.BlockPlacement.canPlaceAt(mockCM, 24, 255, 24, mockPlayer);
    F.assert(canPlace === true, 'canPlaceAt returns true when no collision');

    // 3i. getFaceNormals
    var faceNormals = Donkeycraft.BlockPlacement.getFaceNormals();
    F.assertEq(faceNormals.length, 6, 'BlockPlacement.getFaceNormals returns 6 normals');

    // ============================================================
    // Section 4: InteractableBlocks — Right-Click Interactions
    // ============================================================
    F.section('4. InteractableBlocks — Right-Click Interactions');

    // 4a. Class registration
    F.assert(typeof Donkeycraft.InteractableBlocks === 'object', 'Donkeycraft.InteractableBlocks exists');
    F.assert(typeof Donkeycraft.InteractableBlocks.handleRightClick === 'function', 'handleRightClick is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.isInteractiveBlock === 'function', 'isInteractiveBlock is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.getInteractionType === 'function', 'getInteractionType is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.toggleDoor === 'function', 'toggleDoor is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.toggleLever === 'function', 'toggleLever is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.pressButton === 'function', 'pressButton is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.openChest === 'function', 'openChest is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.openFurnace === 'function', 'openFurnace is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.activateDispenser === 'function', 'activateDispenser is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.playNoteBlock === 'function', 'playNoteBlock is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.cancelAllButtonTimers === 'function', 'cancelAllButtonTimers is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.getInteractiveBlockIds === 'function', 'getInteractiveBlockIds is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.setCurrentTick === 'function', 'setCurrentTick is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.getCurrentTick === 'function', 'getCurrentTick is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.setEventBus === 'function', 'setEventBus is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.clearChunkButtonStates === 'function', 'clearChunkButtonStates is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.getInteractiveState === 'function', 'getInteractiveState is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.clearAllStates === 'function', 'clearAllStates is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.serializeState === 'function', 'serializeState is a function');
    F.assert(typeof Donkeycraft.InteractableBlocks.deserializeState === 'function', 'deserializeState is a function');

    // 4b. Interactive block IDs
    var interactiveIds = Donkeycraft.InteractableBlocks.getInteractiveBlockIds();
    F.assert(interactiveIds.CHEST === 54, 'CHEST block ID = 54');
    F.assert(interactiveIds.FURNACE === 61, 'FURNACE block ID = 61');
    F.assert(interactiveIds.DOOR_WOOD === 64, 'DOOR_WOOD block ID = 64');
    F.assert(interactiveIds.DOOR_IRON === 71, 'DOOR_IRON block ID = 71');
    F.assert(interactiveIds.TRAPDOOR === 143, 'TRAPDOOR block ID = 143');
    F.assert(interactiveIds.LEVER === 69, 'LEVER block ID = 69');
    F.assert(interactiveIds.BUTTON_STONE === 70, 'BUTTON_STONE block ID = 70');
    F.assert(interactiveIds.BUTTON_WOOD === 147, 'BUTTON_WOOD block ID = 147');
    F.assert(interactiveIds.DISPENSER === 23, 'DISPENSER block ID = 23');
    F.assert(interactiveIds.NOTE_BLOCK === 25, 'NOTE_BLOCK block ID = 25');

    // 4c. isInteractiveBlock
    F.assert(Donkeycraft.InteractableBlocks.isInteractiveBlock(54) === true, 'Chest (54) is interactive');
    F.assert(Donkeycraft.InteractableBlocks.isInteractiveBlock(61) === true, 'Furnace (61) is interactive');
    F.assert(Donkeycraft.InteractableBlocks.isInteractiveBlock(1) === false, 'Stone (1) is NOT interactive');
    F.assert(Donkeycraft.InteractableBlocks.isInteractiveBlock(0) === false, 'Air (0) is NOT interactive');

    // 4d. getInteractionType
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(54), 'chest', 'Block 54 = chest');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(61), 'furnace', 'Block 61 = furnace');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(64), 'door', 'Block 64 = door');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(71), 'door', 'Block 71 = door');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(143), 'trapdoor', 'Block 143 = trapdoor');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(69), 'lever', 'Block 69 = lever');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(70), 'button', 'Block 70 = button');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(147), 'button', 'Block 147 = button');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(23), 'dispenser', 'Block 23 = dispenser');
    F.assertEq(Donkeycraft.InteractableBlocks.getInteractionType(25), 'note_block', 'Block 25 = note_block');
    F.assert(Donkeycraft.InteractableBlocks.getInteractionType(1) === null, 'Block 1 (stone) = null');
    F.assert(Donkeycraft.InteractableBlocks.getInteractionType(0) === null, 'Block 0 (air) = null');

    // 4e. Door toggle
    Donkeycraft.InteractableBlocks.clearAllStates();
    mockCM.createMockChunk(0, 0);
    var resultDoor = Donkeycraft.InteractableBlocks.toggleDoor(mockCM, 8, 50, 8, false);
    F.assert(resultDoor === true, 'toggleDoor returns true');
    var doorState = Donkeycraft.InteractableBlocks.getInteractiveState(8, 50, 8);
    F.assert(doorState !== null, 'Door state exists after toggle');
    if (doorState) {
        F.assertEq(doorState.type, 'door', 'Door type = "door"');
        F.assertEq(doorState.state, 'open', 'Door state = "open" (first toggle)');
    }

    // Toggle again — should close
    var resultDoor2 = Donkeycraft.InteractableBlocks.toggleDoor(mockCM, 8, 50, 8, false);
    F.assert(resultDoor2 === true, 'toggleDoor returns true on second call');
    var doorState2 = Donkeycraft.InteractableBlocks.getInteractiveState(8, 50, 8);
    if (doorState2) {
        F.assertEq(doorState2.state, 'closed', 'Door state = "closed" (second toggle)');
    }

    // 4f. Lever toggle
    Donkeycraft.InteractableBlocks.clearAllStates();
    var resultLever = Donkeycraft.InteractableBlocks.toggleLever(mockCM, 8, 50, 8);
    F.assert(resultLever === true, 'toggleLever returns true');
    var leverState = Donkeycraft.InteractableBlocks.getInteractiveState(8, 50, 8);
    if (leverState) {
        F.assertEq(leverState.type, 'lever', 'Lever type = "lever"');
        F.assertEq(leverState.state, 'on', 'Lever state = "on" (first toggle)');
    }

    // Toggle again — should turn off
    Donkeycraft.InteractableBlocks.toggleLever(mockCM, 8, 50, 8);
    var leverState2 = Donkeycraft.InteractableBlocks.getInteractiveState(8, 50, 8);
    if (leverState2) {
        F.assertEq(leverState2.state, 'off', 'Lever state = "off" (second toggle)');
    }

    // 4g. Button press and tick-based expiry
    Donkeycraft.InteractableBlocks.clearAllStates();
    Donkeycraft.InteractableBlocks.setCurrentTick(100);
    var resultBtn = Donkeycraft.InteractableBlocks.pressButton(mockCM, 8, 50, 8);
    F.assert(resultBtn === true, 'pressButton returns true');

    // Button should still be active (tick 100 < 110)
    var resultBtn2 = Donkeycraft.InteractableBlocks.pressButton(mockCM, 8, 50, 8);
    F.assert(resultBtn2 === false, 'pressButton returns false during cooldown');

    // Advance tick past expiry
    Donkeycraft.InteractableBlocks.setCurrentTick(110);
    var resultBtn3 = Donkeycraft.InteractableBlocks.pressButton(mockCM, 8, 50, 8);
    F.assert(resultBtn3 === true, 'pressButton returns true after expiry');

    // 4h. setCurrentTick / getCurrentTick
    Donkeycraft.InteractableBlocks.setCurrentTick(500);
    F.assertEq(Donkeycraft.InteractableBlocks.getCurrentTick(), 500, 'getCurrentTick returns current tick');

    // 4i. Serialization / Deserialization
    Donkeycraft.InteractableBlocks.clearAllStates();
    Donkeycraft.InteractableBlocks.setCurrentTick(1000);
    Donkeycraft.InteractableBlocks.toggleDoor(mockCM, 8, 50, 8, false);

    var serialized = Donkeycraft.InteractableBlocks.serializeState();
    F.assertType(serialized.interactiveStates, 'object', 'serializeState returns interactiveStates');
    F.assertType(serialized.buttonStates, 'object', 'serializeState returns buttonStates');
    F.assertEq(serialized.currentTick, 1000, 'serializeState currentTick = 1000');

    Donkeycraft.InteractableBlocks.clearAllStates();
    F.assertEq(Donkeycraft.InteractableBlocks.getCurrentTick(), 0, 'clearAllStates resets tick to 0');

    Donkeycraft.InteractableBlocks.deserializeState(serialized);
    F.assertEq(Donkeycraft.InteractableBlocks.getCurrentTick(), 1000, 'deserializeState restores tick');
    var restoredState = Donkeycraft.InteractableBlocks.getInteractiveState(8, 50, 8);
    F.assert(restoredState !== null, 'Restored interactive state exists');

    // 4j. cancelAllButtonTimers
    Donkeycraft.InteractableBlocks.clearAllStates();
    Donkeycraft.InteractableBlocks.setCurrentTick(200);
    Donkeycraft.InteractableBlocks.pressButton(mockCM, 10, 60, 10);
    Donkeycraft.InteractableBlocks.cancelAllButtonTimers();
    var afterCancel = Donkeycraft.InteractableBlocks.pressButton(mockCM, 10, 60, 10);
    F.assert(afterCancel === true, 'Button pressable after cancelAllButtonTimers');

    // 4k. clearChunkButtonStates
    Donkeycraft.InteractableBlocks.clearAllStates();
    Donkeycraft.InteractableBlocks.setCurrentTick(300);
    Donkeycraft.InteractableBlocks.pressButton(mockCM, 0, 0, 0);   // chunk (0,0)
    Donkeycraft.InteractableBlocks.pressButton(mockCM, 16, 0, 0);  // chunk (1,0)
    Donkeycraft.InteractableBlocks.clearChunkButtonStates(0, 0);
    // Button at (16,0,0) should still be active
    var btnStillActive = Donkeycraft.InteractableBlocks.pressButton(mockCM, 16, 0, 0);
    F.assert(btnStillActive === false, 'Button in other chunk still in cooldown after partial cleanup');

    // 4l. openChest / openFurnace (event emission)
    Donkeycraft.InteractableBlocks.clearAllStates();
    var chestResult = Donkeycraft.InteractableBlocks.openChest(mockCM, mockPlayer, 8, 50, 8);
    F.assert(chestResult === true, 'openChest returns true');

    var furnaceResult = Donkeycraft.InteractableBlocks.openFurnace(mockCM, mockPlayer, 9, 50, 9);
    F.assert(furnaceResult === true, 'openFurnace returns true');

    // 4m. activateDispenser / playNoteBlock
    var dispResult = Donkeycraft.InteractableBlocks.activateDispenser(mockCM, 8, 50, 8);
    F.assert(dispResult === true, 'activateDispenser returns true');

    // Note block requires correct block ID
    mockCM.createMockChunk(0, 0);
    var noteResult = Donkeycraft.InteractableBlocks.playNoteBlock(mockCM, 8, 50, 8);
    F.assert(noteResult === false, 'playNoteBlock returns false for non-note-block');

    // 4n. setEventBus (silence test — no errors when EventBus not set)
    Donkeycraft.InteractableBlocks.setEventBus(null);
    var silentToggle = Donkeycraft.InteractableBlocks.toggleLever(mockCM, 8, 50, 8);
    F.assert(silentToggle === true, 'toggleLever works without EventBus (silent)');

    // ============================================================
    // Section 5: Cross-Module Integration
    // ============================================================
    F.section('5. Cross-Module Integration');

    // 5a. Raycast → BlockAction pipeline: find block, start breaking
    Donkeycraft.BlockAction.clearAll();
    mockCM.createMockChunk(0, 0);
    mockCM.fillArea(mockCM, 0, 0, 0, 15, 255, 15, 1); // stone everywhere

    var rayOrigin = new Donkeycraft.Vector3(8, 60, 8);
    var rayDir = new Donkeycraft.Vector3(0, -1, 0);
    var rayHit = Donkeycraft.Raycast.raycast(mockCM, rayOrigin, rayDir, 15.0);
    F.assert(rayHit !== null, 'Raycast finds block below player');

    if (rayHit) {
        // Start breaking the hit block
        Donkeycraft.BlockAction.startBreaking(
            rayHit.blockX, rayHit.blockY, rayHit.blockZ,
            1, [], 'stone'
        );
        var breakProgress = Donkeycraft.BlockAction.getBreakProgress(
            rayHit.blockX, rayHit.blockY, rayHit.blockZ
        );
        F.assert(breakProgress >= 0, 'Break progress ≥ 0 after starting break');

        // Tick progress
        var tickEvents = Donkeycraft.BlockAction.tickBreakProgress(0.25);
        F.assertType(tickEvents, 'object', 'tickBreakProgress returns object/array');
    }

    // 5b. Raycast → BlockPlacement pipeline: find face, place adjacent block
    mockCM.createMockChunk(1, 1);
    mockCM.fillArea(mockCM, 16, 0, 16, 31, 255, 31, 0); // air in chunk (1,1)

    var rayOrigin2 = new Donkeycraft.Vector3(24, 50, 24);
    var rayDir2 = new Donkeycraft.Vector3(0, -1, 0);
    var rayHit2 = Donkeycraft.Raycast.raycast(mockCM, rayOrigin2, rayDir2, 60.0);
    F.assert(rayHit2 !== null, 'Raycast finds block below in air chunk');

    if (rayHit2) {
        // Get placement position from face normal
        var placePos = Donkeycraft.BlockPlacement.getPlacementPosition(
            rayHit2.blockX, rayHit2.blockY, rayHit2.blockZ,
            rayHit2.faceNormalX, rayHit2.faceNormalY, rayHit2.faceNormalZ
        );
        F.assertType(placePos.x, 'number', 'Placement position x is number');
        F.assertType(placePos.y, 'number', 'Placement position y is number');
        F.assertType(placePos.z, 'number', 'Placement position z is number');
    }

    // 5c. InteractableBlocks → BlockAction: lever triggers redstone (silently when no RedstoneEngine)
    Donkeycraft.InteractableBlocks.clearAllStates();
    var leverResult = Donkeycraft.InteractableBlocks.toggleLever(mockCM, 8, 50, 8);
    F.assert(leverResult === true, 'Lever toggle works without RedstoneEngine');

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
