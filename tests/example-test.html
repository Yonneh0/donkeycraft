<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Example Test Template</title>
<link rel="stylesheet" href="test.css">
</head>
<body>
<h1>Donkeycraft — Example Test Template</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Example test file demonstrating the shared TestFramework usage. Copy this template for new phase/milestone tests.</div>

<!-- Summary is auto-created at top by TestFramework.init() -->
<div id="results"></div>

<!-- Load project scripts in dependency order -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>

<!-- Load shared test framework (MUST come before the test script) -->
<script src="test.js"></script>

<!-- Your test script -->
<script>
(function() {
    'use strict';

    // Get the shared framework instance
    var F = TestFramework;

    // Initialize: creates #test-summary at top, uses existing #results div
    F.init('results');

    // ============================================================
    // Section 1: Namespace checks
    // ============================================================
    F.section('1. Namespace & Class Registration');

    F.assert(typeof Donkeycraft !== 'undefined', 'Donkeycraft namespace exists');
    F.assert(typeof Donkeycraft.EventBus === 'function', 'Donkeycraft.EventBus registered');
    F.assert(typeof Donkeycraft.Config === 'object', 'Donkeycraft.Config registered');
    F.assertType(Donkeycraft.VERSION, 'string', 'VERSION is a string');
    F.assertEq(Donkeycraft.VERSION, '0.1.0', 'VERSION equals "0.1.0"');

    // ============================================================
    // Section 2: EventBus functionality
    // ============================================================
    F.section('2. EventBus Functionality');

    var bus = new Donkeycraft.EventBus();
    F.assertType(bus, 'object', 'EventBus instance created');

    var emitCalled = false;
    bus.on('test', function() { emitCalled = true; });
    bus.emit('test');
    F.assert(emitCalled, 'EventBus on/emit works correctly');

    // Test unsubscribe
    var unsubFired = false;
    var unsub = bus.on('unsubTest', function() { unsubFired = true; });
    unsub();
    bus.emit('unsubTest');
    F.assert(!unsubFired, 'Unsubscribe function prevents further calls');

    // Test arguments passthrough
    var argResult = null;
    bus.on('argsTest', function(a, b) { argResult = [a, b]; });
    bus.emit('argsTest', 42, 'hello');
    F.assertArrEq(argResult, [42, 'hello'], 'Arguments passthrough works');

    // ============================================================
    // Section 3: Math utility functions
    // ============================================================
    F.section('3. Math Utilities (if available)');

    if (typeof Donkeycraft.lerp === 'function') {
        F.assertEq(Donkeycraft.lerp(0, 10, 0), 0, 'lerp(0,10,0) = 0');
        F.assertEq(Donkeycraft.lerp(0, 10, 1), 10, 'lerp(0,10,1) = 10');
        F.assertEq(Donkeycraft.lerp(0, 10, 0.5), 5, 'lerp(0,10,0.5) = 5');

        F.assertEq(Donkeycraft.clamp(5, 0, 10), 5, 'clamp(5,0,10) = 5');
        F.assertEq(Donkeycraft.clamp(-3, 0, 10), 0, 'clamp(-3,0,10) = 0');
        F.assertEq(Donkeycraft.clamp(15, 0, 10), 10, 'clamp(15,0,10) = 10');

        F.info('All lerp/clamp tests passed');
    } else {
        F.info('Math utilities not loaded (expected if math-utils.js not included)');
    }

    // ============================================================
    // Section 4: Floating point comparison
    // ============================================================
    F.section('4. Floating Point Comparison');

    var a = 0.1 + 0.2;
    F.assertNear(a, 0.3, 0.0001, '0.1 + 0.2 ≈ 0.3 (floating point tolerance)');

    var v = { x: 1.0001, y: 2.0001 };
    F.assertNear(v.x, 1.0, 0.001, 'Vector x component ≈ 1.0');

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
</body>
</html>
