<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Milestone 1 "Hello World" Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 960px; margin: 0 auto; }
h1 { color: #00d4ff; font-size: 1.4em; margin-bottom: 8px; border-bottom: 2px solid #00d4ff; padding-bottom: 8px; }
.subtitle { color: #888; font-size: 0.85em; margin-bottom: 16px; }
.section { margin: 16px 0; padding: 12px 16px; background: #16213e; border-radius: 6px; border-left: 4px solid #333; }
.section h2 { color: #00d4ff; font-size: 1.05em; margin-bottom: 8px; }
.test { padding: 4px 0 4px 24px; font-size: 0.88em; border-left: 2px solid #333; margin: 2px 0; }
.test.pass { color: #2ecc71; border-left-color: #2ecc71; }
.test.fail { color: #e74c3c; border-left-color: #e74c3c; }
.test .detail { color: #888; font-size: 0.85em; margin-top: 1px; }
.summary { margin: 20px 0; padding: 14px 18px; border-radius: 6px; font-size: 1em; }
.summary.pass { background: #0a3d0a; border-left: 4px solid #2ecc71; }
.summary.fail { background: #3d0a0a; border-left: 4px solid #e74c3c; }
.info-msg { color: #f1c40f; font-style: italic; padding: 4px 0 4px 24px; font-size: 0.85em; }
#canvas-container { margin: 16px 0; padding: 12px; background: #0a0a0a; border-radius: 6px; text-align: center; position: relative; }
canvas { border: 1px solid #333; max-width: 100%; image-rendering: pixelated; }
#fps-display { position: absolute; top: 8px; right: 12px; color: #2ecc71; font-size: 0.9em; font-weight: bold; }
</style>
</head>
<body>
<h1>Donkeycraft — Milestone 1 "Hello World" Test</h1>
<div class="subtitle">Goal: Verify rendering pipeline works with core infrastructure — rotating colored cube at 60 FPS.</div>
<div id="results"></div>

<div id="canvas-container">
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="fps-display">FPS: --</div>
</div>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<!-- Phase 2 Render modules -->
<script src="../src/render/gl-context.js"></script>
<script src="../src/render/shader-manager.js"></script>
<script src="../src/render/camera.js"></script>

<script>
(function() {
    'use strict';

    var results = document.getElementById('results');
    var fpsDisplay = document.getElementById('fps-display');
    var totalTests = 0;
    var passedTests = 0;
    var failedTests = 0;
    var currentSection = null;
    var visualPass = false; // Set if canvas renders

    // ============================================================
    // Test Framework (uniform across all tests)
    // ============================================================

    function section(name) {
        var div = document.createElement('div');
        div.className = 'section';
        var heading = document.createElement('h2');
        heading.textContent = name;
        div.appendChild(heading);
        results.appendChild(div);
        currentSection = div;
    }

    function assert(condition, message) {
        totalTests++;
        var div = document.createElement('div');
        if (condition) {
            passedTests++;
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Assertion failed.</div>';
        }
        currentSection.appendChild(div);
    }

    function assertEq(actual, expected, message) {
        totalTests++;
        if (actual === expected) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual) + '</div>';
            currentSection.appendChild(div);
        }
    }

    function assertNear(actual, expected, epsilon, message) {
        totalTests++;
        if (Math.abs(actual - expected) < epsilon) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ~' + expected + ', got ' + actual + ' (delta=' + Math.abs(actual - expected) + ', epsilon=' + epsilon + ')</div>';
            currentSection.appendChild(div);
        }
    }

    function assertType(val, type, message) {
        totalTests++;
        if (typeof val === type) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected type "' + type + '", got "' + typeof val + '"</div>';
            currentSection.appendChild(div);
        }
    }

    function info(msg) {
        var div = document.createElement('div');
        div.className = 'info-msg';
        div.textContent = '>> ' + msg;
        currentSection.appendChild(div);
    }

    function finishTests() {
        var summary = document.createElement('div');
        if (failedTests === 0) {
            summary.className = 'summary pass';
            summary.innerHTML = '<strong>ALL TESTS PASSED</strong> \u2014 ' + passedTests + '/' + totalTests;
        } else {
            summary.className = 'summary fail';
            summary.innerHTML = '<strong>TESTS FAILED</strong> \u2014 ' + passedTests + '/' + totalTests + ' passed, ' + failedTests + ' failed';
        }
        results.appendChild(summary);
    }

    // ============================================================
    // TEST 1: Namespace & Class Registration
    // ============================================================
    section('1. Namespace & Class Registration');

    assert(typeof Donkeycraft !== 'undefined', 'Donkeycraft namespace exists');
    assert(typeof Donkeycraft.GLContext === 'function', 'Donkeycraft.GLContext registered');
    assert(typeof Donkeycraft.ShaderManager === 'function', 'Donkeycraft.ShaderManager registered');
    assert(typeof Donkeycraft.Camera === 'function', 'Donkeycraft.Camera registered');

    // ============================================================
    // TEST 2: WebGL Context Creation
    // ============================================================
    section('2. WebGL Context Creation');

    var canvas = document.getElementById('canvas');
    var glCtx = new Donkeycraft.GLContext(canvas);
    assert(glCtx !== null, 'GLContext instance created');
    assert(glCtx.getGL() !== null, 'WebGL context obtained from GLContext');

    var gl = glCtx.getGL();
    assert(gl instanceof WebGLRenderingContext, 'WebGLRenderingContext obtained');

    // Test capability queries
    assert(typeof glCtx.getMaxTextureSize() === 'number', 'getMaxTextureSize returns number');
    assert(typeof glCtx.getMaxVertexUniforms() === 'number', 'getMaxVertexUniforms returns number');

    // ============================================================
    // TEST 3: Shader Compilation & Linking
    // ============================================================
    section('3. Shader Compilation & Linking');

    var shaderMgr = new Donkeycraft.ShaderManager(gl);
    assert(shaderMgr !== null, 'ShaderManager instance created');

    // Cube vertex shader — with color attribute and uniform matrices
    var cubeVertSrc = [
        'attribute vec3 aPosition;',
        'attribute vec3 aColor;',
        'uniform mat4 uModelMatrix;',
        'uniform mat4 uViewProjection;',
        'varying vec3 vColor;',
        'void main() {',
        '    vColor = aColor;',
        '    gl_Position = uViewProjection * uModelMatrix * vec4(aPosition, 1.0);',
        '}'
    ].join('\n');

    // Cube fragment shader — use per-vertex color
    var cubeFragSrc = [
        'precision mediump float;',
        'varying vec3 vColor;',
        'void main() { gl_FragColor = vec4(vColor, 1.0); }'
    ].join('\n');

    var cubeProgId = shaderMgr.createProgram('cube', cubeVertSrc, cubeFragSrc);
    assert(cubeProgId !== null, 'Cube shader program compiled and linked');

    // Simple test shader for basic rendering
    var testVertSrc = [
        'attribute vec3 aPosition;',
        'void main() { gl_Position = vec4(aPosition, 1.0); }'
    ].join('\n');

    var testFragSrc = [
        'precision mediump float;',
        'void main() { gl_FragColor = vec4(0.2, 0.8, 0.2, 1.0); }'
    ].join('\n');

    var testProgId = shaderMgr.createProgram('test-quad', testVertSrc, testFragSrc);
    assert(testProgId !== null, 'Test quad shader program compiled and linked');

    // Test attribute location caching
    shaderMgr.use('test-quad');
    var posLoc = shaderMgr.getAttribute('aPosition');
    assert(typeof posLoc === 'number' && posLoc >= 0, 'Attribute location retrieved');

    // ============================================================
    // TEST 4: Matrix4 — Identity, Perspective, LookAt
    // ============================================================
    section('4. Matrix4 — Transform Matrices');

    var identity = Donkeycraft.Matrix4.createIdentity();
    var idData = identity.getData();
    assert(idData[0] === 1 && idData[5] === 1 && idData[10] === 1 && idData[15] === 1, 'Identity matrix diagonal = 1');

    var persp = Donkeycraft.Matrix4.createPerspective(Math.PI / 4, canvas.width / canvas.height, 0.1, 100);
    assert(persp instanceof Donkeycraft.Matrix4, 'Perspective matrix created');

    var eye = new Donkeycraft.Vector3(0, 0, 5);
    var target = new Donkeycraft.Vector3(0, 0, 0);
    var up = new Donkeycraft.Vector3(0, 1, 0);
    var lookAt = Donkeycraft.Matrix4.createLookAt(eye, target, up);
    assert(lookAt instanceof Donkeycraft.Matrix4, 'LookAt matrix created');

    var trans = Donkeycraft.Matrix4.createTranslation(1, 2, 3);
    var tData = trans.getData();
    assert(tData[12] === 1 && tData[13] === 2 && tData[14] === 3, 'Translation matrix offsets correct');

    // Rotation around Y axis (90 degrees)
    var zAxis = new Donkeycraft.Vector3(0, 1, 0);
    var rotY = Donkeycraft.Matrix4.createRotation(Math.PI / 2, zAxis);
    assert(rotY instanceof Donkeycraft.Matrix4, 'Rotation matrix created');

    // Matrix multiplication
    var combined = trans.multiply(rotY);
    assert(combined instanceof Donkeycraft.Matrix4, 'Matrix multiplication returns Matrix4');

    // ============================================================
    // TEST 5: Camera — Position, Rotation, Matrices
    // ============================================================
    section('5. Camera — Position, Rotation & Matrices');

    var camera = new Donkeycraft.Camera(70, 0.1, 100);
    assert(camera !== null, 'Camera instance created');

    var pos = camera.getPosition();
    assert(pos instanceof Donkeycraft.Vector3, 'Camera position is Vector3');
    assert(Math.abs(pos.x) < 0.01, 'Camera X starts at 0');
    assert(Math.abs(pos.y - 64) < 0.01, 'Camera Y starts at 64');
    assert(Math.abs(pos.z) < 0.01, 'Camera Z starts at 0');

    camera.setRotation(0, 0);
    assert(Math.abs(camera.getYaw()) < 0.01, 'Yaw is 0');
    assert(Math.abs(camera.getPitch()) < 0.01, 'Pitch is 0');

    var forward = camera.getForward();
    assert(Math.abs(forward.z + 1) < 0.01, 'Forward Z is ~-1 at yaw=0 (looking down -Z)');

    var right = camera.getRight();
    assert(Math.abs(right.x - 1) < 0.01, 'Right X is ~1 at yaw=0');

    var matrices = camera.getMatrices();
    assert(matrices.projection instanceof Donkeycraft.Matrix4, 'Projection matrix is Matrix4');
    assert(matrices.view instanceof Donkeycraft.Matrix4, 'View matrix is Matrix4');

    // Test target calculation
    camera.setPosition(0, 64, 0);
    var target = camera.getTarget();
    assert(Math.abs(target.z + 1) < 0.01, 'Target Z is ~-1 at yaw=0');

    // ============================================================
    // TEST 6: Shader Uniform Setting
    // ============================================================
    section('6. Shader Uniform Setting');

    shaderMgr.use('test-quad');
    shaderMgr.setFloat('uTest', 0.5);
    assert(true, 'setFloat completed without error');

    shaderMgr.setVec3('uTest3', 1.0, 0.0, 0.0);
    assert(true, 'setVec3 completed without error');

    shaderMgr.setMat4('uTestMat', Donkeycraft.Matrix4.createIdentity());
    assert(true, 'setMat4 completed without error');

    // ============================================================
    // TEST 7: WebGL — Render a Green Quad (Visual Test)
    // ============================================================
    section('7. WebGL — Render Green Quad (Visual Confirmation)');

    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.clearColor(0.1, 0.1, 0.2, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    // Use test-quad shader (solid green)
    shaderMgr.use('test-quad');

    var quadVerts = new Float32Array([
        -0.5, -0.5, 0,
         0.5, -0.5, 0,
         0.5,  0.5, 0,
        -0.5,  0.5, 0
    ]);

    var quadBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    gl.bufferData(gl.ARRAY_BUFFER, quadVerts, gl.STATIC_DRAW);

    var posLoc2 = shaderMgr.getAttribute('aPosition');
    if (posLoc2 >= 0) {
        gl.enableVertexAttribArray(posLoc2);
        gl.vertexAttribPointer(posLoc2, 3, gl.FLOAT, false, 0, 0);
    }

    gl.drawArrays(gl.TRIANGLE_FAN, 0, 4);

    if (posLoc2 >= 0) gl.disableVertexAttribArray(posLoc2);
    gl.deleteBuffer(quadBuf);

    var err = gl.getError();
    assert(err === gl.NO_ERROR, 'No WebGL errors after rendering quad');
    visualPass = true; // If we got here without exception, canvas rendered

    info('Green quad rendered to canvas — verify visually above.');

    // ============================================================
    // TEST 8: Rotating Colored Cube (Visual Test)
    // ============================================================
    section('8. WebGL — Rotating Colored Cube (Live Animation)');

    // Setup cube rendering with model/view/projection matrices
    gl.enable(gl.DEPTH_TEST);
    gl.clearColor(0.1, 0.1, 0.2, 1.0);

    // Create cube vertex data: 8 vertices with positions and colors
    var cubeSize = 1.0;
    var hs = cubeSize / 2; // half-size
    var cubeVerts = new Float32Array([
        // Position (12 floats) + Color (12 floats) per vertex
        // Front face (z = +hs)
        -hs,-hs, hs,  1,0,0,   // 0: red
         hs,-hs, hs,  1,0,0,   // 1: red
         hs, hs, hs,  1,0,0,   // 2: red
        -hs, hs, hs,  1,0,0,   // 3: red
        // Back face (z = -hs)
         hs,-hs,-hs,  0,1,0,   // 4: green
        -hs,-hs,-hs,  0,1,0,   // 5: green
        -hs, hs,-hs,  0,1,0,   // 6: green
         hs, hs,-hs,  0,1,0,   // 7: green
        // Top face (y = +hs) — blue
        -hs, hs, hs,  0,0,1,   // 8: blue
         hs, hs, hs,  0,0,1,   // 9: blue
         hs, hs,-hs,  0,0,1,   // 10: blue
        -hs, hs,-hs,  0,0,1,   // 11: blue
        // Bottom face (y = -hs) — yellow
        -hs,-hs,-hs,  1,1,0,   // 12: yellow
         hs,-hs,-hs,  1,1,0,   // 13: yellow
         hs,-hs, hs,  1,1,0,   // 14: yellow
        -hs,-hs, hs,  1,1,0,   // 15: yellow
        // Right face (x = +hs) — magenta
         hs,-hs, hs,  1,0,1,   // 16: magenta
         hs,-hs,-hs,  1,0,1,   // 17: magenta
         hs, hs,-hs,  1,0,1,   // 18: magenta
         hs, hs, hs,  1,0,1,   // 19: magenta
        // Left face (x = -hs) — cyan
        -hs,-hs,-hs,  0,1,1,   // 20: cyan
        -hs,-hs, hs,  0,1,1,   // 21: cyan
        -hs, hs, hs,  0,1,1,   // 22: cyan
        -hs, hs,-hs,  0,1,1    // 23: cyan
    ]);

    var cubeIndices = new Uint16Array([
        0,1,2, 0,2,3,     // front (red)
        4,5,6, 4,6,7,     // back (green)
        8,9,10, 8,10,11,  // top (blue)
        12,13,14, 12,14,15,// bottom (yellow)
        16,17,18, 16,18,19,// right (magenta)
        20,21,22, 20,22,23 // left (cyan)
    ]);

    var cubeBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, cubeBuf);
    gl.bufferData(gl.ARRAY_BUFFER, cubeVerts, gl.STATIC_DRAW);

    var cubeIndexBuf = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, cubeIndexBuf);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, cubeIndices, gl.STATIC_DRAW);

    // Compile a shader that handles model-view-projection with per-vertex color
    var rotVertSrc = [
        'attribute vec3 aPos;',
        'attribute vec3 aCol;',
        'uniform mat4 uMVP;',
        'varying vec3 vCol;',
        'void main() {',
        '    vCol = aCol;',
        '    gl_Position = uMVP * vec4(aPos, 1.0);',
        '}'
    ].join('\n');

    var rotFragSrc = [
        'precision mediump float;',
        'varying vec3 vCol;',
        'void main() { gl_FragColor = vec4(vCol, 1.0); }'
    ].join('\n');

    var rotProgId = shaderMgr.createProgram('rotating-cube', rotVertSrc, rotFragSrc);
    assert(rotProgId !== null, 'Rotating cube shader compiled');

    // Start animation loop
    var animRunning = false;
    var fpsSamples = [];
    var cubeRotated = false;
    var startTime = Date.now();

    function renderCube() {
        if (!animRunning) return;

        var now = Date.now();
        var elapsed = (now - startTime) / 1000; // seconds
        var fps = 1000 / ((Date.now() - startTime) / Math.max(fpsSamples.length, 1));
        fpsSamples.push(1000 / Math.max(((Date.now() - startTime) / Math.max(fpsSamples.length, 1)), 1));

        // Update FPS display every ~500ms
        if (fpsSamples.length % 30 === 0) {
            var avgFps = fpsSamples.reduce(function(a,b){return a+b;}, 0) / fpsSamples.length;
            fpsDisplay.textContent = 'FPS: ' + Math.round(avgFps);
            fpsDisplay.style.color = avgFps >= 50 ? '#2ecc71' : (avgFps >= 30 ? '#f1c40f' : '#e74c3c');
        }

        // Clear
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        // Use rotating cube shader
        shaderMgr.use('rotating-cube');

        // Bind cube vertex data
        var posAttr = shaderMgr.getAttribute('aPos');
        var colAttr = shaderMgr.getAttribute('aCol');

        if (posAttr >= 0) {
            gl.enableVertexAttribArray(posAttr);
            gl.vertexAttribPointer(posAttr, 3, gl.FLOAT, false, 24, 0);
        }
        if (colAttr >= 0) {
            gl.enableVertexAttribArray(colAttr);
            gl.vertexAttribPointer(colAttr, 3, gl.FLOAT, false, 24, 12);
        }

        // Bind index buffer
        gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, cubeIndexBuf);

        // Compute MVP matrices
        var aspect = canvas.width / canvas.height;
        var projMat = Donkeycraft.Matrix4.createPerspective(Math.PI / 4, aspect, 0.1, 100);
        var viewMat = Donkeycraft.Matrix4.createLookAt(
            new Donkeycraft.Vector3(0, 1, 4),
            new Donkeycraft.Vector3(0, 0, 0),
            new Donkeycraft.Vector3(0, 1, 0)
        );

        // Rotation matrices
        var rotYMat = Donkeycraft.Matrix4.createRotation(elapsed * 0.8, new Donkeycraft.Vector3(0, 1, 0));
        var rotXMat = Donkeycraft.Matrix4.createRotation(elapsed * 0.5, new Donkeycraft.Vector3(1, 0, 0));

        // Combined model matrix
        var modelDataY = rotYMat.getData();
        var modelDataX = rotXMat.getData();

        // Simple matrix multiply: model = rotX * rotY (component-wise for demo)
        var modelData = new Float32Array(16);
        for (var i = 0; i < 4; i++) {
            for (var j = 0; j < 4; j++) {
                modelData[i * 4 + j] =
                    modelDataX[i*4+0]*modelDataY[0*4+j] +
                    modelDataX[i*4+1]*modelDataY[1*4+j] +
                    modelDataX[i*4+2]*modelDataY[2*4+j] +
                    modelDataX[i*4+3]*modelDataY[3*4+j];
            }
        }

        // View * Model
        var viewData = viewMat.getData();
        var vmData = new Float32Array(16);
        for (var i = 0; i < 4; i++) {
            for (var j = 0; j < 4; j++) {
                vmData[i*4+j] =
                    viewData[i*4+0]*modelData[0*4+j] +
                    viewData[i*4+1]*modelData[1*4+j] +
                    viewData[i*4+2]*modelData[2*4+j] +
                    viewData[i*4+3]*modelData[3*4+j];
            }
        }

        // View * Model * Projection
        var projData = projMat.getData();
        var mvpData = new Float32Array(16);
        for (var i = 0; i < 4; i++) {
            for (var j = 0; j < 4; j++) {
                mvpData[i*4+j] =
                    vmData[i*4+0]*projData[0*4+j] +
                    vmData[i*4+1]*projData[1*4+j] +
                    vmData[i*4+2]*projData[2*4+j] +
                    vmData[i*4+3]*projData[3*4+j];
            }
        }

        // Upload MVP uniform
        var mvpLoc = shaderMgr.getUniformLocation('uMVP');
        if (mvpLoc) {
            gl.uniformMatrix4fv(mvpLoc, false, mvpData);
        }

        // Draw
        gl.drawElements(gl.TRIANGLES, 36, gl.UNSIGNED_SHORT, 0);

        // Check errors
        err = gl.getError();
        if (err !== gl.NO_ERROR) {
            fpsDisplay.textContent = 'ERROR: ' + err;
            animRunning = false;
            return;
        }

        cubeRotated = true;
        requestAnimationFrame(renderCube);
    }

    // Start animation after a short delay to let DOM settle
    setTimeout(function() {
        animRunning = true;
        startTime = Date.now();
        fpsSamples = [];
        renderCube();
    }, 200);

    // Wait for animation to run, then evaluate
    setTimeout(function() {
        assert(cubeRotated, 'Rotating colored cube rendered successfully');
        assert(visualPass, 'WebGL canvas rendered without errors');

        // Stop animation
        animRunning = false;

        // Cleanup
        gl.deleteBuffer(cubeBuf);
        gl.deleteBuffer(cubeIndexBuf);

        // Test shader error catching
        var badVert = 'THIS IS NOT VALID GLSL {{{';
        var badFrag = 'MORE BAD GLSL }}}';
        var badProg = shaderMgr.createProgram('bad-shader', badVert, badFrag);
        assert(badProg === null || badProg === undefined, 'Invalid shader returns null/undefined (error caught)');

        info('Cube animation ran for ~2 seconds — verify rotating colored cube above.');
        finishTests();
    }, 2200);

})();
</script>
</body>
</html>
