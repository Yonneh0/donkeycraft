<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Asset Generator Test Suite</title>
<link rel="stylesheet" href="test.css">
<style>
body { max-width: 1600px; }
.subtitle { margin-bottom: 20px; }

/* Table layout for texture display */
.texture-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
}
.texture-table th {
    background: #0a3d5e;
    color: #00d4ff;
    padding: 8px 12px;
    text-align: left;
    font-size: 0.9em;
    border-bottom: 2px solid #00d4ff;
}
.texture-table td {
    padding: 6px 10px;
    border-bottom: 1px solid #1a2a4a;
    vertical-align: middle;
}
.texture-preview {
    width: 80px;
    height: 80px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #333;
    background: #111;
}
.atlas-preview {
    max-width: 100%;
    max-height: 960px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #00d4ff;
    background: #111;
}
.texture-name {
    font-family: monospace;
    color: #f1c40f;
    font-size: 0.85em;
    white-space: nowrap;
}
.pass-cell { color: #2ecc71; }
.fail-cell { color: #e74c3c; }

/* Sound display */
.sound-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
}
.sound-table th {
    background: #2d1a4e;
    color: #bb66ff;
    padding: 8px 12px;
    text-align: left;
    font-size: 0.9em;
    border-bottom: 2px solid #bb66ff;
}
.sound-table td {
    padding: 6px 10px;
    border-bottom: 1px solid #1a1a3e;
}
.play-btn {
    background: #bb66ff;
    color: #fff;
    border: none;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: monospace;
    font-size: 0.8em;
}
.play-btn:hover { background: #9944dd; }

/* Summary boxes */
.section-summary {
    display: flex;
    gap: 20px;
    margin: 10px 0;
    padding: 10px;
    background: #0a0a1a;
    border-radius: 6px;
    border-left: 4px solid #333;
}
.section-summary.pass { border-left-color: #2ecc71; }
.section-summary.fail { border-left-color: #e74c3c; }
.section-summary .stat { font-size: 0.9em; }
.section-summary .stat span { font-weight: bold; }

/* Overall result at top */
#overall-result {
    margin: 16px 0;
    padding: 16px 20px;
    border-radius: 8px;
    font-size: 1.1em;
    text-align: center;
    font-weight: bold;
}
#overall-result.pass { background: #0a3d0a; color: #2ecc71; border: 2px solid #2ecc71; }
#overall-result.fail { background: #3d0a0a; color: #e74c3c; border: 2px solid #e74c3c; }

/* Audio context creation button */
#audio-init-section {
    margin: 10px 0;
    padding: 12px;
    background: #1a1a3e;
    border-radius: 6px;
    text-align: center;
}
#audio-init-btn {
    background: #4CAF50;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.9em;
}
#audio-init-btn:hover { background: #3d9140; }
</style>
</head>
<body>
<h1>Donkeycraft — Asset Generator Test Suite</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Comprehensive functional tests for TextureGenerator, SoundGenerator, and AssetManager modules. All generated textures are displayed in tables.</div>

<div id="overall-result" class="pending"><strong>RUNNING TESTS</strong></div>
<div id="audio-init-section">
    <button id="audio-init-btn" onclick="initAudioContext()">Initialize AudioContext (required for sound tests)</button>
    <span id="audio-status" style="margin-left: 10px; color: #888;">Not initialized</span>
</div>
<div id="results"></div>

<!-- Load project scripts in dependency order -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/world/block.js"></script>
<script src="../src/core/asset-generator.js"></script>

<!-- Load shared test framework -->
<script src="test.js"></script>

<script>
(function() {
    'use strict';

    var F = TestFramework;
    var audioCtx = null;
    var totalSections = 0;
    var passedSections = 0;
    var failedSections = 0;

    // Initialize framework
    F.init('results');

    // ============================================================
    // AudioContext initialization
    // ============================================================
    window.initAudioContext = function() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('audio-status').textContent = 'Initialized (' + audioCtx.sampleRate + 'Hz)';
            document.getElementById('audio-status').style.color = '#2ecc71';
            document.getElementById('audio-init-btn').style.display = 'none';

            // Re-run sound tests now that AudioContext is ready
            runSoundTests();
        } catch(e) {
            document.getElementById('audio-status').textContent = 'Failed: ' + e.message;
            document.getElementById('audio-status').style.color = '#e74c3c';
        }
    };

    // ============================================================
    // Helper: Get canvas from generator function for dimension check
    // ============================================================
    function getCanvasFromGenerator(genFn) {
        // Generate the texture and extract its underlying canvas dimensions
        var img = genFn();
        // The _canvasToImage function creates an Image from dataURL.
        // We need to verify the generator works by checking it returns an Image element.
        return img;
    }

    function isImageLike(obj) {
        return obj && typeof obj === 'object' && (obj instanceof Image || (obj.tagName === 'IMG' && obj.src));
    }

    // ============================================================
    // SECTION 1: Namespace & Class Registration
    // ============================================================
    totalSections++;
    F.section('1. Namespace & Class Registration');

    F.assert(typeof Donkeycraft !== 'undefined', 'Donkeycraft namespace exists');
    F.assert(typeof Donkeycraft.TextureGenerator === 'object', 'Donkeycraft.TextureGenerator registered');
    F.assert(typeof Donkeycraft.SoundGenerator === 'object', 'Donkeycraft.SoundGenerator registered');
    F.assert(typeof Donkeycraft.AssetManager === 'object', 'Donkeycraft.AssetManager registered');

    // TextureGenerator functions
    var texGen = Donkeycraft.TextureGenerator;
    F.assertType(texGen.generateStone, 'function', 'TextureGenerator.generateStone is function');
    F.assertType(texGen.generateDirt, 'function', 'TextureGenerator.generateDirt is function');
    F.assertType(texGen.generateGrassTop, 'function', 'TextureGenerator.generateGrassTop is function');
    F.assertType(texGen.generateGrassSide, 'function', 'TextureGenerator.generateGrassSide is function');
    F.assertType(texGen.generateLogSide, 'function', 'TextureGenerator.generateLogSide is function');
    F.assertType(texGen.generateLogTop, 'function', 'TextureGenerator.generateLogTop is function');
    F.assertType(texGen.generateWood, 'function', 'TextureGenerator.generateWood is function');
    F.assertType(texGen.generatePlanks, 'function', 'TextureGenerator.generatePlanks is function');
    F.assertType(texGen.generateWool, 'function', 'TextureGenerator.generateWool is function');
    F.assertType(texGen.generateConcrete, 'function', 'TextureGenerator.generateConcrete is function');
    F.assertType(texGen.generateGlass, 'function', 'TextureGenerator.generateGlass is function');
    F.assertType(texGen.generateBricks, 'function', 'TextureGenerator.generateBricks is function');
    F.assertType(texGen.generateOre, 'function', 'TextureGenerator.generateOre is function');
    F.assertType(texGen.generateSand, 'function', 'TextureGenerator.generateSand is function');
    F.assertType(texGen.generateWater, 'function', 'TextureGenerator.generateWater is function');
    F.assertType(texGen.generateLava, 'function', 'TextureGenerator.generateLava is function');
    F.assertType(texGen.generateBedrock, 'function', 'TextureGenerator.generateBedrock is function');
    F.assertType(texGen.generateGlow, 'function', 'TextureGenerator.generateGlow is function');
    F.assertType(texGen.generateLeaves, 'function', 'TextureGenerator.generateLeaves is function');
    F.assertType(texGen.generateMissing, 'function', 'TextureGenerator.generateMissing is function');
    F.assertType(texGen.getGeneratorForBlock, 'function', 'TextureGenerator.getGeneratorForBlock is function');
    F.assertType(texGen.generateTextureForBlock, 'function', 'TextureGenerator.generateTextureForBlock is function');
    F.assertType(texGen.generateAllTextures, 'function', 'TextureGenerator.generateAllTextures is function');
    F.assertType(texGen.getTextureNameForBlock, 'function', 'TextureGenerator.getTextureNameForBlock is function');
    F.assertType(texGen.getNameMap, 'function', 'TextureGenerator.getNameMap is function');
    F.assertType(texGen.COLOR_MAP, 'object', 'TextureGenerator.COLOR_MAP is object');

    // SoundGenerator functions
    var sndGen = Donkeycraft.SoundGenerator;
    F.assertType(sndGen.getSound, 'function', 'SoundGenerator.getSound is function');
    F.assertType(sndGen.getCategories, 'function', 'SoundGenerator.getCategories is function');
    F.assertType(sndGen.clearCache, 'function', 'SoundGenerator.clearCache is function');
    F.assertType(sndGen.isCached, 'function', 'SoundGenerator.isCached is function');
    F.assertType(sndGen.generateStepSound, 'function', 'SoundGenerator.generateStepSound is function');
    F.assertType(sndGen.generateBreakSound, 'function', 'SoundGenerator.generateBreakSound is function');
    F.assertType(sndGen.generatePlaceSound, 'function', 'SoundGenerator.generatePlaceSound is function');
    F.assertType(sndGen.generateHitSound, 'function', 'SoundGenerator.generateHitSound is function');
    F.assertType(sndGen.generateFootstepSound, 'function', 'SoundGenerator.generateFootstepSound is function');
    F.assertType(sndGen.generateSplashSound, 'function', 'SoundGenerator.generateSplashSound is function');
    F.assertType(sndGen.generateGlassBreakSound, 'function', 'SoundGenerator.generateGlassBreakSound is function');
    F.assertType(sndGen.generatePopSound, 'function', 'SoundGenerator.generatePopSound is function');
    F.assertType(sndGen.generateExplosionSound, 'function', 'SoundGenerator.generateExplosionSound is function');
    F.assertType(sndGen.generateEnchantSound, 'function', 'SoundGenerator.generateEnchantSound is function');
    F.assertType(sndGen.generateDrinkSound, 'function', 'SoundGenerator.generateDrinkSound is function');
    F.assertType(sndGen.generateAmbientSound, 'function', 'SoundGenerator.generateAmbientSound is function');
    F.assertType(sndGen.generateHurtSound, 'function', 'SoundGenerator.generateHurtSound is function');

    // AssetManager functions
    var assetMgr = Donkeycraft.AssetManager;
    F.assertType(assetMgr.init, 'function', 'AssetManager.init is function');
    F.assertType(assetMgr.generateAllBlockTextures, 'function', 'AssetManager.generateAllBlockTextures is function');
    F.assertType(assetMgr.getTexture, 'function', 'AssetManager.getTexture is function');
    F.assertType(assetMgr.getAllTextures, 'function', 'AssetManager.getAllTextures is function');
    F.assertType(assetMgr.preloadSounds, 'function', 'AssetManager.preloadSounds is function');
    F.assertType(assetMgr.preloadAllSounds, 'function', 'AssetManager.preloadAllSounds is function');
    F.assertType(assetMgr.getNameMap, 'function', 'AssetManager.getNameMap is function');
    F.assertType(assetMgr.generateAtlasCanvas, 'function', 'AssetManager.generateAtlasCanvas is function');
    F.assertType(assetMgr.getAssetInfo, 'function', 'AssetManager.getAssetInfo is function');
    F.assertType(assetMgr.reset, 'function', 'AssetManager.reset is function');

    // ============================================================
    // SECTION 2: All Textures — Complete Visual Display
    // ============================================================
    totalSections++;
    F.section('2. All Textures — Complete Visual Display');

    // Consolidated texture list: one row per texture
    var allTextures = [
        // Terrain
        { name: 'Stone', fn: function() { return Donkeycraft.TextureGenerator.generateStone(42); } },
        { name: 'Dirt', fn: function() { return Donkeycraft.TextureGenerator.generateDirt(); } },
        { name: 'Grass Top', fn: function() { return Donkeycraft.TextureGenerator.generateGrassTop(); } },
        { name: 'Grass Side', fn: function() { return Donkeycraft.TextureGenerator.generateGrassSide(); } },
        // Wood
        { name: 'Oak Log Side', fn: function() { return Donkeycraft.TextureGenerator.generateLogSide(100); } },
        { name: 'Log Top', fn: function() { return Donkeycraft.TextureGenerator.generateLogTop(888); } },
        { name: 'Wood', fn: function() { return Donkeycraft.TextureGenerator.generateWood(999); } },
        { name: 'Planks (Oak)', fn: function() { return Donkeycraft.TextureGenerator.generatePlanks(188, 152, 98, 100); } },
        // Wool & Concrete samples
        { name: 'White Wool', fn: function() { return Donkeycraft.TextureGenerator.generateWool(240, 240, 240); } },
        { name: 'Red Wool', fn: function() { return Donkeycraft.TextureGenerator.generateWool(183, 52, 55); } },
        { name: 'Blue Concrete', fn: function() { return Donkeycraft.TextureGenerator.generateConcrete(53, 96, 186); } },
        { name: 'Green Concrete', fn: function() { return Donkeycraft.TextureGenerator.generateConcrete(87, 134, 63); } },
        // Glass & Bricks
        { name: 'Glass', fn: function() { return Donkeycraft.TextureGenerator.generateGlass(200, 220, 255); } },
        { name: 'Tinted Glass', fn: function() { return Donkeycraft.TextureGenerator.generateGlass(60, 50, 80); } },
        { name: 'Bricks (Red)', fn: function() { return Donkeycraft.TextureGenerator.generateBricks(160, 60, 50); } },
        { name: 'Nether Bricks', fn: function() { return Donkeycraft.TextureGenerator.generateNetherBrick(); } },
        { name: 'Red Nether Bricks', fn: function() { return Donkeycraft.TextureGenerator.generateRedNetherBrick(); } },
        { name: 'Prismarine (normal)', fn: function() { return Donkeycraft.TextureGenerator.generatePrismarine('normal'); } },
        { name: 'Prismarine (bricks)', fn: function() { return Donkeycraft.TextureGenerator.generatePrismarine('bricks'); } },
        { name: 'Prismarine (dark)', fn: function() { return Donkeycraft.TextureGenerator.generatePrismarine('dark'); } },
        // Ores (12)
        { name: 'Coal Ore', fn: function() { return Donkeycraft.TextureGenerator.generateCoalOre(); } },
        { name: 'Iron Ore', fn: function() { return Donkeycraft.TextureGenerator.generateIronOre(); } },
        { name: 'Gold Ore', fn: function() { return Donkeycraft.TextureGenerator.generateGoldOre(); } },
        { name: 'Diamond Ore', fn: function() { return Donkeycraft.TextureGenerator.generateDiamondOre(); } },
        { name: 'Emerald Ore', fn: function() { return Donkeycraft.TextureGenerator.generateEmeraldOre(); } },
        { name: 'Redstone Ore (unlit)', fn: function() { return Donkeycraft.TextureGenerator.generateRedstoneOre(); } },
        { name: 'Lit Redstone Ore', fn: function() { return Donkeycraft.TextureGenerator.generateLitRedstoneOre(); } },
        { name: 'Lapis Ore', fn: function() { return Donkeycraft.TextureGenerator.generateLapisOre(); } },
        { name: 'Nether Quartz Ore', fn: function() { return Donkeycraft.TextureGenerator.generateNetherQuartzOre(); } },
        { name: 'Nether Gold Ore', fn: function() { return Donkeycraft.TextureGenerator.generateNetherGoldOre(); } },
        { name: 'Ancient Debris', fn: function() { return Donkeycraft.TextureGenerator.generateAncientDebris(); } },
        { name: 'Gilded Blackstone', fn: function() { return Donkeycraft.TextureGenerator.generateGildedBlackstone(); } },
        // Liquids & Special
        { name: 'Water', fn: function() { return Donkeycraft.TextureGenerator.generateWater(); } },
        { name: 'Lava', fn: function() { return Donkeycraft.TextureGenerator.generateLava(); } },
        { name: 'Bedrock', fn: function() { return Donkeycraft.TextureGenerator.generateBedrock(); } },
        { name: 'Glow (purple)', fn: function() { return Donkeycraft.TextureGenerator.generateGlow(80, 20, 140); } },
        // Metal Blocks
        { name: 'Gold Block', fn: function() { return Donkeycraft.TextureGenerator.generateGoldBlock(); } },
        { name: 'Iron Block', fn: function() { return Donkeycraft.TextureGenerator.generateIronBlock(); } },
        { name: 'Diamond Block', fn: function() { return Donkeycraft.TextureGenerator.generateDiamondBlock(); } },
        { name: 'Emerald Block', fn: function() { return Donkeycraft.TextureGenerator.generateEmeraldBlock(); } },
        // Nether & End
        { name: 'Netherrack', fn: function() { return Donkeycraft.TextureGenerator.generateNetherrack(); } },
        { name: 'End Stone', fn: function() { return Donkeycraft.TextureGenerator.generateEndStone(); } },
        { name: 'Warped Stem', fn: function() { return Donkeycraft.TextureGenerator.generateWarpedStem(); } },
        { name: 'Crimson Planks', fn: function() { return Donkeycraft.TextureGenerator.generateCrimsonPlanks(); } },
        // Plants & Decorative
        { name: 'Leaves', fn: function() { return Donkeycraft.TextureGenerator.generateLeaves(50, 130, 40); } },
        { name: 'Cactus', fn: function() { return Donkeycraft.TextureGenerator.generateCactus(); } },
        { name: 'Flower (red)', fn: function() { return Donkeycraft.TextureGenerator.generateFlower('red'); } },
        { name: 'Lily Pad', fn: function() { return Donkeycraft.TextureGenerator.generateLilyPad(); } },
        // Redstone Components
        { name: 'Redstone Torch', fn: function() { return Donkeycraft.TextureGenerator.generateRedstoneTorch(); } },
        { name: 'Redstone Lamp (unlit)', fn: function() { return Donkeycraft.TextureGenerator.generateRedstoneLamp(false); } },
        { name: 'Dispenser', fn: function() { return Donkeycraft.TextureGenerator.generateDispenser(true); } },
        { name: 'Piston', fn: function() { return Donkeycraft.TextureGenerator.generatePistonSide(); } },
        // Furniture & Utility
        { name: 'Chest', fn: function() { return Donkeycraft.TextureGenerator.generateChestSide(); } },
        { name: 'Furnace', fn: function() { return Donkeycraft.TextureGenerator.generateFurnaceFront(); } },
        { name: 'Crafting Table', fn: function() { return Donkeycraft.TextureGenerator.generateCraftingTable(); } },
        { name: 'Bed (Red)', fn: function() { return Donkeycraft.TextureGenerator.generateBed('red'); } },
        // Portal & Special Effects
        { name: 'End Portal', fn: function() { return Donkeycraft.TextureGenerator.generateEndPortal(); } },
        { name: 'Nether Portal', fn: function() { return Donkeycraft.TextureGenerator.generateNetherPortal(); } },
        { name: 'End Portal Frame', fn: function() { return Donkeycraft.TextureGenerator.generateEndPortalFrame(); } },
        { name: 'Mob Spawner', fn: function() { return Donkeycraft.TextureGenerator.generateMobSpawner(); } }
    ];

    var texTable = '<table class="texture-table"><tr><th>Block</th><th>Texture Preview (80×80)</th><th>Status</th></tr>';
    for (var ti = 0; ti < allTextures.length; ti++) {
        var t = allTextures[ti];
        var imgT = t.fn();
        var passT = isImageLike(imgT);
        if (passT) passedSections++; else failedSections++;
        texTable += '<tr>';
        texTable += '<td class="texture-name">' + t.name + '</td>';
        texTable += '<td><img src="' + imgT.src + '" class="texture-preview" title="' + t.name + '"></td>';
        texTable += '<td class="' + (passT ? 'pass-cell' : 'fail-cell') + '">' + (passT ? '✓ PASS' : '✗ FAIL') + '</td>';
        texTable += '</tr>';
    }
    texTable += '</table>';
    document.getElementById('results').insertAdjacentHTML('beforeend', texTable);

    // COLOR_MAP validation
    var colorMap = Donkeycraft.TextureGenerator.COLOR_MAP;
    var colors = ['white','orange','magenta','light_blue','yellow','lime','pink','gray','light_gray','cyan','purple','blue','brown','green','red','black'];
    var colorPass = true;
    for (var c = 0; c < colors.length; c++) {
        var key = colors[c];
        if (!colorMap[key] || typeof colorMap[key].r !== 'number' || typeof colorMap[key].g !== 'number' || typeof colorMap[key].b !== 'number') {
            colorPass = false;
            break;
        }
    }
    F.assert(colorPass, 'All 16 COLOR_MAP entries have valid RGB values');
    if (colorPass) passedSections++; else failedSections++;

    // Edge cases (no display, just assertions)
    var edgeTests2 = [
        { name: 'generatePlanks(0,0,0)', fn: function() { return Donkeycraft.TextureGenerator.generatePlanks(0, 0, 0, 0); } },
        { name: 'generatePlanks(255,255,255)', fn: function() { return Donkeycraft.TextureGenerator.generatePlanks(255, 255, 255, 999); } },
        { name: 'generateWool(0,0,0)', fn: function() { return Donkeycraft.TextureGenerator.generateWool(0, 0, 0); } },
        { name: 'generateGlass(0,0,0)', fn: function() { return Donkeycraft.TextureGenerator.generateGlass(0, 0, 0); } },
        { name: 'generateGlow(10,10,10)', fn: function() { return Donkeycraft.TextureGenerator.generateGlow(10, 10, 10); } },
        { name: 'generateOre(10,10,10)', fn: function() { return Donkeycraft.TextureGenerator.generateOre(10, 10, 10); } },
        { name: 'generateBedrock()', fn: function() { return Donkeycraft.TextureGenerator.generateBedrock(); } },
        { name: 'generateLogSide(0)', fn: function() { return Donkeycraft.TextureGenerator.generateLogSide(0); } },
        { name: 'generateStone() no seed', fn: function() { return Donkeycraft.TextureGenerator.generateStone(); } }
    ];
    for (var ei = 0; ei < edgeTests2.length; ei++) {
        try {
            var eImg = edgeTests2[ei].fn();
            F.assert(isImageLike(eImg), 'Edge: ' + edgeTests2[ei].name + ' returns image');
            if (isImageLike(eImg)) passedSections++; else failedSections++;
        } catch(e2) {
            failedSections++;
            F.assert(false, 'Edge: ' + edgeTests2[ei].name + ' threw: ' + e2.message);
        }
    }

    // Block name → texture mapping
    F.assertType(texGen.getGeneratorForBlock, 'function', 'getGeneratorForBlock is function');
    F.assertType(texGen.getGeneratorForBlock('stone'), 'function', 'getGeneratorForBlock("stone") returns function');
    F.assert(texGen.getGeneratorForBlock('nonexistent_block_xyz') === null, 'getGeneratorForBlock("unknown") returns null');

    var fallbackImg2 = texGen.generateTextureForBlock('stone');
    F.assert(isImageLike(fallbackImg2), 'generateTextureForBlock("stone") returns image-like object');

    var fallbackUnknown2 = texGen.generateTextureForBlock('totally_unknown_block');
    F.assert(isImageLike(fallbackUnknown2), 'generateTextureForBlock("unknown") returns fallback texture');
    if (isImageLike(fallbackUnknown2)) passedSections++; else failedSections++;

    // Missing texture
    var missingImg2 = texGen.generateMissing();
    F.assert(isImageLike(missingImg2), 'generateMissing returns image-like object');
    if (isImageLike(missingImg2)) passedSections++; else failedSections++;

    // Cross-module integration
    var allBlocks2 = Donkeycraft.BlockRegistry ? Donkeycraft.BlockRegistry.getAllBlocks() : [];
    F.assert(allBlocks2.length > 0, 'BlockRegistry has registered blocks (' + allBlocks2.length + ')');
    if (allBlocks2.length > 0) passedSections++; else failedSections++;

    var block1b = Donkeycraft.BlockRegistry ? Donkeycraft.BlockRegistry.getBlockById(1) : null;
    F.assert(block1b !== null, 'getBlockById(1) returns block object');
    F.assertType(block1b && block1b.name, 'string', 'Block.name is string');

    if (block1b && block1b.name) {
        var gen2 = texGen.getGeneratorForBlock(block1b.name);
        F.assertType(gen2, 'function', 'getGeneratorForBlock returns function for registered block');
        if (gen2) passedSections++; else failedSections++;

        var tex2 = texGen.generateTextureForBlock(block1b.name);
        F.assert(isImageLike(tex2), 'generateTextureForBlock returns texture for registered block');
        if (isImageLike(tex2)) passedSections++; else failedSections++;
    }

    // getNameMap
    var nameMap3 = texGen.getNameMap();
    F.assertType(nameMap3, 'object', 'getNameMap returns object');
    F.assert(Object.keys(nameMap3).length > 0, 'getNameMap returns non-empty map (' + Object.keys(nameMap3).length + ' entries)');
    F.assert(typeof nameMap3[1] === 'string', 'getNameMap[1] is a string (block name)');
    F.info('getNameMap returned ' + Object.keys(nameMap3).length + ' block name entries');
    if (Object.keys(nameMap3).length > 0) passedSections++; else failedSections++;

    // ============================================================
    // Sound Tests (run separately after AudioContext init)
    // ============================================================
    function runSoundTests() {
        totalSections++;
        F.section('18. SoundGenerator — Categories & Caching');

        var categories = sndGen.getCategories();
        F.assertType(categories, 'object', 'getCategories returns array/object');
        F.assert(categories.length >= 13, 'getCategories returns at least 13 categories (' + categories.length + ')');
        F.assert(categories.indexOf('step') >= 0, 'Category "step" is available');
        F.assert(categories.indexOf('explosion') >= 0, 'Category "explosion" is available');
        F.assert(!sndGen.isCached('test_key_xyz'), 'isCached returns false for uncached key');

        var clearResult = sndGen.clearCache();
        F.assertType(clearResult, 'undefined', 'clearCache returns undefined');
        F.assert(!sndGen.isCached('test_key_xyz'), 'isCached returns false after clearCache');
        if (categories.length >= 13) passedSections++; else failedSections++;

        // Helper: convert AudioBuffer to WAV data URL (for play buttons)
        function audioBufferToWavUrl(buffer) {
            var numChannels = buffer.numberOfChannels;
            var sampleRate = buffer.sampleRate;
            var length = buffer.length;
            var bytesPerSample = 2;
            var blockAlign = numChannels * bytesPerSample;
            var dataSize = length * blockAlign;
            var headerSize = 44;
            var totalSize = headerSize + dataSize;
            var arrayBuffer = new ArrayBuffer(totalSize);
            var view = new DataView(arrayBuffer);

            function writeString(offset, str) {
                for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }
            writeString(0, 'RIFF');
            view.setUint32(4, totalSize - 8, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bytesPerSample * 8, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);

            var offset = 44;
            for (var ch = 0; ch < numChannels; ch++) {
                var channelData = buffer.getChannelData(ch);
                for (var i = 0; i < length; i++) {
                    var sample = Math.max(-1, Math.min(1, channelData[i]));
                    view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                    offset += 2;
                }
            }
            return 'data:audio/wav;base64,' + btoa(String.fromCharCode.apply(null, new Uint8Array(arrayBuffer)));
        }

        // Sound display table
        totalSections++;
        F.section('19. SoundGenerator — Audio Generation & Playback');

        var soundTable = '<table class="sound-table"><tr><th>Sound</th><th>Type</th><th>Duration</th><th>Play</th><th>Status</th></tr>';

        // Sync sounds
        try {
            var footstep = sndGen.generateFootstepSound(audioCtx);
            F.assertType(footstep, 'object', 'generateFootstepSound returns AudioBuffer');
            F.assert(footstep instanceof AudioBuffer, 'Footstep is AudioBuffer');
            F.assert(footstep.numberOfChannels === 1, 'Footstep is mono (1 channel)');
            F.assert(footstep.duration >= 0.01, 'Footstep duration reasonable (' + footstep.duration.toFixed(3) + 's)');

            var step = sndGen.generateStepSound(audioCtx, 'stone');
            F.assertType(step, 'object', 'generateStepSound returns AudioBuffer');
            F.assert(step instanceof AudioBuffer, 'Step is AudioBuffer');

            var breakSnd = sndGen.generateBreakSound(audioCtx, 'stone');
            F.assertType(breakSnd, 'object', 'generateBreakSound returns AudioBuffer');
            F.assert(breakSnd instanceof AudioBuffer, 'Break is AudioBuffer');

            // Add play buttons and rows for sync sounds
            var syncSounds = [
                { name: 'Footstep', buffer: footstep },
                { name: 'Step (stone)', buffer: step },
                { name: 'Break (stone)', buffer: breakSnd }
            ];

            for (var ss = 0; ss < syncSounds.length; ss++) {
                var s = syncSounds[ss];
                var wavUrl = audioBufferToWavUrl(s.buffer);
                soundTable += '<tr>';
                soundTable += '<td class="texture-name">' + s.name + '</td>';
                soundTable += '<td>AudioBuffer</td>';
                soundTable += '<td>' + s.buffer.duration.toFixed(3) + 's</td>';
                soundTable += '<td><button class="play-btn" onclick="playSound(\'' + wavUrl.replace(/\'/g, "\\'") + '\')">▶ Play</button></td>';
                soundTable += '<td class="pass-cell">✓ PASS</td>';
                soundTable += '</tr>';
            }

            passedSections += 6; // All sync sounds passed
        } catch(e) {
            failedSections += 3;
            F.assert(false, 'Sync sound tests failed: ' + e.message);
        }

        // Async sounds (all remaining categories)
        (function asyncSoundTest() {
            var asyncTests = [
                { name: 'Hit (stone)', fn: function() { return sndGen.generateHitSound(audioCtx, 'stone'); } },
                { name: 'Splash', fn: function() { return sndGen.generateSplashSound(audioCtx); } },
                { name: 'Glass Break', fn: function() { return sndGen.generateGlassBreakSound(audioCtx); } },
                { name: 'Pop', fn: function() { return sndGen.generatePopSound(audioCtx); } },
                { name: 'Explosion', fn: function() { return sndGen.generateExplosionSound(audioCtx); } },
                { name: 'Enchant', fn: function() { return sndGen.generateEnchantSound(audioCtx); } },
                { name: 'Drink', fn: function() { return sndGen.generateDrinkSound(audioCtx); } },
                { name: 'Place (stone)', fn: function() { return sndGen.generatePlaceSound(audioCtx, 'stone'); } },
                { name: 'Ambient (passive)', fn: function() { return sndGen.generateAmbientSound(audioCtx, 'passive'); } },
                { name: 'Ambient (hostile)', fn: function() { return sndGen.generateAmbientSound(audioCtx, 'hostile'); } },
                { name: 'Hurt (entity)', fn: function() { return sndGen.generateHurtSound(audioCtx, 'entity'); } }
            ];

            var promiseChain = Promise.resolve();
            for (var as2 = 0; as2 < asyncTests.length; as2++) {
                (function(idx) {
                    promiseChain = promiseChain.then(function() {
                        return asyncTests[idx].fn().then(function(buffer) {
                            F.assertType(buffer, 'object', asyncTests[idx].name + ' returns AudioBuffer');
                            F.assert(buffer instanceof AudioBuffer, asyncTests[idx].name + ' is AudioBuffer');

                            var wavUrl = audioBufferToWavUrl(buffer);
                            soundTable += '<tr>';
                            soundTable += '<td class="texture-name">' + asyncTests[idx].name + '</td>';
                            soundTable += '<td>AudioBuffer (async)</td>';
                            soundTable += '<td>' + buffer.duration.toFixed(3) + 's</td>';
                            soundTable += '<td><button class="play-btn" onclick="playSound(\'' + wavUrl.replace(/\'/g, "\\'") + '\')">▶ Play</button></td>';
                            soundTable += '<td class="pass-cell">✓ PASS</td>';
                            soundTable += '</tr>';

                            passedSections += 2;
                        }).catch(function(err) {
                            failedSections++;
                            F.assert(false, asyncTests[idx].name + ' failed: ' + err.message);
                        });
                    });
                })(as2);
            }

            promiseChain.then(function() {
                soundTable += '</table>';
                document.getElementById('results').insertAdjacentHTML('beforeend', soundTable);

                // ============================================================
                // SECTION 20: AssetManager Tests
                // ============================================================
                totalSections++;
                F.section('20. AssetManager — Initialization & Textures');

                var info = assetMgr.getAssetInfo();
                F.assertType(info, 'object', 'getAssetInfo returns object');
                F.assertType(info.totalBlocks, 'number', 'getAssetInfo.totalBlocks is number');
                F.assertType(info.generatedTextures, 'number', 'getAssetInfo.generatedTextures is number');
                F.assertType(info.soundCategories, 'number', 'getAssetInfo.soundCategories is number');
                F.assertType(info.hasAudioContext, 'boolean', 'getAssetInfo.hasAudioContext is boolean');
                F.info('Assets: ' + info.totalBlocks + ' blocks, ' + info.generatedTextures + ' textures, ' + info.soundCategories + ' sound categories');

                var allTex = assetMgr.getAllTextures();
                F.assert(allTex === null || typeof allTex === 'object', 'getAllTextures returns null or object (before generation)');

                var nameMap2 = assetMgr.getNameMap();
                F.assertType(nameMap2, 'object', 'AssetManager.getNameMap returns object');

                if (info.totalBlocks >= 0 && info.soundCategories >= 13) passedSections++; else failedSections++;

                // Atlas canvas
                totalSections++;
                F.section('21. AssetManager — Atlas Canvas Generation');

                var atlasCanvas = assetMgr.generateAtlasCanvas();
                F.assertType(atlasCanvas, 'object', 'generateAtlasCanvas returns canvas element');
                F.assert(atlasCanvas.width === 1280, 'Atlas canvas is 1280px wide (' + atlasCanvas.width + ')');
                F.assert(atlasCanvas.height === 1280, 'Atlas canvas is 1280px tall (' + atlasCanvas.height + ')');

                // Display atlas
                var atlasTable = '<table class="texture-table"><tr><th>Atlas</th><th>Preview</th><th>Status</th></tr>';
                atlasTable += '<tr>';
                atlasTable += '<td class="texture-name">Texture Atlas (1280×1280)</td>';
                atlasTable += '<td><img src="' + atlasCanvas.toDataURL('image/png') + '" class="atlas-preview" title="Full Texture Atlas"></td>';
                atlasTable += '<td class="pass-cell">✓ PASS</td>';
                atlasTable += '</tr></table>';
                document.getElementById('results').insertAdjacentHTML('beforeend', atlasTable);

                if (atlasCanvas.width === 1280 && atlasCanvas.height === 1280) passedSections++; else failedSections++;

                // Reset
                totalSections++;
                F.section('22. AssetManager — Reset');

                assetMgr.reset();
                var afterReset = assetMgr.getAllTextures();
                F.assert(afterReset === null, 'getAllTextures returns null after reset');
                if (afterReset === null) passedSections++; else failedSections++;
            });
        })(); // end asyncSoundTest IIFE
    } // end runSoundTests function

    // ============================================================
    // Global sound playback function
    // ============================================================
    window.playSound = function(url) {
        var audio = new Audio(url);
        audio.play();
    };

    // ============================================================
    // Final summary
    // ============================================================
    var overallEl = document.getElementById('overall-result');
    if (failedSections === 0) {
        overallEl.className = 'pass';
        overallEl.innerHTML = '<strong>ALL TESTS PASSED</strong> — ' + passedSections + '/' + (passedSections + failedSections);
    } else {
        overallEl.className = 'fail';
        overallEl.innerHTML = '<strong>TESTS FAILED</strong> — ' + passedSections + '/' + (passedSections + failedSections) + ' passed, ' + failedSections + ' failed';
    }

})();
</script>
</body>
</html>
