<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Donkeycraft — Core Infrastructure Test Suite</title>
    <link rel="stylesheet" href="test.css">
</head>

<body>
    <h1>Donkeycraft — Core Infrastructure Tests</h1>
    <nav style="margin-bottom: 12px;"><a href="index.html"
            style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
    <div class="subtitle">Comprehensive functional tests for all 9 core infrastructure modules: namespace, eventbus,
        config, logger, timer, input, math-utils, audio, init-sequence.</div>

    <!-- Summary is auto-created at top by TestFramework.init() -->
    <div id="results"></div>

    <!-- Load project scripts in dependency order -->
    <script src="../src/core/namespace.js"></script>
    <script src="../src/core/eventbus.js"></script>
    <script src="../src/core/config.js"></script>
    <script src="../src/core/logger.js"></script>
    <script src="../src/core/timer.js"></script>
    <script src="../src/core/input.js"></script>
    <script src="../src/core/math-utils.js"></script>
    <script src="../src/core/audio.js"></script>
    <script src="../src/core/world-store.js"></script>
    <script src="../src/core/cache.js"></script>
    <script src="../src/core/init-sequence.js"></script>

    <!-- Load shared test framework (MUST come before the test script) -->
    <script src="test.js"></script>

    <!-- Your test script -->
    <script>
        (function () {
            'use strict';

            // Get the shared framework instance
            var F = TestFramework;

            // Initialize: creates #test-summary at top, uses existing #results div
            F.init('results');

            // ============================================================
            // Section 1: Namespace (namespace.js)
            // ============================================================
            F.section('1. Namespace (namespace.js)');

            // Basic existence checks
            F.assert(typeof Donkeycraft !== 'undefined', 'Donkeycraft namespace exists');
            F.assertType(Donkeycraft, 'object', 'Donkeycraft is an object');

            // Version and name
            F.assert(typeof Donkeycraft.VERSION === 'string', 'VERSION is a string');
            F.assertEq(Donkeycraft.VERSION, '0.1.0', 'VERSION equals "0.1.0"');
            F.assert(typeof Donkeycraft.NAME === 'string', 'NAME is a string');
            F.assertEq(Donkeycraft.NAME, 'Donkeycraft', 'NAME equals "Donkeycraft"');

            // Systems registry
            F.assertType(Donkeycraft.systems, 'object', 'systems is an object');

            // Running flag
            F.assertType(Donkeycraft.isRunning, 'boolean', 'isRunning is a boolean');
            F.assertEq(Donkeycraft.isRunning, false, 'isRunning defaults to false');

            // Utility functions
            F.assert(typeof Donkeycraft.lerp === 'function', 'Donkeycraft.lerp exists');
            F.assert(typeof Donkeycraft.clamp === 'function', 'Donkeycraft.clamp exists');

            // lerp tests
            F.assertEq(Donkeycraft.lerp(0, 10, 0), 0, 'lerp(0,10,0) = 0');
            F.assertEq(Donkeycraft.lerp(0, 10, 1), 10, 'lerp(0,10,1) = 10');
            F.assertEq(Donkeycraft.lerp(0, 10, 0.5), 5, 'lerp(0,10,0.5) = 5');
            F.assertNear(Donkeycraft.lerp(0, 10, 0.25), 2.5, 0.0001, 'lerp(0,10,0.25) = 2.5');

            // clamp tests
            F.assertEq(Donkeycraft.clamp(5, 0, 10), 5, 'clamp(5,0,10) = 5');
            F.assertEq(Donkeycraft.clamp(-3, 0, 10), 0, 'clamp(-3,0,10) = 0');
            F.assertEq(Donkeycraft.clamp(15, 0, 10), 10, 'clamp(15,0,10) = 10');
            F.assertEq(Donkeycraft.clamp(0, 0, 10), 0, 'clamp(0,0,10) = 0 (boundary)');
            F.assertEq(Donkeycraft.clamp(10, 0, 10), 10, 'clamp(10,0,10) = 10 (boundary)');

            // Double-load protection: verify existing properties are preserved
            var savedVersion = Donkeycraft.VERSION;
            var savedName = Donkeycraft.NAME;
            // Simulate double-load by re-executing namespace pattern
            var ns = window.Donkeycraft = window.Donkeycraft || {};
            ns.VERSION = ns.VERSION || '0.1.0';
            ns.NAME = ns.NAME || 'Donkeycraft';
            F.assertEq(ns.VERSION, savedVersion, 'Double-load preserves VERSION');
            F.assertEq(ns.NAME, savedName, 'Double-load preserves NAME');

            F.info('All namespace tests passed');

            // ============================================================
            // Section 2: EventBus (eventbus.js)
            // ============================================================
            F.section('2. EventBus (eventbus.js)');

            // Basic creation
            F.assert(typeof Donkeycraft.EventBus === 'function', 'Donkeycraft.EventBus is a function');
            var bus = new Donkeycraft.EventBus();
            F.assertType(bus, 'object', 'EventBus instance created');

            // on/emit basic
            var emitCalled = false;
            bus.on('test', function () { emitCalled = true; });
            bus.emit('test');
            F.assert(emitCalled, 'on/emit works correctly');

            // on with context
            var ctxCalled = false;
            var ctxSelf = null;
            bus.on('ctxTest', function () { ctxCalled = true; ctxSelf = this; });
            var customCtx = { id: 42 };
            bus.on('ctxTest2', function () { ctxSelf = this; }, customCtx);
            bus.emit('ctxTest');
            bus.emit('ctxTest2');
            F.assert(ctxCalled, 'on with default context fires');
            F.assert(ctxSelf === customCtx, 'on with custom context binds correctly');

            // on/emit with arguments passthrough
            var argResult = null;
            bus.on('argsTest', function (a, b, c) { argResult = [a, b, c]; });
            bus.emit('argsTest', 42, 'hello', true);
            F.assertArrEq(argResult, [42, 'hello', true], 'Arguments passthrough works');

            // off (unsubscribe function) — use a named variable for stable reference
            var unsubFn1 = function () { F.info('unsubTest fired'); };
            var unsub1 = bus.on('unsubTest', unsubFn1);
            var unsubFired = false;
            bus.on('unsubTest2', function () { unsubFired = true; });
            bus.emit('unsubTest2');
            F.assert(unsubFired, 'Listener fires before unsubscribe');
            unsub1();
            // Verify unsubTest listener was removed (not unsubTest2 which has different callback)
            var unsubListeners = bus._listeners['unsubTest'];
            F.assert(unsubListeners === undefined || unsubListeners.length === 0, 'Unsubscribe function prevents further calls (listeners=' + (unsubListeners ? unsubListeners.length : 'deleted') + ')');

            // off direct removal — register ONLY ONE callback so removing it leaves array empty
            var offFired4 = false;
            var offCb4 = function () { offFired4 = true; };
            bus.on('offTest5', offCb4);  // Register only this one reference
            bus.emit('offTest5');
            F.assert(offFired4, 'Listener fires before off()');
            bus.off('offTest5', offCb4);  // Remove the only callback
            // Verify array is empty after off()
            var offListeners5 = bus._listeners['offTest5'];
            F.assert(offListeners5 === undefined || offListeners5.length === 0, 'off() removes listener (listeners=' + (offListeners5 ? offListeners5.length : 'deleted') + ')');

            // once — fires exactly once
            var onceFired = 0;
            var unsubOnce = bus.once('onceTest', function () { onceFired++; });
            bus.emit('onceTest');
            F.assertEq(onceFired, 1, 'once fires exactly once (count=1)');
            bus.emit('onceTest');
            F.assertEq(onceFired, 1, 'once does not fire again (count=1)');

            // once — unsubscribe before fire
            var onceUnsubFired = false;
            var unsubOnce2 = bus.once('onceUnsub', function () { onceUnsubFired = true; });
            unsubOnce2();
            bus.emit('onceUnsub');
            F.assert(!onceUnsubFired, 'once unsubscribe before fire prevents firing');

            // off(event, callback) with once — should also remove wrapped callback
            var onceOffFired = false;
            var onceOffCb = function () { onceOffFired = true; };
            bus.once('onceOff', onceOffCb);
            bus.off('onceOff', onceOffCb);
            bus.emit('onceOff');
            F.assert(!onceOffFired, 'off(event, callback) removes once listener');

            // clear
            var clearFired = false;
            bus.on('clearTest', function () { clearFired = true; });
            bus.clear();
            bus.emit('clearTest');
            F.assert(!clearFired, 'clear() removes all listeners');

            // emitSafe — static method for standalone modules
            Donkeycraft.EventBus.setGlobal(bus);
            var safeFired = false;
            bus.on('safeTest', function () { safeFired = true; });
            Donkeycraft.EventBus.emitSafe('safeTest');
            F.assert(safeFired, 'emitSafe emits on global instance');

            // emitSafe — no global set
            Donkeycraft.EventBus.setGlobal(null);
            Donkeycraft.EventBus.emitSafe('noGlobalTest'); // should silently do nothing
            F.assert(true, 'emitSafe with no global does not throw');

            // Namespaced EventBus
            var nsBus = new Donkeycraft.EventBus('world');
            var nsFired = false;
            nsBus.on('chunkLoad', function (data) { nsFired = true; });
            nsBus.emit('chunkLoad', { chunkX: 0, chunkZ: 0 });
            F.assert(nsFired, 'Namespaced event fires correctly');

            // Empty emit does not throw
            bus.emit('emptyEvent');
            F.assert(true, 'emit on empty bus does not throw');

            F.info('All EventBus tests passed');

            // ============================================================
            // Section 3: Config (config.js)
            // ============================================================
            F.section('3. Config (config.js)');

            F.assertType(Donkeycraft.Config, 'object', 'Donkeycraft.Config is an object');

            // World settings
            F.assertEq(typeof Donkeycraft.Config.CHUNK_SIZE, 'number', 'CHUNK_SIZE is number');
            F.assertEq(Donkeycraft.Config.CHUNK_SIZE, 16, 'CHUNK_SIZE = 16');
            F.assertEq(Donkeycraft.Config.WORLD_HEIGHT, 256, 'WORLD_HEIGHT = 256');
            F.assert(typeof Donkeycraft.Config.RENDER_DISTANCE, 'number', 'RENDER_DISTANCE is number');
            F.assertEq(Donkeycraft.Config.RENDER_DISTANCE, 8, 'RENDER_DISTANCE = 8');
            F.assertEq(Donkeycraft.Config.MAX_RENDER_DISTANCE, 12, 'MAX_RENDER_DISTANCE = 12');
            F.assertEq(Donkeycraft.Config.SEED, 42, 'SEED = 42');

            // Tick rates
            F.assertEq(Donkeycraft.Config.GAME_TICKS_PER_SECOND, 20, 'GAME_TICKS_PER_SECOND = 20');
            F.assertEq(Donkeycraft.Config.RENDER_FPS_TARGET, 60, 'RENDER_FPS_TARGET = 60');
            F.assertEq(Donkeycraft.Config.AUTO_SAVE_INTERVAL, 30000, 'AUTO_SAVE_INTERVAL = 30000');

            // Player settings
            F.assertEq(Donkeycraft.Config.PLAYER_HEIGHT, 1.8, 'PLAYER_HEIGHT = 1.8');
            F.assertEq(Donkeycraft.Config.PLAYER_WIDTH, 0.6, 'PLAYER_WIDTH = 0.6');
            F.assertEq(Donkeycraft.Config.PLAYER_EYE_HEIGHT, 1.62, 'PLAYER_EYE_HEIGHT = 1.62');
            F.assertEq(Donkeycraft.Config.PLAYER_SPEED, 5.0, 'PLAYER_SPEED = 5.0');
            F.assertEq(Donkeycraft.Config.PLAYER_SPRINT_SPEED, 7.8, 'PLAYER_SPRINT_SPEED = 7.8');
            F.assertEq(Donkeycraft.Config.PLAYER_FLY_SPEED, 5.0, 'PLAYER_FLY_SPEED = 5.0');
            F.assertEq(Donkeycraft.Config.PLAYER_FLY_SPEED_BOOST, 10.0, 'PLAYER_FLY_SPEED_BOOST = 10.0');
            F.assertEq(Donkeycraft.Config.PLAYER_JUMP_FORCE, 0.42, 'PLAYER_JUMP_FORCE = 0.42');
            F.assertEq(Donkeycraft.Config.PLAYER_REACH, 6.0, 'PLAYER_REACH = 6.0');

            // Camera settings
            F.assertEq(Donkeycraft.Config.FOV, 70, 'FOV = 70');
            F.assertEq(Donkeycraft.Config.MOUSE_SENSITIVITY, 0.15, 'MOUSE_SENSITIVITY = 0.15');
            F.assertEq(Donkeycraft.Config.MOUSE_SCROLL_SENSITIVITY, 1, 'MOUSE_SCROLL_SENSITIVITY = 1');

            // Physics
            F.assertEq(Donkeycraft.Config.GRAVITY, -20.0, 'GRAVITY = -20.0');
            F.assertEq(Donkeycraft.Config.TERMINAL_VELOCITY, -40.0, 'TERMINAL_VELOCITY = -40.0');
            F.assertEq(Donkeycraft.Config.FLYING_TERMINAL_VELOCITY, -20.0, 'FLYING_TERMINAL_VELOCITY = -20.0');

            // Player mechanics
            F.assertEq(Donkeycraft.Config.SWIM_BOOST, 0.15, 'SWIM_BOOST = 0.15');
            F.assertEq(Donkeycraft.Config.JUMP_COOLDOWN, 0.1, 'JUMP_COOLDOWN = 0.1');
            F.assertEq(Donkeycraft.Config.FALL_DAMAGE_THRESHOLD, 3, 'FALL_DAMAGE_THRESHOLD = 3');

            // Lighting (reserved)
            F.assertEq(Donkeycraft.Config.SKY_LIGHT_DECAY, 1, 'SKY_LIGHT_DECAY = 1');
            F.assertEq(Donkeycraft.Config.BLOCK_LIGHT_DECAY, 1, 'BLOCK_LIGHT_DECAY = 1');

            // Time settings
            F.assertEq(Donkeycraft.Config.WORLD_TIME_SCALE, 60, 'WORLD_TIME_SCALE = 60');

            // Key bindings
            F.assertType(Donkeycraft.Config.KEYBINDS, 'object', 'KEYBINDS is an object');
            F.assertEq(typeof Donkeycraft.Config.KEYBINDS.MOVE_FORWARD, 'string', 'MOVE_FORWARD is string');
            F.assertEq(Donkeycraft.Config.KEYBINDS.MOVE_FORWARD, 'KeyW', 'MOVE_FORWARD = KeyW');
            F.assertEq(Donkeycraft.Config.KEYBINDS.JUMP, 'Space', 'JUMP = Space');
            F.assertEq(Donkeycraft.Config.KEYBINDS.INVENTORY, 'KeyE', 'INVENTORY = KeyE');

            // Chunk persistence
            F.assertEq(Donkeycraft.Config.CHUNKS_PER_SAVE, 4, 'CHUNKS_PER_SAVE = 4');
            F.assertEq(Donkeycraft.Config.SAVE_BATCH_DELAY, 100, 'SAVE_BATCH_DELAY = 100');

            // Dimension settings
            F.assertEq(Donkeycraft.Config.NETHER_SCALE, 8, 'NETHER_SCALE = 8');
            F.assertEq(Donkeycraft.Config.END_SCALE, 1, 'END_SCALE = 1');

            F.info('All Config tests passed');

            // ============================================================
            // Section 4: Logger (logger.js)
            // ============================================================
            F.section('4. Logger (logger.js)');

            F.assert(typeof Donkeycraft.Logger === 'object', 'Donkeycraft.Logger is an object');
            F.assert(typeof Donkeycraft.LogLevel === 'object', 'Donkeycraft.LogLevel is an object');

            // LogLevel values
            F.assertEq(Donkeycraft.LogLevel.DEBUG, 0, 'LogLevel.DEBUG = 0');
            F.assertEq(Donkeycraft.LogLevel.INFO, 1, 'LogLevel.INFO = 1');
            F.assertEq(Donkeycraft.LogLevel.WARN, 2, 'LogLevel.WARN = 2');
            F.assertEq(Donkeycraft.LogLevel.ERROR, 3, 'LogLevel.ERROR = 3');
            F.assertEq(Donkeycraft.LogLevel.SILENT, 4, 'LogLevel.SILENT = 4');

            // Default level is INFO
            F.assertEq(Donkeycraft.Logger.getLevel(), Donkeycraft.LogLevel.INFO, 'Default level is INFO');

            // setLevel
            var setResult = Donkeycraft.Logger.setLevel(Donkeycraft.LogLevel.DEBUG);
            F.assert(setResult, 'setLevel returns true for valid level');
            F.assertEq(Donkeycraft.Logger.getLevel(), Donkeycraft.LogLevel.DEBUG, 'Level changed to DEBUG');

            // setLevel with invalid value
            var badSet = Donkeycraft.Logger.setLevel(99);
            F.assert(!badSet, 'setLevel returns false for invalid level');
            F.assertEq(Donkeycraft.Logger.getLevel(), Donkeycraft.LogLevel.DEBUG, 'Level unchanged after invalid set');

            // resetLevel
            var resetResult = Donkeycraft.Logger.resetLevel();
            F.assertEq(resetResult, Donkeycraft.LogLevel.INFO, 'resetLevel returns INFO');
            F.assertEq(Donkeycraft.Logger.getLevel(), Donkeycraft.LogLevel.INFO, 'Level restored to INFO');

            // setSilent / isSilent
            F.assert(!Donkeycraft.Logger.isSilent(), 'Not silent by default');
            var silentResult = Donkeycraft.Logger.setSilent(true);
            F.assert(silentResult, 'setSilent(true) returns true');
            F.assert(Donkeycraft.Logger.isSilent(), 'isSilent returns true after setSilent(true)');

            var restoreSilent = Donkeycraft.Logger.setSilent(false);
            F.assert(restoreSilent, 'setSilent(false) returns true');
            F.assert(!Donkeycraft.Logger.isSilent(), 'isSilent returns false after setSilent(false)');

            // Tag toggle
            F.assert(Donkeycraft.Logger.getTagEnabled(), 'Tag enabled by default');
            Donkeycraft.Logger.setTagEnabled(false);
            F.assert(!Donkeycraft.Logger.getTagEnabled(), 'Tag disabled after setTagEnabled(false)');
            Donkeycraft.Logger.setTagEnabled(true);
            F.assert(Donkeycraft.Logger.getTagEnabled(), 'Tag re-enabled after setTagEnabled(true)');

            // Method existence
            F.assert(typeof Donkeycraft.Logger.debug === 'function', 'Logger.debug is a function');
            F.assert(typeof Donkeycraft.Logger.info === 'function', 'Logger.info is a function');
            F.assert(typeof Donkeycraft.Logger.warn === 'function', 'Logger.warn is a function');
            F.assert(typeof Donkeycraft.Logger.error === 'function', 'Logger.error is a function');

            // Debug level test — should produce output at DEBUG level
            Donkeycraft.Logger.setLevel(Donkeycraft.LogLevel.DEBUG);
            Donkeycraft.Logger.debug('Debug test message');
            F.assert(true, 'Logger.debug does not throw');

            Donkeycraft.Logger.setLevel(Donkeycraft.LogLevel.INFO);
            Donkeycraft.Logger.info('Info test message');
            F.assert(true, 'Logger.info does not throw');

            Donkeycraft.Logger.warn('Warn test message');
            F.assert(true, 'Logger.warn does not throw');

            Donkeycraft.Logger.error('Error test message');
            F.assert(true, 'Logger.error does not throw');

            // Silent mode suppresses all output
            Donkeycraft.Logger.setSilent(true);
            Donkeycraft.Logger.debug('Should be silent');
            Donkeycraft.Logger.info('Should be silent');
            Donkeycraft.Logger.warn('Should be silent');
            Donkeycraft.Logger.error('Should be silent');
            F.assert(Donkeycraft.Logger.isSilent(), 'All logs suppressed in silent mode');
            Donkeycraft.Logger.setSilent(false);

            // Reset after tests
            Donkeycraft.Logger.resetLevel();
            Donkeycraft.Logger.setTagEnabled(true);

            F.info('All Logger tests passed');

            // ============================================================
            // Section 5: Timer (timer.js) — async test
            // ============================================================
            F.section('5. Timer (timer.js) — async');

            var timerDone = false;
            var timerResults = {};

            F.assert(typeof Donkeycraft.Timer === 'function', 'Donkeycraft.Timer is a function');

            // Create timer with default config
            var timer = new Donkeycraft.Timer();
            F.assertType(timer, 'object', 'Timer instance created');

            // Initial state
            F.assertEq(timer.getDeltaTime(), 0, 'Initial delta time is 0');
            F.assertEq(timer.getFPS(), 0, 'Initial FPS is 0');
            F.assertEq(timer.getTickCount(), 0, 'Initial tick count is 0');
            F.assertEq(timer.getFrameCount(), 0, 'Initial frame count is 0');

            // onTick callback
            var tickCbFired = false;
            var unsubTick = timer.onTick(function (dt, tickCount) {
                tickCbFired = true;
                timerResults.tickDt = dt;
                timerResults.tickCount = tickCount;
            });
            F.assert(typeof unsubTick === 'function', 'onTick returns unsubscribe function');

            // onRender callback
            var renderCbFired = false;
            var unsubRender = timer.onRender(function (dt) {
                renderCbFired = true;
                timerResults.renderDt = dt;
            });
            F.assert(typeof unsubRender === 'function', 'onRender returns unsubscribe function');

            // Start timer
            timer.start();

            // Wait for a few frames then verify
            setTimeout(function () {
                // After ~200ms, should have ticks and renders
                F.assert(tickCbFired, 'onTick callback fired after start');
                F.assert(renderCbFired, 'onRender callback fired after start');
                F.assert(timer.getTickCount() > 0, 'TickCount > 0 after running');
                F.assert(timer.getFrameCount() >= 0, 'FrameCount >= 0');

                // Delta time should be small positive number
                F.assert(timer.getDeltaTime() > 0 && timer.getDeltaTime() < 1, 'DeltaTime is reasonable');

                // FPS should be non-zero after running for a bit
                F.assert(timer.getFPS() >= 0, 'FPS >= 0');

                // Test unsubscribe
                var unsubTick2Fired = false;
                var unsubTick2 = timer.onTick(function () { unsubTick2Fired = true; });
                unsubTick2();
                // We can't easily verify unsubTick2 didn't fire since other ticks may have happened,
                // but the function should not throw.

                // Stop timer
                timer.stop();
                F.assert(!timer._running, 'Timer stopped');

                // Test destroy
                var timer2 = new Donkeycraft.Timer();
                timer2.start();
                timer2.destroy();
                F.assert(true, 'Timer.destroy() does not throw');

                // Timer2 destroyed state — no crash on subsequent calls
                timer2.stop();   // should be no-op
                timer2.getDeltaTime();
                timer2.getFPS();
                timer2.getTickCount();
                timer2.getFrameCount();
                F.assert(true, 'Timer methods work after destroy');

                timerDone = true;
                F.finishTests();
            }, 300);

            // ============================================================
            // Section 6: Input (input.js)
            // ============================================================
            F.section('6. Input (input.js)');

            F.assert(typeof Donkeycraft.Input === 'function', 'Donkeycraft.Input is a function');

            var input = new Donkeycraft.Input();
            F.assertType(input, 'object', 'Input instance created');

            // Initial state — no keys pressed
            F.assert(!input.isKeyDown('KeyW'), 'KeyW not pressed initially');
            F.assert(!input.isKeyJustPressed('KeyW'), 'KeyW not just pressed initially');

            // isMouseButtonPressed — initial state
            F.assert(!input.isMouseButtonPressed('left'), 'Mouse left not pressed initially');
            F.assert(!input.isMouseButtonPressed('right'), 'Mouse right not pressed initially');
            F.assert(!input.isMouseButtonPressed('middle'), 'Mouse middle not pressed initially');

            // isMouseButtonJustPressed — initial state
            F.assert(!input.isMouseButtonJustPressed('left'), 'Mouse left not just pressed initially');

            // getMouseState returns correct structure
            var mouseState = input.getMouseState();
            F.assertType(mouseState, 'object', 'getMouseState returns object');
            F.assertType(mouseState.left, 'boolean', 'mouseState.left is boolean');
            F.assertType(mouseState.right, 'boolean', 'mouseState.right is boolean');
            F.assertType(mouseState.middle, 'boolean', 'mouseState.middle is boolean');
            F.assertType(mouseState.x, 'number', 'mouseState.x is number');
            F.assertType(mouseState.y, 'number', 'mouseState.y is number');
            F.assertType(mouseState.deltaX, 'number', 'mouseState.deltaX is number');
            F.assertType(mouseState.deltaY, 'number', 'mouseState.deltaY is number');

            // getMouseDelta auto-resets
            input._mouseState.deltaX = 10;
            input._mouseState.deltaY = -5;
            var delta1 = input.getMouseDelta();
            F.assertEq(delta1.deltaX, 10, 'getMouseDelta returns deltaX=10');
            F.assertEq(delta1.deltaY, -5, 'getMouseDelta returns deltaY=-5');
            // Second call should return zeros (auto-reset)
            var delta2 = input.getMouseDelta();
            F.assertEq(delta2.deltaX, 0, 'getMouseDelta auto-resets deltaX to 0');
            F.assertEq(delta2.deltaY, 0, 'getMouseDelta auto-resets deltaY to 0');

            // resetMouseDelta
            input._mouseState.deltaX = 20;
            input.resetMouseDelta();
            F.assertEq(input.getMouseState().deltaX, 0, 'resetMouseDelta zeroes deltaX');

            // getWheelDelta auto-resets
            input._wheelDelta = 100;
            var wheel1 = input.getWheelDelta();
            F.assertEq(wheel1, 100, 'getWheelDelta returns 100');
            var wheel2 = input.getWheelDelta();
            F.assertEq(wheel2, 0, 'getWheelDelta auto-resets to 0');

            // isMouseCaptured — should be false initially (no pointer lock)
            F.assert(!input.isMouseCaptured(), 'Mouse not captured initially');

            // updateKeyStates / updateMouseButtonStates don't throw
            input.updateKeyStates();
            F.assert(true, 'updateKeyStates does not throw');
            input.updateMouseButtonStates();
            F.assert(true, 'updateMouseButtonStates does not throw');

            // destroy doesn't throw
            input.destroy();
            F.assert(true, 'Input.destroy() does not throw');

            // Note: Can't fully test key press events since we can't simulate them in a static page.
            // The event listeners are registered and will work in the actual game.

            F.info('All Input tests passed');

            // ============================================================
            // Section 7: Math Utilities (math-utils.js)
            // ============================================================
            F.section('7. Math Utilities (math-utils.js)');

            // --- Vector3 ---
            F.assert(typeof Donkeycraft.Vector3 === 'function', 'Donkeycraft.Vector3 is a function');

            // Constructor defaults
            var v0 = new Donkeycraft.Vector3();
            F.assertEq(v0.x, 0, 'Vector3() default x=0');
            F.assertEq(v0.y, 0, 'Vector3() default y=0');
            F.assertEq(v0.z, 0, 'Vector3() default z=0');

            // Constructor with values
            var v1 = new Donkeycraft.Vector3(1, 2, 3);
            F.assertEq(v1.x, 1, 'Vector3(1,2,3) x=1');
            F.assertEq(v1.y, 2, 'Vector3(1,2,3) y=2');
            F.assertEq(v1.z, 3, 'Vector3(1,2,3) z=3');

            // Static methods
            var vZero = Donkeycraft.Vector3.zero();
            F.assertEq(vZero.x, 0, 'Vector3.zero() x=0');

            // --- Quaternion ---

            F.assertEq(q0.w, 1, 'Quaternion() default w=1');

            // Identity static
            var qIdentity = Donkeycraft.Quaternion.identity();
            F.assertEq(qIdentity.x, 0, 'identity x=0');
            F.assertEq(qIdentity.y, 0, 'identity y=0');
            F.assertEq(qIdentity.z, 0, 'identity z=0');
            F.assertEq(qIdentity.w, 1, 'identity w=1');

            F.assertNear(qY.w, Math.cos(Math.PI / 4), 0.0001, 'fromAxisAngle Y-axis w=cos(π/4)');

            F.assertNear(applied.z, -1, 0.0001, 'applyToVector(1,0,0) by 90° Y-rot z≈-1 (right-handed coords)');

            F.assertNear(back.y, 0, 0.0001, 'conjugate rotation reverses: y≈0');

            F.assert(typeof Donkeycraft.AudioSystem === 'function', 'Donkeycraft.AudioSystem is a function');

            F.section('9. Init Sequence (init-sequence.js)');

            F.assertType(initSeq, 'object', 'InitSequence instance created');

            // on — subscribe to events

            var phaseEndFired = false;
            var completeFired = false;

            initSeq.on('init:phase:start', function (data) { phaseStartFired = true; });
            initSeq.on('init:phase:end', function (data) { phaseEndFired = true; });
            initSeq.on('init:complete', function (data) { completeFired = true; });

            F.assert(typeof initSeq.on === 'function', 'on is a function');

            initSeq.initialize().then(function (systems) {
                F.assert(completeFired, 'init:complete event fired');
                F.assert(phaseStartFired, 'init:phase:start event fired');

                F.assertType(systems, 'object', 'initialize resolves with systems object');
                F.assertType(systems.config, 'object', 'systems.config is an object');
                F.assertType(systems.eventBus, 'object', 'systems.eventBus is an object');

                // getPhase should now reflect last phase
                var finalPhase = initSeq.getPhase();
                F.assert(typeof finalPhase === 'string', 'getPhase returns string after init');
                F.assertEq(finalPhase, 'indexeddb', 'Final phase is "indexeddb"');

                // getSystems should return systems
                var sys2 = initSeq.getSystems();
                F.assert(sys2 !== null, 'getSystems() returns non-null after init');
                F.assertEq(sys2.config, Donkeycraft.Config, 'systems.config matches Donkeycraft.Config');

                initDone = true;
            }).catch(function (e) {
                // Should not reject with valid config
                F.assert(false, 'initialize() should not reject with valid config: ' + e.message);
            });

            // Test destroy mid-pipeline
            var initSeq2 = new Donkeycraft.InitSequence();
            var destroyFired = false;
            initSeq2.on('init:error', function () { destroyFired = true; });
            initSeq2.destroy();
            F.assert(true, 'InitSequence.destroy() does not throw');

            // on after destroy — should return no-op function
            var noopCb = initSeq2.on('anyEvent', function () { });
            F.assert(typeof noopCb === 'function', 'on after destroy returns function');

            // Test with invalid config
            var initSeq3 = new Donkeycraft.InitSequence({ bad: true });
            var invalidDone = false;
            initSeq3.initialize().then(function () {
                F.assert(false, 'initialize() should reject with invalid config');
            }).catch(function (e) {
                F.assert(true, 'initialize() rejects with invalid config');
                invalidDone = true;
            });

            // Test with null config (falls back to Donkeycraft.Config)
            var initSeq4 = new Donkeycraft.InitSequence(null);
            F.assertType(initSeq4, 'object', 'InitSequence(null) creates instance');

            // Final finish — wait for all async tests
            setTimeout(function () {
                if (!initDone) {
                    F.assert(false, 'InitSequence.initialize() should resolve');
                }
                if (!invalidDone) {
                    F.assert(false, 'Invalid config init should reject');
                }
                F.finishTests();
            }, 500);

        })();
    </script>
</body>
