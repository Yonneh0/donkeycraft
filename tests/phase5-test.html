<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Phase 5 Player & Movement Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; max-width: 960px; margin: 0 auto; }
h1 { color: #00d4ff; font-size: 1.4em; margin-bottom: 8px; border-bottom: 2px solid #00d4ff; padding-bottom: 8px; }
.subtitle { color: #888; font-size: 0.85em; margin-bottom: 16px; }
.section { margin: 16px 0; padding: 12px 16px; background: #16213e; border-radius: 6px; border-left: 4px solid #333; }
.section h2 { color: #00d4ff; font-size: 1.05em; margin-bottom: 8px; }
.test { padding: 4px 0 4px 24px; font-size: 0.88em; border-left: 2px solid #333; margin: 2px 0; }
.test.pass { color: #2ecc71; border-left-color: #2ecc71; }
.test.fail { color: #e74c3c; border-left-color: #e74c3c; }
.test .detail { color: #888; font-size: 0.85em; margin-top: 1px; }
.summary { margin: 20px 0; padding: 14px 18px; border-radius: 6px; font-size: 1em; }
.summary.pass { background: #0a3d0a; border-left: 4px solid #2ecc71; }
.summary.fail { background: #3d0a0a; border-left: 4px solid #e74c3c; }
.info-msg { color: #f1c40f; font-style: italic; padding: 4px 0 4px 24px; font-size: 0.85em; }
</style>
</head>
<body>
<h1>Donkeycraft — Phase 5 Player & Movement Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Testing: Player, Movement, Collision, Jumping, Flying, HurtBox</div>
<div id="results"></div>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<!-- Phase 3 Block System -->
<script src="../src/world/block.js"></script>
<script src="../src/world/block-state.js"></script>
<script src="../src/world/block-types.js"></script>
<script src="../src/world/texture-atlas.js"></script>
<script src="../src/world/block-models.js"></script>
<script src="../src/world/recipe-registry.js"></script>

<!-- Phase 4 World Generation -->
<script src="../src/world/biome.js"></script>
<script src="../src/world/chunk.js"></script>
<script src="../src/world/chunk-manager.js"></script>
<script src="../src/world/terrain-generator.js"></script>
<script src="../src/world/ore-generator.js"></script>
<script src="../src/world/cave-generator.js"></script>
<script src="../src/world/structure-generator.js"></script>
<script src="../src/world/water-generator.js"></script>
<script src="../src/world/terrain-surface.js"></script>
<script src="../src/world/lighting-engine.js"></script>
<script src="../src/world/physics.js"></script>

<!-- Phase 5 Player & Movement -->
<script src="../src/player/player.js"></script>
<script src="../src/player/collision.js"></script>
<script src="../src/player/movement.js"></script>
<script src="../src/player/jumping.js"></script>
<script src="../src/player/flying.js"></script>
<script src="../src/player/hurt-box.js"></script>

<script>
(function() {
    'use strict';

    var results = document.getElementById('results');
    var totalTests = 0;
    var passedTests = 0;
    var failedTests = 0;
    var currentSection = null;

    // ============================================================
    // Test Framework
    // ============================================================

    function section(name) {
        var div = document.createElement('div');
        div.className = 'section';
        var heading = document.createElement('h2');
        heading.textContent = name;
        div.appendChild(heading);
        results.appendChild(div);
        currentSection = div;
    }

    function assert(condition, message) {
        totalTests++;
        var div = document.createElement('div');
        if (condition) {
            passedTests++;
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
        } else {
            failedTests++;
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Assertion failed.</div>';
        }
        currentSection.appendChild(div);
    }

    function assertEq(actual, expected, message) {
        totalTests++;
        if (actual === expected) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual) + '</div>';
            currentSection.appendChild(div);
        }
    }

    function assertNear(actual, expected, epsilon, message) {
        totalTests++;
        if (Math.abs(actual - expected) < epsilon) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected ~' + expected + ', got ' + actual + ' (delta=' + Math.abs(actual - expected) + ', epsilon=' + epsilon + ')</div>';
            currentSection.appendChild(div);
        }
    }

    function assertType(val, type, message) {
        totalTests++;
        if (typeof val === type) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '\u2713 PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Expected type "' + type + '", got "' + typeof val + '"</div>';
            currentSection.appendChild(div);
        }
    }

    function assertArrEq(actual, expected, message) {
        totalTests++;
        if (actual.length !== expected.length) {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Length mismatch: ' + actual.length + ' vs ' + expected.length + '</div>';
            currentSection.appendChild(div);
            return;
        }
        for (var i = 0; i < actual.length; i++) {
            if (actual[i] !== expected[i]) {
                failedTests++;
                var div3 = document.createElement('div');
                div3.className = 'test fail';
                div3.innerHTML = '\u2717 FAIL: ' + message + '<div class="detail">Index ' + i + ': expected ' + expected[i] + ', got ' + actual[i] + '</div>';
                currentSection.appendChild(div3);
                return;
            }
        }
        passedTests++;
        var div2 = document.createElement('div');
        div2.className = 'test pass';
        div2.textContent = '\u2713 PASS: ' + message;
        currentSection.appendChild(div2);
    }

    function info(msg) {
        var div = document.createElement('div');
        div.className = 'info-msg';
        div.textContent = '>> ' + msg;
        currentSection.appendChild(div);
    }

    function finishTests() {
        var summary = document.createElement('div');
        if (failedTests === 0) {
            summary.className = 'summary pass';
            summary.innerHTML = '<strong>ALL TESTS PASSED</strong> \u2014 ' + passedTests + '/' + totalTests;
        } else {
            summary.className = 'summary fail';
            summary.innerHTML = '<strong>TESTS FAILED</strong> \u2014 ' + passedTests + '/' + totalTests + ' passed, ' + failedTests + ' failed';
        }
        results.appendChild(summary);
    }

    // ============================================================
    // TEST 1: Player Entity (player.js)
    // ============================================================
    section('1. Player Entity (player.js)');

    // Create a mock chunk manager for collision tests
    var mockChunkManager = {
        getChunkIfExists: function(cx, cz) { return null; },
        getChunk: function(cx, cz) { return null; }
    };

    // Create player at known position
    var player = new Donkeycraft.Player({ x: 10.5, y: 64.0, z: -5.0, gameMode: 'survival' });
    assert(player !== null && player instanceof Donkeycraft.Player, 'Player instance created');

    // Test position
    var pos = player.getPosition();
    assertType(pos, 'object', 'getPosition returns an object');
    assertEq(pos.x, 10.5, 'Initial X = 10.5 (got ' + pos.x + ')');
    assertEq(pos.y, 64.0, 'Initial Y = 64.0 (got ' + pos.y + ')');
    assertEq(pos.z, -5.0, 'Initial Z = -5.0 (got ' + pos.z + ')');

    // Test setPosition
    player.setPosition(20.0, 100.0, 30.0);
    var pos2 = player.getPosition();
    assertEq(pos2.x, 20.0, 'setPosition X = 20.0');
    assertEq(pos2.y, 100.0, 'setPosition Y = 100.0');
    assertEq(pos2.z, 30.0, 'setPosition Z = 30.0');

    // Test velocity
    var vel = player.getVelocity();
    assertEq(vel.x, 0, 'Initial velocity X = 0');
    assertEq(vel.y, 0, 'Initial velocity Y = 0');
    assertEq(vel.z, 0, 'Initial velocity Z = 0');

    player.setVelocity(3.0, -5.0, 2.0);
    var vel2 = player.getVelocity();
    assertEq(vel2.x, 3.0, 'setVelocity X = 3.0');
    assertEq(vel2.y, -5.0, 'setVelocity Y = -5.0');
    assertEq(vel2.z, 2.0, 'setVelocity Z = 2.0');

    // Test rotation
    var rot = player.getRotation();
    assertEq(rot.yaw, 0, 'Initial yaw = 0');
    assertEq(rot.pitch, 0, 'Initial pitch = 0');

    player.setRotation(Math.PI, Math.PI / 4);
    var rot2 = player.getRotation();
    assertNear(rot2.yaw, Math.PI, 0.001, 'setYaw = PI (got ' + rot2.yaw.toFixed(4) + ')');
    assertNear(rot2.pitch, Math.PI / 4, 0.001, 'setPitch = PI/4 (got ' + rot2.pitch.toFixed(4) + ')');

    // Test pitch clamping
    player.setRotation(0, Math.PI); // pitch > π/2 should be clamped
    var clampedRot = player.getRotation();
    assertNear(clampedRot.pitch, Math.PI / 2, 0.001, 'Pitch clamped to π/2 (got ' + clampedRot.pitch.toFixed(4) + ')');

    // Test dimensions
    var dims = player.getDimensions();
    assertEq(dims.height, 1.8, 'Player height = 1.8 (got ' + dims.height + ')');
    assertEq(dims.width, 0.6, 'Player width = 0.6 (got ' + dims.width + ')');

    // Test game mode
    assertEq(player.getGameMode(), 'survival', 'Initial game mode = survival');
    player.setGameMode('creative');
    assertEq(player.getGameMode(), 'creative', 'Game mode changed to creative');
    player.setGameMode('spectator');
    assertEq(player.getGameMode(), 'spectator', 'Game mode changed to spectator');

    // Test invalid game mode (should be ignored)
    player.setGameMode('invalid');
    assertEq(player.getGameMode(), 'spectator', 'Invalid game mode ignored (still spectator)');

    // Test onGround
    assert(player.onGround === false, 'Initial onGround = false');
    player.onGround = true;
    assert(player.onGround === true, 'onGround set to true');

    // Test eye position
    player.setPosition(0, 0, 0);
    var eyePos = player.getEyePosition();
    assertNear(eyePos.x, 0, 0.001, 'Eye X = 0');
    assertNear(eyePos.y, 1.62, 0.001, 'Eye Y = PLAYER_EYE_HEIGHT (got ' + eyePos.y.toFixed(4) + ')');
    assertNear(eyePos.z, 0, 0.001, 'Eye Z = 0');

    // Test hurt box (AABB)
    player.setPosition(5.0, 10.0, 5.0);
    var hurtBox = player.getHurtBox();
    assertEq(hurtBox.minX, 4.7, 'HurtBox minX = 4.7 (got ' + hurtBox.minX + ')');
    assertEq(hurtBox.maxX, 5.3, 'HurtBox maxX = 5.3 (got ' + hurtBox.maxX + ')');
    assertEq(hurtBox.minY, 10.0, 'HurtBox minY = 10.0');
    assertEq(hurtBox.maxY, 11.8, 'HurtBox maxY = 11.8 (player top)');
    assertEq(hurtBox.minZ, 4.7, 'HurtBox minZ = 4.7');
    assertEq(hurtBox.maxZ, 5.3, 'HurtBox maxZ = 5.3');

    // Test forward/right direction vectors
    player.setRotation(0, 0); // Facing negative Z
    var fwd = player.getForwardDirection();
    assertNear(fwd.x, 0, 0.01, 'Facing -Z: forward X ≈ 0 (got ' + fwd.x.toFixed(3) + ')');
    assertNear(fwd.z, -1, 0.01, 'Facing -Z: forward Z ≈ -1 (got ' + fwd.z.toFixed(3) + ')');

    player.setRotation(Math.PI / 2, 0); // Facing negative X
    var fwd2 = player.getForwardDirection();
    assertNear(fwd2.x, -1, 0.01, 'Facing -X: forward X ≈ -1 (got ' + fwd2.x.toFixed(3) + ')');
    assertNear(fwd2.z, 0, 0.01, 'Facing -X: forward Z ≈ 0 (got ' + fwd2.z.toFixed(3) + ')');

    // Test alive/dead
    assert(player.isAlive() === true, 'Player is initially alive');
    player.setAlive(false);
    assert(player.isAlive() === false, 'Player is dead after setAlive(false)');

    // Test knockback
    var kbDir = new Donkeycraft.Vector3(1, 0, 0);
    player.applyKnockback(kbDir, 5.0, 2.0);
    var kb = player.getKnockback();
    assertEq(kb.x, 5.0, 'Knockback X = 5.0 (got ' + kb.x + ')');
    assertEq(kb.y, 2.0, 'Knockback Y = 2.0 (got ' + kb.y + ')');
    assertEq(kb.z, 0, 'Knockback Z = 0 (got ' + kb.z + ')');

    player.clearKnockback();
    var kb2 = player.getKnockback();
    assertEq(kb2.x, 0, 'clearKnockback X = 0');
    assertEq(kb2.y, 0, 'clearKnockback Y = 0');
    assertEq(kb2.z, 0, 'clearKnockback Z = 0');

    // Test fall distance tracking
    player.maxFallDistance = 0;
    player.trackFallDistance(-10.0); // Fell 10 blocks
    assertEq(player.getFallDistance(), 10.0, 'Fall distance tracked = 10 (got ' + player.getFallDistance() + ')');

    // Test destroy
    player.destroy();
    assert(player.getPosition() === null, 'destroy() sets position to null');

    // ============================================================
    // TEST 2: Collision Detection (collision.js)
    // ============================================================
    section('2. Collision Detection (collision.js)');

    // Create a chunk manager with known blocks for collision testing
    var testChunkManager = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var testChunk = testChunkManager.getChunk(0, 0);

    // Fill chunk with stone blocks
    testChunk.fill(1); // stone
    // Carve out a room (air)
    for (var x = 5; x < 11; x++) {
        for (var y = 5; y < 11; y++) {
            for (var z = 5; z < 11; z++) {
                testChunk.setBlock(x, y, z, 0); // air
            }
        }
    }

    var collision = new Donkeycraft.Collision(testChunkManager);
    assert(collision !== null && typeof collision.checkMovement === 'function', 'Collision instance created with checkMovement');
    assert(typeof collision.resolveMovement === 'function', 'Collision has resolveMovement method');
    assert(typeof collision.isBlockSolid === 'function', 'Collision has isBlockSolid method');

    // Test isBlockSolid — stone block at (0, 10, 0) should be solid
    assert(collision.isBlockSolid(0, 10, 0) === true, 'Stone block at (0,10,0) is solid');

    // Test isBlockSolid — air inside room at (8, 8, 8) should not be solid
    assert(collision.isBlockSolid(8, 8, 8) === false, 'Air block at (8,8,8) is not solid');

    // Test isBlockSolid — out of chunk bounds
    assert(collision.isBlockSolid(100, 50, 100) === false, 'Out-of-chunk position returns false');

    // Test resolveMovement — moving through air should succeed
    var airPos = new Donkeycraft.Vector3(8.0, 8.0, 8.0);
    var airVel = new Donkeycraft.Vector3(1.0, 0, 0);
    var resultAir = collision.resolveMovement(airPos, airVel, 0.6, 1.8);
    assertEq(resultAir.newX, 9.0, 'Movement through air: newX = 9.0 (got ' + resultAir.newX + ')');

    // Test resolveMovement — moving into stone should be blocked
    var wallPos = new Donkeycraft.Vector3(5.0, 8.0, 8.0);
    var wallVel = new Donkeycraft.Vector3(-1.0, 0, 0); // Moving left into stone wall
    var resultWall = collision.resolveMovement(wallPos, wallVel, 0.6, 1.8);
    assertEq(resultWall.newX, 5.0, 'Movement into wall: newX blocked at 5.0 (got ' + resultWall.newX + ')');

    // Test resolveMovement — falling and hitting ground
    // Stone floor is at Y=4 and below, air from Y=5 to Y=10
    // Player starts at Y=8 (in air), falls with velocity -5.0
    // Bottom of player = 8.0, top = 9.8
    // Moving down by 5.0 would take bottom to Y=3, overlapping stone at Y=4
    // Collision blocks the entire movement since it would penetrate solid block
    var fallPos = new Donkeycraft.Vector3(8.0, 8.0, 8.0);
    var fallVel = new Donkeycraft.Vector3(0, -5.0, 0); // Falling down
    var resultFall = collision.resolveMovement(fallPos, fallVel, 0.6, 1.8);
    assertEq(resultFall.newY, 8.0, 'Falling into wall: newY blocked at 8.0 (movement fully rejected) (got ' + resultFall.newY + ')');
    assert(resultFall.onGround === true, 'Falling into wall sets onGround = true');

    // Test small fall that doesn't penetrate — falling 0.4 blocks from Y=6.0 to Y=5.6
    // Player bottom = 6.0, top = 7.8. Moving down by 0.4: bottom = 5.6, top = 7.4
    // Y=5 is air (in our carved room), so no collision should occur
    var smallFallPos = new Donkeycraft.Vector3(8.0, 6.0, 8.0);
    var smallFallVel = new Donkeycraft.Vector3(0, -0.4, 0);
    var resultSmallFall = collision.resolveMovement(smallFallPos, smallFallVel, 0.6, 1.8);
    // Bottom of player = 6.0, moving down by 0.4: newY = 5.6
    assertEq(resultSmallFall.newY, 5.6, 'Small fall: newY = 5.6 (no collision) (got ' + resultSmallFall.newY + ')');
    assert(resultSmallFall.onGround === false, 'Small fall: onGround = false');

    // Test that falling into solid block from above is blocked
    var aboveBlockPos = new Donkeycraft.Vector3(8.0, 5.9, 8.0);
    var aboveBlockVel = new Donkeycraft.Vector3(0, -1.0, 0);
    var resultAboveBlock = collision.resolveMovement(aboveBlockPos, aboveBlockVel, 0.6, 1.8);
    // Bottom of player = 5.9, moving down by 1.0: bottom = 4.9, overlaps Y=4 stone
    // Collision blocks the movement
    assertEq(resultAboveBlock.newY, 5.9, 'Falling toward solid block: newY blocked at 5.9 (got ' + resultAboveBlock.newY + ')');
    assert(resultAboveBlock.onGround === true, 'Falling toward solid block: onGround = true');

    // Test checkMovement — axis-separated collision detection
    var moveResult = collision.checkMovement(
        new Donkeycraft.Vector3(8.0, 8.0, 8.0),
        0.6, 1.8,
        3.0, 0, 0 // Try to move 3 blocks right (into stone wall)
    );
    assert(moveResult.collisionX === true, 'checkMovement detects X collision with wall');

    var moveResult2 = collision.checkMovement(
        new Donkeycraft.Vector3(8.0, 8.0, 8.0),
        0.6, 1.8,
        1.0, 0, 0 // Move 1 block right (still in air)
    );
    assert(moveResult2.collisionX === false, 'checkMovement no collision for small movement in air');

    // Test getOverlappingBlocks
    var overlaps = collision.getOverlappingBlocks(4.5, 7.0, 7.0, 5.5, 9.0, 9.0);
    assert(Array.isArray(overlaps), 'getOverlappingBlocks returns an array');
    assert(overlaps.length > 0, 'getOverlappingBlocks finds blocks in overlapping area');

    // Test destroy
    collision.destroy();
    testChunkManager.destroy();

    // ============================================================
    // TEST 3: Movement Physics (movement.js)
    // ============================================================
    section('3. Movement Physics (movement.js)');

    // Create mock input for movement testing
    var mockInput = {
        isKeyDown: function(key) { return false; },
        getMouseDelta: function() { return { x: 0, y: 0 }; }
    };

    // Create fresh player and chunk manager
    var moveChunkManager = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var movePlayer = new Donkeycraft.Player({ x: 8.0, y: 20.0, z: 8.0, gameMode: 'survival' });

    // Fill a chunk with blocks
    var moveChunk = moveChunkManager.getChunk(0, 0);
    moveChunk.fill(1); // stone everywhere
    // Carve room
    for (var x2 = 5; x2 < 12; x2++) {
        for (var y2 = 5; y2 < 15; y2++) {
            for (var z2 = 5; z2 < 12; z2++) {
                moveChunk.setBlock(x2, y2, z2, 0); // air
            }
        }
    }

    var moveCollision = new Donkeycraft.Collision(moveChunkManager);
    var movement = new Donkeycraft.Movement(mockInput, movePlayer, moveCollision, moveChunkManager);

    assert(movement !== null && typeof movement.tick === 'function', 'Movement instance created with tick method');

    // Test getHorizontalSpeed — survival walking (no sprint)
    var speed1 = movement.getHorizontalSpeed();
    assertEq(speed1, 5.0, 'Survival walking speed = 5.0 (got ' + speed1 + ')');

    // Test game mode accessors
    assertEq(movement.getGameMode(), 'survival', 'Movement.getGameMode() = survival');
    movement.setGameMode('creative');
    assertEq(movement.getGameMode(), 'creative', 'Movement.setGameMode() changes to creative');

    // Simulate survival tick with forward movement (no gravity test — in air)
    movePlayer.setPosition(8.0, 12.0, 8.0);
    movePlayer.setVelocity(0, 0, 0);

    // Tick with forward key pressed
    mockInput.isKeyDown = function(key) {
        if (key === 'KeyW') return true; // Forward
        return false;
    };

    // Run several ticks to build up speed
    for (var i = 0; i < 10; i++) {
        movement.tick(0.05); // 50ms delta = 20 TPS
    }

    var velAfterWalk = movePlayer.getVelocity();
    assert(velAfterWalk.z !== 0 || velAfterWalk.x !== 0, 'Walking applies horizontal velocity (got X=' + velAfterWalk.x.toFixed(3) + ', Z=' + velAfterWalk.z.toFixed(3) + ')');

    // Test creative flying speed
    movePlayer.setGameMode('creative');
    movePlayer.flyEnabled = true;

    mockInput.isKeyDown = function(key) { return false; };
    movement.tick(0.05);

    var flySpeed = movement.getHorizontalSpeed();
    assertEq(flySpeed, 5.0, 'Creative flying speed = 5.0 (got ' + flySpeed + ')');

    // Test isInWater / isSwimming — no water in test chunk
    assert(movement.isSwimming() === false, 'Not swimming in air');

    // Test destroy
    movement.destroy();
    movePlayer.destroy();
    moveChunkManager.destroy();

    // ============================================================
    // TEST 4: Jump Mechanics (jumping.js)
    // ============================================================
    section('4. Jump Mechanics (jumping.js)');

    var jumpPlayer = new Donkeycraft.Player({ x: 0, y: 10.0, z: 0 });
    jumpPlayer.onGround = true;

    var jumpMockInput = {
        isKeyDown: function(key) { return false; }
    };

    var jumpChunkManager = new Donkeycraft.ChunkManager({ renderDistance: 1 });
    var jumpChunk = jumpChunkManager.getChunk(0, 0);
    jumpChunk.fill(1); // stone floor
    var jumpCollision = new Donkeycraft.Collision(jumpChunkManager);

    var jumping = new Donkeycraft.Jumping(jumpPlayer, jumpMockInput, jumpCollision);

    assert(jumping !== null && typeof jumping.tick === 'function', 'Jumping instance created with tick method');
    assert(typeof jumping.canJump === 'function', 'Jumping has canJump method');
    assert(typeof jumping.performJump === 'function', 'Jumping has performJump method');

    // Test canJump — on ground, no cooldown
    assert(jumping.canJump() === true, 'canJump = true when on ground with no cooldown');

    // Test performJump
    var jumped = jumping.performJump();
    assert(jumped === true, 'performJump returns true');
    assertEq(jumpPlayer.getVelocity().y, 0.42, 'Jump applies jump force (vy = 0.42, got ' + jumpPlayer.getVelocity().y + ')');

    // Test jump cooldown
    assert(jumping.canJump() === false, 'canJump = false after jump (cooldown active)');

    // Simulate cooldown expiring
    jumpPlayer.onGround = true;
    jumping._jumpCooldown = 0;
    assert(jumping.canJump() === true, 'canJump = true after cooldown expires');

    // Test performJump when not on ground
    jumpPlayer.onGround = false;
    var failedJump = jumping.performJump();
    assert(failedJump === false, 'performJump returns false when not on ground');

    // Test getJumpForce
    assertEq(jumping.getJumpForce(), 0.42, 'getJumpForce = 0.42 (got ' + jumping.getJumpForce() + ')');

    // Test isSwimmingUp — no water
    jumpMockInput.isKeyDown = function(key) { return false; };
    assert(jumping.isSwimmingUp() === false, 'isSwimmingUp = false when not in water');

    // Test destroy
    jumping.destroy();
    jumpPlayer.destroy();
    jumpChunkManager.destroy();

    // ============================================================
    // TEST 5: Flying System (flying.js)
    // ============================================================
    section('5. Flying System (flying.js)');

    var flyPlayer = new Donkeycraft.Player({ x: 0, y: 64.0, z: 0, gameMode: 'creative' });
    var flyInput = {
        isKeyDown: function(key) { return false; }
    };

    var flying = new Donkeycraft.Flying(flyPlayer, flyInput);

    assert(flying !== null && typeof flying.tick === 'function', 'Flying instance created with tick method');

    // Test initial state — creative but fly not enabled yet
    assert(flying.isFlying() === false, 'isFlying = false initially (fly not enabled)');
    assert(flying.isEnabled() === false, 'isEnabled = false initially');

    // Test enableFlyMode
    flying.enableFlyMode();
    assert(flying.isFlying() === true, 'isFlying = true after enableFlyMode');
    assert(flying.isEnabled() === true, 'isEnabled = true after enableFlyMode');
    assert(flyPlayer.flyEnabled === true, 'player.flyEnabled = true after enableFlyMode');

    // Test disableFlyMode
    flying.disableFlyMode();
    assert(flying.isFlying() === false, 'isFlying = false after disableFlyMode');
    assert(flying.isEnabled() === false, 'isEnabled = false after disableFlyMode');

    // Test toggleFlyMode
    flying.toggleFlyMode();
    assert(flying.isFlying() === true, 'toggleFlyMode enables flying');
    flying.toggleFlyMode();
    assert(flying.isFlying() === false, 'toggleFlyMode disables flying');

    // Test setEnabled
    flying.setEnabled(true);
    assert(flying.isEnabled() === true, 'setEnabled(true) works');
    flying.setEnabled(false);
    assert(flying.isEnabled() === false, 'setEnabled(false) works');

    // Test getFlySpeed
    flyInput.isKeyDown = function(key) { return false; };
    var normalSpeed = flying.getFlySpeed();
    assertEq(normalSpeed, 5.0, 'Normal fly speed = 5.0 (got ' + normalSpeed + ')');

    flyInput.isKeyDown = function(key) { return key === 'ShiftLeft'; };
    var boostSpeed = flying.getFlySpeed();
    assertEq(boostSpeed, 10.0, 'Sprint fly speed = 10.0 (got ' + boostSpeed + ')');

    // Test canSpectate — creative mode
    assert(flying.canSpectate() === false, 'canSpectate = false for creative mode');

    // Test shouldClipThroughBlocks — creative mode
    assert(flying.shouldClipThroughBlocks() === false, 'shouldClipThroughBlocks = false for creative mode');

    // Test spectator mode
    flyPlayer.setGameMode('spectator');
    assert(flying.canSpectate() === true, 'canSpectate = true for spectator mode');
    assert(flying.shouldClipThroughBlocks() === true, 'shouldClipThroughBlocks = true for spectator mode');

    // Test survival mode can't fly
    var survPlayer = new Donkeycraft.Player({ gameMode: 'survival' });
    var survFlying = new Donkeycraft.Flying(survPlayer, flyInput);
    survFlying.enableFlyMode();
    assert(flyPlayer.flyEnabled === false || survFlying.isEnabled() === false, 'Survival mode cannot enable flying');

    // Test destroy
    flying.destroy();
    survFlying.destroy();

    // ============================================================
    // TEST 6: Hurt Box & Damage System (hurt-box.js)
    // ============================================================
    section('6. Hurt Box & Damage System (hurt-box.js)');

    var hurtPlayer = new Donkeycraft.Player({ x: 0, y: 10.0, z: 0, gameMode: 'survival' });
    var hurtBox = new Donkeycraft.HurtBox(hurtPlayer);

    assert(hurtBox !== null && typeof hurtBox.takeDamage === 'function', 'HurtBox instance created with takeDamage');

    // Test initial health
    assertEq(hurtBox.getHealth(), 20, 'Initial health = 20 (got ' + hurtBox.getHealth() + ')');
    assertEq(hurtBox.getMaxHealth(), 20, 'Max health = 20');

    // Test takeDamage — generic damage
    var damage = hurtBox.takeDamage(5, 'generic');
    assertEq(damage, 5, 'takeDamage returns amount dealt (got ' + damage + ')');
    assertEq(hurtBox.getHealth(), 15, 'Health after 5 damage = 15 (got ' + hurtBox.getHealth() + ')');

    // Test takeDamage — multiple small damages
    hurtBox.takeDamage(3, 'attack');
    assertEq(hurtBox.getHealth(), 12, 'Health after additional 3 damage = 12 (got ' + hurtBox.getHealth() + ')');

    // Test heal
    var healed = hurtBox.heal(5);
    assertEq(healed, 5, 'heal returns amount restored (got ' + healed + ')');
    assertEq(hurtBox.getHealth(), 17, 'Health after healing 5 = 17 (got ' + hurtBox.getHealth() + ')');

    // Test heal beyond max
    var overHeal = hurtBox.heal(10);
    assertEq(overHeal, 3, 'Over-healing returns only what was needed (got ' + overHeal + ')');
    assertEq(hurtBox.getHealth(), 20, 'Health capped at max = 20 (got ' + hurtBox.getHealth() + ')');

    // Test absorption — absorption absorbs first, then remaining damage hits health
    hurtBox.setAbsorption(5);
    assertEq(hurtBox.getAbsorption(), 5, 'Absorption set to 5');

    var absorbedDamage = hurtBox.takeDamage(7, 'generic');
    // Absorption absorbs 5, remaining 2 damage goes to health: 20 - 2 = 18
    assertEq(hurtBox.getHealth(), 18, 'Health reduced by damage not absorbed: 20-2=18 (got ' + hurtBox.getHealth() + ')');
    assertEq(hurtBox.getAbsorption(), 0, 'Absorption depleted to 0 after absorbing 5 of 7 damage (got ' + hurtBox.getAbsorption() + ')');

    // Test full absorption — 10 absorption absorbs 5 damage completely
    hurtBox.heal(2); // Restore health to 20
    hurtBox.setAbsorption(10);
    var absorbedDamage2 = hurtBox.takeDamage(5, 'generic');
    assertEq(hurtBox.getHealth(), 20, 'Health unchanged when absorption fully absorbs 5 damage (got ' + hurtBox.getHealth() + ')');
    assertEq(hurtBox.getAbsorption(), 5, 'Absorption reduced to 5 after absorbing 5 of 5 damage (got ' + hurtBox.getAbsorption() + ')');

    // Test creative immunity — creative mode returns 0 because no damage is dealt
    var creativePlayer = new Donkeycraft.Player({ gameMode: 'creative' });
    var creativeHurtBox = new Donkeycraft.HurtBox(creativePlayer);
    var creativeDamage = creativeHurtBox.takeDamage(20, 'generic');
    assertEq(creativeDamage, 0, 'Creative mode: takeDamage returns 0 (no damage dealt) (got ' + creativeDamage + ')');
    assertEq(creativeHurtBox.getHealth(), 20, 'Creative mode: health unchanged at 20 (got ' + creativeHurtBox.getHealth() + ')');

    // Test fall damage calculation
    var survPlayer2 = new Donkeycraft.Player({ gameMode: 'survival' });
    var hurtBox2 = new Donkeycraft.HurtBox(survPlayer2);

    // Short fall — no damage (≤ 3 blocks)
    survPlayer2.maxFallDistance = 3;
    var fallDmg1 = hurtBox2.calculateFallDamage(3);
    assertEq(fallDmg1, 0, 'Fall of 3 blocks: no damage (got ' + fallDmg1 + ')');

    // Medium fall — some damage: (10 - 3) * 0.5 = 3.5 HP
    survPlayer2.maxFallDistance = 10;
    var fallDmg2 = hurtBox2.calculateFallDamage(10);
    assertEq(fallDmg2, 3.5, 'Fall of 10 blocks: damage = 3.5 (got ' + fallDmg2 + ')');

    // Long fall — lethal damage: (25 - 3) * 0.5 = 11 HP
    survPlayer2.maxFallDistance = 25;
    var fallDmg3 = hurtBox2.calculateFallDamage(25);
    assertEq(fallDmg3, 11, 'Fall of 25 blocks: damage = 11 (got ' + fallDmg3 + ')');

    // Test applyFallDamage — applies and resets: (10 - 3) * 0.5 = 3.5 HP
    survPlayer2.maxFallDistance = 10;
    var appliedDmg = hurtBox2.applyFallDamage();
    assertEq(appliedDmg, 3.5, 'applyFallDamage returns damage dealt (got ' + appliedDmg + ')');
    assertEq(hurtBox2.getHealth(), 16.5, 'Health after fall damage = 16.5 (got ' + hurtBox2.getHealth() + ')');
    assertEq(survPlayer2.maxFallDistance, 0, 'Fall distance reset to 0 after applying damage');

    // Test knockback
    var kbDir = new Donkeycraft.Vector3(0, 0, -1);
    hurtBox2.applyKnockback(kbDir, 8.0, 3.0);
    var kbVec = hurtBox2.getKnockback();
    assertEq(kbVec.x, 0, 'Knockback X = 0');
    assertEq(kbVec.y, 3.0, 'Knockback Y = 3.0 (got ' + kbVec.y + ')');
    assertEq(kbVec.z, -8.0, 'Knockback Z = -8.0 (got ' + kbVec.z + ')');

    hurtBox2.clearKnockback();
    var kbVec2 = hurtBox2.getKnockback();
    assertEq(kbVec2.x, 0, 'clearKnockback X = 0');
    assertEq(kbVec2.y, 0, 'clearKnockback Y = 0');
    assertEq(kbVec2.z, 0, 'clearKnockback Z = 0');

    // Test death callback
    var deathSource = null;
    hurtBox2.setOnDeath(function(source) { deathSource = source; });

    // Kill the player with a large damage
    survPlayer2.maxFallDistance = 0;
    hurtBox2.takeDamage(100, 'fire');
    assert(survPlayer2.isAlive() === false, 'Player is dead after lethal damage');
    assertEq(deathSource, 'fire', 'Death callback received source = fire');

    // Test onDeath with EventBus
    var eventBusDeath = null;
    var hurtBox3 = new Donkeycraft.HurtBox(new Donkeycraft.Player({ gameMode: 'survival' }));
    hurtBox3.setOnDeath(function(source) { eventBusDeath = source; });
    hurtBox3.takeDamage(100, 'lava');
    assert(eventBusDeath === 'lava', 'Death callback received source = lava');

    // Test isCreative
    assert(hurtBox.isCreative() === false, 'HurtBox.isCreative() = false for survival player');
    assert(creativeHurtBox.isCreative() === true, 'HurtBox.isCreative() = true for creative player');

    // Test getHurtBox — delegates to player
    var hbBox = hurtBox.getHurtBox();
    assertType(hbBox, 'object', 'getHurtBox returns an object');
    assert('minX' in hbBox && 'maxY' in hbBox, 'getHurtBox returns AABB with minX/maxY');

    // Test reset
    hurtPlayer.setAlive(false);
    hurtBox.reset();
    assert(hurtPlayer.isAlive() === true, 'reset() revives player');
    assertEq(hurtBox.getHealth(), 20, 'reset() restores health to 20');

    // Test destroy
    hurtBox.destroy();
    hurtPlayer.destroy();
    creativeHurtBox.destroy();

    // ============================================================
    // TEST 7: Integration — Full Movement Simulation
    // ============================================================
    section('7. Integration — Full Movement Simulation');

    // Create a complete setup with all systems connected
    var simChunkManager = new Donkeycraft.ChunkManager({ renderDistance: 2 });
    var simChunk = simChunkManager.getChunk(0, 0);

    // Generate terrain-like chunk: stone floor with air above
    simChunk.fill(1); // stone
    for (var x3 = 0; x3 < 16; x3++) {
        for (var z3 = 0; z3 < 16; z3++) {
            simChunk.setBlock(x3, 10, z3, 0); // air above Y=10
            simChunk.setBlock(x3, 9, z3, 0);
            simChunk.setBlock(x3, 8, z3, 0);
        }
    }

    var simPlayer = new Donkeycraft.Player({ x: 8.0, y: 15.0, z: 8.0 });
    var simCollision = new Donkeycraft.Collision(simChunkManager);
    var simInput = { isKeyDown: function() { return false; } };

    // Test gravity — player should fall from Y=15 to Y=9.8 (ground level)
    // Stone floor is at Y=8 and below, air above Y=8
    // Player height = 1.8, so when standing on Y=8 ground: bottom = 8.0, top = 9.8
    // NOTE: resolveMovement treats velocity as movement delta per tick
    // We need small per-tick movement increments (like real game at 20 TPS)
    simPlayer.setVelocity(0, -0.5, 0); // Small initial downward movement per tick

    var tickCount = 0;
    var deltaTime = 0.05; // 20 TPS
    while (tickCount < 40) {
        var currentPos = simPlayer.getPosition();

        // Check if next move would penetrate ground — if so, stop
        if (currentPos.y <= 9.81) {
            break; // Player is at ground level
        }

        // Apply gravity to increase velocity in small increments
        var currentVel = simPlayer.getVelocity();
        var vy = Math.max(currentVel.y + (-20.0) * deltaTime, -40.0); // Clamp to terminal velocity
        simPlayer.setVelocity(currentVel.x, vy, currentVel.z);

        // Resolve movement with collision — use return value to update position
        var result = simCollision.resolveMovement(
            simPlayer.getPosition(),
            simPlayer.getVelocity(),
            0.6, 1.8
        );

        // Update player position with resolved values
        simPlayer.setPosition(result.newX, result.newY, result.newZ);

        tickCount++;
    }

    var finalY = simPlayer.getPosition().y;
    assert(finalY < 15.0, 'Player falls due to gravity (final Y=' + finalY.toFixed(2) + ' < 15)');
    // Player bottom should be at Y=8 or very close (standing on stone floor), top at Y=9.8
    // Due to collision blocking movement that would penetrate, we accept Y=8-9 range
    assert(finalY >= 8.0 && finalY <= 9.8, 'Player lands near ground: Y=' + finalY.toFixed(2) + ' (expected 8.0-9.8 range) after ' + tickCount + ' ticks');

    // Test jump from ground
    simPlayer.setPosition(8.0, 10.0, 8.0);
    simPlayer.onGround = true;
    simPlayer.setVelocity(0, 0, 0);

    var simJumping = new Donkeycraft.Jumping(simPlayer, { isKeyDown: function() { return false; } }, simCollision);
    simJumping.performJump();
    assertEq(simPlayer.getVelocity().y, 0.42, 'Jump from ground: vy = 0.42 (got ' + simPlayer.getVelocity().y + ')');

    // Test creative flying toggle
    var flyPlayer2 = new Donkeycraft.Player({ gameMode: 'creative' });
    var flyInput2 = { isKeyDown: function() { return false; } };
    var flySystem = new Donkeycraft.Flying(flyPlayer2, flyInput2);

    assert(flySystem.isFlying() === false, 'Creative player: flying disabled initially');
    flySystem.toggleFlyMode();
    assert(flySystem.isFlying() === true, 'Creative player: flying enabled after toggle');

    // Test hurt box in survival — fall damage: (15 - 3) * 0.5 = 6 HP
    var hurtPlayer2 = new Donkeycraft.Player({ gameMode: 'survival' });
    var hurtBox4 = new Donkeycraft.HurtBox(hurtPlayer2);
    hurtPlayer2.maxFallDistance = 15;
    var fallDmg4 = hurtBox4.calculateFallDamage(15);
    assertEq(fallDmg4, 6, 'Fall of 15 blocks: damage = 6 (got ' + fallDmg4 + ')');

    // Cleanup
    simJumping.destroy();
    flySystem.destroy();
    hurtBox4.destroy();
    simPlayer.destroy();
    flyPlayer2.destroy();
    hurtPlayer2.destroy();
    simChunkManager.destroy();

    finishTests();

})();
</script>
