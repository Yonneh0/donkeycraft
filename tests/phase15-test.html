<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>

<script src="../src/player/game-mode.js"></script>
<script src="../src/player/stats.js"></script>

<!-- Load shared test framework -->
<script src="test.js"></script>

<script>
(function() {
    'use strict';

    var F = TestFramework;
    F.init('results');

    // ============================================================
    // Section 1: Game Mode System — Namespace & Construction
    // ============================================================
    F.section('1. Game Mode System — Namespace & Construction');

    F.assert(typeof Donkeycraft.GameMode === 'function', 'Donkeycraft.GameMode is registered');

    var gmPlayer = new Donkeycraft.Player({ x: 0, y: 64, z: 0, gameMode: 'survival' });
    var gameMode = new Donkeycraft.GameMode(gmPlayer);

    F.assertType(gameMode, 'object', 'GameMode instance created');
    F.assert(typeof gameMode.getGameMode === 'function', 'GameMode has getGameMode method');
    F.assert(typeof gameMode.setGameMode === 'function', 'GameMode has setGameMode method');
    F.assert(typeof gameMode.isSurvival === 'function', 'GameMode has isSurvival method');
    F.assert(typeof gameMode.isCreative === 'function', 'GameMode has isCreative method');
    F.assert(typeof gameMode.isSpectator === 'function', 'GameMode has isSpectator method');
    F.assert(typeof gameMode.canTakeDamage === 'function', 'GameMode has canTakeDamage method');
    F.assert(typeof gameMode.canPlaceBlocks === 'function', 'GameMode has canPlaceBlocks method');
    F.assert(typeof gameMode.canBreakBlocks === 'function', 'GameMode has canBreakBlocks method');
    F.assert(typeof gameMode.hasInfiniteItems === 'function', 'GameMode has hasInfiniteItems method');
    F.assert(typeof gameMode.toggleCreativeFly === 'function', 'GameMode has toggleCreativeFly method');
    F.assert(typeof gameMode.isCreativeFlying === 'function', 'GameMode has isCreativeFlying method');
    F.assert(typeof gameMode.destroy === 'function', 'GameMode has destroy method');

    // Test initial state — survival mode
    F.assertEq(gameMode.getGameMode(), 'survival', 'Initial game mode = survival');
    F.assert(gameMode.isSurvival() === true, 'isSurvival() = true');
    F.assert(gameMode.isCreative() === false, 'isCreative() = false');
    F.assert(gameMode.isSpectator() === false, 'isSpectator() = false');

    // ============================================================
    // Section 2: Game Mode Transitions
    // ============================================================
    F.section('2. Game Mode Transitions');

    // Survival -> Creative
    gameMode.setGameMode('creative');
    F.assertEq(gameMode.getGameMode(), 'creative', 'After setGameMode(creative) = creative');
    F.assert(gameMode.isCreative() === true, 'isCreative() = true after switch');
    F.assert(gameMode.isSurvival() === false, 'isSurvival() = false after switch');

    // Creative -> Spectator
    gameMode.setGameMode('spectator');
    F.assertEq(gameMode.getGameMode(), 'spectator', 'After setGameMode(spectator) = spectator');
    F.assert(gameMode.isSpectator() === true, 'isSpectator() = true after switch');

    // Spectator -> Survival
    gameMode.setGameMode('survival');
    F.assertEq(gameMode.getGameMode(), 'survival', 'After setGameMode(survival) = survival');
    F.assert(gameMode.isSurvival() === true, 'isSurvival() = true after switch');

    // Invalid mode should be ignored
    var originalMode = gameMode.getGameMode();
    gameMode.setGameMode('invalid');
    F.assertEq(gameMode.getGameMode(), originalMode, 'Invalid game mode ignored');

    // ============================================================
    // Section 3: Game Mode Permissions
    // ============================================================
    F.section('3. Game Mode Permissions');

    // Survival permissions
    gmPlayer.setGameMode('survival');
    F.assert(gameMode.canTakeDamage() === true, 'Survival: can take damage');
    F.assert(gameMode.canPlaceBlocks() === true, 'Survival: can place blocks');
    F.assert(gameMode.canBreakBlocks() === true, 'Survival: can break blocks');
    F.assert(gameMode.hasInfiniteItems() === false, 'Survival: no infinite items');
    F.assert(gameMode.canInteract() === true, 'Survival: can interact');
    F.assert(gameMode.canPickupItems() === true, 'Survival: can pickup items');
    F.assert(gameMode.isVulnerable() === true, 'Survival: is vulnerable');

    // Creative permissions
    gmPlayer.setGameMode('creative');
    F.assert(gameMode.canTakeDamage() === false, 'Creative: cannot take damage');
    F.assert(gameMode.canPlaceBlocks() === true, 'Creative: can place blocks');
    F.assert(gameMode.canBreakBlocks() === true, 'Creative: can break blocks');
    F.assert(gameMode.hasInfiniteItems() === true, 'Creative: has infinite items');
    F.assert(gameMode.canInteract() === true, 'Creative: can interact');
    F.assert(gameMode.canPickupItems() === true, 'Creative: can pickup items');
    F.assert(gameMode.isVulnerable() === false, 'Creative: not vulnerable');

    // Spectator permissions
    gmPlayer.setGameMode('spectator');
    F.assert(gameMode.canTakeDamage() === true, 'Spectator: can take damage (not immune)');
    F.assert(gameMode.canPlaceBlocks() === false, 'Spectator: cannot place blocks');
    F.assert(gameMode.canBreakBlocks() === false, 'Spectator: cannot break blocks');
    F.assert(gameMode.hasInfiniteItems() === false, 'Spectator: no infinite items');
    F.assert(gameMode.canInteract() === false, 'Spectator: cannot interact');
    F.assert(gameMode.canPickupItems() === false, 'Spectator: cannot pickup items');
    F.assert(gameMode.isVulnerable() === true, 'Spectator: is vulnerable');

    // ============================================================
    // Section 4: Creative Flying
    // ============================================================
    F.section('4. Creative Flying');

    gmPlayer.setGameMode('creative');

    // Initially flying should be disabled
    F.assert(gameMode.isCreativeFlying() === false, 'Creative flying initially disabled');

    // Toggle on
    var toggled = gameMode.toggleCreativeFly();
    F.assert(toggled === true, 'toggleCreativeFly returns true in creative mode');
    F.assert(gameMode.isCreativeFlying() === true, 'Creative flying enabled after toggle');
    F.assert(gmPlayer.flyEnabled === true, 'player.flyEnabled = true after toggle');

    // Toggle off
    gameMode.toggleCreativeFly();
    F.assert(gameMode.isCreativeFlying() === false, 'Creative flying disabled after second toggle');
    F.assert(gmPlayer.flyEnabled === false, 'player.flyEnabled = false after toggle off');

    // Enable/Disable methods
    gameMode.enableCreativeFly();
    F.assert(gameMode.isCreativeFlying() === true, 'enableCreativeFly works');

    gameMode.disableCreativeFly();
    F.assert(gameMode.isCreativeFlying() === false, 'disableCreativeFly works');

    // Non-creative mode cannot fly
    gmPlayer.setGameMode('survival');
    var survToggled = gameMode.toggleCreativeFly();
    F.assert(survToggled === false, 'toggleCreativeFly returns false in survival mode');

    // ============================================================
    // Section 5: Game Mode Tick & Stack Limit
    // ============================================================
    F.section('5. Game Mode Tick & Stack Limit');

    gmPlayer.setGameMode('survival');

    // Test tick (should not throw)
    gameMode.tick(0.05);
    F.assert(true, 'GameMode.tick() completes without error');

    // Test onTick subscriber — use a fresh player to avoid state leakage
    var tickPlayer2 = new Donkeycraft.Player({ gameMode: 'survival' });
    var tickGM = new Donkeycraft.GameMode(tickPlayer2);
    var tickCalled = false;
    var unsub = tickGM.onTick(function(dt) {
        if (dt === 0.05) tickCalled = true;
    });
    tickGM.tick(0.05);
    F.assert(tickCalled, 'onTick subscriber called with deltaTime');

    // Unsubscribe and verify
    tickCalled = false;
    unsub();
    tickGM.tick(0.05);
    F.assert(!tickCalled, 'Unsubscribed callback not called');

    tickGM.destroy();
    tickPlayer2.destroy();

    // Test getStackLimit
    gmPlayer.setGameMode('survival');
    F.assertEq(gameMode.getStackLimit(), 64, 'Survival stack limit = 64');

    gmPlayer.setGameMode('creative');
    F.assertEq(gameMode.getStackLimit(), 64, 'Creative stack limit = 64');

    // ============================================================
    // Section 6: Player Stats — Namespace & Construction
    // ============================================================
    F.section('6. Player Stats — Namespace & Construction');

    F.assert(typeof Donkeycraft.PlayerStats === 'function', 'Donkeycraft.PlayerStats is registered');

    var statsPlayer = new Donkeycraft.Player({ x: 0, y: 64, z: 0 });
    var stats = new Donkeycraft.PlayerStats(statsPlayer);

    F.assertType(stats, 'object', 'PlayerStats instance created');
    F.assert(typeof stats.getStat === 'function', 'PlayerStats has getStat method');
    F.assert(typeof stats.increment === 'function', 'PlayerStats has increment method');
    F.assert(typeof stats.setStat === 'function', 'PlayerStats has setStat method');
    F.assert(typeof stats.getAllStats === 'function', 'PlayerStats has getAllStats method');
    F.assert(typeof stats.getStatsByPrefix === 'function', 'PlayerStats has getStatsByPrefix method');
    F.assert(typeof stats.recordDistance === 'function', 'PlayerStats has recordDistance method');
    F.assert(typeof stats.recordBlockMine === 'function', 'PlayerStats has recordBlockMine method');
    F.assert(typeof stats.recordBlockPlace === 'function', 'PlayerStats has recordBlockPlace method');
    F.assert(typeof stats.recordEntityKill === 'function', 'PlayerStats has recordEntityKill method');
    F.assert(typeof stats.recordDeath === 'function', 'PlayerStats has recordDeath method');
    F.assert(typeof stats.serialize === 'function', 'PlayerStats has serialize method');
    F.assert(typeof stats.fromObject === 'function', 'PlayerStats has fromObject method');
    F.assert(typeof stats.reset === 'function', 'PlayerStats has reset method');

    // Test initial values
    F.assertEq(stats.getStat('blockMine'), 0, 'Initial blockMine = 0');
    F.assertEq(stats.getStat('blockPlaced'), 0, 'Initial blockPlaced = 0');
    F.assertEq(stats.getStat('mobsKilled'), 0, 'Initial mobsKilled = 0');
    F.assertEq(stats.getStat('deaths'), 0, 'Initial deaths = 0');
    F.assertEq(stats.getStat('distanceWalked'), 0, 'Initial distanceWalked = 0');

    // ============================================================
    // Section 7: Stat Increment & Get
    // ============================================================
    F.section('7. Stat Increment & Get');

    // Basic increment
    stats.increment('blockMine');
    F.assertEq(stats.getStat('blockMine'), 1, 'After increment: blockMine = 1');

    stats.increment('blockMine', 5);
    F.assertEq(stats.getStat('blockMine'), 6, 'After increment(5): blockMine = 6');

    // Increment unknown stat (should create it)
    stats.increment('customStat', 10);
    F.assertEq(stats.getStat('customStat'), 10, 'Unknown stat created with value 10');

    // Set stat
    stats.setStat('blockMine', 3);
    F.assertEq(stats.getStat('blockMine'), 3, 'setStat(3) = 3');

    // Set negative value (should clamp to 0)
    stats.setStat('blockMine', -5);
    F.assertEq(stats.getStat('blockMine'), 0, 'setStat(-5) clamped to 0');

    // ============================================================
    // Section 8: getAllStats & getStatsByPrefix
    // ============================================================
    F.section('8. getAllStats & getStatsByPrefix');

    var all = stats.getAllStats();
    F.assertType(all, 'object', 'getAllStats() returns an object');
    F.assert(all.blockMine === 0, 'getAllStats includes blockMine = 0 (clamped from -5)');
    F.assert(all.mobsKilled === 0, 'getAllStats includes mobsKilled = 0');

    // getStatsByPrefix — movement stats start with 'distance'
    var distStats = stats.getStatsByPrefix('distance');
    F.assertType(distStats, 'object', 'getStatsByPrefix returns an object');
    F.assert('distanceWalked' in distStats, 'distance stats include distanceWalked');
    F.assert('distanceSwum' in distStats, 'distance stats include distanceSwum');

    // getStatsByPrefix — block stats start with 'block'
    var blockStats = stats.getStatsByPrefix('block');
    F.assert('blockMine' in blockStats, 'block stats include blockMine');
    F.assert('blockPlaced' in blockStats, 'block stats include blockPlaced');

    // ============================================================
    // Section 9: Distance Recording
    // ============================================================
    F.section('9. Distance Recording');

    stats.recordDistance(10.5, 'walked');
    F.assertEq(stats.getStat('distanceWalked'), 10.5, 'recordDistance(10.5, walked): distanceWalked = 10.5');

    stats.recordDistance(5.0, 'sprinted');
    F.assertEq(stats.getStat('distanceSprinted'), 5.0, 'recordDistance(5.0, sprinted): distanceSprinted = 5.0');

    stats.recordDistance(3.0, 'swum');
    F.assertEq(stats.getStat('distanceSwum'), 3.0, 'recordDistance(3.0, swum): distanceSwum = 3.0');

    stats.recordDistance(2.0, 'fallen');
    F.assertEq(stats.getStat('distanceFallen'), 2.0, 'recordDistance(2.0, fallen): distanceFallen = 2.0');

    // Default type is 'walked'
    stats.recordDistance(7.0);
    F.assertEq(stats.getStat('distanceWalked'), 17.5, 'recordDistance(7.0) default type adds to distanceWalked');

    // Negative distance should be ignored
    var before = stats.getStat('distanceWalked');
    stats.recordDistance(-5.0, 'walked');
    F.assertEq(stats.getStat('distanceWalked'), before, 'Negative distance ignored');

    // ============================================================
    // Section 10: Block & Combat Recording
    // ============================================================
    F.section('10. Block & Combat Recording');

    // Block mining
    stats.recordBlockMine(1); // stone
    F.assertEq(stats.getStat('blockMine'), 1, 'recordBlockMine increments blockMine to 1');
    F.assertEq(stats.getStat('blockBroken'), 1, 'recordBlockMine increments blockBroken');

    // Block placing
    stats.recordBlockPlace(1);
    F.assertEq(stats.getStat('blockPlaced'), 1, 'recordBlockPlace increments blockPlaced');

    // Block interaction
    stats.recordBlockInteract(1);
    F.assertEq(stats.getStat('blockInteractedWith'), 1, 'recordBlockInteract increments blockInteractedWith');

    // Damage dealt
    stats.recordDamageDealt(5);
    F.assertEq(stats.getStat('damageDealt'), 5, 'recordDamageDealt(5): damageDealt = 5');

    // Entity kill
    stats.recordEntityKill('zombie');
    F.assertEq(stats.getStat('mobsKilled'), 1, 'recordEntityKill(zombie): mobsKilled = 1');

    // Death recording
    stats.recordDeath('zombie');
    F.assertEq(stats.getStat('deaths'), 1, 'recordDeath: deaths = 1');
    F.assertEq(stats.getTimeSinceDeath(), 0, 'timeSinceDeath reset to 0 after death');

    // ============================================================
    // Section 11: Stats Serialization
    // ============================================================
    F.section('11. Stats Serialization');

    // Set up some stats for serialization
    stats.increment('blockMine', 10);
    stats.increment('mobsKilled', 3);
    stats.recordEntityKill('skeleton');
    stats.recordDeath('creeper');

    var serialized = stats.serialize();
    F.assertType(serialized, 'object', 'serialize() returns an object');
    F.assertType(serialized.stats, 'object', 'serialized.stats is an object');
    // entityKilledBy is now part of serialized.stats (no top-level duplicate)
    F.assertType(serialized.stats.entityKilledBy, 'object', 'serialized.stats.entityKilledBy is an object');

    F.assert(serialized.stats.blockMine > 0, 'serialized blockMine > 0');
    F.assert(serialized.stats.mobsKilled > 0, 'serialized mobsKilled > 0');

    // Deserialize
    var stats2 = new Donkeycraft.PlayerStats(new Donkeycraft.Player());
    stats2.reset();
    stats2.fromObject({
        stats: { blockMine: 50, mobsKilled: 10, deaths: 3 },
        entityKilledBy: { zombie: 5, skeleton: 3 }
    });

    F.assertEq(stats2.getStat('blockMine'), 50, 'Deserialized blockMine = 50');
    F.assertEq(stats2.getStat('mobsKilled'), 10, 'Deserialized mobsKilled = 10');
    F.assertEq(stats2.getStat('deaths'), 3, 'Deserialized deaths = 3');

    // ============================================================
    // Section 12: Stats Reset & Tick
    // ============================================================
    F.section('12. Stats Reset & Tick');

    // Test tick — time tracking
    stats2.reset();
    F.assertEq(stats2.getStat('timePlayed'), 0, 'timePlayed = 0 after reset');

    // Simulate 1.5 seconds of ticks (should increment timePlayed by 1)
    for (var i = 0; i < 30; i++) {
        stats2.tick(0.05); // 30 * 0.05 = 1.5 seconds
    }

    F.assert(stats2.getStat('timePlayed') >= 1, 'timePlayed >= 1 after 1.5s of ticks (got ' + stats2.getStat('timePlayed') + ')');

    // Test reset
    stats2.increment('blockMine', 100);
    stats2.reset();
    F.assertEq(stats2.getStat('blockMine'), 0, 'reset() clears blockMine');
    F.assertEq(stats2.getStat('mobsKilled'), 0, 'reset() clears mobsKilled');
    F.assertEq(stats2.getStat('timePlayed'), 0, 'reset() clears timePlayed');

    // ============================================================
    // Section 13: Integration — Game Mode + Stats
    // ============================================================
    F.section('13. Integration — Game Mode + Stats');

    var integPlayer = new Donkeycraft.Player({ x: 0, y: 64, z: 0, gameMode: 'survival' });
    var integGameMode = new Donkeycraft.GameMode(integPlayer);
    var integStats = new Donkeycraft.PlayerStats(integPlayer);

    // Switch to creative — should still allow stat tracking
    integGameMode.setGameMode('creative');
    F.assert(integGameMode.isCreative() === true, 'Creative mode active');
    integStats.increment('blockMine', 5);
    F.assertEq(integStats.getStat('blockMine'), 5, 'Stats tracked in creative mode');

    // Switch to spectator — cannot place/break blocks
    integGameMode.setGameMode('spectator');
    F.assert(integGameMode.canPlaceBlocks() === false, 'Spectator cannot place blocks');
    F.assert(integGameMode.canBreakBlocks() === false, 'Spectator cannot break blocks');

    // Record death and verify
    integStats.recordDeath('fall');
    F.assertEq(integStats.getStat('deaths'), 1, 'Death recorded in spectator');

    // Cleanup
    gameMode.destroy();
    gmPlayer.destroy();
    stats.destroy();
    statsPlayer.destroy();
    stats2.destroy();
    integGameMode.destroy();
    integStats.destroy();
    integPlayer.destroy();

    F.finishTests();

})();
</script>
