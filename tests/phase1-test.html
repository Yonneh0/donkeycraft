<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft Phase 1 — Core Infrastructure Test Suite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Consolas', 'Monaco', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { color: #00d4ff; margin-bottom: 8px; font-size: 1.4em; }
  .summary { margin: 12px 0; padding: 10px 14px; border-radius: 4px; font-size: 0.95em; }
  .summary.pass { background: #0a3d0a; border-left: 4px solid #2ecc71; }
  .summary.fail { background: #3d0a0a; border-left: 4px solid #e74c3c; }
  .section { margin: 16px 0; padding: 10px 14px; background: #16213e; border-radius: 4px; }
  .section h2 { color: #00d4ff; font-size: 1.1em; margin-bottom: 8px; }
  .test { padding: 4px 0 4px 20px; font-size: 0.88em; border-left: 2px solid #333; }
  .test.pass { color: #2ecc71; border-left-color: #2ecc71; }
  .test.fail { color: #e74c3c; border-left-color: #e74c3c; }
  .test .detail { color: #888; font-size: 0.85em; margin-top: 2px; }
  #results { margin-top: 16px; }
</style>
</head>
<body>
<h1>Donkeycraft Phase 1 — Core Infrastructure Test Suite</h1>
<div id="summary"></div>
<div id="results"></div>

<!-- Load scripts in dependency order -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<script>
(function() {
    'use strict';

    var results = document.getElementById('results');
    var summaryEl = document.getElementById('summary');
    var totalTests = 0;
    var passedTests = 0;
    var failedTests = 0;
    var currentSection = null;

    // --- Test helpers ---

    function startSection(name) {
        var section = document.createElement('div');
        section.className = 'section';
        var heading = document.createElement('h2');
        heading.textContent = name;
        section.appendChild(heading);
        results.appendChild(section);
        currentSection = section;
    }

    function assert(condition, message) {
        totalTests++;
        var div = document.createElement('div');
        if (condition) {
            passedTests++;
            div.className = 'test pass';
            div.textContent = '✓ PASS: ' + message;
        } else {
            failedTests++;
            div.className = 'test fail';
            div.innerHTML = '✗ FAIL: ' + message + '<div class="detail">Assertion failed.</div>';
        }
        currentSection.appendChild(div);
    }

    function assertEq(actual, expected, message) {
        totalTests++;
        if (actual === expected) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '✓ PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div2 = document.createElement('div');
            div2.className = 'test fail';
            div2.innerHTML = '✗ FAIL: ' + message + '<div class="detail">Expected ' + JSON.stringify(expected) + ', got ' + JSON.stringify(actual) + '</div>';
            currentSection.appendChild(div2);
        }
    }

    function assertNear(actual, expected, epsilon, message) {
        totalTests++;
        if (Math.abs(actual - expected) < epsilon) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '✓ PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div2 = document.createElement('div');
            div2.className = 'test fail';
            div2.innerHTML = '✗ FAIL: ' + message + '<div class="detail">Expected ~' + expected + ', got ' + actual + ' (delta=' + Math.abs(actual - expected) + ', epsilon=' + epsilon + ')</div>';
            currentSection.appendChild(div2);
        }
    }

    function assertType(val, type, message) {
        totalTests++;
        if (typeof val === type) {
            passedTests++;
            var div = document.createElement('div');
            div.className = 'test pass';
            div.textContent = '✓ PASS: ' + message;
            currentSection.appendChild(div);
        } else {
            failedTests++;
            var div2 = document.createElement('div');
            div2.className = 'test fail';
            div2.innerHTML = '✗ FAIL: ' + message + '<div class="detail">Expected type "' + type + '", got "' + typeof val + '"</div>';
            currentSection.appendChild(div2);
        }
    }

    function assertArrEq(actual, expected, message) {
        totalTests++;
        if (actual.length !== expected.length) {
            failedTests++;
            var div = document.createElement('div');
            div.className = 'test fail';
            div.innerHTML = '✗ FAIL: ' + message + '<div class="detail">Length mismatch: ' + actual.length + ' vs ' + expected.length + '</div>';
            currentSection.appendChild(div);
            return;
        }
        for (var i = 0; i < actual.length; i++) {
            if (actual[i] !== expected[i]) {
                failedTests++;
                var div3 = document.createElement('div');
                div3.className = 'test fail';
                div3.innerHTML = '✗ FAIL: ' + message + '<div class="detail">Index ' + i + ': expected ' + expected[i] + ', got ' + actual[i] + '</div>';
                currentSection.appendChild(div3);
                return;
            }
        }
        passedTests++;
        var div2 = document.createElement('div');
        div2.className = 'test pass';
        div2.textContent = '✓ PASS: ' + message;
        currentSection.appendChild(div2);
    }

    function finishTests() {
        var summary = document.createElement('div');
        if (failedTests === 0) {
            summary.className = 'summary pass';
            summary.innerHTML = '<strong>ALL TESTS PASSED</strong> — ' + passedTests + '/' + totalTests;
        } else {
            summary.className = 'summary fail';
            summary.innerHTML = '<strong>TESTS FAILED</strong> — ' + passedTests + '/' + totalTests + ' passed, ' + failedTests + ' failed';
        }
        summaryEl.appendChild(summary);
    }

    // ============================================================
    // TEST: Namespace
    // ============================================================
    startSection('1. Namespace (namespace.js)');

    assert(typeof Donkeycraft !== 'undefined', 'Donkeycraft global exists');
    assert(typeof Donkeycraft.VERSION === 'string', 'Donkeycraft.VERSION is a string');
    assertEq(Donkeycraft.VERSION, '0.1.0', 'VERSION equals "0.1.0"');
    assert(typeof Donkeycraft.NAME === 'string', 'Donkeycraft.NAME is a string');
    assertEq(Donkeycraft.NAME, 'Donkeycraft', 'NAME equals "Donkeycraft"');
    assert(typeof Donkeycraft.systems === 'object', 'Donkeycraft.systems is an object');
    assert(typeof Donkeycraft.isRunning === 'boolean', 'Donkeycraft.isRunning is a boolean');
    assertEq(Donkeycraft.isRunning, false, 'isRunning defaults to false');

    // Double-load safety: re-execute namespace script content
    var beforeSystems = Donkeycraft.systems;
    (function() {
        'use strict';
        var Donkeycraft = window.Donkeycraft = window.Donkeycraft || {};
        Donkeycraft.VERSION = Donkeycraft.VERSION || '0.1.0';
        Donkeycraft.NAME = Donkeycraft.NAME || 'Donkeycraft';
        Donkeycraft.systems = Donkeycraft.systems || {};
        Donkeycraft.isRunning = (Donkeycraft.isRunning !== undefined) ? Donkeycraft.isRunning : false;
    })();
    assert(Donkeycraft.systems === beforeSystems, 'Double-load preserves existing systems object');

    // ============================================================
    // TEST: EventBus
    // ============================================================
    startSection('2. EventBus (eventbus.js)');

    var bus = new Donkeycraft.EventBus();

    // Basic on/emit
    var emitCalled = false;
    var unsub1 = bus.on('test', function() { emitCalled = true; });
    bus.emit('test');
    assert(emitCalled, 'on(): listener is called on emit');

    // Arguments passthrough
    var argReceived = null;
    bus.on('argsTest', function(a, b, c) { argReceived = [a, b, c]; });
    bus.emit('argsTest', 1, 'hello', true);
    assertArrEq(argReceived, [1, 'hello', true], 'on(): arguments are passed through correctly');

    // Context binding
    var ctxTest = { value: 42 };
    var ctxValue = null;
    bus.on('ctxTest', function() { ctxValue = this.value; }, ctxTest);
    bus.emit('ctxTest');
    assertEq(ctxValue, 42, 'on(): context parameter binds correctly');

    // Unsubscribe function
    var unsubCalled = false;
    var unsub2 = bus.on('unsubTest', function() { unsubCalled = true; });
    unsub2();
    bus.emit('unsubTest');
    assert(!unsubCalled, 'on(): unsubscribe function prevents further calls');

    // once() — fires only once
    var onceCount = 0;
    bus.once('onceTest', function() { onceCount++; });
    bus.emit('onceTest');
    bus.emit('onceTest');
    assertEq(onceCount, 1, 'once(): fires exactly once');

    // once() — unsubscribe before fire
    var neverFired = false;
    var unsubOnce = bus.once('neverFire', function() { neverFired = true; });
    unsubOnce();
    bus.emit('neverFire');
    assert(!neverFired, 'once(): unsubscribe before fire prevents execution');

    // off() — removes by original callback
    var offCb = function() {};
    bus.once('offTest', offCb);
    bus.off('offTest', offCb);
    var offFired = false;
    // Re-register to verify the old one was removed
    bus.on('offTest', function() { offFired = true; });
    bus.emit('offTest');
    assert(offFired, 'off(): re-registered listener still works after removing once callback');

    // off() — removes regular listeners
    var offRegFired = false;
    bus.on('offReg', function() { offRegFired = true; });
    bus.off('offReg', function() { offRegFired = true; }); // This won't match (different fn)
    // Actually register and remove properly
    var regCb = function() {};
    bus.on('offReg2', regCb);
    bus.off('offReg2', regCb);
    var regAfterOff = false;
    bus.emit('offReg2');
    assert(!regAfterOff, 'off(): removes regular listener by callback reference');

    // Namespace prefixing
    var nsBus = new Donkeycraft.EventBus('world');
    var nsFired = false;
    nsBus.on('chunkLoad', function() { nsFired = true; });
    bus.emit('worldchunkLoad'); // Should NOT fire the namespaced listener
    nsBus.emit('chunkLoad');
    assert(nsFired, 'EventBus: namespace prefixing works correctly');

    // emit() — error isolation
    var afterErrorFired = false;
    var bus2 = new Donkeycraft.EventBus();
    bus2.on('errorTest', function() { throw new Error('test error'); });
    bus2.on('errorTest', function() { afterErrorFired = true; });
    bus2.emit('errorTest');
    assert(afterErrorFired, 'emit(): second listener fires even if first throws');

    // clear()
    var clearFired = false;
    bus.clear();
    bus.emit('test'); // was already called, but clear removes all
    assert(true, 'clear(): executes without error (all listeners removed)');

    // ============================================================
    // TEST: Config
    // ============================================================
    startSection('3. Config (config.js)');

    assert(typeof Donkeycraft.Config !== 'undefined', 'Donkeycraft.Config exists');
    assertType(Donkeycraft.Config, 'object', 'Config is an object');

    // World settings
    assertEq(Donkeycraft.Config.CHUNK_SIZE, 16, 'CHUNK_SIZE = 16');
    assertEq(Donkeycraft.Config.WORLD_HEIGHT, 256, 'WORLD_HEIGHT = 256');
    assertEq(Donkeycraft.Config.RENDER_DISTANCE, 8, 'RENDER_DISTANCE = 8');
    assertEq(Donkeycraft.Config.MAX_RENDER_DISTANCE, 12, 'MAX_RENDER_DISTANCE = 12');
    assertEq(Donkeycraft.Config.SEED, 42, 'SEED = 42');

    // Tick rates
    assertEq(Donkeycraft.Config.GAME_TICKS_PER_SECOND, 20, 'GAME_TICKS_PER_SECOND = 20');
    assertEq(Donkeycraft.Config.RENDER_FPS_TARGET, 60, 'RENDER_FPS_TARGET = 60');
    assertEq(Donkeycraft.Config.AUTO_SAVE_INTERVAL, 30000, 'AUTO_SAVE_INTERVAL = 30000');

    // Player settings
    assertEq(Donkeycraft.Config.PLAYER_HEIGHT, 1.8, 'PLAYER_HEIGHT = 1.8');
    assertEq(Donkeycraft.Config.PLAYER_WIDTH, 0.6, 'PLAYER_WIDTH = 0.6');
    assertEq(Donkeycraft.Config.PLAYER_EYE_HEIGHT, 1.62, 'PLAYER_EYE_HEIGHT = 1.62');
    assertEq(Donkeycraft.Config.PLAYER_SPEED, 5.0, 'PLAYER_SPEED = 5.0');
    assertEq(Donkeycraft.Config.PLAYER_SPRINT_SPEED, 7.8, 'PLAYER_SPRINT_SPEED = 7.8');
    assertEq(Donkeycraft.Config.PLAYER_FLY_SPEED, 5.0, 'PLAYER_FLY_SPEED = 5.0');
    assertEq(Donkeycraft.Config.PLAYER_FLY_SPEED_BOOST, 10.0, 'PLAYER_FLY_SPEED_BOOST = 10.0');
    assertEq(Donkeycraft.Config.PLAYER_JUMP_FORCE, 0.42, 'PLAYER_JUMP_FORCE = 0.42');
    assertEq(Donkeycraft.Config.PLAYER_REACH, 6.0, 'PLAYER_REACH = 6.0');

    // Camera settings
    assertEq(Donkeycraft.Config.FOV, 70, 'FOV = 70');
    assertEq(Donkeycraft.Config.MOUSE_SENSITIVITY, 0.15, 'MOUSE_SENSITIVITY = 0.15');
    assertEq(Donkeycraft.Config.MOUSE_SCROLL_SENSITIVITY, 1, 'MOUSE_SCROLL_SENSITIVITY = 1');

    // Physics
    assertEq(Donkeycraft.Config.GRAVITY, -20.0, 'GRAVITY = -20.0');
    assertEq(Donkeycraft.Config.TERMINAL_VELOCITY, -40.0, 'TERMINAL_VELOCITY = -40.0');
    assertEq(Donkeycraft.Config.FLYING_TERMINAL_VELOCITY, -20.0, 'FLYING_TERMINAL_VELOCITY = -20.0');

    // Keybinds
    assert(typeof Donkeycraft.Config.KEYBINDS === 'object', 'KEYBINDS is an object');
    assertEq(Donkeycraft.Config.KEYBINDS.MOVE_FORWARD, 'KeyW', 'KEYBINDS.MOVE_FORWARD = KeyW');
    assertEq(Donkeycraft.Config.KEYBINDS.MOVE_BACKWARD, 'KeyS', 'KEYBINDS.MOVE_BACKWARD = KeyS');
    assertEq(Donkeycraft.Config.KEYBINDS.MOVE_LEFT, 'KeyA', 'KEYBINDS.MOVE_LEFT = KeyA');
    assertEq(Donkeycraft.Config.KEYBINDS.MOVE_RIGHT, 'KeyD', 'KEYBINDS.MOVE_RIGHT = KeyD');
    assertEq(Donkeycraft.Config.KEYBINDS.JUMP, 'Space', 'KEYBINDS.JUMP = Space');
    assertEq(Donkeycraft.Config.KEYBINDS.SPRINT, 'ShiftLeft', 'KEYBINDS.SPRINT = ShiftLeft');
    assertEq(Donkeycraft.Config.KEYBINDS.SNEAK, 'ControlLeft', 'KEYBINDS.SNEAK = ControlLeft');
    assertEq(Donkeycraft.Config.KEYBINDS.INVENTORY, 'KeyE', 'KEYBINDS.INVENTORY = KeyE');
    assertEq(Donkeycraft.Config.KEYBINDS.DEBUG_SCREEN, 'F3', 'KEYBINDS.DEBUG_SCREEN = F3');
    assertEq(Donkeycraft.Config.KEYBINDS.FLY_TOGGLE, 'F5', 'KEYBINDS.FLY_TOGGLE = F5');
    assertEq(Donkeycraft.Config.KEYBINDS.DROP_ITEM, 'KeyQ', 'KEYBINDS.DROP_ITEM = KeyQ');

    // Verify all Digit keybinds exist
    for (var d = 1; d <= 9; d++) {
        var keyName = 'PICK_ITEM_' + d;
        var expectedKey = 'Digit' + d;
        assertEq(Donkeycraft.Config.KEYBINDS[keyName], expectedKey, 'KEYBINDS.' + keyName + ' = ' + expectedKey);
    }

    // Chunk persistence
    assertEq(Donkeycraft.Config.CHUNKS_PER_SAVE, 4, 'CHUNKS_PER_SAVE = 4');
    assertEq(Donkeycraft.Config.SAVE_BATCH_DELAY, 100, 'SAVE_BATCH_DELAY = 100');

    // ============================================================
    // TEST: Logger
    // ============================================================
    startSection('4. Logger (logger.js)');

    assert(typeof Donkeycraft.LogLevel === 'object', 'Donkeycraft.LogLevel exists');
    assertEq(Donkeycraft.LogLevel.DEBUG, 0, 'LogLevel.DEBUG = 0');
    assertEq(Donkeycraft.LogLevel.INFO, 1, 'LogLevel.INFO = 1');
    assertEq(Donkeycraft.LogLevel.WARN, 2, 'LogLevel.WARN = 2');
    assertEq(Donkeycraft.LogLevel.ERROR, 3, 'LogLevel.ERROR = 3');
    assertEq(Donkeycraft.LogLevel.SILENT, 4, 'LogLevel.SILENT = 4');

    assert(typeof Donkeycraft.Logger === 'object', 'Donkeycraft.Logger exists');
    assertType(Donkeycraft.Logger.setLevel, 'function', 'Logger.setLevel is a function');
    assertType(Donkeycraft.Logger.getLevel, 'function', 'Logger.getLevel is a function');
    assertType(Donkeycraft.Logger.setTagEnabled, 'function', 'Logger.setTagEnabled is a function');
    assertType(Donkeycraft.Logger.getTagEnabled, 'function', 'Logger.getTagEnabled is a function');
    assertType(Donkeycraft.Logger.debug, 'function', 'Logger.debug is a function');
    assertType(Donkeycraft.Logger.info, 'function', 'Logger.info is a function');
    assertType(Donkeycraft.Logger.warn, 'function', 'Logger.warn is a function');
    assertType(Donkeycraft.Logger.error, 'function', 'Logger.error is a function');

    // Level filtering: default is INFO, so DEBUG should be suppressed
    var levelBefore = Donkeycraft.Logger.getLevel();

    // Test DEBUG suppression at INFO level
    Donkeycraft.Logger.setLevel(Donkeycraft.LogLevel.INFO);
    assert(Donkeycraft.Logger.getLevel() === Donkeycraft.LogLevel.INFO, 'Default level is INFO');

    // Test WARN level: debug and info suppressed, warn shown
    Donkeycraft.Logger.setLevel(Donkeycraft.LogLevel.WARN);
    assert(Donkeycraft.Logger.getLevel() === Donkeycraft.LogLevel.WARN, 'setLevel/getLevel work correctly');

    // Test SILENT level: nothing should pass
    Donkeycraft.Logger.setLevel(Donkeycraft.LogLevel.SILENT);
    assert(Donkeycraft.Logger.getLevel() === Donkeycraft.LogLevel.SILENT, 'SILENT level suppresses all');

    // Restore and test tag toggle
    Donkeycraft.Logger.setTagEnabled(false);
    assert(!Donkeycraft.Logger.getTagEnabled(), 'getTagEnabled returns false after setTagEnabled(false)');

    Donkeycraft.Logger.setTagEnabled(true);
    assert(Donkeycraft.Logger.getTagEnabled(), 'getTagEnabled returns true after setTagEnabled(true)');

    // Restore default level
    Donkeycraft.Logger.setLevel(levelBefore);
    Donkeycraft.Logger.setTagEnabled(true);

    // Test that error method accepts multiple args
    assertType(Donkeycraft.Logger.error, 'function', 'Logger.error accepts variadic args (no error calling)');
    try {
        Donkeycraft.Logger.error('test', 'msg', 123, { key: 'val' });
        assert(true, 'Logger.error() executes without error with multiple arguments');
    } catch (e) {
        assert(false, 'Logger.error() should not throw');
    }

    // ============================================================
    // TEST: Timer
    // ============================================================
    startSection('5. Timer (timer.js)');

    // Constructor
    var timer = new Donkeycraft.Timer();
    assert(timer instanceof Donkeycraft.Timer, 'Timer constructor creates instance');
    assertType(timer.getDeltaTime, 'function', 'getDeltaTime is a function');
    assertType(timer.getFPS, 'function', 'getFPS is a function');
    assertType(timer.getTickCount, 'function', 'getTickCount is a function');
    assertType(timer.start, 'function', 'start is a function');
    assertType(timer.stop, 'function', 'stop is a function');
    assertType(timer.onTick, 'function', 'onTick is a function');
    assertType(timer.onRender, 'function', 'onRender is a function');

    // Default tick interval
    assertEq(timer._tickInterval, 50, 'Default tick interval = 50ms (1000/20)');

    // Custom ticks per second
    var fastTimer = new Donkeycraft.Timer(10);
    assertEq(fastTimer._tickInterval, 100, 'Custom 10 TPS → tick interval = 100ms');

    // getDeltaTime starts at 0
    assertNear(timer.getDeltaTime(), 0, 0.001, 'Initial deltaTime is 0');

    // getTickCount starts at 0
    assertEq(timer.getTickCount(), 0, 'Initial tickCount is 0');

    // onTick callback
    var tickCbCalled = false;
    var tickDtReceived = null;
    var tickCountReceived = null;
    var unsubTick = timer.onTick(function(dt, tickCount) {
        tickCbCalled = true;
        tickDtReceived = dt;
        tickCountReceived = tickCount;
    });
    assertType(unsubTick, 'function', 'onTick returns unsubscribe function');

    // onRender callback
    var renderCbCalled = false;
    var renderDtReceived = null;
    var unsubRender = timer.onRender(function(dt) {
        renderCbCalled = true;
        renderDtReceived = dt;
    });
    assertType(unsubRender, 'function', 'onRender returns unsubscribe function');

    // Start and let it run briefly
    timer.start();
    assert(timer._running, 'Timer._running is true after start()');

    // Wait a bit for callbacks to fire
    yieldFrames(3).then(function() {
        assert(tickCbCalled, 'onTick callback fires after start()');
        assert(renderCbCalled, 'onRender callback fires after start()');

        if (tickCbCalled) {
            assertNear(tickDtReceived, 0.05, 0.01, 'onTick receives ~50ms tickDt (50ms = 1/20)');
            assert(tickCountReceived >= 1, 'onTick receives tickCount >= 1');
        }

        // FPS should be non-zero after running
        var fps = timer.getFPS();
        assert(fps >= 0, 'getFPS returns a non-negative number after running: ' + fps);

        // Test idempotent start
        var firstStartId = timer._animationFrameId;
        timer.start();
        assert(true, 'start() called twice without error (idempotent-ish)');

        // Stop
        timer.stop();
        assert(!timer._running, 'Timer._running is false after stop()');

        // Test unsubscribe tick
        var unsubTickCbFired = false;
        var unsubTickCb = timer.onTick(function() { unsubTickCbFired = true; });
        unsubTickCb();
        timer.start();
        yieldFrames(2).then(function() {
            timer.stop();
            assert(!unsubTickCbFired, 'Unsubscribed tick callback does not fire');

            // Test unsubscribe render
            var unsubRenderCbFired = false;
            var unsubRenderCb = timer.onRender(function() { unsubRenderCbFired = true; });
            unsubRenderCb();
            timer.start();
            yieldFrames(2).then(function() {
                timer.stop();
                assert(!unsubRenderCbFired, 'Unsubscribed render callback does not fire');

                // Test tick callback error isolation
                var afterErrorTick = false;
                var timer2 = new Donkeycraft.Timer(20);
                timer2.onTick(function() { throw new Error('tick error test'); });
                timer2.onTick(function() { afterErrorTick = true; });
                timer2.start();
                yieldFrames(3).then(function() {
                    timer2.stop();
                    assert(afterErrorTick, 'Second tick callback fires even if first throws');

                    // Cleanup: destroy input to release listeners before final report
                    if (Donkeycraft.Input) {
                        var input = new Donkeycraft.Input();
                        input.destroy();
                        assert(true, 'Input.destroy() executes without error');
                    }

                    finishTests();
                });
            });
        });
    });

    // ============================================================
    // TEST: Input
    // ============================================================
    startSection('6. Input (input.js)');

    // Note: Input attaches global event listeners, so we create and destroy it.
    var input = new Donkeycraft.Input();
    assert(input instanceof Donkeycraft.Input, 'Input constructor creates instance');
    assertType(input.isKeyDown, 'function', 'isKeyDown is a function');
    assertType(input.isKeyJustPressed, 'function', 'isKeyJustPressed is a function');
    assertType(input.updateKeyStates, 'function', 'updateKeyStates is a function');
    assertType(input.getMouseState, 'function', 'getMouseState is a function');
    assertType(input.getMouseDelta, 'function', 'getMouseDelta is a function');
    assertType(input.getWheelDelta, 'function', 'getWheelDelta is a function');
    assertType(input.captureMouse, 'function', 'captureMouse is a function');
    assertType(input.releaseMouse, 'function', 'releaseMouse is a function');
    assertType(input.isMouseCaptured, 'function', 'isMouseCaptured is a function');
    assertType(input.destroy, 'function', 'destroy is a function');

    // isKeyDown: no keys pressed initially
    assert(!input.isKeyDown('KeyW'), 'No keys pressed initially → KeyW = false');
    assert(!input.isKeyDown('Space'), 'No keys pressed initially → Space = false');

    // getMouseState returns object with expected properties
    var ms = input.getMouseState();
    assert(typeof ms.left === 'boolean', 'getMouseState().left is boolean');
    assert(typeof ms.right === 'boolean', 'getMouseState().right is boolean');
    assert(typeof ms.middle === 'boolean', 'getMouseState().middle is boolean');
    assert(typeof ms.x === 'number', 'getMouseState().x is number');
    assert(typeof ms.y === 'number', 'getMouseState().y is number');
    assert(typeof ms.deltaX === 'number', 'getMouseState().deltaX is number');
    assert(typeof ms.deltaY === 'number', 'getMouseState().deltaY is number');

    // getMouseDelta auto-resets
    var delta1 = input.getMouseDelta();
    assertEq(delta1.deltaX, 0, 'Initial deltaX from getMouseDelta()');
    assertEq(delta1.deltaY, 0, 'Initial deltaY from getMouseDelta()');
    var delta2 = input.getMouseDelta();
    assertEq(delta2.deltaX, 0, 'getMouseDelta() resets after first call');
    assertEq(delta2.deltaY, 0, 'getMouseDelta() resets after first call');

    // getWheelDelta auto-resets
    var wheel1 = input.getWheelDelta();
    assertEq(wheel1, 0, 'Initial wheel delta = 0');
    var wheel2 = input.getWheelDelta();
    assertEq(wheel2, 0, 'getWheelDelta() resets after first call');

    // updateKeyStates + isKeyJustPressed: simulate key press via event
    // We dispatch a keydown event, then call updateKeyStates
    var keyPressEvent = new KeyboardEvent('keydown', { code: 'KeyW', bubbles: true });
    window.dispatchEvent(keyPressEvent);

    assert(input.isKeyDown('KeyW'), 'After keydown KeyW → isKeyDown = true');
    // Just-pressed requires updateKeyStates to be called
    input.updateKeyStates();
    assert(input.isKeyJustPressed('KeyW'), 'After keydown + updateKeyStates → isKeyJustPressed = true');

    // Second call to isKeyJustPressed should return false (cleared by updateKeyStates)
    input.updateKeyStates();
    assert(!input.isKeyJustPressed('KeyW'), 'isKeyJustPressed returns false on second call (held key)');

    // Key release
    var keyReleaseEvent = new KeyboardEvent('keyup', { code: 'KeyW', bubbles: true });
    window.dispatchEvent(keyReleaseEvent);
    assert(!input.isKeyDown('KeyW'), 'After keyup KeyW → isKeyDown = false');

    // destroy removes listeners — we can't easily verify this, but verify it doesn't throw
    input.destroy();
    assert(true, 'Input.destroy() executes without error');

    // ============================================================
    // TEST: Vector3
    // ============================================================
    startSection('7. Math Utilities — Vector3 (math-utils.js)');

    var v = new Donkeycraft.Vector3(3, 4, 0);
    assert(v.x === 3 && v.y === 4 && v.z === 0, 'Vector3 constructor sets x, y, z');

    // Default values
    var vDefault = new Donkeycraft.Vector3();
    assertEq(vDefault.x, 0, 'Default Vector3.x = 0');
    assertEq(vDefault.y, 0, 'Default Vector3.y = 0');
    assertEq(vDefault.z, 0, 'Default Vector3.z = 0');

    // NaN handling
    var vNaN = new Donkeycraft.Vector3(NaN, 5, NaN);
    assertEq(vNaN.x, 0, 'Vector3 replaces NaN x with 0');
    assertEq(vNaN.y, 5, 'Vector3 preserves valid y');
    assertEq(vNaN.z, 0, 'Vector3 replaces NaN z with 0');

    // Static methods
    var zero = Donkeycraft.Vector3.zero();
    assert(zero.x === 0 && zero.y === 0 && zero.z === 0, 'Vector3.zero() returns (0,0,0)');

    var one = Donkeycraft.Vector3.one();
    assert(one.x === 1 && one.y === 1 && one.z === 1, 'Vector3.one() returns (1,1,1)');

    var copy = Donkeycraft.Vector3.copy(v);
    assert(copy.x === 3 && copy.y === 4 && copy.z === 0, 'Vector3.copy() creates shallow copy');
    copy.set(99, 99, 99);
    assertEq(v.x, 3, 'Vector3.copy() is independent of original');

    var fromArr = Donkeycraft.Vector3.fromArray([7, 8, 9]);
    assert(fromArr.x === 7 && fromArr.y === 8 && fromArr.z === 9, 'Vector3.fromArray([7,8,9])');

    // set() — chaining
    var chain = v.set(1, 2, 3);
    assertEq(chain, v, 'set() returns this for chaining');
    assert(v.x === 1 && v.y === 2 && v.z === 3, 'set() updates components');

    // add() — chaining
    var a = new Donkeycraft.Vector3(1, 2, 3);
    var b = new Donkeycraft.Vector3(4, 5, 6);
    var addResult = a.add(b);
    assertEq(addResult, a, 'add() returns this');
    assert(a.x === 5 && a.y === 7 && a.z === 9, 'add() modifies in place: (1,2,3)+(4,5,6)=(5,7,9)');

    // sub() — chaining
    var c = new Donkeycraft.Vector3(10, 20, 30);
    var d = new Donkeycraft.Vector3(3, 4, 5);
    c.sub(d);
    assert(c.x === 7 && c.y === 16 && c.z === 25, 'sub() in place: (10,20,30)-(3,4,5)=(7,16,25)');

    // scale() — chaining
    var e = new Donkeycraft.Vector3(2, 3, 4);
    e.scale(3);
    assert(e.x === 6 && e.y === 9 && e.z === 12, 'scale(3): (2,3,4) → (6,9,12)');

    // dot product
    var f = new Donkeycraft.Vector3(1, 2, 3);
    var g = new Donkeycraft.Vector3(4, 5, 6);
    assertEq(f.dot(g), 32, 'dot((1,2,3),(4,5,6)) = 32');

    // cross product — chaining
    var h = new Donkeycraft.Vector3(1, 0, 0);
    var i = new Donkeycraft.Vector3(0, 1, 0);
    var crossResult = h.cross(i);
    assertEq(crossResult, h, 'cross() returns this');
    assert(h.x === 0 && h.y === 0 && h.z === 1, 'cross((1,0,0),(0,1,0)) = (0,0,1)');

    // lengthSq
    var j = new Donkeycraft.Vector3(3, 4, 0);
    assertEq(j.lengthSq(), 25, 'lengthSq((3,4,0)) = 25');

    // length
    assertNear(j.length(), 5, 0.001, 'length((3,4,0)) = 5');

    // normalize — chaining
    var k = new Donkeycraft.Vector3(3, 4, 0);
    var normResult = k.normalize();
    assertEq(normResult, k, 'normalize() returns this');
    assertNear(k.length(), 1, 0.001, 'normalize() produces unit vector');

    // normalize zero vector
    var zeroV = new Donkeycraft.Vector3(0, 0, 0);
    zeroV.normalize();
    assert(zeroV.x === 0 && zeroV.y === 0 && zeroV.z === 0, 'normalize() of zero vector stays (0,0,0)');

    // normalized() — returns copy
    var l = new Donkeycraft.Vector3(10, 0, 0);
    var normCopy = l.normalized();
    assertNear(normCopy.length(), 1, 0.001, 'normalized() returns unit vector');
    assertEq(l.x, 10, 'normalized() does not modify original');

    // distanceTo
    var m = new Donkeycraft.Vector3(0, 0, 0);
    var n = new Donkeycraft.Vector3(3, 4, 0);
    assertNear(m.distanceTo(n), 5, 0.001, 'distanceTo((0,0,0),(3,4,0)) = 5');

    // floor — chaining
    var o = new Donkeycraft.Vector3(1.7, -2.3, 3.9);
    var floorResult = o.floor();
    assertEq(floorResult, o, 'floor() returns this');
    assert(o.x === 1 && o.y === -3 && o.z === 3, 'floor((1.7,-2.3,3.9)) = (1,-3,3)');

    // equals with epsilon
    var p = new Donkeycraft.Vector3(0.0005, 0.0005, 0.0005);
    var q = new Donkeycraft.Vector3(0, 0, 0);
    assert(p.equals(q), 'equals() with default epsilon: (0.0005,0.0005,0.0005) ≈ (0,0,0)');

    var r = new Donkeycraft.Vector3(0.1, 0, 0);
    assert(!r.equals(q), 'equals() with default epsilon: (0.1,0,0) ≠ (0,0,0)');

    // isZero
    assert(z.isZero(), '(0,0,0).isZero() = true');
    assert(!(new Donkeycraft.Vector3(1, 0, 0)).isZero(), '(1,0,0).isZero() = false');

    // ============================================================
    // TEST: Matrix4
    // ============================================================
    startSection('8. Math Utilities — Matrix4 (math-utils.js)');

    // createIdentity
    var identity = Donkeycraft.Matrix4.createIdentity();
    assert(identity instanceof Donkeycraft.Matrix4, 'createIdentity returns Matrix4');
    var idData = identity.getData();
    assert(idData[0] === 1 && idData[5] === 1 && idData[10] === 1 && idData[15] === 1, 'Identity diagonal = 1');
    assert(idData[1] === 0 && idData[4] === 0 && idData[2] === 0, 'Identity off-diagonal = 0');

    // createPerspective
    var persp = Donkeycraft.Matrix4.createPerspective(Math.PI / 4, 16 / 9, 0.1, 100);
    assert(persp instanceof Donkeycraft.Matrix4, 'createPerspective returns Matrix4');
    var pData = persp.getData();
    assertNear(pData[0], 9 / Math.tan(Math.PI / 8), 0.1, 'Perspective[0] has expected FOV value');

    // createOrthographic
    var ortho = Donkeycraft.Matrix4.createOrthographic(-10, 10, -10, 10, 0.1, 100);
    assert(ortho instanceof Donkeycraft.Matrix4, 'createOrthographic returns Matrix4');

    // createLookAt
    var eye = new Donkeycraft.Vector3(0, 0, 5);
    var target = new Donkeycraft.Vector3(0, 0, 0);
    var up = new Donkeycraft.Vector3(0, 1, 0);
    var lookAt = Donkeycraft.Matrix4.createLookAt(eye, target, up);
    assert(lookAt instanceof Donkeycraft.Matrix4, 'createLookAt returns Matrix4');

    // createTranslation
    var trans = Donkeycraft.Matrix4.createTranslation(3, 4, 5);
    var tData = trans.getData();
    assert(tData[12] === 3 && tData[13] === 4 && tData[14] === 5, 'Translation matrix has correct offsets');

    // createRotation (90 degrees around Z)
    var zAxis = new Donkeycraft.Vector3(0, 0, 1);
    var rotZ = Donkeycraft.Matrix4.createRotation(Math.PI / 2, zAxis);
    assert(rotZ instanceof Donkeycraft.Matrix4, 'createRotation returns Matrix4');

    // multiply
    var m1 = Donkeycraft.Matrix4.createTranslation(1, 0, 0);
    var m2 = Donkeycraft.Matrix4.createTranslation(0, 2, 0);
    var mProd = m1.multiply(m2);
    assert(mProd instanceof Donkeycraft.Matrix4, 'multiply returns Matrix4');

    // transformVector (direction, w=0)
    var dir = new Donkeycraft.Vector3(1, 0, 0);
    var translated = Donkeycraft.Matrix4.createTranslation(5, 0, 0);
    var result = translated.transformVector(dir, 0);
    assert(result.x === 1 && result.y === 0 && result.z === 0, 'transformVector with w=0 ignores translation');

    // transformVector (position, w=1)
    var posResult = translated.transformVector(dir, 1);
    // result = M * (1,0,0,1) = column 0*1 + column 3*1 = (1,0,0,0) + (5,0,0,1) = (6,0,0,1)
    assertNear(posResult.x, 6, 0.001, 'transformVector w=1: position (1,0,0)+translation(5,0,0)=(6,0,0)');

    // transpose
    var asym = Donkeycraft.Matrix4.createTranslation(1, 2, 3);
    var asymData = asym.getData();
    assert(asymData[12] === 1 && asymData[13] === 2 && asymData[14] === 3, 'Before transpose: translation at [12,13,14]');
    asym.transpose();
    var transposedData = asym.getData();
    assert(transposedData[12] === 1 && transposedData[4] === 2 && transposedData[8] === 3, 'After transpose: [12]=1,[4]=2,[8]=3');

    // ============================================================
    // TEST: Quaternion
    // ============================================================
    startSection('9. Math Utilities — Quaternion (math-utils.js)');

    var q = new Donkeycraft.Quaternion(0, 0, 0, 1);
    assert(q.x === 0 && q.y === 0 && q.z === 0 && q.w === 1, 'Quaternion defaults to identity (0,0,0,1)');

    var qCustom = new Donkeycraft.Quaternion(0.1, 0.2, 0.3, 0.9);
    assert(qCustom.x === 0.1 && qCustom.y === 0.2 && qCustom.z === 0.3 && qCustom.w === 0.9, 'Quaternion custom values');

    // identity()
    var qId = Donkeycraft.Quaternion.identity();
    assert(qId.x === 0 && qId.y === 0 && qId.z === 0 && qId.w === 1, 'Quaternion.identity() = (0,0,0,1)');

    // fromAxisAngle — 90 degrees around Y
    var yAxis = new Donkeycraft.Vector3(0, 1, 0);
    var qYaw = Donkeycraft.Quaternion.fromAxisAngle(yAxis, Math.PI / 2);
    assertNear(qYaw.w, Math.cos(Math.PI / 4), 0.001, 'fromAxisAngle w = cos(θ/2)');

    // fromEuler — identity angles
    var qEulerZero = Donkeycraft.Quaternion.fromEuler(0, 0, 0);
    assertNear(qEulerZero.w, 1, 0.001, 'fromEuler(0,0,0) ≈ identity');

    // multiply
    var qMul = qYaw.multiply(Donkeycraft.Quaternion.identity());
    assertNear(qMul.x, qYaw.x, 0.001, 'multiply by identity preserves x');
    assertNear(qMul.w, qYaw.w, 0.001, 'multiply by identity preserves w');

    // applyToVector — rotate (1,0,0) by 90° around Y → should be (-0, 0, 1) approximately
    var testVec = new Donkeycraft.Vector3(1, 0, 0);
    var rotated = qYaw.applyToVector(testVec);
    assertNear(rotated.x, 0, 0.1, 'applyToVector: 90° Y rotation of (1,0,0) ≈ (0,0,1)');
    assertNear(rotated.z, 1, 0.1, 'applyToVector: 90° Y rotation of (1,0,0) ≈ (0,0,1)');

    // toEuler — roundtrip from identity
    var euler = qId.toEuler();
    assertNear(euler.yaw, 0, 0.001, 'toEuler of identity: yaw ≈ 0');
    assertNear(euler.pitch, 0, 0.001, 'toEuler of identity: pitch ≈ 0');
    assertNear(euler.roll, 0, 0.001, 'toEuler of identity: roll ≈ 0');

    // normalize
    var qUnnorm = new Donkeycraft.Quaternion(3, 4, 0, 0);
    var qNorm = qUnnorm.normalize();
    assertNear(qNorm.length ? qNorm.x * qNorm.x + qNorm.y * qNorm.y + qNorm.z * qNorm.z + qNorm.w * qNorm.w : 0, 1, 0.001);
    // Manual check: magnitude of (3,4,0,0) = sqrt(9+16+0+0) = 5, so normalized = (0.6, 0.8, 0, 0)
    assertNear(qNorm.x, 0.6, 0.001, 'normalize((3,4,0,0)).x = 0.6');
    assertNear(qNorm.y, 0.8, 0.001, 'normalize((3,4,0,0)).y = 0.8');

    // ============================================================
    // TEST: PerlinNoise
    // ============================================================
    startSection('10. Math Utilities — PerlinNoise (math-utils.js)');

    assert(typeof Donkeycraft.PerlinNoise === 'object', 'PerlinNoise exists');
    assertType(Donkeycraft.PerlinNoise.init, 'function', 'PerlinNoise.init is a function');
    assertType(Donkeycraft.PerlinNoise.noise3D, 'function', 'PerlinNoise.noise3D is a function');
    assertType(Donkeycraft.PerlinNoise.noise2D, 'function', 'PerlinNoise.noise2D is a function');
    assertType(Donkeycraft.PerlinNoise.noise1D, 'function', 'PerlinNoise.noise1D is a function');
    assertType(Donkeycraft.PerlinNoise.fbm, 'function', 'PerlinNoise.fbm is a function');

    // noise3D returns values in [-1, 1]
    var n3 = Donkeycraft.PerlinNoise.noise3D(0, 0, 0);
    assert(n3 >= -1 && n3 <= 1, 'noise3D(0,0,0) in [-1,1]: ' + n3);

    var n3b = Donkeycraft.PerlinNoise.noise3D(123.456, 789.012, 345.678);
    assert(n3b >= -1 && n3b <= 1, 'noise3D(random) in [-1,1]: ' + n3b);

    // noise2D returns values in [-1, 1]
    var n2 = Donkeycraft.PerlinNoise.noise2D(0, 0);
    assert(n2 >= -1 && n2 <= 1, 'noise2D(0,0) in [-1,1]: ' + n2);

    // noise1D returns values in [-1, 1]
    var n1 = Donkeycraft.PerlinNoise.noise1D(42);
    assert(n1 >= -1 && n1 <= 1, 'noise1D(42) in [-1,1]: ' + n1);

    // Different inputs produce different outputs
    assert(Donkeycraft.PerlinNoise.noise3D(0, 0, 0) !== Donkeycraft.PerlinNoise.noise3D(1, 0, 0), 'Different inputs → different outputs');

    // fbm returns normalized values
    var fbmVal = Donkeycraft.PerlinNoise.fbm(0, 0, 0, 4, 0.5, 2);
    assert(fbmVal >= -1 && fbmVal <= 1, 'fbm(0,0,0) in [-1,1]: ' + fbmVal);

    // init with different seed changes output
    var origVal = Donkeycraft.PerlinNoise.noise3D(1, 2, 3);
    Donkeycraft.PerlinNoise.init(99);
    var newSeedVal = Donkeycraft.PerlinNoise.noise3D(1, 2, 3);
    assert(origVal !== newSeedVal, 'init(newSeed) changes noise output');

    // Restore default seed
    Donkeycraft.PerlinNoise.init(42);

    // ============================================================
    // TEST: Utility Functions
    // ============================================================
    startSection('11. Math Utilities — Utility Functions (math-utils.js)');

    // lerp
    assertEq(Donkeycraft.lerp(0, 10, 0), 0, 'lerp(0,10,0) = 0');
    assertEq(Donkeycraft.lerp(0, 10, 1), 10, 'lerp(0,10,1) = 10');
    assertEq(Donkeycraft.lerp(0, 10, 0.5), 5, 'lerp(0,10,0.5) = 5');
    assertEq(Donkeycraft.lerp(-5, 5, 0.5), 0, 'lerp(-5,5,0.5) = 0');

    // clamp
    assertEq(Donkeycraft.clamp(5, 0, 10), 5, 'clamp(5,0,10) = 5');
    assertEq(Donkeycraft.clamp(-3, 0, 10), 0, 'clamp(-3,0,10) = 0');
    assertEq(Donkeycraft.clamp(15, 0, 10), 10, 'clamp(15,0,10) = 10');
    assertEq(Donkeycraft.clamp(0.5, 0, 1), 0.5, 'clamp(0.5,0,1) = 0.5');

    // map
    assertEq(Donkeycraft.map(0, 0, 10, 0, 100), 0, 'map(0,0,10,0,100) = 0');
    assertEq(Donkeycraft.map(10, 0, 10, 0, 100), 100, 'map(10,0,10,0,100) = 100');
    assertEq(Donkeycraft.map(5, 0, 10, 0, 100), 50, 'map(5,0,10,0,100) = 50');
    assertEq(Donkeycraft.map(2, 0, 5, 10, 20), 14, 'map(2,0,5,10,20) = 14');

    // round
    assertEq(Donkeycraft.round(3.5), 4, 'round(3.5) = 4');
    assertEq(Donkeycraft.round(3.4), 3, 'round(3.4) = 3');
    assertEq(Donkeycraft.round(-2.5), -2, 'round(-2.5) = -2');

    // inRange
    assert(Donkeycraft.inRange(5, 0, 10), 'inRange(5,0,10) = true');
    assert(Donkeycraft.inRange(0, 0, 10), 'inRange(0,0,10) = true (inclusive min)');
    assert(Donkeycraft.inRange(10, 0, 10), 'inRange(10,0,10) = true (inclusive max)');
    assert(!Donkeycraft.inRange(-1, 0, 10), 'inRange(-1,0,10) = false');
    assert(!Donkeycraft.inRange(11, 0, 10), 'inRange(11,0,10) = false');

    // ============================================================
    // TEST: AudioSystem (non-interactive)
    // ============================================================
    startSection('12. AudioSystem (audio.js)');

    assert(typeof Donkeycraft.AudioSystem === 'function', 'AudioSystem constructor exists');

    var audio = new Donkeycraft.AudioSystem();
    assert(audio instanceof Donkeycraft.AudioSystem, 'AudioSystem constructor creates instance');
    assertType(audio.init, 'function', 'init is a function');
    assertType(audio.setVolume, 'function', 'setVolume is a function');
    assertType(audio.getVolume, 'function', 'getVolume is a function');
    assertType(audio.setEnabled, 'function', 'setEnabled is a function');
    assertType(audio.loadSound, 'function', 'loadSound is a function');
    assertType(audio.play, 'function', 'play is a function');
    assertType(audio.stop, 'function', 'stop is a function');
    assertType(audio.preload, 'function', 'preload is a function');
    assertType(audio.destroy, 'function', 'destroy is a function');

    // Volume defaults to 1.0
    assertEq(audio._volume, 1.0, 'Initial volume = 1.0');

    // setVolume uses clamp (from math-utils)
    audio.setVolume(1.5);
    assertEq(audio._volume, 1.0, 'setVolume(1.5) clamped to 1.0');
    audio.setVolume(-0.5);
    assertEq(audio._volume, 0.0, 'setVolume(-0.5) clamped to 0.0');
    audio.setVolume(0.5);
    assertEq(audio.getVolume(), 0.5, 'getVolume() returns set value');

    // setEnabled
    audio.setEnabled(false);
    assert(!audio._enabled, '_enabled = false after setEnabled(false)');
    audio.setEnabled(true);
    assert(audio._enabled, '_enabled = true after setEnabled(true)');

    // play without init — should silently do nothing
    try {
        audio.play('nonexistent');
        assert(true, 'play() without init does not throw');
    } catch (e) {
        assert(false, 'play() without init should not throw: ' + e.message);
    }

    // destroy without init — should not throw
    try {
        audio.destroy();
        assert(true, 'destroy() without init does not throw');
    } catch (e) {
        assert(false, 'destroy() without init should not throw: ' + e.message);
    }

    // ============================================================
    // Cross-component: EventBus + Logger integration
    // ============================================================
    startSection('13. Integration — EventBus + Logger');

    // EventBus.emit should use Donkeycraft.Logger.error when available
    var integrationBus = new Donkeycraft.EventBus();
    var errorLogged = false;
    var originalError = console.error;
    console.error = function() { errorLogged = true; };
    integrationBus.on('boom', function() { throw new Error('integrated test'); });
    integrationBus.emit('boom');
    console.error = originalError;
    assert(errorLogged, 'EventBus catches errors and logs via Logger/console.error');

    // ============================================================
    // Final summary is called in the Timer async chain above
    // But if timer tests haven't finished, we need a fallback
    // The finishTests() call is inside the async chain.
    // ============================================================

})();

// Helper: yield to the event loop for N frames
function yieldFrames(count) {
    return new Promise(function(resolve) {
        var remaining = count || 1;
        function tick() {
            if (remaining <= 0) {
                resolve();
            } else {
                remaining--;
                requestAnimationFrame(tick);
            }
        }
        requestAnimationFrame(tick);
    });
}
</script>
</body>
