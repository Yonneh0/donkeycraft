<script>
(function() {
    'use strict';

    // ============================================================
    // Minimal PerlinNoise stub — required by terrain-generator.js
    // ============================================================
    if (!Donkeycraft.PerlinNoise) {
        Donkeycraft.PerlinNoise = (function() {
            var _seed = 0;
            function init(seed) { _seed = seed || 0; }
            function noise2D(x, y) {
                var n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
                return n - Math.floor(n);
            }
            function fbm(x, y, z, octaves, lacunarity, gain) {
                var value = 0, amplitude = 1, frequency = 1, maxVal = 0;
                for (var i = 0; i < octaves; i++) {
                    value += noise2D(x * frequency, z * frequency) * amplitude;
                    maxVal += amplitude;
                    amplitude *= 0.5;
                    frequency *= lacunarity || 2;
                }
                return maxVal > 0 ? (value / maxVal - 0.5) * 2 : 0;
            }
            return { init: init, noise2D: noise2D, fbm: fbm, _initialized: false };
        })();
    }

    // ============================================================
    // Minimal BlockRegistry stub — covers all IDs used by world gen
    // ============================================================
    if (!Donkeycraft.BlockRegistry) {
        var _blockDefs = {};
        var _blockByName = {};
        var _allBlocks = [];

        function _registerBlock(id, name, solid, transparent, liquid, replaceable, lightOpacity, lightLevel) {
            var block = {
                id: id, name: name,
                solid: solid || false, transparent: transparent || false,
                liquid: liquid || false, replaceable: replaceable || false,
                lightOpacity: lightOpacity !== undefined ? lightOpacity : 0,
                lightLevel: lightLevel !== undefined ? lightLevel : 0
            };
            _blockDefs[id] = block;
            _blockByName[name] = block;
            _allBlocks.push(block);
        }

        // Register all blocks referenced by world generation code
        // Format: (id, name, solid, transparent, liquid, replaceable, lightOpacity, lightLevel)
        _registerBlock(0, 'air', false, true, false, true, 0, 0);
        _registerBlock(1, 'stone', true, false, false, false, 15, 0);
        _registerBlock(2, 'grass_block', true, false, false, false, 15, 0);
        _registerBlock(3, 'dirt', true, false, false, false, 15, 0);
        _registerBlock(4, 'cobblestone', true, false, false, false, 15, 0);
        _registerBlock(5, 'planks', true, false, false, false, 15, 0);
        _registerBlock(6, 'sapling', false, true, false, false, 0, 0);
        _registerBlock(7, 'bedrock', true, false, false, false, 15, 0);
        _registerBlock(9, 'gravel', true, false, false, false, 15, 0); // gravity block
        _registerBlock(12, 'sand', true, false, false, false, 15, 0); // gravity block
        _registerBlock(13, 'glass', false, true, false, false, 0, 0);
        _registerBlock(14, 'diamond_ore', true, false, false, false, 15, 0);
        _registerBlock(15, 'iron_ore', true, false, false, false, 15, 0);
        _registerBlock(16, 'coal_ore', true, false, false, false, 15, 0);
        _registerBlock(17, 'obsidian', true, false, false, false, 15, 0);
        _registerBlock(21, 'gold_ore', true, false, false, false, 15, 0);
        _registerBlock(22, 'lapis_ore', true, false, false, false, 15, 0);
        _registerBlock(24, 'oak_log', true, false, false, false, 15, 0);
        _registerBlock(25, 'oak_wood', true, false, false, false, 15, 0);
        _registerBlock(26, 'oak_leaves', false, true, false, false, 0, 0);
        _registerBlock(27, 'snow', false, true, false, false, 0, 0);
        _registerBlock(31, 'tall_grass', false, true, false, false, 0, 0);
        _registerBlock(32, 'fern', false, true, false, false, 0, 0);
        _registerBlock(36, 'rose', false, true, false, false, 0, 0);
        _registerBlock(37, 'bedrock', true, false, false, false, 15, 0);
        _registerBlock(56, 'torch', false, true, false, false, 0, 14);
        _registerBlock(69, 'glowstone', true, false, false, false, 0, 15);
        _registerBlock(78, 'snow_layer', false, true, false, false, 0, 0);
        _registerBlock(80, 'snow_block', true, false, false, false, 15, 0);
        _registerBlock(96, 'pumpkin', true, false, false, false, 15, 0);
        _registerBlock(108, 'lava', false, true, true, false, 0, 15);
        _registerBlock(110, 'basalt', true, false, false, false, 15, 0);
        _registerBlock(112, 'blackstone', true, false, false, false, 15, 0);
        _registerBlock(119, 'end_stone', true, false, false, false, 15, 0);
        _registerBlock(126, 'emerald_ore', true, false, false, false, 15, 0);
        _registerBlock(129, 'wool', false, false, false, false, 15, 0);
        _registerBlock(131, 'cactus', true, false, false, false, 15, 0);
        _registerBlock(148, 'iron_block', true, false, false, false, 15, 0);

        _registerBlock(198, 'clay', true, false, false, false, 15, 0);
        _registerBlock(212, 'water', false, true, true, false, 0, 0);
        _registerBlock(213, 'lava', false, true, true, false, 0, 15);
        _registerBlock(238, 'nether_quartz_ore', true, false, false, false, 15, 0);
        _registerBlock(257, 'netherrack', true, false, false, false, 15, 0);
        _registerBlock(258, 'soul_sand', true, false, false, false, 15, 0);
        _registerBlock(259, 'soul_soil', true, false, false, false, 15, 0);
        _registerBlock(260, 'gilded_blackstone', true, false, false, false, 15, 0);
        _registerBlock(272, 'nether_gold_ore', true, false, false, false, 15, 0);
        _registerBlock(273, 'ancient_debris', true, false, false, false, 15, 0);
        _registerBlock(274, 'magma', true, false, false, false, 0, 3);
        _registerBlock(276, 'nether_portal', false, true, false, false, 0, 0);
        _registerBlock(278, 'chorus_plant', true, false, false, false, 15, 0);
        _registerBlock(279, 'chorus_flower', false, true, false, false, 0, 0);
        _registerBlock(280, 'purpur_block', true, false, false, false, 15, 0);
        _registerBlock(281, 'purpur_pillar', true, false, false, false, 15, 0);
        _registerBlock(284, 'shroomlight', true, false, false, false, 0, 15);
        _registerBlock(296, 'amethyst_block', true, false, false, false, 15, 0);
        _registerBlock(374, 'crying_obsidian', true, false, false, false, 15, 0);

        Donkeycraft.BlockRegistry = {
            getBlockById: function(id) { return _blockDefs[id] || null; },
            getBlockByName: function(name) { return _blockByName[name] || null; },
            isTransparent: function(id) { var b = _blockDefs[id]; return b ? b.transparent : false; },
            isSolid: function(id) { var b = _blockDefs[id]; return b ? b.solid : false; },
            isLiquid: function(id) { var b = _blockDefs[id]; return b ? b.liquid : false; },
            isReplaceable: function(id) { var b = _blockDefs[id]; return b ? b.replaceable : false; }
        };
    }

    // ============================================================
    // Minimal ChunkManager stub for NetherGenerator/EndGenerator tests only
    // (real ChunkManager.js loads later — stub is needed here because
    // nether-generator.js and end-generator.js reference ChunkManager at module load time)
    // ============================================================
    if (!Donkeycraft.ChunkManager) {
        Donkeycraft.ChunkManager = function() {
            this._chunks = {};
            this.onChunkLoad = null;
        };
        Donkeycraft.ChunkManager.prototype.getChunk = function(cx, cz) {
            var key = cx + ',' + cz;
            if (!this._chunks[key]) {
                this._chunks[key] = new Donkeycraft.Chunk(cx, cz);
            }
            return this._chunks[key];
        };
        Donkeycraft.ChunkManager.prototype.getChunkIfExists = function(cx, cz) {
            var key = cx + ',' + cz;
            return this._chunks[key] || null;
        };
        Donkeycraft.ChunkManager.prototype.markChunkDirty = function() {};
        Donkeycraft.ChunkManager.prototype.destroy = function() { this._chunks = {}; };
    }

    // Set up chunk managers for dimension generators so generateNetherTerrain / generateEndTerrain don't throw
    if (Donkeycraft.NetherGenerator && Donkeycraft.NetherGenerator.setChunkManager) {
        Donkeycraft.NetherGenerator.setChunkManager(new Donkeycraft.ChunkManager());
    }
    if (Donkeycraft.EndGenerator && Donkeycraft.EndGenerator.setChunkManager) {
        Donkeycraft.EndGenerator.setChunkManager(new Donkeycraft.ChunkManager());
    }

})();
</script>

<script>
(function() {
    'use strict';

    var F = TestFramework;
    var CHUNK_SIZE = Donkeycraft.Config.CHUNK_SIZE;
    var WORLD_HEIGHT = Donkeycraft.Config.WORLD_HEIGHT;

    // Initialize the test framework — MUST be called before section()/assert()
    F.init('results');

    // ============================================================
    // Section 1: Biome Registry
    // ============================================================
    F.section('1. Biome Registry');

    // Basic registry functions exist
    F.assert(typeof Donkeycraft.BiomeRegistry.getBiomeById === 'function', 'getBiomeById is a function');
    F.assert(typeof Donkeycraft.BiomeRegistry.getBiomeByName === 'function', 'getBiomeByName is a function');
    F.assert(typeof Donkeycraft.BiomeRegistry.getAllBiomes === 'function', 'getAllBiomes is a function');
    F.assert(typeof Donkeycraft.BiomeRegistry.getBiomeCount === 'function', 'getBiomeCount is a function');
    F.assert(typeof Donkeycraft.BiomeRegistry.hasBiome === 'function', 'hasBiome is a function');
    F.assert(typeof Donkeycraft.BiomeRegistry.getRandomBiome === 'function', 'getRandomBiome is a function');

    // Biome count
    F.assertEq(Donkeycraft.BiomeRegistry.getBiomeCount(), 15, 'Biome count equals 15');

    // All biomes array
    var allBiomes = Donkeycraft.BiomeRegistry.getAllBiomes();
    F.assertType(allBiomes, 'object', 'getAllBiomes returns an object (array)');
    F.assert(allBiomes.length === 15, 'getAllBiomes returns array of length 15');

    // Individual biome lookups by ID
    var plains = Donkeycraft.BiomeRegistry.getBiomeById(1);
    F.assertType(plains, 'object', 'Plains biome exists (ID 1)');
    F.assertEq(plains ? plains.name : '', 'plains', 'Plains biome name is "plains"');

    var desert = Donkeycraft.BiomeRegistry.getBiomeById(2);
    F.assert(desert !== null, 'Desert biome exists (ID 2)');
    F.assertEq(desert ? desert.name : '', 'desert', 'Desert biome name is "desert"');

    var forest = Donkeycraft.BiomeRegistry.getBiomeById(3);
    F.assert(forest !== null, 'Forest biome exists (ID 3)');

    var ocean = Donkeycraft.BiomeRegistry.getBiomeById(6);
    F.assert(ocean !== null, 'Ocean biome exists (ID 6)');

    var extremeHills = Donkeycraft.BiomeRegistry.getBiomeById(7);
    F.assert(extremeHills !== null, 'Extreme Hills biome exists (ID 7)');

    // Non-existent biome returns null
    var none = Donkeycraft.BiomeRegistry.getBiomeById(999);
    F.assert(none === null, 'Non-existent biome ID returns null');

    // Biome name lookups
    var byName = Donkeycraft.BiomeRegistry.getBiomeByName('plains');
    F.assert(byName !== null, 'Biome lookup by name "plains" works');
    F.assertEq(byName ? byName.id : -1, 1, 'Plains biome ID is 1 via name lookup');

    var noneByName = Donkeycraft.BiomeRegistry.getBiomeByName('nonexistent');
    F.assert(noneByName === null, 'Non-existent biome name returns null');

    // hasBiome
    F.assert(Donkeycraft.BiomeRegistry.hasBiome(1), 'hasBiome(1) is true');
    F.assert(!Donkeycraft.BiomeRegistry.hasBiome(999), 'hasBiome(999) is false');

    // getRandomBiome returns a valid biome
    var random = Donkeycraft.BiomeRegistry.getRandomBiome();
    F.assertType(random, 'object', 'getRandomBiome returns an object');
    F.assert(random !== null, 'getRandomBiome returns non-null');

    // Biome properties: Plains
    F.assertEq(plains.temperature, 0.8, 'Plains temperature is 0.8');
    F.assertEq(plains.rainfall, 0.4, 'Plains rainfall is 0.4');
    F.assert(!plains.hasSnow, 'Plains has no snow');
    F.assert(!plains.isOcean, 'Plains is not ocean');
    F.assert(!plains.isDesert, 'Plains is not desert');
    F.assertEq(plains.spawnRates.passive, 0.01, 'Plains passive spawn rate is 0.01');
    F.assertEq(plains.spawnRates.hostile, 0.025, 'Plains hostile spawn rate is 0.025');
    F.assertType(plains.decoration, 'object', 'Plains has decoration object');

    // Biome properties: Desert
    F.assert(desert.temperature === 1.0, 'Desert temperature is 1.0');
    F.assertEq(desert.rainfall, 0.0, 'Desert rainfall is 0.0');
    F.assert(desert.isDesert, 'Desert.isDesert is true');
    F.assertEq(desert.decoration.trees, 0, 'Desert has no trees');
    F.assertEq(desert.decoration.cacti, 3, 'Desert has cacti decoration count 3');

    // Biome properties: Ocean
    F.assert(ocean.isOcean, 'Ocean.isOcean is true');
    F.assertEq(ocean.spawnRates.passive, 0, 'Ocean passive spawn rate is 0');
    F.assertEq(ocean.spawnRates.aqua, 0.03, 'Ocean aqua spawn rate is 0.03');

    // Biome properties: Snowy Tundra
    var tundra = Donkeycraft.BiomeRegistry.getBiomeById(8);
    F.assert(tundra !== null, 'Snowy Tundra exists (ID 8)');
    F.assert(tundra.hasSnow, 'Tundra.hasSnow is true');
    F.assertEq(tundra.temperature, 0.05, 'Tundra temperature < 0.15 for snow');

    // Biome properties: Extreme Hills
    F.assert(extremeHills.isExtremeHills, 'Extreme Hills.isExtremeHills is true');

    // ============================================================
    // Section 2: Chunk Data Structure
    // ============================================================
    F.section('2. Chunk Data Structure');

    var chunk = new Donkeycraft.Chunk(5, 7);

    // Basic properties
    F.assertEq(chunk.chunkX, 5, 'Chunk X coordinate is 5');
    F.assertEq(chunk.chunkZ, 7, 'Chunk Z coordinate is 7');
    F.assertType(chunk.blocks, 'object', 'Chunk has blocks array (Uint16Array)');
    F.assertType(chunk.skyLight, 'object', 'Chunk has skyLight array (Uint8Array)');
    F.assertType(chunk.blockLight, 'object', 'Chunk has blockLight array (Uint8Array)');

    // Block get/set
    chunk.setBlock(0, 0, 0, 1); // stone
    F.assertEq(chunk.getBlock(0, 0, 0), 1, 'getBlock(0,0,0) returns set value 1');

    chunk.setBlock(15, 255, 15, 2); // grass_block at max coords
    F.assertEq(chunk.getBlock(15, 255, 15), 2, 'getBlock(15,255,15) returns set value 2');

    // Out of bounds returns air (0)
    F.assertEq(chunk.getBlock(-1, 0, 0), 0, 'Out of bounds X returns 0');
    F.assertEq(chunk.getBlock(0, -1, 0), 0, 'Out of bounds Y returns 0');
    F.assertEq(chunk.getBlock(0, 0, -1), 0, 'Out of bounds Z returns 0');
    F.assertEq(chunk.getBlock(16, 0, 0), 0, 'OutOfBounds X+1 returns 0');
    F.assertEq(chunk.getBlock(0, 256, 0), 0, 'OutOfBounds Y+1 returns 0');
    F.assertEq(chunk.getBlock(0, 0, 16), 0, 'OutOfBounds Z+1 returns 0');

    // Default is air (0)
    F.assertEq(chunk.getBlock(8, 64, 8), 0, 'Default block at center is air');

    // Sky light get/set
    chunk.setSkyLight(0, 0, 0, 15);
    F.assertEq(chunk.getSkyLight(0, 0, 0), 15, 'Sky light set/get works');
    F.assertEq(chunk.getSkyLight(-1, 0, 0), 15, 'Out of bounds sky light returns 15');

    // Block light get/set
    chunk.setBlockLight(8, 64, 8, 12);
    F.assertEq(chunk.getBlockLight(8, 64, 8), 12, 'Block light set/get works');
    F.assertEq(chunk.getBlockLight(-1, 0, 0), 0, 'Out of bounds block light returns 0');

    // Dirty flag — use a fresh chunk so prior setBlock calls don't interfere
    var dirtyChunk = new Donkeycraft.Chunk(0, 0);
    F.assert(!dirtyChunk.isDirty(), 'New chunk is not dirty');
    dirtyChunk.setBlock(0, 0, 0, 3); // changes state
    F.assert(dirtyChunk.isDirty(), 'Chunk becomes dirty after setBlock');
    dirtyChunk.markClean();
    F.assert(!dirtyChunk.isDirty(), 'Chunk is clean after markClean');

    // fill — sample key positions instead of asserting all 65536 blocks
    chunk.fill(1);
    F.assertEq(chunk.getBlock(0, 0, 0), 1, 'fill(1) sets corner to stone');
    F.assertEq(chunk.getBlock(8, 128, 8), 1, 'fill(1) sets center to stone');
    F.assertEq(chunk.getBlock(15, 255, 15), 1, 'fill(1) sets opposite corner to stone');
    F.assertEq(chunk.getBlock(15, 0, 0), 1, 'fill(1) sets edge to stone');

    // clearLight
    chunk.clearLight();
    F.assertEq(chunk.getSkyLight(0, 0, 0), 0, 'clearLight resets sky light to 0');
    F.assertEq(chunk.getBlockLight(0, 0, 0), 0, 'clearLight resets block light to 0');

    // globalX / globalZ
    F.assertEq(chunk.globalX(), 80, 'globalX() for chunk 5 = 80');
    F.assertEq(chunk.globalZ(), 112, 'globalZ() for chunk 7 = 112');

    // globalToLocal
    var loc = chunk.globalToLocal(80, 112);
    F.assertEq(loc.lx, 0, 'globalToLocal(80,112) gives local (0,0)');
    F.assertEq(loc.lz, 0, 'globalToLocal(80,112) gives local (0,0)');

    var loc2 = chunk.globalToLocal(85, 117);
    F.assertEq(loc2.lx, 5, 'globalToLocal(85,117) gives local (5,5)');
    F.assertEq(loc2.lz, 5, 'globalToLocal(85,117) gives local (5,5)');

    // getBlockData returns the blocks array
    F.assertType(chunk.getBlockData(), 'object', 'getBlockData returns an object');

    // destroy nulls arrays
    chunk.destroy();
    F.assert(chunk.blocks === null, 'destroy() nulls blocks array');
    F.assert(chunk.skyLight === null, 'destroy() nulls skyLight array');
    F.assert(chunk.blockLight === null, 'destroy() nulls blockLight array');

    // ============================================================
    // Section 3: Static Chunk Helpers
    // ============================================================
    F.section('3. Static Chunk Coordinate Helpers');

    // chunkCoordX / chunkCoordZ
    F.assertEq(Donkeycraft.Chunk.chunkCoordX(0), 0, 'chunkCoordX(0) = 0');
    F.assertEq(Donkeycraft.Chunk.chunkCoordX(15), 0, 'chunkCoordX(15) = 0');
    F.assertEq(Donkeycraft.Chunk.chunkCoordX(16), 1, 'chunkCoordX(16) = 1');
    F.assertEq(Donkeycraft.Chunk.chunkCoordX(-16), -1, 'chunkCoordX(-16) = -1');

    F.assertEq(Donkeycraft.Chunk.chunkCoordZ(0), 0, 'chunkCoordZ(0) = 0');
    F.assertEq(Donkeycraft.Chunk.chunkCoordZ(31), 1, 'chunkCoordZ(31) = 1');
    F.assertEq(Donkeycraft.Chunk.chunkCoordZ(-1), -1, 'chunkCoordZ(-1) = -1');

    // localCoordX / localCoordZ
    F.assertEq(Donkeycraft.Chunk.localCoordX(0), 0, 'localCoordX(0) = 0');
    F.assertEq(Donkeycraft.Chunk.localCoordX(15), 15, 'localCoordX(15) = 15');
    F.assertEq(Donkeycraft.Chunk.localCoordX(16), 0, 'localCoordX(16) = 0');
    F.assertEq(Donkeycraft.Chunk.localCoordX(-1), 15, 'localCoordX(-1) = 15 (wrapped)');
    F.assertEq(Donkeycraft.Chunk.localCoordX(-16), 0, 'localCoordX(-16) = 0 (wrapped)');

    F.assertEq(Donkeycraft.Chunk.localCoordZ(0), 0, 'localCoordZ(0) = 0');
    F.assertEq(Donkeycraft.Chunk.localCoordZ(31), 15, 'localCoordZ(31) = 15');
    F.assertEq(Donkeycraft.Chunk.localCoordZ(-1), 15, 'localCoordZ(-1) = 15 (wrapped)');

    // ============================================================
    // Section 4: Terrain Generator
    // ============================================================
    F.section('4. Terrain Generator');

    F.assert(typeof Donkeycraft.TerrainGenerator === 'object', 'TerrainGenerator is an object');
    F.assert(typeof Donkeycraft.TerrainGenerator.getInstance === 'function', 'getInstance is a function');
    F.assert(typeof Donkeycraft.TerrainGenerator.generateHeightmap === 'function', 'generateHeightmap is a function');
    F.assert(typeof Donkeycraft.TerrainGenerator.getHeightAt === 'function', 'getHeightAt is a function');
    F.assert(typeof Donkeycraft.TerrainGenerator.generate === 'function', 'generate is a function');

    // getInstance returns an object
    var tg = Donkeycraft.TerrainGenerator.getInstance();
    F.assertType(tg, 'object', 'getInstance returns an object');

    // generateHeightmap returns array of correct size
    var heightmap = Donkeycraft.TerrainGenerator.generateHeightmap(0, 0);
    F.assertType(heightmap, 'object', 'generateHeightmap returns an object (array)');
    F.assert(heightmap.length === CHUNK_SIZE * CHUNK_SIZE, 'Heightmap length is CHUNK_SIZE² (' + (CHUNK_SIZE * CHUNK_SIZE) + ')');

    // All height values are numbers in valid range
    var allValid = true;
    for (var i = 0; i < heightmap.length; i++) {
        if (typeof heightmap[i] !== 'number' || heightmap[i] < 1 || heightmap[i] >= WORLD_HEIGHT - 10) {
            allValid = false;
            break;
        }
    }
    F.assert(allValid, 'All height values are numbers in valid range [1, ' + (WORLD_HEIGHT - 10) + ')');

    // Biome variation: ocean should be lower than plains
    var oceanHM = Donkeycraft.TerrainGenerator.generateHeightmap(100, 100, Donkeycraft.BiomeRegistry.getBiomeById(6));
    var plainsHM = Donkeycraft.TerrainGenerator.generateHeightmap(200, 200, Donkeycraft.BiomeRegistry.getBiomeById(1));

    var oceanAvg = 0;
    for (var i = 0; i < oceanHM.length; i++) oceanAvg += oceanHM[i];
    oceanAvg /= oceanHM.length;

    var plainsAvg = 0;
    for (var i = 0; i < plainsHM.length; i++) plainsAvg += plainsHM[i];
    plainsAvg /= plainsHM.length;

    F.assert(oceanAvg < 35, 'Ocean average height < 35 (got ' + oceanAvg.toFixed(1) + ')');
    F.assert(plainsAvg > 40 && plainsAvg < 90, 'Plains average height in moderate range (got ' + plainsAvg.toFixed(1) + ')');

    // Extreme hills should have highest terrain
    var hillsHM = Donkeycraft.TerrainGenerator.generateHeightmap(300, 300, Donkeycraft.BiomeRegistry.getBiomeById(7));
    var hillsMax = 0;
    for (var i = 0; i < hillsHM.length; i++) {
        if (hillsHM[i] > hillsMax) hillsMax = hillsHM[i];
    }
    F.assert(hillsMax > 120, 'Extreme hills max height > 120 (got ' + hillsMax + ')');

    // getHeightAt
    var h = Donkeycraft.TerrainGenerator.getHeightAt(0, 0, 0, 0, heightmap);
    F.assertType(h, 'number', 'getHeightAt returns a number');
    F.assertEq(h, heightmap[0], 'getHeightAt(0,0) equals heightmap[0]');

    // ============================================================
    // Section 5: Ore Generator

    F.assertNear(wt.getTimeOfDay(), 0.75, 0.0001, 'Time of day at 18000 ticks = 0.75 (sunset)');

    // Dimension properties: Nether
    F.assert(!nether.hasSkyLight, 'Nether has no sky light');
    F.assert(nether.hasCeiling, 'Nether has ceiling');
    F.assertEq(nether.ambientDarkness, 0, 'Nether ambient darkness = 0');
    F.assert(!nether.respawnAtSpawn, 'Nether does not respawn at spawn');
    F.assert(nether.hasPiglins, 'Nether has piglins');
    F.assert(!nether.hasWeather, 'Nether has no weather');
    F.assertEq(nether.coordinateScale, 8, 'Nether coordinate scale = 8');

    // Dimension properties: End
    F.assert(!end.hasSkyLight, 'End has no sky light');
    F.assertEq(end.ambientDarkness, 1, 'End ambient darkness = 1 (pitch black)');
    F.assert(!end.respawnAtSpawn, 'End does not respawn at spawn');
    F.assert(!end.hasWeather, 'End has no weather');
    F.assert(!end.bedWorks, 'Beds do not work in End');

    // getDimensionHeight
    F.assertEq(Donkeycraft.Dimensions.getDimensionHeight(0), WORLD_HEIGHT, 'Overworld height = WORLD_HEIGHT');
    F.assertEq(Donkeycraft.Dimensions.getDimensionHeight(99), WORLD_HEIGHT, 'Non-existent dimension returns default height');

    // bedsWorkInDimension / hasPiglinsInDimension / hasWeatherInDimension / getAmbientDarkness / hasSkyLightInDimension
    F.assert(Donkeycraft.Dimensions.bedsWorkInDimension(0), 'Beds work in Overworld');
    F.assert(!Donkeycraft.Dimensions.bedsWorkInDimension(1), 'Beds do not work in Nether');
    F.assert(!Donkeycraft.Dimensions.bedsWorkInDimension(2), 'Beds do not work in End');

    F.assert(Donkeycraft.Dimensions.hasPiglinsInDimension(1), 'Nether has piglins');
    F.assert(!Donkeycraft.Dimensions.hasPiglinsInDimension(0), 'Overworld has no piglins');

    F.assert(Donkeycraft.Dimensions.hasWeatherInDimension(0), 'Overworld has weather');
    F.assert(!Donkeycraft.Dimensions.hasWeatherInDimension(1), 'Nether has no weather');

    F.assertEq(Donkeycraft.Dimensions.getAmbientDarkness(2), 1, 'End ambient darkness = 1');
    F.assertEq(Donkeycraft.Dimensions.getAmbientDarkness(0), 0, 'Overworld ambient darkness = 0');

    F.assert(Donkeycraft.Dimensions.hasSkyLightInDimension(0), 'Overworld has sky light');
    F.assert(!Donkeycraft.Dimensions.hasSkyLightInDimension(1), 'Nether has no sky light');

    // ============================================================
    // Section 13: Portal System
    // ============================================================
    F.section('13. Portal System');

    F.assert(typeof Donkeycraft.Portal === 'object', 'Portal is an object');
    F.assert(typeof Donkeycraft.Portal.isPortalBlock === 'function', 'isPortalBlock is a function');
    F.assert(typeof Donkeycraft.Portal.isPortalActive === 'function', 'isPortalActive is a function');
    F.assert(typeof Donkeycraft.Portal.detectNetherPortal === 'function', 'detectNetherPortal is a function');
    F.assert(typeof Donkeycraft.Portal.createPortal === 'function', 'createPortal is a function');
    F.assert(typeof Donkeycraft.Portal.findMatchingPortal === 'function', 'findMatchingPortal is a function');
    F.assert(typeof Donkeycraft.Portal.travelToDimension === 'function', 'travelToDimension is a function');
    F.assert(typeof Donkeycraft.Portal.isPortalAt === 'function', 'isPortalAt is a function');
    F.assert(typeof Donkeycraft.Portal.detectPortalAtPosition === 'function', 'detectPortalAtPosition is a function');
    F.assert(typeof Donkeycraft.Portal.switchDimension === 'function', 'switchDimension is a function');
    F.assert(typeof Donkeycraft.Portal.getCurrentDimension === 'function', 'getCurrentDimension is a function');
    F.assert(typeof Donkeycraft.Portal.getAllPortals === 'function', 'getAllPortals is a function');
    F.assert(typeof Donkeycraft.Portal.clearAllPortals === 'function', 'clearAllPortals is a function');
    F.assert(typeof Donkeycraft.Portal.getObsidianId === 'function', 'getObsidianId is a function');
    F.assert(typeof Donkeycraft.Portal.getNetherPortalId === 'function', 'getNetherPortalId is a function');
    F.assert(typeof Donkeycraft.Portal.getEndPortalId === 'function', 'getEndPortalId is a function');

    // Block ID getters
    F.assertType(Donkeycraft.Portal.getObsidianId(), 'number', 'getObsidianId returns a number');
    F.assertType(Donkeycraft.Portal.getNetherPortalId(), 'number', 'getNetherPortalId returns a number');
    F.assertType(Donkeycraft.Portal.getEndPortalId(), 'number', 'getEndPortalId returns a number');

    // isPortalBlock
    F.assert(Donkeycraft.Portal.isPortalBlock(Donkeycraft.Portal.getObsidianId()), 'Obsidian is a portal block');
    F.assert(!Donkeycraft.Portal.isPortalBlock(1), 'Stone is not a portal block');

    // isPortalActive
    F.assert(Donkeycraft.Portal.isPortalActive(Donkeycraft.Portal.getNetherPortalId()), 'Nether portal block is active');
    F.assert(!Donkeycraft.Portal.isPortalActive(1), 'Stone is not an active portal block');

    // getAllPortals / clearAllPortals
    var portals = Donkeycraft.Portal.getAllPortals();
    F.assertType(portals, 'object', 'getAllPortals returns an object (array)');
    F.assert(portals.length === 0, 'Initial portal count is 0');

    Donkeycraft.Portal.clearAllPortals();
    F.assert(Donkeycraft.Portal.getAllPortals().length === 0, 'clearAllPortals empties portal list');

    // detectNetherPortal doesn't crash on empty chunk
    var portalChunk = new Donkeycraft.Chunk(0, 0);
    try {
        var result = Donkeycraft.Portal.detectNetherPortal(8, 64, 8);
        F.assert(result === null || result.valid === false, 'detectNetherPortal returns null/false on empty chunk');
    } catch (e) {
        F.assert(false, 'detectNetherPortal does not throw: ' + e.message);
    }

    // travelToDimension doesn't crash
    try {
        var travelResult = Donkeycraft.Portal.travelToDimension(0, 1, 80, 64, 160);
        F.assert(true, 'travelToDimension completes without error');
    } catch (e) {
        F.assert(false, 'travelToDimension does not throw: ' + e.message);
    }

    // getCurrentDimension returns a valid dimension type
    var currentDim = Donkeycraft.Portal.getCurrentDimension();
    F.assertType(currentDim, 'number', 'getCurrentDimension returns a number');
    F.assert(currentDim === 0 || currentDim === 1 || currentDim === 2, 'getCurrentDimension returns valid dimension type');

    // invalidateBlockIdCache doesn't crash and re-resolves IDs
    try {
        Donkeycraft.Portal.invalidateBlockIdCache();
        F.assert(true, 'invalidateBlockIdCache completes without error');
        // IDs should still be accessible after invalidation
        F.assertType(Donkeycraft.Portal.getObsidianId(), 'number', 'obsidian ID still valid after cache invalidate');
    } catch (e) {
        F.assert(false, 'invalidateBlockIdCache does not throw: ' + e.message);
    }

    // switchDimension doesn't crash
    try {
        Donkeycraft.Portal.switchDimension(1);
        F.assert(true, 'switchDimension completes without error');
    } catch (e) {
        F.assert(false, 'switchDimension does not throw: ' + e.message);
    }

    // detectPortalAtPosition doesn't crash
    try {
        var portalDetect = Donkeycraft.Portal.detectPortalAtPosition(8, 64, 8);
        F.assert(true, 'detectPortalAtPosition completes without error');
    } catch (e) {
        F.assert(false, 'detectPortalAtPosition does not throw: ' + e.message);
    }

    // createPortal with dimensionType parameter
    try {
        Donkeycraft.Portal.clearAllPortals();
        var result = Donkeycraft.Portal.createPortal(0, 64, 0, 0, 1);
        F.assert(true, 'createPortal with dimensionType completes without error');
    } catch (e) {
        F.assert(false, 'createPortal with dimensionType throws: ' + e.message);
    }

    // Portal registration uses correct dimension key
    try {
        Donkeycraft.Portal.clearAllPortals();
        var overworldPortal = new Donkeycraft.Chunk(0, 0); // dummy chunk for setup
        Donkeycraft.Portal.createPortal(100, 64, 100, 0, 0); // overworld portal
        var overworldPortals = Donkeycraft.Portal.getAllPortals();
        F.assert(overworldPortals.length > 0, 'Overworld portal was registered');

        Donkeycraft.Portal.clearAllPortals();
        var netherPortal = new Donkeycraft.Chunk(0, 0); // dummy chunk for setup
        Donkeycraft.Portal.createPortal(12, 64, 12, 0, 1); // nether portal (coords /8)
        var netherPortals = Donkeycraft.Portal.getAllPortals();
        F.assert(netherPortals.length > 0, 'Nether portal was registered');
    } catch (e) {
        F.assert(false, 'Portal dimension key test failed: ' + e.message);
    }

    // _checkPlayerInPortal doesn't crash with null player
    try {
        var checkResult = Donkeycraft.Portal._checkPlayerInPortal(null);
        F.assert(!checkResult, '_checkPlayerInPortal returns false for null player');
    } catch (e) {
        F.assert(false, '_checkPlayerInPortal throws: ' + e.message);
    }

    // ============================================================
    // Section 14: Nether Generator
    // ============================================================
    F.section('14. Nether Generator');

    F.assert(typeof Donkeycraft.NetherGenerator === 'object', 'NetherGenerator is an object');
    F.assert(typeof Donkeycraft.NetherGenerator.getInstance === 'function', 'getInstance is a function');
    F.assert(typeof Donkeycraft.NetherGenerator.generateNetherTerrain === 'function', 'generateNetherTerrain is a function');
    F.assert(typeof Donkeycraft.NetherGenerator.generateNetherHeightmap === 'function', 'generateNetherHeightmap is a function');
    F.assert(typeof Donkeycraft.NetherGenerator.isLavaSeaLevel === 'function', 'isLavaSeaLevel is a function');
    F.assert(typeof Donkeycraft.NetherGenerator.getLavaSeaLevel === 'function', 'getLavaSeaLevel is a function');

    // getInstance returns an object
    var ng = Donkeycraft.NetherGenerator.getInstance();
    F.assertType(ng, 'object', 'getInstance returns an object');

    // isLavaSeaLevel
    F.assert(Donkeycraft.NetherGenerator.isLavaSeaLevel(31), 'Y=31 is lava sea level');
    F.assert(Donkeycraft.NetherGenerator.isLavaSeaLevel(32), 'Y=32 is lava sea level');
    F.assert(!Donkeycraft.NetherGenerator.isLavaSeaLevel(30), 'Y=30 is not lava sea level');
    F.assert(!Donkeycraft.NetherGenerator.isLavaSeaLevel(64), 'Y=64 is not lava sea level');

    // getLavaSeaLevel
    F.assertEq(Donkeycraft.NetherGenerator.getLavaSeaLevel(), 31, 'Lava sea level Y = 31');

    // generateNetherHeightmap returns array of correct size
    var netherHM = Donkeycraft.NetherGenerator.generateNetherHeightmap(0, 0);
    F.assert(netherHM.length === CHUNK_SIZE * CHUNK_SIZE, 'Nether heightmap length is CHUNK_SIZE²');

    // All values are numbers in valid range
    var netherValid = true;
    for (var i = 0; i < netherHM.length; i++) {
        if (typeof netherHM[i] !== 'number' || netherHM[i] < 0) {
            netherValid = false;
            break;
        }
    }
    F.assert(netherValid, 'All nether heightmap values are valid numbers');

    // generateNetherTerrain doesn't crash — set chunk manager after script load
    try {
        var netherCM = new Donkeycraft.ChunkManager();
        Donkeycraft.NetherGenerator.setChunkManager(netherCM);
        Donkeycraft.NetherGenerator.generateNetherTerrain(0, 0);
        F.assert(true, 'generateNetherTerrain completes without error');
        netherCM.destroy();
    } catch (e) {
        F.assert(false, 'generateNetherTerrain does not throw: ' + e.message);
    }

    // ============================================================
    // Section 15: End Generator
    // ============================================================
    F.section('15. End Generator');

    F.assert(typeof Donkeycraft.EndGenerator === 'object', 'EndGenerator is an object');
    F.assert(typeof Donkeycraft.EndGenerator.getInstance === 'function', 'getInstance is a function');
    F.assert(typeof Donkeycraft.EndGenerator.generateEndTerrain === 'function', 'generateEndTerrain is a function');
    F.assert(typeof Donkeycraft.EndGenerator.generateEndHeightmap === 'function', 'generateEndHeightmap is a function');
    F.assert(typeof Donkeycraft.EndGenerator.isIslandChunk === 'function', 'isIslandChunk is a function');
    F.assert(typeof Donkeycraft.EndGenerator.getBaseYForIslandType === 'function', 'getBaseYForIslandType is a function');

    // getInstance returns an object
    var eg = Donkeycraft.EndGenerator.getInstance();
    F.assertType(eg, 'object', 'getInstance returns an object');

    // isIslandChunk
    F.assert(typeof Donkeycraft.EndGenerator.isIslandChunk(0, 0) === 'boolean', 'isIslandChunk returns boolean for center');
    F.assert(typeof Donkeycraft.EndGenerator.isIslandChunk(100, 100) === 'boolean', 'isIslandChunk returns boolean for distant chunk');

    // getBaseYForIslandType
    F.assertEq(Donkeycraft.EndGenerator.getBaseYForIslandType('midlands'), 49, 'Midlands base Y = 49');
    F.assertEq(Donkeycraft.EndGenerator.getBaseYForIslandType('highlands'), 55, 'Highlands base Y = 55');
    F.assertEq(Donkeycraft.EndGenerator.getBaseYForIslandType('outer'), 45, 'Outer End base Y = 45');

    // generateEndHeightmap returns array of correct size
    var endHM = Donkeycraft.EndGenerator.generateEndHeightmap(0, 0);
    F.assert(endHM.length === CHUNK_SIZE * CHUNK_SIZE, 'End heightmap length is CHUNK_SIZE²');

    // All values are numbers
    var endValid = true;
    for (var i = 0; i < endHM.length; i++) {
        if (typeof endHM[i] !== 'number') {
            endValid = false;
            break;
        }
    }
    F.assert(endValid, 'All end heightmap values are valid numbers');

    // generateEndTerrain doesn't crash — set chunk manager after script load
    try {
        var endCM = new Donkeycraft.ChunkManager();
        Donkeycraft.EndGenerator.setChunkManager(endCM);
        Donkeycraft.EndGenerator.generateEndTerrain(0, 0);
        F.assert(true, 'generateEndTerrain completes without error');
        endCM.destroy();
    } catch (e) {
        F.assert(false, 'generateEndTerrain does not throw: ' + e.message);
    }

    // ============================================================
    // Section 16: World Utilities
    // ============================================================
    F.section('16. World Utilities');

    F.assert(typeof Donkeycraft.WorldUtils === 'object', 'WorldUtils is an object');
    F.assert(typeof Donkeycraft.WorldUtils.getBlockAt === 'function', 'getBlockAt is a function');
    F.assert(typeof Donkeycraft.WorldUtils.setBlockAt === 'function', 'setBlockAt is a function');
    F.assert(typeof Donkeycraft.WorldUtils.isChunkLoaded === 'function', 'isChunkLoaded is a function');
    F.assert(typeof Donkeycraft.WorldUtils.getChunkAndLocalCoords === 'function', 'getChunkAndLocalCoords is a function');
    F.assert(typeof Donkeycraft.WorldUtils.calculateRaycastMaxSteps === 'function', 'calculateRaycastMaxSteps is a function');
    F.assert(typeof Donkeycraft.WorldUtils.makeStateKey === 'function', 'makeStateKey is a function');
    F.assert(typeof Donkeycraft.WorldUtils.parseStateKey === 'function', 'parseStateKey is a function');
    F.assert(typeof Donkeycraft.WorldUtils.makeChunkKey === 'function', 'makeChunkKey is a function');

    // makeStateKey / parseStateKey roundtrip
    var key = Donkeycraft.WorldUtils.makeStateKey(100, 64, -50);
    F.assertType(key, 'string', 'makeStateKey returns a string');
    F.assert(key.indexOf(',') !== -1, 'makeStateKey produces a comma-separated string');

    var parsed = Donkeycraft.WorldUtils.parseStateKey(key);
    F.assertEq(parsed.x, 100, 'parseStateKey roundtrip: x = 100');
    F.assertEq(parsed.y, 64, 'parseStateKey roundtrip: y = 64');
    F.assertEq(parsed.z, -50, 'parseStateKey roundtrip: z = -50');

    // makeChunkKey
    var chunkKey = Donkeycraft.WorldUtils.makeChunkKey(32, 64);
    F.assertType(chunkKey, 'string', 'makeChunkKey returns a string');
    F.assertEq(chunkKey, '2,4', 'makeChunkKey(32,64) = "2,4"');

    // calculateRaycastMaxSteps formula: ceil(reach * sqrt(3)) + 2
    var steps10 = Donkeycraft.WorldUtils.calculateRaycastMaxSteps(5);
    F.assert(steps10 > 0, 'calculateRaycastMaxSteps(5) returns positive number');

    var steps6 = Donkeycraft.WorldUtils.calculateRaycastMaxSteps(6);
    F.assert(steps6 > steps10, 'calculateRaycastMaxSteps(6) > calculateRaycastMaxSteps(5)');

    // getBlockAt with null chunk manager returns 0
    var block = Donkeycraft.WorldUtils.getBlockAt(null, 0, 64, 0);
    F.assertEq(block, 0, 'getBlockAt(null, ...) returns 0');

    // setBlockAt with null chunk manager returns false
    var setResult = Donkeycraft.WorldUtils.setBlockAt(null, 0, 64, 0, 1);
    F.assert(!setResult, 'setBlockAt(null, ...) returns false');

    // isChunkLoaded with null chunk manager returns false
    F.assert(!Donkeycraft.WorldUtils.isChunkLoaded(null, 0, 0), 'isChunkLoaded(null, ...) returns false');

    // getChunkAndLocalCoords with null chunk manager
    var coords = Donkeycraft.WorldUtils.getChunkAndLocalCoords(null, 0, 64, 0);
    F.assert(coords.chunk === null, 'getChunkAndLocalCoords(null, ...) returns chunk=null');

})();
</script>
