<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Donkeycraft — Phase 19 Assets Test</title>
<link rel="stylesheet" href="test.css">
<style>
/* ── Layout ───────────────────────────────────────────── */
body { max-width: 1200px; }

/* ── Visual UI panels ─────────────────────────────────── */
.asset-panel {
    margin: 20px 0;
    padding: 18px 20px;
    background: #0d1b2a;
    border-radius: 10px;
    border: 1px solid #1b3a5c;
}
.asset-panel h2 {
    color: #f1c40f;
    font-size: 1.1em;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #2a4a6b;
}

/* ── Texture grid ─────────────────────────────────────── */
.texture-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 56px);
    gap: 4px;
    justify-content: center;
    padding: 14px;
    background: #060d17;
    border-radius: 8px;
}
.tex-cell-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
}
.texture-cell {
    width: 48px;
    height: 48px;
    image-rendering: pixelated;
    border: 1px solid #1a2a3a;
    border-radius: 3px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s;
}
.texture-cell:hover {
    transform: scale(3);
    z-index: 100;
    border-color: #00d4ff;
    box-shadow: 0 0 12px rgba(0,212,255,0.4);
}
.texture-label {
    font-size: 0.6em;
    color: #888;
    text-align: center;
    white-space: nowrap;
    max-width: 52px;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ── Atlas canvas ─────────────────────────────────────── */
.atlas-container {
    text-align: center;
    padding: 12px;
    background: #060d17;
    border-radius: 8px;
}
.atlas-container canvas {
    border: 2px solid #1b3a5c;
    image-rendering: pixelated;
    max-width: 100%;
    width: 512px;
}

/* ── Sound table ──────────────────────────────────────── */
.sound-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
}
.sound-table th {
    text-align: left;
    padding: 8px 12px;
    background: #0a1628;
    color: #f1c40f;
    border-bottom: 2px solid #2a4a6b;
    font-size: 0.9em;
}
.sound-table td {
    padding: 8px 12px;
    border-bottom: 1px solid #1b3a5c;
    vertical-align: middle;
}
.sound-table tr:hover td {
    background: #0d1f3c;
}
.sound-name {
    font-weight: bold;
    color: #00d4ff;
    font-family: 'Consolas', 'Monaco', monospace;
    white-space: nowrap;
}
.sound-desc {
    color: #aaa;
    font-size: 0.92em;
}
.sound-play-btn {
    padding: 6px 14px;
    background: #16213e;
    border: 1px solid #1b3a5c;
    border-radius: 4px;
    color: #e0e0e0;
    cursor: pointer;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.9em;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
}
.sound-play-btn:hover {
    background: #1a2a4a;
    border-color: #00d4ff;
}
.sound-play-btn:active {
    background: #0f3460;
    border-color: #f1c40f;
}

/* ── Section overrides ────────────────────────────────── */
.section {
    margin: 12px 0;
    padding: 10px 16px;
    background: #16213e;
    border-radius: 6px;
    border-left: 4px solid #333;
}
.section h2 {
    color: #f1c40f;
    font-size: 1em;
    margin-bottom: 6px;
}

/* ── Collapsible sections ─────────────────────────────── */
.collapsible-header {
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
}
.collapsible-header::before {
    content: '▸';
    display: inline-block;
    width: 16px;
    transition: transform 0.15s;
    font-size: 0.8em;
    color: #888;
}
.collapsible-header.open::before {
    transform: rotate(90deg);
}
.collapsible-body {
    display: none;
    margin-top: 4px;
}
.collapsible-body.open {
    display: block;
}
</style>
</head>
<body>
<h1>Donkeycraft — Phase 19 Assets Test</h1>
<nav style="margin-bottom: 12px;"><a href="index.html" style="color: #00d4ff; text-decoration: none; font-size: 0.9em;">← Back to Test Index</a></nav>
<div class="subtitle">Procedural texture & sound generation — TextureGenerator, SoundGenerator, AssetManager</div>

<!-- Visual UI (inserted before test results) -->
<div id="visual-ui"></div>
<div id="results"></div>

<!-- Phase 1 Core -->
<script src="../src/core/namespace.js"></script>
<script src="../src/core/eventbus.js"></script>
<script src="../src/core/config.js"></script>
<script src="../src/core/logger.js"></script>
<script src="../src/core/timer.js"></script>
<script src="../src/core/input.js"></script>
<script src="../src/core/math-utils.js"></script>
<script src="../src/core/audio.js"></script>

<!-- Phase 3 Block System -->
<script src="../src/world/block.js"></script>
<script src="../src/world/block-state.js"></script>
<script src="../src/world/block-types.js"></script>
<script src="../src/world/texture-atlas.js"></script>
<script src="../src/world/block-models.js"></script>
<script src="../src/world/recipe-registry.js"></script>

<!-- Shared test framework -->
<script src="test.js"></script>

<!-- Phase 19: Asset Generator -->
<script src="../src/core/asset-generator.js"></script>

<script>
(function() {
    'use strict';

    var F = TestFramework;
    F.init('results');

    // ── Helpers ──────────────────────────────────────────
    function _waitForImage(img, timeout) {
        return new Promise(function(resolve) {
            if (!img || img.complete) { resolve(img); return; }
            img.onload = function() { resolve(img); };
            img.onerror = function() { resolve(img); };
            setTimeout(function() { resolve(img); }, timeout || 500);
        });
    }

    // ── AudioContext setup ───────────────────────────────
    var audioCtx = null;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) {
        F.info('AudioContext not available — sound tests will be skipped');
    }

    // ============================================================
    // Section 1: Namespace & Class Registration
    // ============================================================
    F.section('1. Namespace & Class Registration');

    F.assert(typeof Donkeycraft.TextureGenerator !== 'undefined', 'TextureGenerator exists');
    F.assert(typeof Donkeycraft.SoundGenerator !== 'undefined', 'SoundGenerator exists');
    F.assert(typeof Donkeycraft.AssetManager !== 'undefined', 'AssetManager exists');

    // TextureGenerator
    var texFuncs = [
        'generateStone','generateDirt','generateGrassTop','generateGrassSide',
        'generateLogSide','generatePlanks','generateWool','generateConcrete',
        'generateGlass','generateBricks','generateOre','generateAllTextures',
        'getGeneratorForBlock','generateTextureForBlock','getNameMap'
    ];
    for (var t = 0; t < texFuncs.length; t++) {
        F.assertType(Donkeycraft.TextureGenerator[texFuncs[t]], 'function', 'TextureGenerator.' + texFuncs[t] + ' is a function');
    }

    // SoundGenerator
    F.assertType(Donkeycraft.SoundGenerator.getSound, 'function', 'SoundGenerator.getSound is a function');
    F.assertType(Donkeycraft.SoundGenerator.getCategories, 'function', 'SoundGenerator.getCategories is a function');
    F.assertType(Donkeycraft.SoundGenerator.clearCache, 'function', 'SoundGenerator.clearCache is a function');
    F.assertType(Donkeycraft.SoundGenerator.isCached, 'function', 'SoundGenerator.isCached is a function');

    // AssetManager
    var amFuncs = [
        'init','generateAllBlockTextures','getTexture','getAllTextures',
        'preloadAllSounds','generateAtlasCanvas','getAssetInfo','reset'
    ];
    for (var a = 0; a < amFuncs.length; a++) {
        F.assertType(Donkeycraft.AssetManager[amFuncs[a]], 'function', 'AssetManager.' + amFuncs[a] + ' is a function');
    }

    // ============================================================
    // Section 2: COLOR_MAP Verification
    // ============================================================
    F.section('2. COLOR_MAP Verification');

    var cm = Donkeycraft.TextureGenerator.COLOR_MAP;
    F.assert(cm.white && cm.white.r === 240 && cm.white.g === 240 && cm.white.b === 240, 'White color correct');
    F.assert(cm.red && cm.red.r === 183 && cm.red.g === 52 && cm.red.b === 55, 'Red color correct');
    F.assert(cm.blue && cm.blue.r === 53 && cm.blue.g === 96 && cm.blue.b === 186, 'Blue color correct');
    F.assert(Object.keys(cm).length === 16, 'COLOR_MAP has 16 entries (count=' + Object.keys(cm).length + ')');

    // ============================================================
    // Section 3: Texture Generation — Basic Textures
    // ============================================================
    F.section('3. Basic Textures');

    var stoneImg = Donkeycraft.TextureGenerator.generateStone(42);
    F.assert(stoneImg instanceof Image, 'generateStone returns Image');
    _waitForImage(stoneImg).then(function(img) {
        F.assertEq(img.width, 16, 'Stone is 16×16 (w=' + img.width + ')');
        F.assertEq(img.height, 16, 'Stone is 16×16 (h=' + img.height + ')');
    });

    var dirtImg = Donkeycraft.TextureGenerator.generateDirt();
    F.assert(dirtImg instanceof Image, 'generateDirt returns Image');

    var grassTop = Donkeycraft.TextureGenerator.generateGrassTop();
    F.assert(grassTop instanceof Image, 'generateGrassTop returns Image');

    var grassSide = Donkeycraft.TextureGenerator.generateGrassSide();
    F.assert(grassSide instanceof Image, 'generateGrassSide returns Image');

    var logSide = Donkeycraft.TextureGenerator.generateLogSide(777);
    F.assert(logSide instanceof Image, 'generateLogSide returns Image');

    var planks = Donkeycraft.TextureGenerator.generatePlanks(188, 152, 98, 100);
    F.assert(planks instanceof Image, 'generatePlanks returns Image');

    // ============================================================
    // Section 4: Texture Generation — Ores & Minerals
    // ============================================================
    F.section('4. Ores & Minerals');

    F.assert(Donkeycraft.TextureGenerator.generateCoalOre() instanceof Image, 'Coal ore generated');
    F.assert(Donkeycraft.TextureGenerator.generateIronOre() instanceof Image, 'Iron ore generated');
    F.assert(Donkeycraft.TextureGenerator.generateGoldOre() instanceof Image, 'Gold ore generated');
    F.assert(Donkeycraft.TextureGenerator.generateDiamondOre() instanceof Image, 'Diamond ore generated');
    F.assert(Donkeycraft.TextureGenerator.generateLapisOre() instanceof Image, 'Lapis ore generated');
    F.assert(Donkeycraft.TextureGenerator.generateRedstoneOre() instanceof Image, 'Redstone ore generated');

    // ============================================================
    // Section 5: Texture Generation — Liquids & Special
    // ============================================================
    F.section('5. Liquids & Special Blocks');

    F.assert(Donkeycraft.TextureGenerator.generateWater() instanceof Image, 'Water generated');
    F.assert(Donkeycraft.TextureGenerator.generateLava() instanceof Image, 'Lava generated');
    F.assert(Donkeycraft.TextureGenerator.generateGlass(200, 220, 255) instanceof Image, 'Glass generated');
    F.assert(Donkeycraft.TextureGenerator.generateBedrock() instanceof Image, 'Bedrock generated');
    F.assert(Donkeycraft.TextureGenerator.generateNetherrack() instanceof Image, 'Netherrack generated');
    F.assert(Donkeycraft.TextureGenerator.generateEndStone() instanceof Image, 'End stone generated');

    // ============================================================
    // Section 6: Texture Generation — Metal Blocks
    // ============================================================
    F.section('6. Metal Blocks');

    F.assert(Donkeycraft.TextureGenerator.generateGoldBlock() instanceof Image, 'Gold block generated');
    F.assert(Donkeycraft.TextureGenerator.generateIronBlock() instanceof Image, 'Iron block generated');
    F.assert(Donkeycraft.TextureGenerator.generateDiamondBlock() instanceof Image, 'Diamond block generated');
    F.assert(Donkeycraft.TextureGenerator.generateEmeraldBlock() instanceof Image, 'Emerald block generated');
    F.assert(Donkeycraft.TextureGenerator.generateCoalBlock() instanceof Image, 'Coal block generated');
    F.assert(Donkeycraft.TextureGenerator.generateRedstoneBlock() instanceof Image, 'Redstone block generated');
    F.assert(Donkeycraft.TextureGenerator.generateLapisBlock() instanceof Image, 'Lapis block generated');

    // ============================================================
    // Section 7: Texture Generation — Plants & Decorations
    // ============================================================
    F.section('7. Plants & Decorations');

    F.assert(Donkeycraft.TextureGenerator.generateGrass() instanceof Image, 'Grass block generated');
    F.assert(Donkeycraft.TextureGenerator.generateTallGrass() instanceof Image, 'Tall grass generated');
    F.assert(Donkeycraft.TextureGenerator.generateFern() instanceof Image, 'Fern generated');
    F.assert(Donkeycraft.TextureGenerator.generateFlower('red') instanceof Image, 'Poppy generated');
    F.assert(Donkeycraft.TextureGenerator.generateRoseBush() instanceof Image, 'Rose bush generated');
    F.assert(Donkeycraft.TextureGenerator.generateSunflower() instanceof Image, 'Sunflower generated');
    F.assert(Donkeycraft.TextureGenerator.generateLilyPad() instanceof Image, 'Lily pad generated');
    F.assert(Donkeycraft.TextureGenerator.generateDeadBush() instanceof Image, 'Dead bush generated');
    F.assert(Donkeycraft.TextureGenerator.generateVine() instanceof Image, 'Vine generated');
    F.assert(Donkeycraft.TextureGenerator.generateCactus() instanceof Image, 'Cactus generated');

    // ============================================================
    // Section 8: Texture Generation — Redstone Components
    // ============================================================
    F.section('8. Redstone Components');

    F.assert(Donkeycraft.TextureGenerator.generateRedstoneTorch() instanceof Image, 'Redstone torch generated');
    F.assert(Donkeycraft.TextureGenerator.generateRedstoneLamp(false) instanceof Image, 'Unlit redstone lamp generated');
    F.assert(Donkeycraft.TextureGenerator.generateRedstoneLamp(true) instanceof Image, 'Lit redstone lamp generated');
    F.assert(Donkeycraft.TextureGenerator.generateLever() instanceof Image, 'Lever generated');
    F.assert(Donkeycraft.TextureGenerator.generateObserver() instanceof Image, 'Observer generated');
    F.assert(Donkeycraft.TextureGenerator.generateRepeater() instanceof Image, 'Repeater generated');
    F.assert(Donkeycraft.TextureGenerator.generatePistonSide() instanceof Image, 'Piston side generated');
    F.assert(Donkeycraft.TextureGenerator.generateDispenser(true) instanceof Image, 'Dispenser generated');
    F.assert(Donkeycraft.TextureGenerator.generateButton(true) instanceof Image, 'Stone button generated');

    // ============================================================
    // Section 9: Texture Generation — Storage & Furnaces
    // ============================================================
    F.section('9. Storage & Furnaces');

    F.assert(Donkeycraft.TextureGenerator.generateChestSide() instanceof Image, 'Chest generated');
    F.assert(Donkeycraft.TextureGenerator.generateFurnaceFront() instanceof Image, 'Furnace generated');
    F.assert(Donkeycraft.TextureGenerator.generateCraftingTable() instanceof Image, 'Crafting table generated');
    F.assert(Donkeycraft.TextureGenerator.generateBookshelf() instanceof Image, 'Bookshelf generated');
    F.assert(Donkeycraft.TextureGenerator.generateSmoker() instanceof Image, 'Smoker generated');
    F.assert(Donkeycraft.TextureGenerator.generateBlastFurnace() instanceof Image, 'Blast furnace generated');

    // ============================================================
    // Section 10: Texture Generation — Nether & End Blocks
    // ============================================================
    F.section('10. Nether & End Blocks');

    F.assert(Donkeycraft.TextureGenerator.generateWarpedStem() instanceof Image, 'Warped stem generated');
    F.assert(Donkeycraft.TextureGenerator.generateCrimsonStem() instanceof Image, 'Crimson stem generated');
    F.assert(Donkeycraft.TextureGenerator.generateGlowstone() instanceof Image, 'Glowstone generated');
    F.assert(Donkeycraft.TextureGenerator.generateShroomlight() instanceof Image, 'Shroomlight generated');
    F.assert(Donkeycraft.TextureGenerator.generateMagma() instanceof Image, 'Magma generated');
    F.assert(Donkeycraft.TextureGenerator.generateSoulSand() instanceof Image, 'Soul sand generated');
    F.assert(Donkeycraft.TextureGenerator.generateChorusPlant() instanceof Image, 'Chorus plant generated');
    F.assert(Donkeycraft.TextureGenerator.generateEndPortalFrame() instanceof Image, 'End portal frame generated');
    F.assert(Donkeycraft.TextureGenerator.generateNetherPortal() instanceof Image, 'Nether portal generated');
    F.assert(Donkeycraft.TextureGenerator.generateEndRod() instanceof Image, 'End rod generated');

    // ============================================================
    // Section 11: Texture Generation — Misc Blocks
    // ============================================================
    F.section('11. Misc Blocks');

    F.assert(Donkeycraft.TextureGenerator.generateTNTSide() instanceof Image, 'TNT generated');
    F.assert(Donkeycraft.TextureGenerator.generateNoteBlock() instanceof Image, 'Note block generated');
    F.assert(Donkeycraft.TextureGenerator.generateLantern() instanceof Image, 'Lantern generated');
    F.assert(Donkeycraft.TextureGenerator.generateSoulLantern() instanceof Image, 'Soul lantern generated');
    F.assert(Donkeycraft.TextureGenerator.generateSculkSensor() instanceof Image, 'Sculk sensor generated');
    F.assert(Donkeycraft.TextureGenerator.generateMobSpawner() instanceof Image, 'Mob spawner generated');
    F.assert(Donkeycraft.TextureGenerator.generateMissing() instanceof Image, 'Missing texture generated');

    // ============================================================
    // Section 12: Texture Generation — Ice, Snow, Leaves
    // ============================================================
    F.section('12. Ice, Snow, Leaves');

    F.assert(Donkeycraft.TextureGenerator.generateIce() instanceof Image, 'Ice generated');
    F.assert(Donkeycraft.TextureGenerator.generateSnowBlock() instanceof Image, 'Snow block generated');
    F.assert(Donkeycraft.TextureGenerator.generateLeaves(50, 130, 40) instanceof Image, 'Oak leaves generated');
    F.assert(Donkeycraft.TextureGenerator.generateSponge() instanceof Image, 'Sponge generated');

    // ============================================================
    // Section 13: Texture Generation — Deepslate & Polished
    // ============================================================
    F.section('13. Deepslate & Polished Stone');

    F.assert(Donkeycraft.TextureGenerator.generateDeepslate() instanceof Image, 'Deepslate generated');
    F.assert(Donkeycraft.TextureGenerator.generateCobbledDeepslate() instanceof Image, 'Cobbled deepslate generated');
    F.assert(Donkeycraft.TextureGenerator.generatePolishedDeepslate() instanceof Image, 'Polished deepslate generated');
    F.assert(Donkeycraft.TextureGenerator.generateSmoothStone() instanceof Image, 'Smooth stone generated');

    // ============================================================
    // Section 14: getGeneratorForBlock & generateTextureForBlock
    // ============================================================
    F.section('14. Generator Lookup Methods');

    var genStone = Donkeycraft.TextureGenerator.getGeneratorForBlock('stone');
    F.assertType(genStone, 'function', 'getGeneratorForBlock("stone") returns function');

    var genUnknown = Donkeycraft.TextureGenerator.getGeneratorForBlock('nonexistent_block_xyz');
    F.assert(genUnknown === null, 'getGeneratorForBlock unknown returns null');

    var texStone = Donkeycraft.TextureGenerator.generateTextureForBlock('stone');
    F.assert(texStone instanceof Image, 'generateTextureForBlock("stone") returns Image');

    var texFallback = Donkeycraft.TextureGenerator.generateTextureForBlock('unknown_block_xyz');
    F.assert(texFallback instanceof Image, 'generateTextureForBlock fallback returns Image');

    // ============================================================
    // Section 15: generateAllTextures & getNameMap
    // ============================================================
    F.section('15. Bulk Generation & Name Map');

    var allTex = Donkeycraft.TextureGenerator.generateAllTextures();
    F.assertType(allTex, 'object', 'generateAllTextures returns object');
    F.assert(Object.keys(allTex).length > 0, 'Generated textures exist (count=' + Object.keys(allTex).length + ')');
    F.assert(allTex[1] !== undefined, 'Stone texture (ID 1) in map');
    F.assert(allTex[0] === undefined, 'Air (ID 0) excluded from map');

    var nameMap = Donkeycraft.TextureGenerator.getNameMap();
    F.assertType(nameMap, 'object', 'getNameMap returns object');
    F.assertEq(nameMap[1], 'stone', 'Block ID 1 → "stone"');
    F.assert(Object.keys(nameMap).length > 0, 'Name map has entries (count=' + Object.keys(nameMap).length + ')');

    // ============================================================
    // Section 16: AssetManager — Atlas & Texture Retrieval
    // ============================================================
    F.section('16. AssetManager — Atlas & Textures');

    Donkeycraft.AssetManager.init(null);
    var atlasTex = Donkeycraft.AssetManager.generateAllBlockTextures();
    F.assert(Object.keys(atlasTex).length > 0, 'AssetManager generated textures (count=' + Object.keys(atlasTex).length + ')');

    var atlasCanvas = Donkeycraft.AssetManager.generateAtlasCanvas();
    F.assertType(atlasCanvas, 'object', 'generateAtlasCanvas returns canvas');
    F.assertEq(atlasCanvas.width, 256, 'Atlas canvas is 256px wide');
    F.assertEq(atlasCanvas.height, 256, 'Atlas canvas is 256px tall');

    var tex1 = Donkeycraft.AssetManager.getTexture(1);
    F.assert(tex1 instanceof Image, 'getTexture(1) returns Image');

    var tex999 = Donkeycraft.AssetManager.getTexture(999);
    F.assert(tex999 === null, 'getTexture(999) returns null');

    // ============================================================
    // Section 17: AssetManager — Info & Reset
    // ============================================================
    F.section('17. AssetManager — Info & Reset Lifecycle');

    var info = Donkeycraft.AssetManager.getAssetInfo();
    F.assert(info.totalBlocks > 0, 'totalBlocks > 0 (' + info.totalBlocks + ')');
    F.assert(info.generatedTextures > 0, 'generatedTextures > 0 (' + info.generatedTextures + ')');
    F.assert(info.soundCategories === 13, 'soundCategories is 13 (' + info.soundCategories + ')');

    Donkeycraft.AssetManager.reset();
    F.assert(Donkeycraft.AssetManager.getTexture(1) === null, 'getTexture returns null after reset');
    F.assert(Donkeycraft.AssetManager.getAssetInfo().generatedTextures === 0, 'generatedTextures is 0 after reset');

    Donkeycraft.AssetManager.generateAllBlockTextures();
    F.assert(Donkeycraft.AssetManager.getTexture(1) instanceof Image, 'getTexture works after regeneration');

    // ============================================================
    // Section 18: Sound Generation — Categories
    // ============================================================
    F.section('18. Sound Categories');

    var categories = Donkeycraft.SoundGenerator.getCategories();
    F.assertType(categories, 'object', 'getCategories returns object');
    F.assert(categories.length === 13, '13 sound categories (count=' + categories.length + ')');

    var expectedCats = ['step','break','place','hit','footstep','splash','glass_break','pop','explosion','enchant','drink','ambient','hurt'];
    for (var ec = 0; ec < expectedCats.length; ec++) {
        F.assert(categories.indexOf(expectedCats[ec]) >= 0, 'Category "' + expectedCats[ec] + '" exists');
    }

    // ============================================================
    // Section 19: Sound Generation — Noise-based Sounds
    // ============================================================
    F.section('19. Noise-based Sounds (step/break/footstep)');

    if (audioCtx) {
        var stepSound = Donkeycraft.SoundGenerator.getSound(audioCtx, 'step', 'stone');
        F.assertType(stepSound, 'object', 'Step sound returns AudioBuffer');
        F.assertEq(stepSound.numberOfChannels, 1, 'Step sound is mono');
        F.assert(stepSound.duration > 0 && stepSound.duration <= 0.2, 'Step duration reasonable (' + stepSound.duration.toFixed(3) + 's)');

        var breakSound = Donkeycraft.SoundGenerator.getSound(audioCtx, 'break', 'stone');
        F.assertType(breakSound, 'object', 'Break sound returns AudioBuffer');
        F.assert(breakSound.duration > 0 && breakSound.duration <= 0.5, 'Break duration reasonable (' + breakSound.duration.toFixed(3) + 's)');

        // Caching
        var stepSound2 = Donkeycraft.SoundGenerator.getSound(audioCtx, 'step', 'stone');
        F.assert(stepSound === stepSound2, 'Step sound is cached');

        F.assert(Donkeycraft.SoundGenerator.isCached('step:stone') === true, 'isCached("step:stone") is true');
        F.assert(Donkeycraft.SoundGenerator.isCached('nonexistent') === false, 'isCached("nonexistent") is false');

        Donkeycraft.SoundGenerator.clearCache();
        F.assert(Donkeycraft.SoundGenerator.isCached('step:stone') === false, 'After clearCache, isCached returns false');
    } else {
        F.info('AudioContext unavailable — sound tests skipped');
    }

    // ============================================================
    // Section 20: Sound Generation — Async Sounds (Place/Hit)
    // ============================================================
    F.section('20. Async Sounds (place/hit)');

    if (audioCtx) {
        Donkeycraft.SoundGenerator.getSound(audioCtx, 'place', 'stone').then(function(buf) {
            F.assertType(buf, 'object', 'Place sound resolves to AudioBuffer');
            F.assert(buf.duration > 0, 'Place sound duration > 0');
        }).catch(function(e) {
            F.assert(false, 'Place sound rejected: ' + e.message);
        });

        Donkeycraft.SoundGenerator.getSound(audioCtx, 'hit', 'stone').then(function(buf) {
            F.assertType(buf, 'object', 'Hit sound resolves to AudioBuffer');
            F.assert(buf.duration > 0, 'Hit sound duration > 0');
        }).catch(function(e) {
            F.assert(false, 'Hit sound rejected: ' + e.message);
        });

        F.info('Async sound promises fired');
    } else {
        F.info('AudioContext unavailable — async sound tests skipped');
    }

    // ============================================================
    // Section 21: Sound Generation — Complex Async Sounds
    // ============================================================
    F.section('21. Complex Async Sounds (splash/explosion/enchant)');

    if (audioCtx) {
        Donkeycraft.SoundGenerator.getSound(audioCtx, 'splash').then(function(buf) {
            F.assertType(buf, 'object', 'Splash sound resolves');
        }).catch(function(e) { F.assert(false, 'Splash rejected: ' + e.message); });

        Donkeycraft.SoundGenerator.getSound(audioCtx, 'explosion').then(function(buf) {
            F.assert(buf.duration > 0.5, 'Explosion is long enough (' + buf.duration.toFixed(2) + 's)');
        }).catch(function(e) { F.assert(false, 'Explosion rejected: ' + e.message); });

        Donkeycraft.SoundGenerator.getSound(audioCtx, 'enchant').then(function(buf) {
            F.assertType(buf, 'object', 'Enchant sound resolves');
        }).catch(function(e) { F.assert(false, 'Enchant rejected: ' + e.message); });

        F.info('Complex async sounds fired');
    } else {
        F.info('AudioContext unavailable — complex async tests skipped');
    }

    // ============================================================
    // Section 22: Sound Generation — Ambient, Hurt, Unknown
    // ============================================================
    F.section('22. Ambient, Hurt & Unknown Category Fallback');

    if (audioCtx) {
        var amb = Donkeycraft.SoundGenerator.getSound(audioCtx, 'ambient', 'passive');
        F.assertType(amb, 'object', 'Ambient passive sound returns AudioBuffer');

        var hurt = Donkeycraft.SoundGenerator.getSound(audioCtx, 'hurt', 'entity');
        F.assertType(hurt, 'object', 'Hurt sound returns AudioBuffer');

        var unknown = Donkeycraft.SoundGenerator.getSound(audioCtx, 'nonexistent_category');
        F.assertType(unknown, 'object', 'Unknown category returns fallback AudioBuffer');
    } else {
        F.info('AudioContext unavailable — ambient/hurt tests skipped');
    }

    // ============================================================
    // Section 23: Edge Cases — Determinism & Fallbacks
    // ============================================================
    F.section('23. Edge Cases — Determinism & Fallbacks');

    var missingTex = Donkeycraft.TextureGenerator.generateMissing();
    F.assert(missingTex instanceof Image, 'Missing texture is valid Image');
    F.assert(typeof missingTex.src === 'string' && missingTex.src.startsWith('data:image'), 'Missing texture has dataURL src');

    // Deterministic: same seed → same result
    var stoneA = Donkeycraft.TextureGenerator.generateStone(42);
    var stoneB = Donkeycraft.TextureGenerator.generateStone(42);
    F.assert(stoneA instanceof Image && stoneB instanceof Image, 'Deterministic generation produces valid images');

    // Unknown name → fallback
    var fallback = Donkeycraft.TextureGenerator.generateTextureForBlock('completely_fake_block_name_xyz');
    F.assert(fallback instanceof Image, 'Fallback texture for unknown name is valid Image');

    // ============================================================
    // Section 24: Integration — TextureGenerator + BlockRegistry
    // ============================================================
    F.section('24. Integration — TextureGenerator + BlockRegistry');

    var blocks = Donkeycraft.BlockRegistry ? Donkeycraft.BlockRegistry.getAllBlocks() : [];
    F.assert(blocks.length > 250, 'BlockRegistry has > 250 blocks (count=' + blocks.length + ')');

    var nameMap2 = Donkeycraft.TextureGenerator.getNameMap();
    var mappedCount = 0;
    for (var bi = 0; bi < blocks.length; bi++) {
        if (blocks[bi].name !== 'air') mappedCount++;
    }
    F.assert(Object.keys(nameMap2).length === mappedCount, 'Name map matches non-air block count (' + Object.keys(nameMap2).length + '/' + mappedCount + ')');

    // ============================================================
    // VISUAL UI: Texture Grid, Atlas, Sound Buttons
    // ============================================================
    var uiContainer = document.getElementById('visual-ui');

    // ── Texture Grid ─────────────────────────────────────
    var texPanel = document.createElement('div');
    texPanel.className = 'asset-panel';
    texPanel.innerHTML = '<h2>🎨 Generated Textures <span style="color:#888;font-size:0.8em">(hover to enlarge)</span></h2>';

    var texGrid = document.createElement('div');
    texGrid.className = 'texture-grid';

    var sampleTextures = [
        { name: 'stone', fn: function() { return Donkeycraft.TextureGenerator.generateStone(42); } },
        { name: 'dirt', fn: Donkeycraft.TextureGenerator.generateDirt },
        { name: 'grass_top', fn: Donkeycraft.TextureGenerator.generateGrassTop },
        { name: 'grass_side', fn: Donkeycraft.TextureGenerator.generateGrassSide },
        { name: 'log_side', fn: function() { return Donkeycraft.TextureGenerator.generateLogSide(777); } },
        { name: 'planks_oak', fn: function() { return Donkeycraft.TextureGenerator.generatePlanks(188, 152, 98, 100); } },
        { name: 'wool_white', fn: function() { return Donkeycraft.TextureGenerator.generateWool(240, 240, 240); } },
        { name: 'wool_red', fn: function() { return Donkeycraft.TextureGenerator.generateWool(183, 52, 55); } },
        { name: 'brick', fn: function() { return Donkeycraft.TextureGenerator.generateBricks(160, 60, 50); } },
        { name: 'coal_ore', fn: Donkeycraft.TextureGenerator.generateCoalOre },
        { name: 'iron_ore', fn: Donkeycraft.TextureGenerator.generateIronOre },
        { name: 'gold_ore', fn: Donkeycraft.TextureGenerator.generateGoldOre },
        { name: 'diamond_ore', fn: Donkeycraft.TextureGenerator.generateDiamondOre },
        { name: 'water', fn: Donkeycraft.TextureGenerator.generateWater },
        { name: 'lava', fn: Donkeycraft.TextureGenerator.generateLava },
        { name: 'glass', fn: function() { return Donkeycraft.TextureGenerator.generateGlass(200, 220, 255); } },
        { name: 'bedrock', fn: Donkeycraft.TextureGenerator.generateBedrock },
        { name: 'netherrack', fn: Donkeycraft.TextureGenerator.generateNetherrack },
        { name: 'end_stone', fn: Donkeycraft.TextureGenerator.generateEndStone },
        { name: 'gold_block', fn: Donkeycraft.TextureGenerator.generateGoldBlock },
        { name: 'iron_block', fn: Donkeycraft.TextureGenerator.generateIronBlock },
        { name: 'glowstone', fn: Donkeycraft.TextureGenerator.generateGlowstone },
        { name: 'tnt', fn: Donkeycraft.TextureGenerator.generateTNTSide },
        { name: 'chest', fn: Donkeycraft.TextureGenerator.generateChestSide },
        { name: 'furnace', fn: Donkeycraft.TextureGenerator.generateFurnaceFront },
        { name: 'crafting_table', fn: Donkeycraft.TextureGenerator.generateCraftingTable },
        { name: 'leaves_oak', fn: function() { return Donkeycraft.TextureGenerator.generateLeaves(50, 130, 40); } },
        { name: 'cactus', fn: Donkeycraft.TextureGenerator.generateCactus },
        { name: 'melon', fn: Donkeycraft.TextureGenerator.generateMelon },
        { name: 'snow_block', fn: Donkeycraft.TextureGenerator.generateSnowBlock },
        { name: 'ice', fn: Donkeycraft.TextureGenerator.generateIce },
        { name: 'soul_sand', fn: Donkeycraft.TextureGenerator.generateSoulSand },
        { name: 'magma', fn: Donkeycraft.TextureGenerator.generateMagma },
        { name: 'lantern', fn: Donkeycraft.TextureGenerator.generateLantern },
        { name: 'redstone_torch', fn: Donkeycraft.TextureGenerator.generateRedstoneTorch },
        { name: 'lever', fn: Donkeycraft.TextureGenerator.generateLever },
        { name: 'observer', fn: Donkeycraft.TextureGenerator.generateObserver },
        { name: 'repeater', fn: Donkeycraft.TextureGenerator.generateRepeater },
        { name: 'piston_side', fn: Donkeycraft.TextureGenerator.generatePistonSide },
        { name: 'end_rod', fn: Donkeycraft.TextureGenerator.generateEndRod },
        { name: 'chain', fn: Donkeycraft.TextureGenerator.generateChain },
        { name: 'missing', fn: Donkeycraft.TextureGenerator.generateMissing }
    ];

    for (var si = 0; si < sampleTextures.length; si++) {
        var st = sampleTextures[si];
        var img = st.fn();
        if (img instanceof Image) {
            var wrap = document.createElement('div');
            wrap.className = 'tex-cell-wrap';

            var cell = document.createElement('img');
            cell.className = 'texture-cell';
            cell.src = img.src;
            cell.title = st.name;
            wrap.appendChild(cell);

            var label = document.createElement('div');
            label.className = 'texture-label';
            label.textContent = st.name;
            wrap.appendChild(label);

            texGrid.appendChild(wrap);
        }
    }
    texPanel.appendChild(texGrid);
    uiContainer.appendChild(texPanel);

    // ── Atlas Canvas ─────────────────────────────────────
    var atlasPanel = document.createElement('div');
    atlasPanel.className = 'asset-panel';
    atlasPanel.innerHTML = '<h2>🗺️ Texture Atlas (256×256)</h2>';
    var atlasWrap = document.createElement('div');
    atlasWrap.className = 'atlas-container';
    var atlasCvs = Donkeycraft.AssetManager.generateAtlasCanvas();
    if (atlasCvs) atlasWrap.appendChild(atlasCvs);
    atlasPanel.appendChild(atlasWrap);
    uiContainer.appendChild(atlasPanel);

    // ── Sound Table ──────────────────────────────────────
    var soundPanel = document.createElement('div');
    soundPanel.className = 'asset-panel';
    soundPanel.innerHTML = '<h2>🔊 Procedural Sounds <span style="color:#888;font-size:0.8em">(click to play)</span></h2>';

    var tableWrap = document.createElement('div');
    tableWrap.style.overflowX = 'auto';

    var soundTable = document.createElement('table');
    soundTable.className = 'sound-table';

    // Table header
    var thead = document.createElement('thead');
    var headerRow = document.createElement('tr');
    var headers = ['Sound Name', 'Description', 'Play'];
    for (var h = 0; h < headers.length; h++) {
        var th = document.createElement('th');
        th.textContent = headers[h];
        headerRow.appendChild(th);
    }
    thead.appendChild(headerRow);
    soundTable.appendChild(thead);

    // Table body
    var tbody = document.createElement('tbody');

    if (audioCtx) {
        // Sound descriptions — each category with its purpose
        var soundInfo = [
            { cat: 'step',         desc: 'Block stepping sound (footsteps on surface)',       mat: 'stone' },
            { cat: 'break',        desc: 'Block breaking effect (crunch/smash)',              mat: 'stone' },
            { cat: 'place',        desc: 'Block placement thud (set down sound)',             mat: 'stone' },
            { cat: 'hit',          desc: 'Block being hit repeatedly (mining percussion)',    mat: 'stone' },
            { cat: 'footstep',     desc: 'Entity walking footsteps (mob/player)',             mat: 'stone' },
            { cat: 'splash',       desc: 'Water splash / entering water effect',              mat: null },
            { cat: 'glass_break',  desc: 'Glass shattering into pieces',                      mat: null },
            { cat: 'pop',          desc: 'Item pickup / furnace recipe completion',           mat: null },
            { cat: 'explosion',    desc: 'TNT explosion (low rumble → boom)',                 mat: null },
            { cat: 'enchant',      desc: 'Enchantment table magical chime',                   mat: null },
            { cat: 'drink',        desc: 'Item consumption / drinking animation',             mat: null },
            { cat: 'ambient',      desc: 'Passive ambient noise (cave echoes, wind)',         mat: 'passive' },
            { cat: 'hurt',         desc: 'Entity taking damage (pain sound)',                 mat: 'entity' }
        ];

        for (var row = 0; row < soundInfo.length; row++) {
            var info = soundInfo[row];
            var tr = document.createElement('tr');

            // Name cell
            var tdName = document.createElement('td');
            tdName.className = 'sound-name';
            tdName.textContent = info.cat;
            tr.appendChild(tdName);

            // Description cell
            var tdDesc = document.createElement('td');
            tdDesc.className = 'sound-desc';
            tdDesc.textContent = info.desc;
            tr.appendChild(tdDesc);

            // Play button cell
            var tdPlay = document.createElement('td');
            var playBtn = document.createElement('button');
            playBtn.className = 'sound-play-btn';
            playBtn.textContent = '▶ Play';
            (function(cat, mat) {
                playBtn.addEventListener('click', function() {
                    playBtn.textContent = '⏳ Loading...';
                    var snd = Donkeycraft.SoundGenerator.getSound(audioCtx, cat, mat);
                    if (snd instanceof Promise) {
                        snd.then(function(buf) {
                            var src = audioCtx.createBufferSource();
                            src.buffer = buf;
                            src.connect(audioCtx.destination);
                            src.start(0);
                            playBtn.textContent = '▶ Play';
                        }).catch(function() {
                            playBtn.textContent = '✗ Error';
                        });
                    } else if (snd instanceof AudioBuffer) {
                        var src = audioCtx.createBufferSource();
                        src.buffer = snd;
                        src.connect(audioCtx.destination);
                        src.start(0);
                        playBtn.textContent = '▶ Play';
                    } else {
                        playBtn.textContent = '✗ Invalid';
                    }
                });
            })(info.cat, info.mat);
            tdPlay.appendChild(playBtn);
            tr.appendChild(tdPlay);

            tbody.appendChild(tr);
        }
    } else {
        var trNoAudio = document.createElement('tr');
        var tdNoAudio = document.createElement('td');
        tdNoAudio.colSpan = 3;
        tdNoAudio.style.color = '#888';
        tdNoAudio.style.padding = '16px';
        tdNoAudio.textContent = 'AudioContext not available — sounds cannot be played';
        trNoAudio.appendChild(tdNoAudio);
        tbody.appendChild(trNoAudio);
    }

    soundTable.appendChild(tbody);
    tableWrap.appendChild(soundTable);
    soundPanel.appendChild(tableWrap);
    uiContainer.appendChild(soundPanel);

    // ============================================================
    // Finish: renders summary at top of page
    // ============================================================
    F.finishTests();

})();
</script>
</body>
</html>
