<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <style>
        body {
            margin: 0;
            background-color: rgb(128, 128, 128);
        }
        /* Override toggle button position for standalone page */
        .dk-inventory-toggle-btn {
            position: fixed !important;
            left: 10px !important;
            bottom: 10px !important;
            z-index: 9999 !important;
        }
    </style>
    <link rel="stylesheet" href="src/ui/inventory-ui.css">
</head>
<body>

<!-- Player Inventory Panel -->
<div id="dk-inventory-panel" class="dk-inventory-panel">
    <!-- Title bar -->
    <div class="dk-inventory-titlebar">
        <span class="dk-title-text">Inventory of Player</span>
        <div class="dk-inventory-close-btn" id="dk-inventory-close-btn">X</div>
    </div>

    <!-- Main content area -->
    <div class="dk-inventory-content">
        <!-- Left pane — Player Paperdoll + Equipment Slots -->
        <div class="dk-inventory-left-pane">
            <!-- Equipment layout: left slots | paperdoll | right slots -->
            <div class="dk-equipment-layout">
                <!-- Left column: 4 slots stacked, gap, then 1 slot -->
                <div class="dk-equip-col dk-equip-left">
                    <div class="dk-equip-slot" data-slot="helm"><span class="dk-slot-item"></span></div>
                    <div class="dk-equip-slot" data-slot="chest"><span class="dk-slot-item"></span></div>
                    <div class="dk-equip-slot" data-slot="legs"><span class="dk-slot-item"></span></div>
                    <div class="dk-equip-slot" data-slot="boots"><span class="dk-slot-item"></span></div>
                    <div class="dk-equip-half-space"></div>
                    <div class="dk-equip-slot" data-slot="shield"><span class="dk-slot-item"></span></div>
                </div>

                <!-- Center: Paperdoll placeholder with smoke effect -->
                <div class="dk-equip-center">
                    <div class="dk-paperdoll-container">
                        <div class="dk-paperdoll"></div>
                        <div class="dk-paperdoll-smoke">
                            <div class="dk-smoke-particle"></div>
                            <div class="dk-smoke-particle"></div>
                            <div class="dk-smoke-particle"></div>
                            <div class="dk-smoke-particle"></div>
                            <div class="dk-smoke-particle"></div>
                            <div class="dk-smoke-particle"></div>
                        </div>
                    </div>
                </div>

                <!-- Right column: 2 columns of 4 slots, gap, then 2 horizontal slots -->
                <div class="dk-equip-col dk-equip-right">
                    <div class="dk-equip-slot-col">
                        <div class="dk-equip-slot" data-slot="neck"><span class="dk-slot-item"></span></div>
                        <div class="dk-equip-slot" data-slot="offhand"><span class="dk-slot-item"></span></div>
                        <div class="dk-equip-slot" data-slot="belt"><span class="dk-slot-item"></span></div>
                        <div class="dk-equip-slot" data-slot="ring1"><span class="dk-slot-item"></span></div>
                    </div>
                    <div class="dk-equip-slot-col">
                        <div class="dk-equip-slot" data-slot="ring2"><span class="dk-slot-item"></span></div>
                        <div class="dk-equip-slot" data-slot="ring3"><span class="dk-slot-item"></span></div>
                        <div class="dk-equip-slot" data-slot="ring4"><span class="dk-slot-item"></span></div>
                        <div class="dk-equip-slot" data-slot="ring5"><span class="dk-slot-item"></span></div>
                    </div>
                    <div class="dk-equip-half-space"></div>
                    <div class="dk-equip-slot-row">
                        <div class="dk-equip-slot" data-slot="ring6"><span class="dk-slot-item"></span></div>
                        <div class="dk-equip-slot" data-slot="ring7"><span class="dk-slot-item"></span></div>
                    </div>
                </div>
            </div>

            <!-- Inventory Grid Section (bottom 2/5 of panel) -->
            <div class="dk-inventory-grid-section">
                <div class="dk-inventory-grid-wrapper">
                    <div id="dk-inventory-grid" class="dk-inventory-grid"></div>
                </div>
            </div>
        </div>

        <!-- Right pane — 9 Container slots in vertical stack -->
        <div class="dk-inventory-right-pane">
            <div class="dk-container-stack">
                <div class="dk-container-slot" data-slot="c1"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c2"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c3"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c4"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c5"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c6"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c7"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c8"><span class="dk-slot-item"></span></div>
                <div class="dk-container-slot" data-slot="c9"><span class="dk-slot-item"></span></div>
            </div>
        </div>
    </div>
</div>

<!-- Hotbar container for toggle button positioning -->
<div id="dk-hotbar-container"></div>

<!-- Minimal Donkeycraft namespace + Inventory mock class -->
<script>
(function () {
    'use strict';

    window.Donkeycraft = window.Donkeycraft || {};

    /**
     * Mock ItemStack for testing the UI.
     */
    Donkeycraft.ItemStack = function (itemId, count) {
        this._itemId = itemId || 0;
        this._count = count || 0;
    };

    Donkeycraft.ItemStack.prototype.getItemId = function () {
        return this._itemId;
    };

    Donkeycraft.ItemStack.prototype.getCount = function () {
        return this._count;
    };

    Donkeycraft.ItemStack.prototype.isEmpty = function () {
        return this._count <= 0;
    };

    /**
     * Mock Inventory for testing the UI.
     */
    Donkeycraft.Inventory = function (slotCount) {
        this._slotCount = slotCount || 0;
        this._slots = [];
        for (var i = 0; i < this._slotCount; i++) {
            this._slots.push(new Donkeycraft.ItemStack(0, 0));
        }
        this._listeners = [];
    };

    Donkeycraft.Inventory.prototype.getSlotCount = function () {
        return this._slotCount;
    };

    Donkeycraft.Inventory.prototype.getSlot = function (index) {
        if (index >= 0 && index < this._slotCount) {
            return this._slots[index];
        }
        return new Donkeycraft.ItemStack(0, 0);
    };

    Donkeycraft.Inventory.prototype.setSlot = function (index, stack) {
        if (index >= 0 && index < this._slotCount) {
            this._slots[index] = stack;
            for (var i = 0; i < this._listeners.length; i++) {
                try { this._listeners[i](index, stack); } catch (e) {}
            }
        }
    };

    Donkeycraft.Inventory.prototype.onSlotChange = function (callback) {
        this._listeners.push(callback);
        var inv = this;
        return function () {
            var idx = inv._listeners.indexOf(callback);
            if (idx >= 0) inv._listeners.splice(idx, 1);
        };
    };
})();
</script>

<!-- Load inventory JS -->
<script src="src/ui/inventory-ui.js"></script>

<!-- Initialize InventoryUI -->
<script>
(function () {
    'use strict';

    // Create mock inventories
    var playerInv = new Donkeycraft.Inventory(258); // 43 rows × 6 cols
    var backpackInv = new Donkeycraft.Inventory(9);

    // Populate with some demo items
    var itemData = [
        { id: 1, count: 64 },  // Stone
        { id: 3, count: 64 },  // Dirt
        { id: 4, count: 64 },  // Grass
        { id: 5, count: 64 },  // Wood
        { id: 6, count: 64 },  // Sand
        { id: 218, count: 10 }, // Diamond
        { id: 61, count: 5 },  // Fire
        { id: 54, count: 1 },  // Chest
    ];

    for (var i = 0; i < Math.min(itemData.length, 258); i++) {
        var data = itemData[i];
        playerInv.setSlot(i, new Donkeycraft.ItemStack(data.id, data.count));
    }

    // Populate backpack with a couple items
    backpackInv.setSlot(0, new Donkeycraft.ItemStack(310, 1));  // Chopsticks
    backpackInv.setSlot(1, new Donkeycraft.ItemStack(312, 1));  // Torch

    // Initialize the inventory UI
    var invUI = new Donkeycraft.InventoryUI(null, null);
    invUI.setInventory(playerInv, backpackInv);

})();
</script>

</body>
</html>
