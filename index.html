<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donkeycraft</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/gui.css">
<style>
/* Inline styles for dynamically-created elements */
#dk-canvas-container {
    position: relative;
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<!-- WebGL Canvas Container -->
<div id="dk-canvas-container">
    <canvas id="dk-canvas"></canvas>
</div>

<!-- Game Overlay (sits on top of canvas) -->
<div id="dk-overlay">

    <!-- Crosshair (centered) -->
    <div id="dk-crosshair"></div>

    <!-- Debug Overlay (F3 toggle) -->
    <div id="dk-debug-overlay" class="dk-debug-info"></div>

    <!-- GUI Backdrop (dims background when GUI open) -->
    <div id="dk-gui-backdrop"></div>

    <!-- GUI Panel Container (modal screens) -->
    <div id="dk-gui-container" class="dk-interactive"></div>

    <!-- Hotbar Container -->
    <div id="dk-hotbar-container" class="dk-interactive"></div>

</div>

<!-- Loading Screen (shown during async init) -->
<div id="dk-loading-screen">
    <div class="dk-loading-container">
        <div class="dk-loading-title">Donkeycraft</div>
        <div class="dk-progress-bar-container">
            <div class="dk-progress-bar" id="dk-progress-bar"></div>
        </div>
        <div class="dk-progress-text" id="dk-progress-text">Initializing...</div>
        <div class="dk-tip" id="dk-loading-tip"></div>
        <div class="dk-error" id="dk-loading-error"></div>
    </div>
</div>

<!-- Error Screen (shown on fatal errors) -->
<div id="dk-error-screen">
    <div class="dk-error-title">Something went wrong</div>
    <div class="dk-error-message" id="dk-error-message"></div>
    <button class="dk-retry-btn" id="dk-retry-btn">Retry</button>
</div>

<!-- ============================================================
     Load project scripts in dependency order
     ============================================================ -->

<!-- Phase 1: Core Infrastructure -->
<script src="src/core/namespace.js"></script>
<script src="src/core/eventbus.js"></script>
<script src="src/core/config.js"></script>
<script src="src/core/logger.js"></script>
<script src="src/core/timer.js"></script>
<script src="src/core/input.js"></script>
<script src="src/core/math-utils.js"></script>
<script src="src/core/audio.js"></script>

<script src="src/render/gl-context.js"></script>
<script src="src/render/shader-manager.js"></script>
<script src="src/render/geometry-builder.js"></script>
<script src="src/render/mesh-optimizer.js"></script>
<script src="src/render/chunk-mesh.js"></script>
<script src="src/render/terrain-renderer.js"></script>
<script src="src/render/camera.js"></script>
<script src="src/render/fog.js"></script>
<script src="src/render/sky.js"></script>
<script src="src/render/lighting.js"></script>
<script src="src/render/hand-renderer.js"></script>
<script src="src/render/break-particles.js"></script>
<script src="src/render/gui-renderer.js"></script>

<!-- Phase 3: Block System -->
<script src="src/world/block.js"></script>
<script src="src/world/block-state.js"></script>
<script src="src/world/block-types.js"></script>
<script src="src/world/texture-atlas.js"></script>
<script src="src/world/block-models.js"></script>

<script src="src/world/ore-generator.js"></script>
<script src="src/world/cave-generator.js"></script>

<!-- Phase 6.5: Loading Screen & Init -->
<script src="src/core/init-sequence.js"></script>

<!-- Phase 20: UI Elements -->
<script src="src/ui/gui-elements.js"></script>

<!-- Game initialization (Phase 21 not yet implemented) -->
<script>
(function() {
    'use strict';

    // Hide loading screen — game loop starts when Phase 21 is implemented.
    var loadingScreen = document.getElementById('dk-loading-screen');
    if (loadingScreen) {
        loadingScreen.style.display = 'none';
    }

    // Show a placeholder message since Phase 21 (src/game.js) is not yet available.
    var debugOverlay = document.getElementById('dk-debug-overlay');
    if (debugOverlay) {
        debugOverlay.style.display = 'block';
        debugOverlay.textContent = '[Phase 21 pending] Main Game Loop — UI layer operational';
    }
})();
</script>

</body>
</html>
