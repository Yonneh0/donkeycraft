    <script type="text/plain" id="dk-vertex-shaders">
// Donkeycraft — Vertex Shaders
// All vertex shaders as string resources for terrain, particles, and GUI rendering.

// Terrain Vertex Shader
var TERRAIN_VERTEX_SHADER = `
precision mediump int;

attribute vec3 aPosition;
attribute vec2 aUV;
attribute vec3 aNormal;
attribute float aLight;

uniform mat4 uProjection;
uniform mat4 uView;
uniform mat4 uModel;
uniform vec3 uColor;
uniform int uUseColor;

varying vec2 vUV;
varying vec3 vNormal;
varying float vLight;
varying float vDepth;
varying vec4 vColor;
varying vec3 vWorldPos;

void main() {
    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
    vUV = aUV;
    vNormal = aNormal;
    vLight = aLight;

    // View-space Z for exponential distance fog
    vec4 viewPos = uView * uModel * vec4(aPosition, 1.0);
    vDepth = -viewPos.z;

    // World position for underwater effects
    vWorldPos = (uModel * vec4(aPosition, 1.0)).xyz;

    // Pass color to fragment shader — use uColor when in entity mode (uUseColor == 1)
    if (uUseColor == 1) {
        vColor = vec4(uColor, 1.0);
    } else {
        vColor = vec4(1.0);
    }
}
`;

// Block Break Vertex Shader
var BREAK_VERTEX_SHADER = `
attribute vec3 aPosition;
attribute vec2 aUV;
attribute vec4 aColor;

uniform mat4 uProjection;
uniform mat4 uView;

varying vec2 vUV;
varying vec4 vColor;

void main() {
    gl_Position = uProjection * uView * vec4(aPosition, 1.0);
    vUV = aUV;
    vColor = aColor;
}
`;

// GUI Vertex Shader
var GUI_VERTEX_SHADER = `
attribute vec3 aPosition;
attribute vec2 aUV;
attribute vec4 aColor;

uniform mat4 uProjection;
uniform mat4 uView;
uniform mat4 uModel;

varying vec2 vUV;
varying vec4 vColor;

void main() {
    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
    vUV = aUV;
    vColor = aColor;
}
`;

// Sky Vertex Shader
var SKY_VERTEX_SHADER = `
attribute vec3 aPosition;
attribute vec2 aUV;
attribute vec4 aColor;

uniform mat4 uProjection;
uniform mat4 uView;
uniform mat4 uModel;

varying vec2 vUV;
varying vec3 vWorldPos;
varying vec4 vColor;

void main() {
    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
    vUV = aUV;
    vWorldPos = aPosition;
    vColor = aColor;
}
`;

// Entity Vertex Shader — flat color rendering (no UV needed)
var ENTITY_VERTEX_SHADER = `
attribute vec3 aPosition;
attribute vec3 aNormal;

uniform mat4 uProjection;
uniform mat4 uView;
uniform mat4 uModel;

varying vec3 vNormal;
varying float vDepth;

void main() {
    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
    vNormal = aNormal;
    vDepth = -(uView * uModel * vec4(aPosition, 1.0)).z;
}
`;

// Water Vertex Shader
var WATER_VERTEX_SHADER = `
precision mediump int;

attribute vec3 aPosition;
attribute vec2 aUV;
attribute vec3 aNormal;

uniform mat4 uProjection;
uniform mat4 uView;
uniform mat4 uModel;

varying vec2 vUV;
varying vec3 vNormal;
varying vec3 vWorldPos;
varying float vDepth;

void main() {
    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
    vUV = aUV;
    vNormal = aNormal;
    vWorldPos = (uModel * vec4(aPosition, 1.0)).xyz;
    vDepth = -((uView * uModel * vec4(aPosition, 1.0)).z);
}
`;

// Hand/Item Vertex Shader
var HAND_VERTEX_SHADER = `
attribute vec3 aPosition;
attribute vec2 aUV;
attribute vec3 aNormal;
attribute float aLight;

uniform mat4 uProjection;
uniform mat4 uView;
uniform mat4 uModel;

varying vec2 vUV;
varying vec4 vColor;

void main() {
    gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
    vUV = aUV;
    vColor = vec4(aLight, aLight, aLight, 1.0);
}
`;

</script>

    <script type="text/plain" id="dk-fragment-shaders">
// Donkeycraft — Fragment Shaders
// All fragment shaders for terrain lighting, fog, sky, and GUI rendering.

// Terrain Fragment Shader
var TERRAIN_FRAGMENT_SHADER = `
precision mediump float;
precision mediump int;

varying vec2 vUV;
varying vec3 vNormal;
varying float vLight;
varying float vDepth;
varying vec4 vColor;
varying vec3 vWorldPos;

uniform sampler2D uTexture;
uniform vec3 uFogColor;
uniform float uFogDensity;
uniform float uLightFactor;
uniform int uUseColor;

// Underwater uniforms — active when camera is submerged
uniform float uCameraWaterDepth;  // > 0 when camera is underwater
uniform float uUnderwaterDensity; // fog density when underwater (~0.05)
uniform vec3 uUnderwaterColor;    // blue-green tint

void main() {
    // Entity rendering mode: use flat color directly, no texture lookup
    if (uUseColor == 1) {
        vec3 finalColor = vColor.rgb;

        // Exponential distance fog
        float fogFactor = 1.0 - exp(-vDepth * uFogDensity);
        fogFactor = clamp(fogFactor, 0.0, 1.0);
        finalColor = mix(finalColor, uFogColor, fogFactor);

        gl_FragColor = vec4(finalColor, vColor.a);
        return;
    }

    // Terrain rendering mode: use texture with lighting
    vec4 texColor = texture2D(uTexture, vUV);
    if (texColor.a < 0.5) discard;

    // === Underwater texture distortion ===
    vec3 finalColor;
    if (uCameraWaterDepth > 0.5) {
        float depthFactor = uCameraWaterDepth * 0.01; // 1% UV shift per meter
        // Animated distortion using vUV (not vWorldPos) to prevent seams at chunk boundaries
        vec2 noiseUV = vUV + vec2(
            sin(vUV.x * 3.14159 * 2.0) * depthFactor,
            cos(vUV.y * 3.14159 * 2.0) * depthFactor
        );

        // Additional distortion for deeper water (> 3m)
        if (uCameraWaterDepth > 3.0) {
            float extraDistort = (uCameraWaterDepth - 3.0) * 0.005;
            noiseUV += vec2(
                sin(vUV.y * 3.14159 * 2.0) * extraDistort,
                cos(vUV.x * 3.14159 * 2.0) * extraDistort
            );
        }

        finalColor = texture2D(uTexture, noiseUV).rgb * vLight * uLightFactor;

        // Underwater color tint (blue-green)
        finalColor = mix(finalColor, finalColor * uUnderwaterColor, 0.4);
    } else {
        // Normal (non-underwater) rendering
        finalColor = texColor.rgb * vLight * uLightFactor;
    }

    // Exponential distance fog — stronger underwater
    float fogDensity = uFogDensity;
    if (uCameraWaterDepth > 0.5) {
        fogDensity = uUnderwaterDensity; // ~3-5× stronger
    }
    float fogFactor = 1.0 - exp(-vDepth * fogDensity);
    fogFactor = clamp(fogFactor, 0.0, 1.0);
    finalColor = mix(finalColor, uFogColor, fogFactor);

    gl_FragColor = vec4(finalColor, texColor.a);
}
`;

// Fog Fragment Shader
var FOG_FRAGMENT_SHADER = `
precision mediump float;
uniform vec3 uFogColor;

void main() {

// Water Fragment Shader — unified semi-transparent water surface with FBM waves,
// semi-scattered reflection, sun glare (Fresnel + specular), and depth-based fog.
//
// FIXES applied:
// - UV coordinates are now wrapped using fract() to prevent out-of-bounds texture sampling
//   which caused random color artifacts when water spans many blocks.
// - Wave animation uses the FBM-computed wave height to perturb the normal for
//   more realistic light interaction with the animated surface.
// - Reflection texture sampling is clamped to [0,1] to prevent undefined behavior.
var WATER_FRAGMENT_SHADER = `
precision mediump float;

varying vec2 vUV;
varying vec3 vNormal;
varying vec3 vWorldPos;
varying float vDepth;

uniform sampler2D uTexture;
uniform vec3 uFogColor;
uniform float uFogDensity;
uniform float uLightFactor;

uniform float uWaterAlpha;        // base transparency (~0.55)
uniform float uReflectionStrength;// 0-1 based on viewing angle (Fresnel)
uniform sampler2D uReflectionTex; // reflected terrain texture
uniform float uTime;              // animated wave time
uniform vec3 uCameraPos;          // camera world position
uniform float uWaterLevel;        // water surface Y coordinate
uniform vec3 uSunDir;             // sun direction vector for specular glare
uniform float uWaveScale;         // FBM wave UV scale multiplier (matches JS FBM_WAVE_SCALE)

// === Simplex-like 2D noise (fast approximation) ===
vec3 permute(vec3 x) {
    return mod(((x * 34.0) + 1.0) * x, 289.0);
}

float snoise(vec2 v) {
    const vec4 C = vec4(0.211324865405187,  // (3.0-sqrt(3.0))/6.0
                        0.366025403784439,  // 0.5*(sqrt(3.0)-1.0)
                       -0.577350269189626,  // -1.0 + 2.0 * C.x
                        0.024390243902439); // 1.0 / 41.0
    vec2 i = floor(v + dot(v, C.yy));
    vec2 x0 = v - i + dot(i, C.xx);
    vec2 i1;
    i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
    vec4 x12 = x0.xyxy + C.xxzz;
    x12.xy -= i1;
    i = mod(i, 289.0);
    vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0))
        + i.x + vec3(0.0, i1.x, 1.0));
    vec3 m = max(0.5 - vec3(dot(x0, x0), dot(x12.xy, x12.xy), dot(x12.zw, x12.zw)), 0.0);
    m = m * m;
    m = m * m;
    vec3 x = 2.0 * fract(p * C.www) - 1.0;
    vec3 h = abs(x) - 0.5;
    vec3 ox = floor(x + 0.5);
    vec3 a0 = x - ox;
    m *= 1.79284291400159 - 0.85373472095314 * (a0 * a0 + h * h);
    vec3 g;
    g.x = a0.x * x0.x + h.x * x0.y;
    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
    return 130.0 * dot(m, g);
}

// === FBM (Fractional Brownian Motion) — 4 octaves for organic rolling waves ===
float fbm(vec2 p, float time) {
    float value = 0.0;
    float amplitude = 0.5;
    float frequency = 1.0;
    // 4 octaves: base + 3 harmonics
    vec2 offset = vec2(time * 0.08, time * 0.06); // slow drift
    for (int i = 0; i < 4; i++) {
        float noiseVal = snoise(p * frequency + offset) * amplitude;
        value += noiseVal;
        amplitude *= 0.5;
        frequency *= 2.0;
    }
    return value;
}

void main() {
    // === Animated FBM wave displacement ===
    // Wave UV uses world-space coordinates for seamless large-surface animation.
    vec2 waveUV = vUV * uWaveScale;
    float waveHeight = fbm(waveUV, uTime);

    // Distort UV based on wave gradient for semi-scattered reflection
    float eps = 0.01;
    vec2 dx = vec2(eps, 0.0);
    vec2 dy = vec2(0.0, eps);
    float waveXp = fbm(waveUV + dx, uTime);
    float waveXn = fbm(waveUV - dx, uTime);
    float waveYp = fbm(waveUV + dy, uTime);
    float waveYn = fbm(waveUV - dy, uTime);
    vec2 waveGradient = vec2(waveXp - waveXn, waveYp - waveYn) * 0.5;

    // === Texture UV: use vertex UV directly (already in correct atlas tile range) ===
    // The vertex shader now passes per-block UVs offset by the water tile position,
    // so no fract() wrapping is needed. This ensures the water samples its specific
    // tile from the atlas instead of all tiles being clamped to [0,1].
    vec2 texUV = vUV;

    // Reflection UV: distort by wave gradient for scattered reflection effect
    vec2 reflUV = texUV;
    reflUV += waveGradient * 0.3; // subtle scattering
    reflUV = clamp(reflUV, 0.0, 1.0); // Clamp to prevent out-of-bounds

    // Sample base terrain texture (for water color mixing)
    vec2 baseUV = texUV + waveGradient * 0.05;
    vec4 texColor = texture2D(uTexture, baseUV);

    // Sample reflected terrain (null texture returns black — safely blended out)
    vec4 reflColor = texture2D(uReflectionTex, reflUV);

    // === FIX: Compute animated normal from FBM wave height for realistic lighting ===
    // Perturb the normal based on wave gradient so light interacts with the animated surface.
    vec3 waveNormal = vec3(waveGradient * 2.0, 1.0 - length(waveGradient) * 0.5);
    waveNormal = normalize(waveNormal);
    vec3 litNormal = mix(vNormal, waveNormal, 0.3); // Blend 30% with animated normal

    // === Fresnel effect: steeper angles = more reflection ===
    vec3 viewDir = normalize(uCameraPos - vWorldPos);
    float fresnel = pow(1.0 - abs(dot(viewDir, litNormal)), 4.0);

    // Reflection blend: mix between direct water (bottom angle) and reflection (grazing)
    float reflectionBlend = mix(0.2, 1.0, fresnel) * uReflectionStrength;

    // FIX: Use a solid base water color instead of relying on texture sampling
    // which can produce garbage when the atlas doesn't have the expected tiles.
    vec3 directWater = vec3(0.12, 0.32, 0.58); // Deep blue-green water color

    // Blend with texture color for subtle variation (reduce texture dependency)
    float texInfluence = 0.3; // Only 30% texture influence, 70% solid color
    directWater = mix(directWater, texColor.rgb * vec3(0.15, 0.35, 0.6), texInfluence);

    vec3 waterColor = mix(directWater, reflColor.rgb * vec3(0.5), reflectionBlend);

    // === Sun glare (specular highlight) ===
    // Blinn-Phong specular: highlight when half-angle aligns with normal
    vec3 halfDir = normalize(uSunDir + viewDir);
    float spec = pow(max(dot(litNormal, halfDir), 0.0), 64.0);
    // Add wave perturbation to specular for realistic shimmer
    spec *= (0.5 + 0.5 * (0.5 + waveHeight)); // shimmer: brightens/darkens with waves
    vec3 sunGlare = vec3(1.0, 0.95, 0.8) * spec * 0.6; // warm white glare

    waterColor += sunGlare;

    // === Apply lighting factor for time-of-day brightness ===
    // Multiplies the entire water surface to match terrain lighting consistency
    waterColor *= uLightFactor;

    // === Depth-based fog ===
    // Distance from camera to water surface point
    float distFromCamera = length(vWorldPos - uCameraPos);

    // Exponential distance fog
    float fogFactor = 1.0 - exp(-distFromCamera * uFogDensity);
    fogFactor = clamp(fogFactor, 0.0, 1.0);
    waterColor = mix(waterColor, uFogColor, fogFactor);

    // === Alpha: Fresnel-based transparency ===
    // Steeper angles (grazing) = more opaque (more reflection)
    // Direct overhead view = more transparent
    // Use uWaterAlpha uniform for configurable base transparency
    float alpha = mix(uWaterAlpha, uWaterAlpha * 1.54, fresnel); // 0.55 * 1.54 ≈ 0.85

    // Use uWaterLevel to adjust alpha based on camera height above water surface
    // Camera closer to water surface = slightly more transparent
    float camHeightAboveWater = uCameraPos.y - uWaterLevel;
    if (camHeightAboveWater > 0.0 && camHeightAboveWater < 10.0) {
        alpha *= 1.0 - (1.0 - camHeightAboveWater / 10.0) * 0.1;
    }
    alpha *= (1.0 - reflectionBlend * 0.2); // slightly reduce alpha where reflection is strong

    // Dithering: subtle per-pixel variation to prevent banding.
    // Uses a UV-based pseudo-random pattern instead of world position to avoid
    // visible repeating patterns across large bodies of water.
    float dither = (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) * 0.02;
    alpha += dither;

    gl_FragColor = vec4(waterColor, clamp(alpha, 0.3, 0.9));
}
`;

// Entity Fragment Shader — flat color rendering with fog
var ENTITY_FRAGMENT_SHADER = `
precision mediump float;

varying vec3 vNormal;
varying float vDepth;

uniform vec3 uColor;
uniform vec3 uFogColor;
uniform float uFogDensity;

void main() {
    // Apply flat color from uniform
    vec3 finalColor = uColor;

    // Simple directional lighting
    vec3 lightDir = normalize(vec3(0.5, 1.0, 0.3));
    float diff = max(dot(normalize(vNormal), lightDir), 0.25);
    finalColor *= diff;

    // Exponential distance fog
    float fogFactor = 1.0 - exp(-vDepth * uFogDensity);
    fogFactor = clamp(fogFactor, 0.0, 1.0);
    finalColor = mix(finalColor, uFogColor, fogFactor);

    gl_FragColor = vec4(finalColor, 1.0);
}
`;

                    gameSystems.blockActionSystem,
                    gameSystems.blockPlacementSystem,

                        } else {

                            // Wire keyboard shortcut (I key) to toggle inventory
                            document.addEventListener('keydown', function (e2) {
                                if (e2.code === 'KeyI' && !e2.ctrlKey && !e2.metaKey && !e2.altKey) {
                                    e2.preventDefault();
                                    if (game2._inventoryUI) {
                                        game2._inventoryUI.toggle();
                                    }
                                }
                            });

                            Donkeycraft.Logger.info('Game', 'Player Inventory UI initialized');
                        } catch (e) {
                            Donkeycraft.Logger.error('Game', 'InventoryUI error: ' + e.message);
                        }

                        // Listen for hotbar selection changes
                        if (hotbar.onSelectedChange) {
                            hotbar.onSelectedChange(function (newSlot, oldSlot) {
                                // Sync player selected slot
                                if (game2._player && game2._player.setSelectedHotbarSlot) {
                                    game2._player.setSelectedHotbarSlot(newSlot);
                                }
                            });
                        }
                    }

                    // --- Wire up Hunger system (deferred from setSystems — player created in init()) ---
                    // Note: HurtBox removed — all vitals stored on Player directly
                    try {
                        var hunger = new Donkeycraft.Hunger(game2._player);
                        game2._hungerSystem = hunger;
                        Donkeycraft._hungerSystem = hunger;

                        // Wire hunger system into Movement for degradation tracking
                        if (game2._movementSystem) {
                            try { game2._movementSystem.setHungerSystem(hunger); } catch (e3) { }
                        }
                    } catch (e) {
                        Donkeycraft.Logger.error('Game', 'Hunger deferred init failed: ' + e.message);
                    }

                    // --- Wire up Health Bar UI ---
                    try {
                        var healthBarContainer = document.getElementById('dk-health-bar-wrapper');
                        if (healthBarContainer && Donkeycraft.HealthBar && game2._player) {
                            var healthBar = new Donkeycraft.HealthBar(healthBarContainer, game2._player);
                            Donkeycraft._healthBar = healthBar;
                        } else {
                            Donkeycraft.Logger.warn('Game', 'HealthBar skipped - container:', !!healthBarContainer, 'class:', typeof Donkeycraft.HealthBar, 'player:', !!game2._player);
                        }
                    } catch (e) {
                        Donkeycraft.Logger.error('Game', 'HealthBar error: ' + e.message);
                    }

                    // --- Wire up Hunger Bar UI ---
                    try {
                        var hungerBarContainer = document.getElementById('dk-hunger-bar-wrapper');
                        if (hungerBarContainer && Donkeycraft.HungerBar && game2._hungerSystem) {
                            var hungerBar = new Donkeycraft.HungerBar(hungerBarContainer, game2._hungerSystem);
                            Donkeycraft._hungerBar = hungerBar;
                        } else {
                            Donkeycraft.Logger.warn('Game', 'HungerBar skipped - container:', !!hungerBarContainer, 'class:', typeof Donkeycraft.HungerBar, 'hunger:', !!game2._hungerSystem);
                        }
                    } catch (e) {
                        Donkeycraft.Logger.error('Game', 'HungerBar error: ' + e.message);
                    }

                    // --- Wire up Speed Indicator UI (slider-based speed selection) ---
                    try {
                        var speedIndicatorContainer = document.getElementById('dk-speed-indicator');
                        if (speedIndicatorContainer && Donkeycraft.SpeedIndicator && game2._movementSystem) {
                            var speedIndicator = new Donkeycraft.SpeedIndicator(speedIndicatorContainer);
                            if (game2._player) {
                                speedIndicator.setPlayer(game2._player);
                            }
                            speedIndicator.setMovementSystem(game2._movementSystem);

                            // Wire the slider change callback — when the user changes the slider,
                            // notify the movement system of the new index and speed ID.
                            if (game2._movementSystem.setSliderIndex) {
                                speedIndicator.setOnSliderChange(function (index, speedId) {
                                    if (game2._movementSystem && game2._movementSystem.setSliderIndex) {
                                        game2._movementSystem.setSliderIndex(index);
                                    }
                                    Donkeycraft.Logger.info('SpeedIndicator', 'Speed changed to index ' + index + ' (' + speedId + ')');
                                });
                            }

                            // Store reference on game for render loop updates
                            game2._speedIndicator = speedIndicator;
                            Donkeycraft.Logger.info('Game', 'Speed Indicator initialized (slider mode)');
                        }
                    } catch (e) {
                        Donkeycraft.Logger.error('Game', 'SpeedIndicator error: ' + e.message);
                    }

                    // --- Wire up Game Mode Badge UI ---
                    try {
                        var badgeContainer = document.getElementById('dk-gamemode-badge');
                        if (badgeContainer && Donkeycraft.GameModeBadge) {
                            var gameModeBadge = new Donkeycraft.GameModeBadge(badgeContainer);
                            if (game2._player) {
                                gameModeBadge.setPlayer(game2._player);
                            }
                            // Wire swap callback: clicking badge swaps between survival and creative
                            var self2 = this;
                            gameModeBadge.setOnSwap(function (targetMode) {
                                try {
                                    var player2 = window._dkGame && window._dkGame.getPlayer ? window._dkGame.getPlayer() : null;
                                    if (!player2) return;
                                    var currentMode = player2.getGameMode ? player2.getGameMode() : null;
                                    // Don't switch if already in target mode
                                    if (currentMode === targetMode) return;
                                    player2.setGameMode(targetMode);
                                    // Reset fly state when switching to creative
                                    if (targetMode === 'creative' && window._dkGame && window._dkGame._flyingSystem) {
                                        window._dkGame._flyingSystem.enableFlyMode();
                                    }
                                    Donkeycraft.Logger.info('Game', 'Game mode swapped to: ' + targetMode + ' (via badge click)');
                                } catch (e3) {
                                    Donkeycraft.Logger.error('Game', 'Badge swap error: ' + e3.message);
                                }
                            });
                            // Store reference for cleanup on game destroy
                            game2._gameModeBadge = gameModeBadge;
                        }
                    } catch (e) {
                        Donkeycraft.Logger.error('Game', 'GameModeBadge error: ' + e.message);
                    }

                    // --- Wire up XP Bar UI ---
                    try {
                        var experience = new Donkeycraft.Experience(game2._player);
                        // Make experience instance accessible for test buttons
                        Donkeycraft._xpInstance = experience;

                        // Wire XP bar UI (DOM container already exists in HTML)
                        var xpBarContainer = document.getElementById('dk-xp-bar-wrapper');
                        if (xpBarContainer && Donkeycraft.XPBar) {
                            var xpBar = new Donkeycraft.XPBar(xpBarContainer, experience);
                            // Store XPBar reference globally for test button access
                            Donkeycraft._xpBar = xpBar;
                        }
                    } catch (e) {
                        Donkeycraft.Logger.warn('Game', 'XP Bar initialization failed: ' + e.message);
                    }

                    // --- Wire up GuiManager ---
                    if (Donkeycraft.GuiManager) {
                        var guiContainer = document.getElementById('dk-gui-container');
                        var guiBackdrop = document.getElementById('dk-gui-backdrop');
                        try {
                            var guiManager = new Donkeycraft.GuiManager(guiContainer, guiBackdrop);
                            game2.setGuiManager(guiManager);

                            // Close GUI on backdrop click (only when no panels exist to avoid double-close)
                            if (guiBackdrop) {
                                guiBackdrop.addEventListener('click', function () {
                                    if (guiManager.isOpen()) {
                                        guiManager.close();
                                    }
                                });
                            }

                            // Register all GUI component types with the manager
                            try {
                                // Register proper GUI wrapper classes instead of data classes
                                if (Donkeycraft.InventoryGui) {
                                    guiManager.registerComponent('inventory', Donkeycraft.InventoryGui);
                                } else if (Donkeycraft.Inventory) {
                                    guiManager.registerComponent('inventory', Donkeycraft.Inventory);
                                }
                                if (Donkeycraft.CraftingGrid) {
                                    guiManager.registerComponent('crafting_table', Donkeycraft.CraftingGrid);
                                }
                                if (Donkeycraft.FurnaceUI) {
                                    guiManager.registerComponent('furnace', Donkeycraft.FurnaceUI);
                                }
                                if (Donkeycraft.ChestUI) {
                                    guiManager.registerComponent('chest', Donkeycraft.ChestUI);
                                }
                                if (Donkeycraft.AnvilUI) {
                                    guiManager.registerComponent('anvil', Donkeycraft.AnvilUI);
                                }
                                if (Donkeycraft.EnchantingUI) {
                                    guiManager.registerComponent('enchanting_table', Donkeycraft.EnchantingUI);
                                }
                                if (Donkeycraft.CreativeInventory) {
                                    guiManager.registerComponent('creative_inventory', Donkeycraft.CreativeInventory);
                                }
                            } catch (e) {
                                Donkeycraft.Logger.warn('Game', 'GUI component registration failed: ' + e.message);
                            }

                            // --- Wire up DebugOverlay (F3) ---
                            try {
                                var debugOverlay = new Donkeycraft.DebugOverlay(game2.getEventBus(), Donkeycraft.Config);
                                debugOverlay.setPlayer(game2._player);
                                debugOverlay.setChunkManager(game2._chunkManager);
                                debugOverlay.setTimer(game2._timer);
                                debugOverlay.setBiome(Donkeycraft.Biome || null);
                                debugOverlay.setGameMode(game2._gameMode);

                                // Wire terrain renderer reference so the F3 overlay can show rendering stats.
                                if (game2._terrainRenderer) {
                                    debugOverlay.setTerrainRenderer(game2._terrainRenderer);
                                }

                                // Store reference for toggleDebugOverlay to use
                                game2._debugOverlay = debugOverlay;

                                // Override toggleDebugOverlay to start/stop auto-listening
                                var origToggle = game2.toggleDebugOverlay.bind(game2);
                                game2.toggleDebugOverlay = function () {
                                    var visible = origToggle();
                                    if (visible && debugOverlay.startListening) {
                                        debugOverlay.startListening();
                                    } else if (!visible && debugOverlay.stopListening) {
                                        debugOverlay.stopListening();
                                    }
                                    return visible;
                                };

                                // Wire game reference into DebugOverlay for renderer toggle access
                                debugOverlay.setGame(game2);

                                // --- Renderer Toggle Checkboxes: event delegation on debug overlay ---
                                var dkDebugOverlay = document.getElementById('dk-debug-overlay');
                                if (dkDebugOverlay) {
                                    dkDebugOverlay.addEventListener('change', function (e) {
                                        if (e.target.classList && e.target.classList.contains('dk-renderer-toggle')) {
                                            var renderer = e.target.getAttribute('data-renderer');
                                            if (renderer) {
                                                game2.setRendererVisibility(renderer, e.target.checked);
                                            }
                                        }
                                    });
                                }
                            } catch (e) {
                                Donkeycraft.Logger.warn('Game', 'DebugOverlay initialization failed: ' + e.message);
                            }

                            // --- Wire FurnaceUI timer auto-start when furnace GUI opens ---
                            var origGuiOpen = guiManager.open.bind(guiManager);
                            guiManager.open = function (type, data) {
                                var result = origGuiOpen(type, data);
                                if (type === 'furnace' && this._guiStack.length > 0) {
                                    var topEntry = this._guiStack[this._guiStack.length - 1];
                                    if (topEntry.ui && topEntry.ui.setTimer && topEntry.ui.startListening) {
                                        try {
                                            topEntry.ui.setTimer(game2._timer);
                                            topEntry.ui.startListening();
                                        } catch (e3) { }
                                    }
                                }
                                return result;
                            };

                            // --- Chest data store: persists chest contents across GUI open/close ---
                            var _chestDataStore = {}; // key "x,y,z" → { doubleChest: boolean, slots: Array }

                            // Listen for guiOpen:chest events from InteractableBlocks
                            try {
                                var eventBus = game2.getEventBus();
                                if (eventBus) {
                                    eventBus.on('guiOpen:chest', function (data) {
                                        var cx = data.x, cy = data.y, cz = data.z;
                                        var chestKey = cx + ',' + cy + ',' + cz;

                                        // Double-chest detection: check adjacent positions
                                        var doubleChest = false;
                                        var adjKeys = [
                                            (cx - 1) + ',' + cy + ',' + cz,
                                            (cx + 1) + ',' + cy + ',' + cz,
                                            cx + ',' + cy + ',' + (cz - 1),
                                            cx + ',' + cy + ',' + (cz + 1)
                                        ];
                                        for (var d = 0; d < adjKeys.length; d++) {
                                            if (_chestDataStore[adjKeys[d]] && _chestDataStore[adjKeys[d]].doubleChest) {
                                                doubleChest = true;
                                                break;
                                            }
                                        }

                                        // Load chest data from store
                                        var chestData = _chestDataStore[chestKey] || { key: chestKey, doubleChest: doubleChest, slots: new Array(doubleChest ? 54 : 27) };
                                        chestData.doubleChest = doubleChest;

                                        // Open chest GUI with data
                                        guiManager.open('chest', {
                                            doubleChest: doubleChest,
                                            chestKey: chestKey,
                                            preloadedSlots: chestData.slots
                                        });
                                    });

                                    // guiClose:chest events are handled by the guiManager.close override above,
                                    // which saves chest data before closing. No separate event listener needed.
                                }
                            } catch (e4) {
                                Donkeycraft.Logger.warn('Game', 'Chest event wiring failed: ' + e4.message);
                            }

                            // Save chest data when any GUI is closed
                            var origGuiClose = guiManager.close.bind(guiManager);
                            guiManager.close = function () {
                                if (this._guiStack.length > 0) {
                                    var topBefore = this._guiStack[this._guiStack.length - 1];
                                    // Save chest data if closing a chest GUI
                                    if (topBefore.type === 'chest' && topBefore.ui && topBefore.ui.serializeData) {
                                        var serialized = topBefore.ui.serializeData();
                                        if (serialized.key) {
                                            _chestDataStore[serialized.key] = {
                                                doubleChest: serialized.doubleChest,
                                                slots: serialized.slots
                                            };
                                        }
                                    }
                                }
                                return origGuiClose();
                            };

                        } catch (e) {
                            Donkeycraft.Logger.warn('Game', 'GuiManager initialization failed: ' + e.message);
                        }
                    }

                    // ============================================================
                    // Wire up Keybindings Panel (display-only, top-center)
                    // ============================================================
                    try {
                        var keybindPanel = new Donkeycraft.KeybindingsPanel();
                        if (game2._timer && keybindPanel.startListening) {
                            keybindPanel.startListening(game2._timer);
                        }
                        // Listen for game mode changes to update displayed keys
                        if (game2._eventBus) {
                            try {
                                game2._eventBus.on('gameMode:changed', function (data) {
                                    if (data && data.newMode && keybindPanel.setGameMode) {
                                        keybindPanel.setGameMode(data.newMode);
                                    }
                                });
                            } catch (e) { }
                        }
                        // Store reference for cleanup on game destroy
                        game2._keybindingsPanel = keybindPanel;
                    } catch (e) {
                        Donkeycraft.Logger.warn('Game', 'KeybindingsPanel initialization failed: ' + e.message);
                    }

                    // ============================================================
                    // Wire up Map Renderer (2D overhead map view + minimap)
                    // ============================================================
                    try {
                        if (Donkeycraft.MapRenderer && game2._chunkManager) {
                            var mapRenderer = new Donkeycraft.MapRenderer({
                                chunkManager: game2._chunkManager
                            });

                            // Set canvas elements from DOM
                            var fullMapCanvas = document.getElementById('dk-map-canvas');
                            var minimapCanvas = document.getElementById('dk-minimap-canvas');
                            mapRenderer.setCanvases(fullMapCanvas, minimapCanvas);

                            // Initialize (creates panel, toggle button, event listeners)
                            var mapInitOk = mapRenderer.init();

                            // Wire up chunk dirty callback — invalidate surface maps when blocks change
                            var cm = game2._chunkManager;
                            if (cm && mapInitOk) {
                                var existingChunksChanged = cm.onChunksChanged;
                                cm.onChunksChanged = function () {
                                    if (existingChunksChanged) existingChunksChanged();
                                    // Invalidate surface maps for all dirty chunks
                                    var dirty = cm.getDirtyChunks();
                                    for (var i = 0; i < dirty.length; i++) {
                                        Donkeycraft.MapRenderer.invalidateChunkSurfaceMap(dirty[i].chunkX, dirty[i].chunkZ);
                                    }
                                };
                            }

                            if (mapInitOk) {
                                // Store reference on game for render loop access
                                game2._mapRenderer = mapRenderer;

                                // Handle window resize — M-key toggle is handled in the main keydown listener
                                window.addEventListener('resize', function () {
                                    if (mapRenderer && mapRenderer.onWindowResize) {
                                        mapRenderer.onWindowResize();
                                    }
                                });

                                Donkeycraft.Logger.info('Game', 'Map Renderer initialized successfully');
                            } else {
                                Donkeycraft.Logger.warn('Game', 'Map Renderer initialization failed');
                            }
                        }
                    } catch (e) {
                        Donkeycraft.Logger.warn('Game', 'Map Renderer setup error: ' + e.message);
                    }

                    // ============================================================
                    // Wire up Nametag Renderer (CSS overlay system)
                    // ============================================================
                    try {
                        if (Donkeycraft.NametagRenderer && game2._entityManager && game2._camera) {
                            var nametagRenderer = new Donkeycraft.NametagRenderer({
                                entityManager: game2._entityManager,
                                camera: game2._camera,
                                gl: game2._gl || null
                            });
                            nametagRenderer.init();
                            game2._nametagRenderer = nametagRenderer;
                            Donkeycraft.Logger.info('Game', 'Nametag Renderer initialized');
                        }
                    } catch (e) {
                        Donkeycraft.Logger.warn('Game', 'Nametag Renderer initialization failed: ' + e.message);
                    }

                    // ============================================================
                    // Post-init validation: ensure critical systems are wired.
                    // If key subsystems failed to initialize, log a warning so
                    // the user knows which features may be missing.
                    // ============================================================
                    var _missingSystems = [];
                    if (!game2._camera) _missingSystems.push('Camera');
                    if (!game2._player) _missingSystems.push('Player');
                    if (!game2._chunkManager) _missingSystems.push('Chunk Manager');
                    if (!game2._terrainRenderer) _missingSystems.push('Terrain Renderer');
                    if (_missingSystems.length > 0) {
                        Donkeycraft.Logger.warn('Game', 'Critical systems missing after init: ' + _missingSystems.join(', ') + ' — some features may not work.');
                    } else {
                        Donkeycraft.Logger.info('Game', 'All critical systems initialized successfully');
                    }

                    // ============================================================
                    // Post-init validation: check that the WebGL context and shader programs are functional.
                    // If WebGL failed silently, surface an error instead of a black screen.
                    // ============================================================
                    var _glIssues = [];
                    if (!game2._gl) _glIssues.push('WebGL context null');
                    var _shaderStats = game2._shaderManager ? game2._shaderManager.getStats() : null;
                    if (!_shaderStats || _shaderStats.programs === 0) {
                        _glIssues.push('No shader programs compiled');
                    }
                    if (_glIssues.length > 0) {
                        Donkeycraft.Logger.error('Game', 'WebGL issues detected: ' + _glIssues.join('; '));
                    }

                    // Dispose loading screen after game starts and UI is wired up
                    loadingScreen.dispose();
                }
            }).catch(function (err) {
                if (loadingScreen) {
                    loadingScreen.showError(err.message || 'Initialization failed');
                }
            });


        })();
    </script>

</body>

</html>
